<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCA-AIIO Practice Exam</title>
<style>
  :root {
    --bg: #0B1426;
    --surface: #131E33;
    --surface2: #1A2740;
    --accent: #00E5B0;
    --accent-dim: #00E5B033;
    --text: #E8ECF1;
    --text-dim: #8899AA;
    --correct: #00E5B0;
    --incorrect: #FF4D6A;
    --warning: #FFB84D;
    --border: #2A3A52;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }

  .header .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 500;
  }

  /* Progress bar */
  .progress-container {
    margin-bottom: 24px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Domain tag */
  .domain-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  .domain-tag.essential { background: #1a3a5c; color: #5BA8FF; }
  .domain-tag.infra { background: #1a3c2e; color: #00E5B0; }
  .domain-tag.ops { background: #3a2a1a; color: #FFB84D; }

  /* Question */
  .question-text {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .option.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .option.correct {
    border-color: var(--correct);
    background: #00E5B015;
  }

  .option.incorrect {
    border-color: var(--incorrect);
    background: #FF4D6A15;
  }

  .option.disabled { cursor: default; }

  .option-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .option.selected .option-letter {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .option.correct .option-letter {
    background: var(--correct);
    color: var(--bg);
    border-color: var(--correct);
  }

  .option.incorrect .option-letter {
    background: var(--incorrect);
    color: white;
    border-color: var(--incorrect);
  }

  .option-text { font-size: 15px; padding-top: 3px; }

  /* Explanation */
  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
    display: none;
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  /* Buttons */
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--text-dim); }

  .btn-ghost {
    background: none;
    color: var(--text-dim);
    padding: 10px 12px;
  }

  .btn-ghost:hover { color: var(--text); }

  /* Timer */
  .timer {
    font-size: 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-dim);
  }

  .timer.warning { color: var(--warning); }
  .timer.danger { color: var(--incorrect); }

  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 60px 20px;
  }

  .start-screen h2 {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .start-screen .subtitle {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 32px;
  }

  .exam-info {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .info-card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .info-card .value {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }

  .mode-select {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .mode-btn {
    padding: 12px 24px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s ease;
  }

  .mode-btn:hover { border-color: var(--accent); }
  .mode-btn.active { border-color: var(--accent); background: var(--accent-dim); }

  .mode-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  /* Results screen */
  .results-screen { padding: 40px 0; }

  .results-screen h2 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 8px;
  }

  .score-display {
    text-align: center;
    margin: 24px 0;
  }

  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .score-circle.pass { border-color: var(--correct); }
  .score-circle.fail { border-color: var(--incorrect); }

  .score-number {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }

  .score-circle.pass .score-number { color: var(--correct); }
  .score-circle.fail .score-number { color: var(--incorrect); }

  .score-label { font-size: 13px; color: var(--text-dim); }

  .domain-breakdown {
    margin: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .domain-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 8px;
  }

  .domain-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }

  .domain-score {
    font-size: 14px;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .domain-bar {
    width: 120px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .domain-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Review */
  .review-item {
    margin-bottom: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }

  .review-item.was-correct { border-left-color: var(--correct); }
  .review-item.was-incorrect { border-left-color: var(--incorrect); }

  .review-q {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .review-answer {
    font-size: 13px;
    color: var(--text-dim);
  }

  .review-answer span { font-weight: 600; }
  .review-answer .correct-text { color: var(--correct); }
  .review-answer .incorrect-text { color: var(--incorrect); }

  /* Question navigator */
  .q-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 16px 0;
  }

  .q-nav-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.15s ease;
  }

  .q-nav-btn.answered { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .q-nav-btn.current { border-color: var(--text); color: var(--text); }
  .q-nav-btn.flagged { background: #FFB84D22; color: var(--warning); border-color: var(--warning); }

  .flag-btn {
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
  }

  .flag-btn.flagged { color: var(--warning); }

  @media (max-width: 600px) {
    .exam-info { grid-template-columns: 1fr; }
    .mode-select { flex-direction: column; align-items: center; }
    .actions { flex-direction: column; }
    .actions .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const QUESTIONS = [
  // === DOMAIN 1: Essential AI Knowledge (38%) - 19 questions ===
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which NVIDIA tool is specifically designed to optimize trained deep learning models for high-performance inference?",
    options: ["CUDA", "TensorRT", "NeMo", "NCCL"],
    correct: 1,
    explanation: "TensorRT is NVIDIA's inference optimizer and runtime. It takes trained models and optimizes them through layer fusion, precision calibration (FP16/INT8), and kernel auto-tuning for maximum throughput on NVIDIA GPUs. CUDA is the parallel computing platform, NeMo is for training/fine-tuning, and NCCL is for multi-GPU communication."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the primary architectural difference between GPUs and CPUs that makes GPUs better suited for deep learning?",
    options: [
      "GPUs have larger cache memory per core",
      "GPUs have thousands of smaller cores optimized for parallel processing",
      "GPUs have higher single-thread clock speeds",
      "GPUs use less power than CPUs"
    ],
    correct: 1,
    explanation: "GPUs have thousands of simpler cores designed for parallel processing, which is ideal for the matrix multiplication and linear algebra operations that dominate deep learning workloads. CPUs have fewer but more powerful cores optimized for sequential, low-latency tasks."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which statement correctly describes the relationship between AI, machine learning, and deep learning?",
    options: [
      "Deep learning is the broadest category, containing ML and AI",
      "AI, ML, and DL are three independent fields with no overlap",
      "AI is the broadest field, ML is a subset of AI, and DL is a subset of ML",
      "ML and DL are both subsets of AI, but ML and DL do not overlap"
    ],
    correct: 2,
    explanation: "AI is the broadest field encompassing any system that simulates human intelligence. Machine Learning is a subset of AI where systems learn from data. Deep Learning is a subset of ML that uses multi-layer neural networks. The relationship is: AI > ML > DL."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the primary function of NVIDIA Triton Inference Server?",
    options: [
      "Training large language models across multiple GPUs",
      "Serving trained models for inference with support for multiple frameworks",
      "Managing GPU clusters in a data center",
      "Optimizing model weights through quantization"
    ],
    correct: 1,
    explanation: "Triton Inference Server is NVIDIA's model serving solution that supports multiple frameworks (PyTorch, TensorFlow, ONNX, TensorRT) and provides features like dynamic batching, model versioning, and ensemble models. It handles the deployment and serving of models, not training or optimization."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which factor has NOT been a primary driver of the recent rapid adoption of AI?",
    options: [
      "Availability of massive datasets from internet and IoT",
      "Advances in GPU computing power",
      "Decrease in the number of available AI researchers",
      "Open-source frameworks like PyTorch and TensorFlow"
    ],
    correct: 2,
    explanation: "The rapid adoption of AI has been driven by massive data availability, GPU computing power, open-source frameworks, cloud computing, and algorithmic advances (like transformers). The number of AI researchers has actually increased, not decreased."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What does NVIDIA NIM provide?",
    options: [
      "A suite of GPU monitoring and diagnostics tools",
      "Pre-optimized inference microservices for rapid model deployment",
      "A container registry for storing custom Docker images",
      "A job scheduling system for HPC clusters"
    ],
    correct: 1,
    explanation: "NVIDIA NIM (NVIDIA Inference Microservices) provides pre-built, optimized microservices that package AI models with industry-standard APIs, making it easy to deploy models in production without manual optimization. It abstracts the complexity of inference serving."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "In the AI development lifecycle, which step comes immediately after model training?",
    options: [
      "Data collection",
      "Deployment to production",
      "Validation and testing",
      "Monitoring for data drift"
    ],
    correct: 2,
    explanation: "After training, the model must be validated and tested to evaluate its performance on unseen data before being optimized and deployed. The lifecycle goes: data preparation > model development > training > validation/testing > optimization > deployment > monitoring."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the primary difference between AI training and inference in terms of computational requirements?",
    options: [
      "Training requires less memory but more compute time than inference",
      "Training typically requires more compute resources, higher precision, and larger batch sizes than inference",
      "Inference requires higher precision floating-point operations than training",
      "Training and inference have identical computational requirements"
    ],
    correct: 1,
    explanation: "Training requires significantly more compute: higher precision (FP32 or mixed FP16/BF16), larger batch sizes for throughput, more GPU memory, and runs for hours/days. Inference can use lower precision (INT8, FP16), smaller batches, and is optimized for latency rather than throughput."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is NGC (NVIDIA GPU Cloud)?",
    options: [
      "A public cloud provider competing with AWS and Azure",
      "A catalog of GPU-optimized containers, pre-trained models, and SDKs",
      "NVIDIA's private data center hosting service",
      "A GPU virtualization platform"
    ],
    correct: 1,
    explanation: "NGC is NVIDIA's hub/registry that provides GPU-optimized software including containers, pre-trained models, Helm charts, and SDKs. It is not a cloud provider but a catalog/registry that works across clouds and on-premises infrastructure."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which NVIDIA framework is specifically designed for building, training, and fine-tuning large language models and AI models?",
    options: [
      "RAPIDS",
      "TensorRT",
      "NeMo",
      "DCGM"
    ],
    correct: 2,
    explanation: "NeMo (Neural Modules) is NVIDIA's framework for building, training, and fine-tuning AI models including LLMs, speech AI, and multimodal models. RAPIDS is for data science, TensorRT for inference optimization, and DCGM for GPU monitoring."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What type of memory do modern NVIDIA data center GPUs (A100, H100) use to achieve high bandwidth?",
    options: [
      "DDR5 SDRAM",
      "GDDR6X",
      "HBM (High Bandwidth Memory)",
      "LPDDR5"
    ],
    correct: 2,
    explanation: "NVIDIA data center GPUs like A100 (HBM2e) and H100 (HBM3) use High Bandwidth Memory, which provides bandwidth of 2-3+ TB/s. This is critical for AI workloads where data must be fed to GPU cores at very high rates. GDDR6X is used in consumer GeForce cards."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the purpose of NCCL in NVIDIA's software stack?",
    options: [
      "Compiling CUDA programs for different GPU architectures",
      "Providing collective communication routines for distributed training across multiple GPUs",
      "Managing container deployments on GPU clusters",
      "Converting models between different deep learning frameworks"
    ],
    correct: 1,
    explanation: "NCCL (NVIDIA Collective Communications Library) provides optimized collective communication primitives (AllReduce, AllGather, Broadcast, etc.) for distributed training across multiple GPUs and nodes. It is essential for scaling training workloads."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "NVIDIA RAPIDS is best described as:",
    options: [
      "An inference optimization toolkit",
      "A suite of GPU-accelerated libraries for data science and analytics",
      "A deep learning training framework",
      "A network management platform"
    ],
    correct: 1,
    explanation: "RAPIDS is a suite of open-source GPU-accelerated libraries for data science including cuDF (dataframes), cuML (machine learning), and cuGraph (graph analytics). It accelerates traditional data science workflows that typically run on CPU."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which NVIDIA solution provides a complete enterprise AI software platform with security, support, and management?",
    options: [
      "NGC",
      "CUDA Toolkit",
      "NVIDIA AI Enterprise",
      "DGX OS"
    ],
    correct: 2,
    explanation: "NVIDIA AI Enterprise is the enterprise software platform that includes certified containers, frameworks, and tools with enterprise support, security features, and management capabilities. NGC is the catalog, CUDA is the development platform, and DGX OS is the operating system for DGX systems."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the key advantage of using mixed precision training (e.g., FP16/BF16 with FP32)?",
    options: [
      "It eliminates the need for GPUs entirely",
      "It increases training speed and reduces memory usage while maintaining accuracy",
      "It only works on CPUs, not GPUs",
      "It improves inference latency but has no effect on training"
    ],
    correct: 1,
    explanation: "Mixed precision training uses lower precision (FP16 or BF16) for most operations while keeping critical operations in FP32. This nearly doubles throughput, reduces memory consumption (allowing larger batch sizes or models), while maintaining model accuracy through loss scaling techniques."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "In which industry is NVIDIA DRIVE platform primarily used?",
    options: [
      "Healthcare drug discovery",
      "Financial fraud detection",
      "Autonomous vehicles and advanced driver assistance",
      "Natural language processing for customer service"
    ],
    correct: 2,
    explanation: "NVIDIA DRIVE is the platform for autonomous vehicles (AV) and advanced driver assistance systems (ADAS). It provides the compute platform, software stack, and simulation tools for developing self-driving technology."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What is the purpose of cuDNN in the NVIDIA software stack?",
    options: [
      "GPU cluster management and orchestration",
      "Optimized library of primitives for deep neural network operations",
      "Data center networking protocol",
      "File system for GPU-attached storage"
    ],
    correct: 1,
    explanation: "cuDNN (CUDA Deep Neural Network library) provides highly optimized implementations of standard deep learning operations like convolutions, pooling, normalization, and activation functions. Deep learning frameworks like PyTorch and TensorFlow use cuDNN under the hood for GPU acceleration."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "Which of the following is a key difference between training and inference hardware requirements?",
    options: [
      "Training requires single GPU; inference always requires multi-GPU",
      "Inference always uses FP32 precision while training uses INT8",
      "Training typically benefits from high memory bandwidth and large GPU memory; inference prioritizes latency",
      "There is no difference in hardware requirements between training and inference"
    ],
    correct: 2,
    explanation: "Training benefits from large GPU memory (to hold model parameters, gradients, optimizer states), high memory bandwidth, and multi-GPU scaling. Inference prioritizes low latency and can often use smaller GPUs, lower precision, and optimized serving configurations."
  },
  {
    domain: "essential",
    domainLabel: "Essential AI Knowledge",
    question: "What does the NVIDIA software lifecycle for AI deployment typically include in the optimization phase?",
    options: [
      "Collecting and labeling training data",
      "Quantization, layer fusion, and kernel tuning to optimize the model for deployment",
      "Writing the initial model architecture code",
      "Setting up GPU cluster networking"
    ],
    correct: 1,
    explanation: "The optimization phase uses tools like TensorRT to apply quantization (reducing precision to INT8/FP16), layer fusion (combining multiple operations), and kernel auto-tuning to maximize performance for deployment. This step comes after training and validation but before production deployment."
  },

  // === DOMAIN 2: AI Infrastructure (40%) - 20 questions ===
  {
    domain: "infra",
    domainLabel: "AI Infrastructure",
    question: "What is the primary function of NVLink in an NVIDIA DGX system?",
    options: [
      "Connecting the DGX system to the external network",
      "Providing high-speed GPU-to-GPU interconnect within a node",
      "Managing storage I/O between GPUs and NVMe drives",
      "Connecting multiple DGX nodes across a data center"
    ],
    correct: 1,
    explanation: "NVLink is a high-bandwidth, energy-efficient interconnect that enables direct GPU-to-GPU communication within a single server/node. It provides much higher bandwidth than PCIe. For connecting nodes across a cluster, InfiniBand or high-speed Ethernet is used."
  },
  {
    domain: "infra",
    domainLabel: "AI Infrastructure",
    question: "What role does NVSwitch play in a multi-GPU system?",
    options: [
      "It switches between different CUDA versions for compatibility",
      "It provides a switch fabric enabling full-mesh NVLink connectivity among all GPUs in a node",
      "It manages network traffic between data center racks",
      "It switches GPU power states for energy efficiency"
    ],
    correct: 1,
    explanation: "NVSwitch is a dedicated switch chip that connects all GPUs within a node via NVLink in a full-mesh topology, providing full bisection bandwidth. Without NVSwitch, NVLink connections would be point-to-point. NVSwitch makes all GPUs appear as a single, unified memory space."
  },
  {
    domain: "infra",
    domainLabel: "AI Infrastructure",
    question: "Which networking technology is primarily used for high-speed inter-node communication in AI clusters?",
    options: [
      "NVLink",
      "PCIe Gen5",
      "InfiniBand",
      "USB 4.0"
    ],
    correct: 2,

// Shuffle utility
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// App state
let state = {
  screen: 'start',
  mode: 'study', // 'study' or 'exam'
  questions: [],
  current: 0,
  answers: {},
  flagged: new Set(),
  revealed: new Set(),
  startTime: null,
  elapsed: 0,
  timerInterval: null
};

function startExam(mode) {
  state.mode = mode;
  state.questions = shuffle(QUESTIONS).slice(0, 50);
  state.current = 0;
  state.answers = {};
  state.flagged = new Set();
  state.revealed = new Set();
  state.startTime = Date.now();
  state.screen = 'exam';

  if (mode === 'exam') {
    state.timerInterval = setInterval(() => {
      state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      renderTimer();
      if (state.elapsed >= 3600) {
        finishExam();
      }
    }, 1000);
  }
  render();
}

function selectAnswer(idx) {
  const qi = state.current;
  if (state.mode === 'exam' && state.revealed.has(qi)) return;
  state.answers[qi] = idx;

  if (state.mode === 'study') {
    state.revealed.add(qi);
  }
  render();
}

function revealAnswer() {
  state.revealed.add(state.current);
  render();
}

function nextQuestion() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    render();
  }
}

function prevQuestion() {
  if (state.current > 0) {
    state.current--;
    render();
  }
}

function goToQuestion(idx) {
  state.current = idx;
  render();
}

function toggleFlag() {
  const qi = state.current;
  if (state.flagged.has(qi)) state.flagged.delete(qi);
  else state.flagged.add(qi);
  render();
}

function finishExam() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.screen = 'results';
  render();
}

function resetExam() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.screen = 'start';
  render();
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function renderTimer() {
  const el = document.getElementById('timer');
  if (!el) return;
  const remaining = Math.max(0, 3600 - state.elapsed);
  el.textContent = formatTime(remaining);
  el.className = 'timer' + (remaining < 300 ? ' danger' : remaining < 600 ? ' warning' : '');
}

function getScore() {
  let correct = 0;
  let byDomain = { essential: { correct: 0, total: 0 }, infra: { correct: 0, total: 0 }, ops: { correct: 0, total: 0 } };

  state.questions.forEach((q, i) => {
    const d = q.domain;
    byDomain[d].total++;
    if (state.answers[i] === q.correct) {
      correct++;
      byDomain[d].correct++;
    }
  });

  return { correct, total: state.questions.length, byDomain };
}

function render() {
  const app = document.getElementById('app');

  if (state.screen === 'start') {
    app.innerHTML = renderStartScreen();
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.mode = btn.dataset.mode;
        document.getElementById('mode-desc').textContent =
          state.mode === 'study'
            ? 'See correct answers immediately after each question. Best for learning.'
            : 'Timed exam simulation (60 min). Answers revealed at the end.';
      });
    });
    document.getElementById('start-btn').addEventListener('click', () => startExam(state.mode));
    return;
  }

  if (state.screen === 'exam') {
    app.innerHTML = renderExamScreen();
    attachExamListeners();
    return;
  }

  if (state.screen === 'results') {
    app.innerHTML = renderResultsScreen();
    document.getElementById('restart-btn')?.addEventListener('click', resetExam);
    document.getElementById('review-btn')?.addEventListener('click', () => {
      state.screen = 'review';
      render();
    });
    return;
  }

  if (state.screen === 'review') {
    app.innerHTML = renderReviewScreen();
    document.getElementById('back-btn')?.addEventListener('click', () => {
      state.screen = 'results';
      render();
    });
    return;
  }
}

  const answered = state.answers[qi] !== undefined;
  const revealed = state.revealed.has(qi);

  const domainClass = q.domain === 'essential' ? 'essential' : q.domain === 'infra' ? 'infra' : 'ops';

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    if (revealed) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct';
      else if (state.answers[qi] === i && i !== q.correct) cls += ' incorrect';
    } else if (state.answers[qi] === i) {
      cls += ' selected';
    }
    return `
      <div class="${cls}" data-idx="${i}">
        <div class="option-letter">${letters[i]}</div>
        <div class="option-text">${opt}</div>

  }

  let actionsHtml = '';
  if (state.mode === 'study') {
    actionsHtml = `

        </div>
      </div>
    `;
  } else {
    actionsHtml = `
      <div class="actions">
        <button class="btn btn-secondary" id="prev-btn" ${qi === 0 ? 'disabled' : ''}>← Previous</button>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-primary" id="next-btn">${qi < state.questions.length - 1 ? 'Next →' : 'Submit Exam'}</button>
        </div>
      </div>

  for (let i = 0; i < state.questions.length; i++) {

      <div style="display:flex;align-items:center;gap:12px;">
        ${state.mode === 'exam' ? '<div class="timer" id="timer">60:00</div>' : ''}
        <span class="badge">${state.mode === 'study' ? 'Study' : 'Exam'}</span>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-info">
        <span>Question ${qi + 1} of ${state.questions.length}</span>
        <span>${Object.keys(state.answers).length} answered</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${((qi + 1) / state.questions.length) * 100}%"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="domain-tag ${domainClass}">${q.domainLabel}</span>
      <button class="flag-btn ${state.flagged.has(qi) ? 'flagged' : ''}" id="flag-btn">${state.flagged.has(qi) ? '⚑ Flagged' : '⚐ Flag'}</button>
    </div>
    <div class="question-text">${q.question}</div>
    <div class="options">${optionsHtml}</div>
    ${explanationHtml}
    ${actionsHtml}
    ${qNavHtml}
  `;
}

function attachExamListeners() {
  const qi = state.current;
  const revealed = state.revealed.has(qi);

  if (!revealed || state.mode === 'exam') {
    document.querySelectorAll('.option:not(.disabled)').forEach(opt => {
      opt.addEventListener('click', () => selectAnswer(parseInt(opt.dataset.idx)));
    });
  }

  document.getElementById('prev-btn')?.addEventListener('click', prevQuestion);
  document.getElementById('flag-btn')?.addEventListener('click', toggleFlag);

  if (state.mode === 'study') {
    document.getElementById('check-btn')?.addEventListener('click', revealAnswer);
    document.getElementById('next-btn')?.addEventListener('click', () => {
      if (qi >= state.questions.length - 1) finishExam();
      else nextQuestion();
    });
  } else {
    document.getElementById('next-btn')?.addEventListener('click', () => {
      if (qi >= state.questions.length - 1) {
        const unanswered = state.questions.length - Object.keys(state.answers).length;
        if (unanswered > 0) {
          if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
        }
        finishExam();
      } else nextQuestion();
    });
    if (state.mode === 'exam') renderTimer();
  }

  document.querySelectorAll('.q-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => goToQuestion(parseInt(btn.dataset.qi)));
  });
}

function renderResultsScreen() {
  const score = getScore();
  const pct = Math.round((score.correct / score.total) * 100);
  const passed = pct >= 70;

  const domains = [
    { key: 'essential', name: 'Essential AI Knowledge', weight: '38%', color: '#5BA8FF' },
    { key: 'infra', name: 'AI Infrastructure', weight: '40%', color: '#00E5B0' },
    { key: 'ops', name: 'AI Operations', weight: '22%', color: '#FFB84D' }
  ];

  let domainHtml = domains.map(d => {
    const ds = score.byDomain[d.key];
    const dpct = ds.total > 0 ? Math.round((ds.correct / ds.total) * 100) : 0;
    return `
      <div class="domain-row">
        <div class="domain-name">${d.name} <span style="color:var(--text-dim);font-size:12px;">(${d.weight})</span></div>
        <div class="domain-bar">
          <div class="domain-bar-fill" style="width:${dpct}%;background:${d.color};"></div>
        </div>
        <div class="domain-score" style="color:${dpct >= 70 ? 'var(--correct)' : 'var(--incorrect)'}">${ds.correct}/${ds.total} (${dpct}%)</div>
      </div>
    `;
  }).join('');

  const elapsed = state.mode === 'exam' ? formatTime(state.elapsed) : 'N/A';

  return `
    <div class="results-screen">
      <h2>${passed ? 'Practice Passed' : 'Needs More Study'}</h2>
      <p style="text-align:center;color:var(--text-dim);font-size:14px;">
        ${passed ? 'You reached the passing threshold. Keep studying the weak areas.' : 'Focus on the domains below where you scored under 70%.'}
      </p>
      <div class="score-display">
        <div class="score-circle ${passed ? 'pass' : 'fail'}">
          <div class="score-number">${pct}%</div>
          <div class="score-label">${score.correct}/${score.total}</div>
        </div>
        <p style="color:var(--text-dim);font-size:13px;">
          ${state.mode === 'exam' ? 'Time: ' + elapsed : 'Study mode - no time limit'}
          &nbsp;|&nbsp; Passing: 70%
        </p>
      </div>
      <div class="domain-breakdown">${domainHtml}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">
        <button class="btn btn-secondary" id="review-btn">Review Answers</button>
        <button class="btn btn-primary" id="restart-btn">Try Again</button>
      </div>
    </div>
  `;
}

function renderReviewScreen() {
  const letters = ['A', 'B', 'C', 'D'];

  let itemsHtml = state.questions.map((q, i) => {
    const userAnswer = state.answers[i];
    const isCorrect = userAnswer === q.correct;
    const domainClass = q.domain === 'essential' ? 'essential' : q.domain === 'infra' ? 'infra' : 'ops';

    return `
      <div class="review-item ${isCorrect ? 'was-correct' : 'was-incorrect'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span class="domain-tag ${domainClass}" style="margin-bottom:0;">${q.domainLabel}</span>
          <span style="font-size:12px;color:var(--text-dim);">Q${i + 1}</span>
        </div>
        <div class="review-q">${q.question}</div>
        <div class="review-answer">
          ${userAnswer !== undefined
            ? `Your answer: <span class="${isCorrect ? 'correct-text' : 'incorrect-text'}">${letters[userAnswer]}. ${q.options[userAnswer]}</span>`
            : '<span class="incorrect-text">Not answered</span>'}
          ${!isCorrect ? `<br>Correct: <span class="correct-text">${letters[q.correct]}. ${q.options[q.correct]}</span>` : ''}
        </div>
        <div class="explanation show" style="margin-top:8px;">${q.explanation}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="header">
      <h1>Answer Review</h1>
      <button class="btn btn-secondary" id="back-btn">← Back to Results</button>
    </div>
    ${itemsHtml}
  `;
}

// Init
render();
</script>
</body>
</html>
