  { id: 2004, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following mechanisms are fundamental components of the Transformer architecture used in Large Language Models (LLMs) to enable effective contextual understanding and generation?", options: ["Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Positional Encoding", "Recurrent Neural Networks (RNNs)", "Feed-Forward Neural Networks", "Dropout Regularization"], correct: [0, 2, 4], multiSelect: true, explanation: "The Transformer architecture relies on self-attention for capturing token relationships, positional encoding for sequence order, and feed-forward networks for non-linear transformations at each position. CNNs process spatial data, RNNs are sequential (replaced by Transformers), and dropout is a training regularization technique, not a fundamental architectural component.", source: "ncp-genl-exam-1", sourceIndex: 4 },
  { id: 2005, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following mechanisms are fundamental components of the transformer architecture used in Large Language Models (LLMs) to effectively capture contextual dependencies?", options: ["Self-Attention Mechanism", "Convolutional Layers", "Positional Encoding", "Recurrent Neural Networks (RNNs)", "Feed-Forward Neural Networks", "Batch Normalization"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformers capture contextual dependencies through self-attention (relating all token pairs), positional encoding (preserving order information), and feed-forward networks (transforming representations). Convolutional layers, RNNs, and batch normalization are not core Transformer mechanisms for contextual dependency capture.", source: "ncp-genl-exam-1", sourceIndex: 5 },
  { id: 2006, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following architectural components are fundamental to the structure of transformer-based Large Language Models (LLMs)?", options: ["Multi-head self-attention mechanism", "Convolutional neural networks (CNNs)", "Position-wise feed-forward networks", "Recurrent neural networks (RNNs)", "Positional encoding", "Batch normalization layers"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformer LLMs are built on multi-head self-attention (parallel attention across subspaces), position-wise feed-forward networks (per-position non-linear transformations), and positional encoding (sequence order information). CNNs, RNNs, and batch normalization are not fundamental Transformer components.", source: "ncp-genl-exam-1", sourceIndex: 6 },
  { id: 2056, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following best describes the primary function of a tokenizer in the preprocessing pipeline of a large language model (LLM)?", options: ["To convert raw text into dense vector representations suitable for downstream classification tasks", "To segment raw input text into discrete units (tokens) that can be mapped to integer IDs used as model inputs", "To normalize and clean text by removing stopwords, punctuation, and special characters before model ingestion", "To perform semantic parsing of input sentences into structured syntactic trees for linguistic analysis"], correct: 1, explanation: "A tokenizer's primary function is segmenting raw text into discrete token units and mapping them to integer IDs that serve as model inputs. It does not create dense vectors (that's the embedding layer), clean text (that's preprocessing), or perform syntactic parsing.", source: "ncp-genl-exam-1", sourceIndex: 56 },
  { id: 2057, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of tokenization for large language models (LLMs), which tokenization algorithm most effectively balances vocabulary size, handling of rare or unknown words, and computational efficiency across multilingual corpora?", options: ["Byte-Pair Encoding (BPE)", "Word-level tokenization", "Character-level tokenization", "Whitespace tokenization"], correct: 0, explanation: "Byte-Pair Encoding (BPE) iteratively merges the most frequent character pairs, creating a subword vocabulary that efficiently handles rare words, keeps vocabulary size manageable, and works well across languages. Word-level creates huge vocabularies with OOV issues, character-level is too granular, and whitespace tokenization fails for non-space-delimited languages.", source: "ncp-genl-exam-1", sourceIndex: 57 },
  // ── Prompt Engineering & RAG ──
  { id: 2007, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following statements accurately describe key characteristics and benefits of chain-of-thought prompting when applied to large language models in prompt engineering?", options: ["It involves explicitly instructing the model to generate intermediate reasoning steps before providing a final answer.", "It primarily enhances model performance on tasks requiring multi-step logical or mathematical reasoning.", "It reduces the model's output length by eliminating unnecessary intermediate content.", "It can be implemented by providing few-shot examples demonstrating stepwise reasoning in the prompt.", "It guarantees 100% accuracy on all reasoning tasks when used with any large language model.", "It is most effective when combined with model fine-tuning rather than prompt engineering alone."], correct: [0, 1, 3], multiSelect: true, explanation: "Chain-of-thought prompting instructs models to show intermediate reasoning steps, significantly improving multi-step logical/mathematical reasoning, and can be implemented via few-shot examples showing step-by-step solutions. It actually increases output length (not reduces it), doesn't guarantee accuracy, and is a prompt engineering technique that works without fine-tuning.", source: "ncp-genl-exam-1", sourceIndex: 7 },
  { id: 2008, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of zero-shot learning with large language models (LLMs), which prompt engineering strategy most effectively enables the model to perform a task it has not explicitly seen before?", options: ["Providing a large number of labeled examples in the prompt", "Crafting a clear and detailed task description without examples", "Fine-tuning the model on a small labeled dataset", "Using retrieval-augmented generation to supply relevant documents"], correct: 1, explanation: "Zero-shot learning relies on clear, detailed task descriptions without any examples, leveraging the model's pre-trained knowledge to generalize. Providing examples would be few-shot learning, fine-tuning changes model weights, and RAG supplements knowledge but isn't a zero-shot prompting strategy.", source: "ncp-genl-exam-1", sourceIndex: 8 },
  { id: 2009, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of few-shot learning with large language models (LLMs), which of the following best describes the primary mechanism by which examples provided in the prompt influence model behavior?", options: ["The model updates its internal weights based on the provided examples during inference", "The model uses the examples as in-context demonstrations to infer the task pattern and apply it to new inputs", "The model retrieves similar examples from a pre-indexed database to generate responses", "The model fine-tunes itself on the provided examples before answering the query"], correct: 1, explanation: "In few-shot learning, examples serve as in-context demonstrations that help the model infer the expected input-output pattern without any weight updates. The model doesn't update weights at inference time, doesn't retrieve from databases, and doesn't self-fine-tune—it uses the examples purely as context within the prompt.", source: "ncp-genl-exam-1", sourceIndex: 9 },
  { id: 2010, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following prompt engineering techniques most effectively leverages LLM reasoning to handle complex multi-step problems without providing example answers in the prompt?", options: ["Zero-shot prompting with explicit examples", "Few-shot prompting with diverse examples", "Zero-shot chain-of-thought prompting using phrases like \"Let's think step by step\"", "Template-based prompting with structured input fields"], correct: 2, explanation: "Zero-shot chain-of-thought prompting triggers step-by-step reasoning without providing examples, using phrases like 'Let's think step by step' to elicit the model's internal reasoning capabilities. Zero-shot with examples is contradictory, few-shot requires examples, and template-based prompting doesn't inherently promote reasoning.", source: "ncp-genl-exam-1", sourceIndex: 10 },
  { id: 2011, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt injection attacks targeting large language models (LLMs), which of the following defensive strategies most effectively mitigates adversarial manipulation of model outputs by malicious user inputs?", options: ["Increasing the model's training data diversity to include adversarial examples", "Allowing unrestricted user input to maximize model utility and flexibility", "Implementing strict input validation and sanitization pipelines to detect and neutralize injected instructions", "Deploying the LLM without system prompts to reduce attack surface"], correct: 2, explanation: "Strict input validation and sanitization pipelines can detect and neutralize malicious injected instructions before they reach the model. Training data diversity helps but doesn't prevent runtime attacks, unrestricted input enables attacks, and removing system prompts actually reduces control over model behavior.", source: "ncp-genl-exam-1", sourceIndex: 11 },
  { id: 2012, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "When designing prompt templates to minimize hallucination in large language models (LLMs) deployed for enterprise knowledge retrieval, which of the following strategies is most effective?", options: ["Instructing the model to generate creative and expansive responses to cover all possible scenarios", "Including explicit instructions to acknowledge uncertainty and cite specific retrieved documents as sources", "Using zero-shot prompts without any contextual information to test the model's inherent knowledge", "Increasing the temperature parameter to encourage more diverse and comprehensive responses"], correct: 1, explanation: "Explicitly instructing the model to acknowledge uncertainty and cite retrieved sources grounds responses in verifiable information and reduces hallucination. Creative/expansive instructions, zero-shot without context, and high temperature all increase the likelihood of hallucination.", source: "ncp-genl-exam-1", sourceIndex: 12 },
  { id: 2013, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In advanced prompt engineering for large language models (LLMs), which technique most effectively elicits multi-step reasoning by structuring the prompt to guide the model through intermediate logical steps?", options: ["Chain-of-Thought (CoT) prompting", "Zero-shot prompting", "Few-shot prompting with single-step examples", "Retrieval-Augmented Generation (RAG)"], correct: 0, explanation: "Chain-of-Thought prompting specifically structures prompts to guide models through intermediate reasoning steps, demonstrating the step-by-step logical process. Zero-shot lacks demonstrations, few-shot with single-step examples doesn't show reasoning chains, and RAG retrieves information but doesn't inherently structure reasoning.", source: "ncp-genl-exam-1", sourceIndex: 13 },
  { id: 2017, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG) for large language models (LLMs), which of the following best describes the primary role of the retrieval component within the overall architecture?", options: ["To dynamically fetch relevant external documents or knowledge snippets that are incorporated into the LLM's context window during generation", "To fine-tune the LLM's parameters using retrieved documents as training data during inference", "To replace the LLM's generative capabilities with a search engine that directly returns retrieved documents as responses", "To pre-cache all possible user queries and their corresponding answers for deterministic retrieval"], correct: 0, explanation: "The retrieval component dynamically fetches relevant documents from external knowledge bases and injects them into the LLM's context window, grounding generation in factual sources. It doesn't fine-tune weights at inference, replace generation with search, or pre-cache all queries.", source: "ncp-genl-exam-1", sourceIndex: 17 },
  { id: 2018, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "When implementing Retrieval-Augmented Generation (RAG) to enhance a large language model's responses with up-to-date information, which component is most critical for determining the relevance of retrieved documents to the user query?", options: ["The language model's decoding strategy (e.g., beam search vs. sampling)", "The semantic similarity metric used by the retrieval system to match query embeddings with document embeddings", "The size of the LLM's context window relative to the total number of documents in the corpus", "The temperature parameter controlling the stochasticity of the LLM's generation"], correct: 1, explanation: "The semantic similarity metric (cosine similarity, dot product, etc.) between query and document embeddings is the critical component determining retrieval relevance. Decoding strategy affects generation, context window limits how much is used, and temperature controls randomness—none directly determine retrieval quality.", source: "ncp-genl-exam-1", sourceIndex: 18 },
  { id: 2019, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "When integrating a Retrieval-Augmented Generation (RAG) system for a large language model, which of the following architectural design decisions most critically impacts the quality and relevance of the retrieved context?", options: ["The choice of tokenization algorithm used by the language model", "The embedding model and similarity search strategy employed by the retrieval component", "The number of transformer layers in the base language model", "The decoding strategy (e.g., greedy vs. beam search) used during generation"], correct: 1, explanation: "The embedding model quality and similarity search strategy directly determine whether retrieved documents are relevant to the query. Tokenization, model depth, and decoding strategy affect the language model side but don't impact the retrieval component's ability to find relevant context.", source: "ncp-genl-exam-1", sourceIndex: 19 },
  { id: 2025, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following strategies most effectively mitigates hallucination in large language models (LLMs) during deployment in high-stakes applications requiring factual accuracy?", options: ["Implementing Retrieval-Augmented Generation (RAG) to ground model responses in verified external knowledge sources", "Increasing the model's temperature parameter to generate more diverse and creative responses", "Reducing the context window size to limit the amount of information the model processes", "Fine-tuning the model exclusively on synthetic data generated by the model itself"], correct: 0, explanation: "RAG grounds model responses in verified external knowledge, significantly reducing hallucination in high-stakes applications. Higher temperature increases randomness and hallucination, smaller context windows lose information, and training on self-generated synthetic data can amplify errors.", source: "ncp-genl-exam-1", sourceIndex: 25 },
  { id: 2026, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following techniques most effectively reduces hallucination in large language models (LLMs) by grounding generated outputs in verified external information?", options: ["Increasing the decoding temperature to encourage more creative and varied outputs", "Implementing Retrieval-Augmented Generation (RAG) to supply the model with relevant, up-to-date documents", "Applying chain-of-thought prompting without access to external knowledge sources", "Reducing the model size to limit overfitting to training data patterns"], correct: 1, explanation: "RAG supplies the model with relevant, verified documents at inference time, grounding outputs in factual information and reducing hallucination. Higher temperature increases randomness, CoT without external knowledge can still hallucinate, and smaller models may actually hallucinate more.", source: "ncp-genl-exam-1", sourceIndex: 26 },
  { id: 2034, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of large language model deployment, which of the following architectural approaches most effectively enables the model to access and integrate real-time external knowledge while minimizing hallucination?", options: ["Increasing the number of transformer layers to expand the model's parametric memory capacity", "Implementing a Retrieval-Augmented Generation (RAG) pipeline that retrieves relevant documents from an external knowledge base at inference time", "Applying chain-of-thought prompting to improve the model's internal reasoning without external data access", "Fine-tuning the model on domain-specific datasets to encode up-to-date knowledge into its parameters"], correct: 1, explanation: "RAG pipelines retrieve relevant documents at inference time, providing real-time external knowledge that grounds generation and minimizes hallucination. Adding layers increases parametric memory but not real-time knowledge, CoT improves reasoning without external data, and fine-tuning encodes static knowledge.", source: "ncp-genl-exam-1", sourceIndex: 34 },
  { id: 2035, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of LLM deployment for enterprise applications, which architectural pattern most effectively addresses the challenge of maintaining up-to-date factual knowledge without retraining the model?", options: ["Periodic full model retraining on updated datasets", "Increasing the model's context window to accommodate more recent information", "Implementing a Retrieval-Augmented Generation (RAG) system with a continuously updated vector database", "Applying domain-specific fine-tuning on curated recent documents"], correct: 2, explanation: "RAG with a continuously updated vector database allows the model to access current information without retraining. Full retraining is expensive and slow, larger context windows don't add new knowledge, and fine-tuning encodes knowledge statically and still requires periodic updates.", source: "ncp-genl-exam-1", sourceIndex: 35 },
  // ── Training & Fine-Tuning ──
  { id: 2014, domain: "training", domainLabel: "Training & Fine-Tuning", question: "Which of the following fine-tuning approaches is specifically designed to reduce computational cost by only updating a small set of additional parameters while keeping the original model weights frozen?", options: ["Full fine-tuning", "Domain-adaptive pretraining", "Parameter-Efficient Fine-Tuning (PEFT) using methods like LoRA", "Supervised fine-tuning on all layers simultaneously"], correct: 2, explanation: "PEFT methods like LoRA introduce small trainable matrices while freezing original model weights, dramatically reducing computational cost and memory requirements. Full fine-tuning and supervised fine-tuning on all layers update all parameters, and domain-adaptive pretraining continues pretraining on domain data.", source: "ncp-genl-exam-1", sourceIndex: 14 },
  { id: 2015, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which technique most efficiently adapts a pretrained model to a specific task by introducing trainable low-rank matrices into the model's existing weight matrices, thereby minimizing computational overhead?", options: ["Full model fine-tuning with all parameters updated", "Low-Rank Adaptation (LoRA)", "Adapter layers inserted between transformer blocks", "Reinforcement Learning from Human Feedback (RLHF)"], correct: 1, explanation: "LoRA introduces trainable low-rank decomposition matrices alongside frozen original weights, enabling efficient task adaptation with minimal parameters. Full fine-tuning updates all weights, adapters add entire new layers, and RLHF is an alignment technique, not a parameter-efficient adaptation method.", source: "ncp-genl-exam-1", sourceIndex: 15 },
  { id: 2016, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which technique most efficiently adapts a pretrained model to a specialized domain by minimizing computational overhead and preserving pretrained knowledge?", options: ["Full parameter fine-tuning on domain-specific data", "Low-Rank Adaptation (LoRA) with frozen base model weights", "Training a new model from scratch on domain-specific data", "Continual pretraining on domain-specific data with all parameters updated"], correct: 1, explanation: "LoRA with frozen base weights minimizes computation by only training small low-rank matrices, while preserving all pretrained knowledge in the frozen weights. Full fine-tuning risks catastrophic forgetting, training from scratch wastes pretrained knowledge, and continual pretraining with all parameters updated is expensive.", source: "ncp-genl-exam-1", sourceIndex: 16 },
  { id: 2020, domain: "training", domainLabel: "Training & Fine-Tuning", question: "When preparing data for pretraining and fine-tuning large language models (LLMs), which of the following practices are essential to ensure high-quality model performance and generalization?", options: ["Removing duplicate and near-duplicate data to prevent overfitting and data leakage", "Applying consistent tokenization and normalization across datasets to maintain input uniformity", "Including only domain-specific data during pretraining to maximize relevance for fine-tuning", "Annotating data with detailed labels during pretraining to improve unsupervised learning quality", "Balancing dataset distribution to avoid bias towards dominant classes or topics", "Randomly shuffling data only during fine-tuning, not during pretraining"], correct: [0, 1, 4], multiSelect: true, explanation: "Essential data preparation practices include deduplication (preventing overfitting/leakage), consistent tokenization/normalization (ensuring uniform processing), and balanced distribution (avoiding bias). Pretraining benefits from diverse data (not only domain-specific), pretraining is unsupervised (labels aren't used), and shuffling is important during both pretraining and fine-tuning.", source: "ncp-genl-exam-1", sourceIndex: 20 },
  { id: 2021, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of preparing datasets for training generative AI large language models (LLMs), which data preprocessing step is most critical to ensure the model learns coherent language patterns without being biased toward dominant data sources?", options: ["Applying aggressive data augmentation techniques such as back-translation and synonym replacement", "Performing data deduplication and balanced sampling across diverse sources", "Using only high-quality, human-annotated data exclusively for all training stages", "Normalizing all numerical values and encoding categorical variables uniformly"], correct: 1, explanation: "Deduplication prevents the model from memorizing repeated content, and balanced sampling ensures diverse representation across sources, preventing bias. Aggressive augmentation can introduce noise, exclusive human-annotated data is impractical at scale, and numerical normalization is more relevant for structured data than language modeling.", source: "ncp-genl-exam-1", sourceIndex: 21 },
  { id: 2022, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of training data preparation for large language models (LLMs), which of the following preprocessing steps is most critical to ensure data quality and prevent the model from learning spurious correlations?", options: ["Deduplication of near-duplicate text entries across the dataset", "Encoding all text into a fixed-length vector representation before tokenization", "Converting all documents into a single uniform language using machine translation", "Removing all punctuation and special characters to reduce vocabulary size"], correct: 0, explanation: "Deduplication prevents the model from overfitting to repeated content and learning spurious correlations from duplicated data. Fixed-length encoding before tokenization is unnecessary, machine translation introduces errors, and removing punctuation loses important information.", source: "ncp-genl-exam-1", sourceIndex: 22 },
  { id: 2023, domain: "training", domainLabel: "Training & Fine-Tuning", question: "Which of the following techniques is most effective in mitigating catastrophic forgetting when fine-tuning a large language model (LLM) on a new domain-specific dataset?", options: ["Increasing the learning rate significantly to accelerate adaptation to the new domain", "Employing Elastic Weight Consolidation (EWC) to penalize changes to weights critical for previously learned tasks", "Training exclusively on the new domain dataset without any reference to the original pretraining data", "Removing all dropout layers to maximize the model's capacity for the new task"], correct: 1, explanation: "Elastic Weight Consolidation (EWC) identifies which weights are most important for previously learned tasks and penalizes large changes to them during fine-tuning. High learning rates cause rapid forgetting, exclusive new-domain training ignores prior knowledge, and removing dropout reduces regularization without addressing forgetting.", source: "ncp-genl-exam-1", sourceIndex: 23 },
  { id: 2024, domain: "training", domainLabel: "Training & Fine-Tuning", question: "When fine-tuning a large language model (LLM) on a domain-specific dataset, which regularization strategy most effectively prevents catastrophic forgetting of previously learned general knowledge?", options: ["Applying dropout with a high rate exclusively to the top transformer layers during fine-tuning", "Using early stopping based solely on domain-specific validation loss without any regularization", "Combining elastic weight consolidation (EWC) with a mixed training strategy that includes a small proportion of the original pretraining data", "Increasing the learning rate to accelerate adaptation to the new domain while ignoring general knowledge retention"], correct: 2, explanation: "Combining EWC (protecting important weights) with mixed training (including original data) provides the most comprehensive defense against catastrophic forgetting. Selective dropout doesn't protect specific knowledge, early stopping alone doesn't preserve prior knowledge, and high learning rates accelerate forgetting.", source: "ncp-genl-exam-1", sourceIndex: 24 },
  { id: 2043, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of optimizing large language models (LLMs) for production deployment, which technique most effectively reduces model size and inference latency without significant loss in output quality by compressing the model's knowledge into a smaller architecture?", options: ["Quantization", "Pruning", "Knowledge distillation", "LoRA fine-tuning"], correct: 2, explanation: "Knowledge distillation trains a smaller 'student' model to mimic a larger 'teacher' model's behavior, compressing knowledge into a more efficient architecture. Quantization reduces precision but keeps the same architecture, pruning removes weights but doesn't create a new architecture, and LoRA is for fine-tuning, not compression.", source: "ncp-genl-exam-1", sourceIndex: 43 },
  { id: 2050, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of multi-GPU and distributed training setups for large generative AI language models, which of the following practices are essential to optimize training efficiency and scalability?", options: ["Implementing gradient accumulation to simulate larger batch sizes without increasing GPU memory usage", "Using data parallelism with synchronous gradient updates to ensure model consistency across GPUs", "Relying solely on model parallelism without communication optimization to split model layers across GPUs", "Utilizing mixed precision training to reduce memory bandwidth and improve throughput on GPUs", "Disabling NCCL backend to avoid overhead in GPU communication during distributed training", "Employing asynchronous gradient updates to allow GPUs to proceed independently without waiting for synchronization"], correct: [0, 1, 3], multiSelect: true, explanation: "Essential distributed training practices include gradient accumulation (simulating larger batches within memory constraints), synchronous data parallelism (maintaining model consistency), and mixed precision training (reducing memory and improving throughput). Model parallelism without communication optimization is inefficient, NCCL is essential for GPU communication, and asynchronous updates can cause model inconsistency.", source: "ncp-genl-exam-1", sourceIndex: 50 },
  { id: 2052, domain: "training", domainLabel: "Training & Fine-Tuning", question: "Which of the following techniques most effectively reduces GPU memory consumption during the training of large language models without significantly compromising training throughput?", options: ["Increasing the batch size to maximize GPU utilization at the cost of higher memory usage", "Applying gradient checkpointing to trade computation for memory by recomputing activations during backpropagation", "Using full-precision (FP32) training to maintain numerical stability and avoid quantization errors", "Disabling data parallelism and relying solely on model parallelism across multiple GPUs"], correct: 1, explanation: "Gradient checkpointing reduces memory by discarding intermediate activations during the forward pass and recomputing them during backpropagation, trading extra computation for significant memory savings. Larger batches increase memory, FP32 uses more memory than mixed precision, and disabling data parallelism doesn't reduce per-GPU memory.", source: "ncp-genl-exam-1", sourceIndex: 52 },
  { id: 2058, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of deploying large language models (LLMs) for domain-specific applications, which of the following strategies is most effective for rapidly adapting the model to specialized vocabulary and task requirements while minimizing computational cost?", options: ["Retraining the model from scratch on domain-specific data to ensure full adaptation", "Increasing the model's context window to accommodate longer domain-specific documents", "Applying parameter-efficient fine-tuning (PEFT) methods such as LoRA on domain-specific datasets", "Expanding the tokenizer's vocabulary with domain-specific tokens and retraining the embedding layer exclusively"], correct: 2, explanation: "PEFT methods like LoRA enable rapid domain adaptation by training only small additional parameters on domain-specific data, minimizing computational cost while leveraging the pretrained model's knowledge. Retraining from scratch is expensive, larger context windows don't add domain knowledge, and vocabulary expansion alone doesn't adapt model behavior.", source: "ncp-genl-exam-1", sourceIndex: 58 },
  // ── Deployment & Optimization ──
  { id: 2036, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating generative AI large language models (LLMs), which of the following metrics best captures the qualitative aspect of model performance that cannot be fully assessed by quantitative metrics alone?", options: ["Perplexity score on a held-out test set", "Human evaluation of response relevance and coherence", "BLEU score comparing generated text to reference texts", "Token-level accuracy in predicting the next word"], correct: 1, explanation: "Human evaluation captures qualitative aspects like relevance, coherence, helpfulness, and safety that automated metrics cannot fully assess. Perplexity, BLEU, and token accuracy are quantitative metrics that measure specific aspects but miss the holistic quality judgment that humans provide.", source: "ncp-genl-exam-1", sourceIndex: 36 },
  { id: 2037, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of benchmarking large language models (LLMs) for generative AI tasks, which evaluation metric best captures the model's ability to produce contextually coherent and semantically relevant text over long passages?", options: ["Perplexity", "BLEU score", "ROUGE-L", "BERTScore"], correct: 3, explanation: "BERTScore uses contextual embeddings to evaluate semantic similarity between generated and reference text, capturing coherence and relevance better than surface-level metrics. Perplexity measures prediction confidence, BLEU measures n-gram precision, and ROUGE-L measures longest common subsequence—none capture deep semantic coherence as well.", source: "ncp-genl-exam-1", sourceIndex: 37 },
  { id: 2038, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When designing an evaluation framework for generative AI large language models (LLMs), which of the following considerations are essential to ensure a robust and comprehensive assessment?", options: ["Incorporating both quantitative metrics (e.g., perplexity, BLEU) and qualitative human evaluations to capture model performance comprehensively", "Focusing exclusively on accuracy metrics to simplify the evaluation process and avoid subjective biases", "Defining clear use-case specific criteria and benchmarks aligned with the intended application domain of the LLM", "Evaluating the model only on synthetic datasets to avoid privacy concerns related to real user data", "Including robustness tests such as adversarial inputs and stress scenarios to assess model reliability under diverse conditions", "Prioritizing speed of evaluation over depth to enable rapid iteration cycles during model development"], correct: [0, 2, 4], multiSelect: true, explanation: "A robust evaluation framework requires quantitative + qualitative metrics (comprehensive coverage), use-case-specific criteria (domain alignment), and robustness testing (adversarial/stress scenarios). Accuracy-only is incomplete, synthetic-only data misses real-world patterns, and prioritizing speed over depth produces shallow assessments.", source: "ncp-genl-exam-1", sourceIndex: 38 },
  { id: 2039, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of error analysis for evaluating large language models (LLMs), which of the following approaches most effectively identifies systematic failure modes that are not captured by aggregate performance metrics alone?", options: ["Reporting only overall accuracy scores on standard benchmarks to simplify comparison across models", "Performing stratified error analysis by decomposing failures across task types, input distributions, and edge cases to reveal patterns in model weaknesses", "Focusing exclusively on false positive rates to minimize harmful outputs in safety-critical applications", "Using automated evaluation pipelines without human review to ensure scalability and reproducibility"], correct: 1, explanation: "Stratified error analysis decomposes failures by task type, input distribution, and edge cases, revealing systematic weaknesses hidden by aggregate metrics. Overall accuracy obscures patterns, false positive focus is too narrow, and fully automated evaluation misses nuanced failure modes that require human judgment.", source: "ncp-genl-exam-1", sourceIndex: 39 },
  { id: 2040, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for enterprise applications, which of the following deployment strategies most effectively balances latency, cost, and scalability while ensuring high availability?", options: ["Deploying a single large LLM instance on a dedicated server with no auto-scaling to minimize infrastructure complexity", "Utilizing a managed cloud service with auto-scaling capabilities, model quantization for reduced inference cost, and load balancing across multiple instances", "Running the LLM exclusively on-premises to avoid data privacy risks associated with cloud deployments", "Deploying multiple fine-tuned LLM variants simultaneously without a routing mechanism to maximize coverage"], correct: 1, explanation: "Managed cloud with auto-scaling, quantization, and load balancing optimally balances latency (quantization + load balancing), cost (auto-scaling + quantization), and scalability (auto-scaling + multiple instances). Single instance lacks scalability, on-premises-only limits flexibility, and multiple variants without routing wastes resources.", source: "ncp-genl-exam-1", sourceIndex: 40 },
  { id: 2041, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) in production, which of the following strategies most effectively reduces inference latency while maintaining output quality for high-throughput applications?", options: ["Increasing the number of transformer layers to enhance model capacity and output quality", "Applying model quantization and leveraging batched inference with dynamic batching to optimize throughput and reduce per-request latency", "Deploying the model on CPU-only infrastructure to reduce hardware costs", "Disabling the key-value (KV) cache to reduce memory usage during inference"], correct: 1, explanation: "Quantization reduces computation per token, and dynamic batching amortizes overhead across requests, together reducing latency while maintaining quality. More layers increase latency, CPU inference is much slower, and disabling KV cache dramatically increases latency by recomputing attention at every step.", source: "ncp-genl-exam-1", sourceIndex: 41 },
  { id: 2042, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When deploying a large language model (LLM) in a production environment requiring low latency and high throughput, which combination of optimization techniques most effectively addresses both memory efficiency and inference speed?", options: ["Full model fine-tuning with increased batch size and higher precision weights", "Quantization to INT8 combined with KV cache optimization and dynamic batching", "Increasing the number of transformer layers while reducing the embedding dimension", "Using beam search decoding with a large beam width to improve output quality"], correct: 1, explanation: "INT8 quantization reduces memory and speeds up computation, KV cache avoids redundant attention computation, and dynamic batching maximizes GPU utilization. Full fine-tuning with higher precision increases memory, architectural changes require retraining, and large beam width increases latency.", source: "ncp-genl-exam-1", sourceIndex: 42 },
  { id: 2044, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM inference optimization for production deployments, which technique most effectively reduces memory bandwidth requirements during the autoregressive decoding phase?", options: ["Increasing batch size to amortize fixed overhead costs across more requests", "Applying gradient checkpointing to reduce activation memory during forward passes", "Implementing KV cache to store and reuse previously computed key-value pairs across decoding steps", "Using full precision (FP32) weights to maintain numerical stability during inference"], correct: 2, explanation: "KV cache stores previously computed key-value pairs so they don't need to be recomputed at each decoding step, dramatically reducing memory bandwidth during autoregressive generation. Batch size affects throughput not per-token bandwidth, gradient checkpointing is for training, and FP32 increases bandwidth requirements.", source: "ncp-genl-exam-1", sourceIndex: 44 },
  { id: 2045, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of large language model (LLM) deployment optimization, which combination of techniques most effectively reduces inference latency and memory footprint while preserving model accuracy for a production-grade service?", options: ["Full precision (FP32) inference with single-request batching and no caching", "INT8 quantization combined with KV cache and continuous batching", "Model pruning combined with high-rank weight decomposition and beam search", "Increasing context window size while disabling tokenization normalization"], correct: 1, explanation: "INT8 quantization reduces memory and computation, KV cache eliminates redundant key-value computation, and continuous batching maximizes GPU utilization—together providing optimal latency, memory, and accuracy. FP32 without optimization is inefficient, pruning with high-rank decomposition is contradictory, and larger context with disabled normalization doesn't optimize inference.", source: "ncp-genl-exam-1", sourceIndex: 45 },
  { id: 2046, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When developing a conversational AI system using a large language model (LLM), which of the following architectural patterns most effectively maintains coherent multi-turn dialogue context while managing token window limitations?", options: ["Resetting the conversation context after each user turn to prevent context overflow", "Implementing a sliding window mechanism combined with a summarization module to compress older turns while retaining key context", "Increasing the model's maximum token limit without any compression strategy", "Storing all conversation history in an external database without injecting it into the model's context"], correct: 1, explanation: "A sliding window with summarization keeps recent turns in full detail while compressing older context into summaries, maintaining coherence within token limits. Resetting loses all context, unlimited token expansion is impractical, and external storage without context injection means the model can't use the history.", source: "ncp-genl-exam-1", sourceIndex: 46 },
  { id: 2047, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing multi-agent LLM systems for complex task decomposition, which architectural pattern most effectively ensures reliable task coordination and result aggregation across specialized agents?", options: ["Orchestrator-subagent pattern with a dedicated coordination layer managing task delegation, result validation, and state tracking across specialized agents", "Peer-to-peer agent communication without centralized coordination to maximize parallelism", "Single monolithic agent with extended context window to handle all subtasks sequentially", "Pipeline architecture where each agent processes input independently without sharing state"], correct: 0, explanation: "The orchestrator-subagent pattern provides centralized coordination for task delegation, validation, and state management, ensuring reliable multi-agent workflows. Peer-to-peer lacks coordination guarantees, monolithic agents don't leverage specialization, and stateless pipelines can't handle complex interdependent subtasks.", source: "ncp-genl-exam-1", sourceIndex: 47 },
  { id: 2048, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of tool-augmented large language models (LLMs), which of the following design patterns most effectively enables reliable and safe execution of multi-step agentic workflows?", options: ["Allowing the LLM to execute tool calls autonomously without any intermediate validation or human oversight", "Implementing a structured reasoning loop with explicit tool call planning, result validation, and human-in-the-loop checkpoints for high-risk actions", "Restricting the LLM to a single tool call per session to minimize error propagation", "Using the LLM's internal knowledge exclusively without integrating any external tools"], correct: 1, explanation: "A structured reasoning loop with planning, validation, and human checkpoints ensures reliability and safety in agentic workflows. Autonomous execution risks errors propagating unchecked, single-tool restriction limits capability, and no tools limits the system to parametric knowledge only.", source: "ncp-genl-exam-1", sourceIndex: 48 },
  { id: 2049, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building production-grade LLM pipelines, which of the following observability practices is most critical for diagnosing and resolving issues related to inconsistent model outputs across different user sessions?", options: ["Logging only the final model outputs without capturing intermediate reasoning steps or prompt inputs", "Implementing end-to-end tracing that captures prompt inputs, model parameters, retrieved context, intermediate reasoning steps, and final outputs for each session", "Monitoring only infrastructure metrics such as CPU and GPU utilization without tracking model-specific inputs and outputs", "Relying solely on user feedback forms to identify inconsistencies without automated logging"], correct: 1, explanation: "End-to-end tracing captures the full request lifecycle (inputs, parameters, context, reasoning, outputs), enabling root cause analysis of inconsistencies. Output-only logging misses causes, infrastructure metrics don't explain output quality, and user feedback is too slow and incomplete for systematic diagnosis.", source: "ncp-genl-exam-1", sourceIndex: 49 },
  { id: 2051, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scalable orchestration for deploying large language models (LLMs), which approach most effectively ensures efficient resource utilization and low-latency inference under variable and unpredictable traffic loads?", options: ["Deploying a fixed number of LLM instances with static allocation to guarantee consistent performance", "Implementing an auto-scaling cluster with dynamic resource allocation guided by real-time inference metrics such as queue depth and GPU utilization", "Running all inference requests sequentially on a single high-capacity node to avoid coordination overhead", "Pre-loading all possible model variants into memory simultaneously to minimize model-switching latency"], correct: 1, explanation: "Auto-scaling with dynamic allocation based on real-time metrics (queue depth, GPU utilization) optimally handles variable traffic by scaling resources to match demand. Fixed allocation wastes resources or under-provisions, sequential processing creates bottlenecks, and pre-loading all variants wastes enormous amounts of memory.", source: "ncp-genl-exam-1", sourceIndex: 51 },
  { id: 2053, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When scaling a large language model (LLM) deployment to handle millions of concurrent users with diverse query types, which combination of infrastructure strategies most effectively balances cost, latency, and model performance?", options: ["Using a single large monolithic LLM for all query types to simplify management and avoid routing overhead", "Deploying a mixture of specialized smaller models with intelligent query routing, combined with auto-scaling and caching for frequent queries", "Replicating the full LLM across all geographic regions without any model optimization techniques", "Applying aggressive quantization to INT4 for all queries to minimize costs regardless of accuracy requirements"], correct: 1, explanation: "Specialized smaller models with intelligent routing optimize cost (right-sized models per query), latency (smaller models are faster), and performance (specialized models excel at their tasks). Caching handles frequent queries. Monolithic models waste resources, unoptimized replication is expensive, and aggressive INT4 for everything sacrifices quality.", source: "ncp-genl-exam-1", sourceIndex: 53 },
  { id: 2054, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) at scale, which combination of observability and monitoring techniques most effectively enables proactive detection and root-cause analysis of model degradation in production?", options: ["Tracking only system-level metrics (CPU, GPU, memory) without capturing model-specific signals", "Implementing distributed tracing combined with real-time statistical monitoring of output distributions, prompt-response latency, and drift detection against baseline performance benchmarks", "Collecting batch logs post-hoc and reviewing them manually on a weekly basis", "Monitoring only user satisfaction scores as the primary signal for model performance"], correct: 1, explanation: "Distributed tracing with real-time monitoring of output distributions, latency, and drift detection provides comprehensive proactive visibility into model health. System-only metrics miss model behavior, batch review is too slow, and user satisfaction alone is a lagging indicator that misses root causes.", source: "ncp-genl-exam-1", sourceIndex: 54 },
  { id: 2055, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building enterprise-grade LLM applications, which of the following data management strategies most effectively ensures that sensitive information is not retained or leaked across user sessions while maintaining model performance?", options: ["Storing all conversation histories in a centralized database accessible to all users to enable cross-session learning", "Implementing session-scoped context isolation with strict data lifecycle policies, including automatic context flushing and access controls per user session", "Embedding all user data directly into the model's parameters during fine-tuning to personalize responses", "Using a shared cache for all user sessions to optimize inference speed without data isolation"], correct: 1, explanation: "Session-scoped isolation with automatic context flushing and access controls prevents cross-session data leakage while maintaining performance. Centralized accessible storage and shared caches enable data leakage, and embedding user data into weights is impractical and creates permanent privacy risks.", source: "ncp-genl-exam-1", sourceIndex: 55 },
  { id: 2059, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deployment optimization for large language models (LLMs), which technique most effectively reduces the memory footprint and inference latency by representing model weights in lower-precision formats without retraining the model?", options: ["Knowledge distillation", "Structured pruning of attention heads", "Post-training quantization (PTQ)", "Low-rank adaptation (LoRA)"], correct: 2, explanation: "Post-training quantization converts model weights to lower precision (INT8, INT4) after training without requiring retraining, reducing memory and improving latency. Knowledge distillation requires training a new model, pruning removes components, and LoRA is a fine-tuning method, not a weight precision technique.", source: "ncp-genl-exam-1", sourceIndex: 59 },
  { id: 2060, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) using cloud-native architectures, which of the following strategies most effectively balances inference cost and latency while ensuring high availability for variable workloads?", options: ["Deploying a fixed number of full-precision LLM replicas on dedicated GPU instances to guarantee consistent performance", "Utilizing spot or preemptible GPU instances with auto-scaling policies, combined with model quantization and request batching to minimize cost and latency", "Running all inference on CPU-based instances to reduce GPU costs, accepting higher latency as a tradeoff", "Pre-loading multiple model variants simultaneously on a single high-memory instance to avoid cold start delays"], correct: 1, explanation: "Spot instances with auto-scaling reduce cost, quantization reduces per-request computation, and request batching improves GPU utilization—together providing optimal cost-latency balance with availability. Fixed replicas waste resources, CPU inference is too slow for LLMs, and pre-loading everything wastes memory and doesn't scale.", source: "ncp-genl-exam-1", sourceIndex: 60 },
  { id: 2067, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of conversational AI systems using large language models (LLMs), which of the following approaches most effectively preserves long-term user context across multiple sessions while respecting memory limitations of the model's context window?", options: ["Storing the complete verbatim conversation history in the model's context window, expanding it indefinitely as needed", "Implementing a hierarchical memory architecture that combines short-term in-context storage with long-term external memory retrieval, using summarization to compress older context", "Resetting the conversation context completely at the start of each new session to avoid context contamination", "Fine-tuning the model periodically on each user's conversation history to encode long-term preferences into model weights"], correct: 1, explanation: "Hierarchical memory with short-term in-context storage, long-term external retrieval, and summarization optimally balances context preservation with window limitations. Unlimited expansion is impossible, resetting loses all context, and per-user fine-tuning is impractical and creates privacy risks.", source: "ncp-genl-exam-1", sourceIndex: 67 },
  { id: 2068, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM systems, which of the following prompt management strategies most effectively ensures consistent model behavior, minimizes prompt injection risks, and supports scalable iteration of system instructions?", options: ["Allowing end users to directly modify system prompts at runtime to personalize model behavior", "Centralizing prompt templates in a versioned prompt registry with access controls, input sanitization, and A/B testing capabilities for controlled rollout of prompt changes", "Embedding all instructions directly into the model's fine-tuned weights to eliminate runtime prompt dependency", "Using a single static system prompt for all use cases to simplify maintenance and avoid prompt versioning complexity"], correct: 1, explanation: "A versioned prompt registry with access controls, sanitization, and A/B testing provides consistency (version control), security (sanitization + access controls), and scalability (A/B testing for controlled iteration). User-editable prompts enable injection, weight-embedded instructions can't be updated, and single static prompts can't handle diverse use cases.", source: "ncp-genl-exam-1", sourceIndex: 68 },
  { id: 2069, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When building an LLM-powered application that must reliably extract structured data (e.g., JSON) from unstructured user inputs, which combination of techniques most robustly ensures output format compliance and reduces parsing failures?", options: ["Using a high temperature setting to encourage diverse outputs and manually filtering for valid JSON", "Combining constrained decoding (grammar-based or token-based) with output schema validation and retry logic for malformed outputs", "Relying solely on prompt instructions to specify the output format without any programmatic validation", "Post-processing all outputs with a rule-based parser that attempts to coerce any text into JSON format"], correct: 1, explanation: "Constrained decoding forces valid structure at generation time, schema validation catches any remaining issues, and retry logic handles edge cases—together providing robust format compliance. High temperature with manual filtering is unreliable, prompt-only instructions don't guarantee format, and coercing arbitrary text into JSON produces invalid data.", source: "ncp-genl-exam-1", sourceIndex: 69 },
  { id: 2070, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of advanced LLM application architectures, which of the following patterns most effectively enables an LLM to autonomously decompose complex, multi-step tasks into executable subtasks, coordinate tool usage, and adapt its plan based on intermediate results?", options: ["Retrieval-Augmented Generation (RAG) with a fixed retrieval pipeline and no dynamic replanning", "Chain-of-thought prompting with static few-shot examples and no external tool integration", "ReAct (Reasoning + Acting) framework combining interleaved reasoning traces and tool-use actions with dynamic plan revision based on observed outcomes", "Standard instruction-following with a single system prompt and no iterative feedback loops"], correct: 2, explanation: "ReAct interleaves reasoning (thinking about what to do) with acting (executing tools) and observing (processing results), enabling dynamic plan revision based on outcomes. RAG without replanning can't adapt, static CoT can't use tools, and standard instruction-following lacks iterative capability.", source: "ncp-genl-exam-1", sourceIndex: 70 },
  // ── Safety & Governance ──
  { id: 2027, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of bias detection and mitigation in large language models (LLMs), which of the following approaches most comprehensively addresses both intrinsic and extrinsic biases while maintaining model utility?", options: ["Removing all demographic information from training data to eliminate potential bias sources", "Combining counterfactual data augmentation with adversarial debiasing and continuous post-deployment monitoring", "Fine-tuning the model exclusively on balanced datasets representing equal proportions of demographic groups", "Applying post-hoc output filtering to remove any generated content containing demographic references"], correct: 1, explanation: "Combining counterfactual augmentation (training-time), adversarial debiasing (model-level), and post-deployment monitoring (production-level) addresses bias comprehensively across the lifecycle. Removing demographics loses useful context, balanced-only fine-tuning is too narrow, and output filtering is superficial and can censor legitimate content.", source: "ncp-genl-exam-1", sourceIndex: 27 },
  { id: 2028, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of bias detection and mitigation in large language models (LLMs), which of the following approaches most comprehensively addresses bias at multiple stages of the model lifecycle?", options: ["Combining diverse and balanced training data curation, adversarial debiasing during training, and continuous post-deployment monitoring", "Applying post-hoc output filtering to remove biased tokens from generated text", "Using only human-annotated datasets to ensure bias-free training examples", "Restricting the model's vocabulary to exclude terms associated with demographic groups"], correct: 0, explanation: "Addressing bias at data curation (diverse/balanced data), training (adversarial debiasing), and deployment (continuous monitoring) provides comprehensive lifecycle coverage. Post-hoc filtering is superficial, human annotation doesn't guarantee bias-free data, and vocabulary restriction removes legitimate language use.", source: "ncp-genl-exam-1", sourceIndex: 28 },
  { id: 2029, domain: "safety", domainLabel: "Safety & Governance", question: "Which of the following approaches best describes the Constitutional AI (CAI) method developed by Anthropic for aligning large language models with human values and safety constraints?", options: ["Training the model exclusively on human-labeled preference data to directly optimize for human approval", "Using reinforcement learning from human feedback (RLHF) as the sole alignment mechanism without any rule-based constraints", "Iteratively refining model outputs using a set of predefined principles to guide self-critique and revision during training", "Applying hard-coded output filters to block any content violating predefined safety rules"], correct: 2, explanation: "Constitutional AI uses a set of predefined principles (a 'constitution') to guide the model in self-critiquing and revising its own outputs iteratively during training. Unlike pure RLHF, it reduces reliance on human labelers. It's not solely RLHF, not exclusively human-labeled, and uses learned behavior rather than hard-coded filters.", source: "ncp-genl-exam-1", sourceIndex: 29 },
  { id: 2030, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which of the following governance frameworks most effectively ensures comprehensive oversight of model behavior across its entire lifecycle?", options: ["Relying solely on post-deployment user feedback to identify and correct harmful model outputs", "Implementing a continuous monitoring system that integrates pre-deployment red-teaming, real-time output auditing, and iterative model retraining based on detected violations", "Applying strict output filtering using rule-based keyword blocklists to prevent harmful content generation", "Delegating all governance responsibilities to the end-user organizations deploying the model"], correct: 1, explanation: "Continuous monitoring integrating pre-deployment testing (red-teaming), real-time auditing, and iterative improvement provides comprehensive lifecycle governance. Post-deployment-only feedback is reactive, keyword blocklists are easily bypassed, and delegating all responsibility to end-users avoids developer accountability.", source: "ncp-genl-exam-1", sourceIndex: 30 },
  { id: 2031, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible deployment of large language models (LLMs), which combination of strategies most comprehensively addresses the risk of generating harmful or biased content while maintaining model utility?", options: ["Implementing RLHF with a diverse set of human annotators, combined with adversarial red-teaming and continuous post-deployment monitoring", "Applying strict input filtering and output censorship as the primary safeguards", "Relying exclusively on model fine-tuning on curated safe datasets without ongoing monitoring", "Using constitutional AI principles solely during pre-training without further alignment techniques"], correct: 0, explanation: "RLHF with diverse annotators (alignment), red-teaming (vulnerability discovery), and continuous monitoring (production oversight) together provide comprehensive safety while preserving utility. Strict censorship is too aggressive, fine-tuning alone lacks monitoring, and pre-training-only alignment doesn't address deployment risks.", source: "ncp-genl-exam-1", sourceIndex: 31 },
  { id: 2032, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of aligning large language models (LLMs) with human preferences, which combination of techniques most effectively balances safety constraints with model utility while minimizing reward hacking?", options: ["Supervised fine-tuning (SFT) alone using curated human-labeled datasets", "Reinforcement Learning from Human Feedback (RLHF) combined with Constitutional AI principles and iterative red-teaming", "Unsupervised pretraining with diverse data followed by rule-based output filtering", "Direct preference optimization (DPO) without any human feedback or reward modeling"], correct: 1, explanation: "RLHF provides preference alignment, Constitutional AI adds principled self-critique (reducing reward hacking), and red-teaming discovers remaining vulnerabilities. SFT alone lacks preference optimization, unsupervised + filtering is superficial, and DPO without feedback data can't learn preferences.", source: "ncp-genl-exam-1", sourceIndex: 32 },
  { id: 2033, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety and alignment, which technique most effectively uses human preference data to fine-tune a language model to generate responses that are helpful, harmless, and honest?", options: ["Supervised fine-tuning (SFT) on a curated dataset of correct answers", "Unsupervised pretraining on a large diverse corpus", "Reinforcement Learning from Human Feedback (RLHF)", "Knowledge distillation from a larger teacher model"], correct: 2, explanation: "RLHF trains a reward model from human preference comparisons, then uses reinforcement learning to optimize the LLM to generate preferred (helpful, harmless, honest) responses. SFT teaches correct answers but not preferences, pretraining is unsupervised, and knowledge distillation transfers capabilities, not alignment.", source: "ncp-genl-exam-1", sourceIndex: 33 },
  { id: 2061, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of deploying large language models (LLMs) in regulated industries such as healthcare or finance, which of the following practices most comprehensively addresses data privacy, compliance, and model governance requirements?", options: ["Storing all user interactions in a centralized cloud database with default encryption settings to simplify compliance audits", "Implementing end-to-end data encryption, role-based access controls, model output audit trails, and regular compliance reviews aligned with industry-specific regulations such as HIPAA or GDPR", "Deploying the LLM exclusively on public cloud infrastructure to leverage built-in compliance certifications without additional controls", "Restricting LLM access to internal users only and relying on network-level security without application-layer controls"], correct: 1, explanation: "Comprehensive compliance requires end-to-end encryption (data protection), RBAC (access control), audit trails (accountability), and regulation-aligned reviews (HIPAA/GDPR compliance). Default encryption alone is insufficient, public cloud certifications don't cover application-level requirements, and network-only security misses data-level protections.", source: "ncp-genl-exam-1", sourceIndex: 61 },
  { id: 2062, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of data privacy for large language models (LLMs), which of the following techniques most effectively prevents the model from memorizing and reproducing sensitive personal information present in the training data?", options: ["Increasing the model's dropout rate during training to reduce overfitting on sensitive examples", "Applying differential privacy mechanisms during training to add calibrated noise that limits the influence of individual data points", "Removing all personally identifiable information (PII) from the training data using rule-based filters before training", "Reducing the model size to limit its capacity to memorize specific training examples"], correct: 1, explanation: "Differential privacy adds mathematically calibrated noise during training, providing formal guarantees that individual data points cannot be memorized or extracted. Dropout reduces general overfitting but doesn't provide privacy guarantees, PII removal with rules is incomplete, and smaller models can still memorize data.", source: "ncp-genl-exam-1", sourceIndex: 62 },
  { id: 2063, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which of the following frameworks most comprehensively addresses the need for transparency, accountability, and auditability throughout the model lifecycle?", options: ["Deploying an output filtering system that blocks harmful content post-generation", "Relying solely on voluntary self-reporting by model developers to disclose risks", "Implementing model cards and datasheets for documentation, combined with continuous monitoring, third-party auditing, and clear incident response protocols", "Restricting model access to authorized users through API key management alone"], correct: 2, explanation: "Model cards/datasheets (transparency), continuous monitoring + third-party audits (accountability), and incident response protocols (auditability) provide comprehensive lifecycle governance. Output filtering is one narrow control, self-reporting lacks verification, and access management alone doesn't ensure responsible use.", source: "ncp-genl-exam-1", sourceIndex: 63 },
  { id: 2064, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which of the following practices most effectively ensures accountability and transparency in model decision-making for high-stakes applications?", options: ["Deploying models without any documentation to protect proprietary information and competitive advantages", "Maintaining detailed model cards, audit logs of model decisions, and explainability reports that are accessible to relevant stakeholders", "Using black-box models exclusively to prevent adversarial exploitation of decision logic", "Relying solely on end-user feedback to identify and address model failures post-deployment"], correct: 1, explanation: "Model cards, audit logs, and explainability reports provide the documentation, traceability, and transparency needed for accountability in high-stakes applications. No documentation prevents oversight, black-box opacity undermines trust, and user feedback alone is insufficient for systematic governance.", source: "ncp-genl-exam-1", sourceIndex: 64 },
  { id: 2065, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI practices for large language models (LLMs), which of the following measures most comprehensively mitigates the risk of harmful content generation while preserving the model's utility for legitimate use cases?", options: ["Implementing a strict keyword-based output filter that blocks any response containing predefined sensitive terms", "Combining RLHF-based alignment, Constitutional AI principles, adversarial red-teaming, and context-aware content moderation to create layered safety guardrails", "Restricting the model to respond only to queries that exactly match pre-approved templates", "Deploying the model without any safety measures to maximize response diversity and minimize censorship"], correct: 1, explanation: "Layered guardrails combining RLHF alignment, Constitutional AI, red-teaming, and context-aware moderation provide comprehensive safety while preserving utility through nuanced, context-sensitive controls. Keyword filters are too blunt, template restrictions destroy utility, and no safety measures are irresponsible.", source: "ncp-genl-exam-1", sourceIndex: 65 },
  { id: 2066, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI for large language models (LLMs), which evaluation methodology most rigorously identifies potential safety vulnerabilities and failure modes before production deployment?", options: ["Standard benchmarking on held-out test sets using accuracy and perplexity metrics", "Structured red-teaming with diverse adversarial prompts designed to probe safety boundaries and trigger harmful outputs", "User acceptance testing with a small group of internal stakeholders", "Automated regression testing against predefined input-output pairs"], correct: 1, explanation: "Structured red-teaming with diverse adversarial prompts systematically probes safety boundaries and discovers failure modes that standard testing misses. Benchmarking measures general performance, UAT is too narrow, and regression testing only covers known scenarios, not novel adversarial attacks.", source: "ncp-genl-exam-1", sourceIndex: 66 },
  // ── Exam 2 (Q1-Q70) ──
  // ── Architecture & Foundations ──
  { id: 2071, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of foundational Large Language Models (LLMs), which component primarily enables the model to capture contextual relationships between tokens over long sequences?", options: ["Feed-forward neural networks", "Self-attention mechanism", "Convolutional layers", "Recurrent neural networks (RNNs)"], correct: 1, explanation: "The self-attention mechanism computes relationships between all token pairs in a sequence simultaneously, enabling the model to capture contextual dependencies regardless of distance. Feed-forward networks transform representations per-position, convolutional layers capture local patterns, and RNNs process sequentially with vanishing gradient issues.", source: "ncp-genl-exam-2", sourceIndex: 1 },
  { id: 2072, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of foundational Large Language Model (LLM) architectures, which component primarily enables the model to capture long-range dependencies in input text sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Embedding Layers"], correct: 1, explanation: "The self-attention mechanism captures long-range dependencies by computing attention weights between all token pairs regardless of distance. RNNs struggle with long-range dependencies due to vanishing gradients, CNNs capture local patterns, and embedding layers map tokens to vectors without modeling dependencies.", source: "ncp-genl-exam-2", sourceIndex: 2 },
  { id: 2073, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of transformer-based Large Language Models (LLMs), which component primarily enables the model to capture contextual relationships between tokens regardless of their distance in the input sequence?", options: ["Convolutional layers", "Self-attention mechanism", "Recurrent neural networks (RNNs)", "Feed-forward neural networks"], correct: 1, explanation: "Self-attention computes pairwise relationships between all tokens simultaneously, enabling distance-independent contextual understanding. Convolutional layers have limited receptive fields, RNNs process sequentially making distant relationships harder to learn, and feed-forward networks operate on individual positions.", source: "ncp-genl-exam-2", sourceIndex: 3 },
  { id: 2074, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component is primarily responsible for capturing long-range dependencies in input sequences and enabling contextual understanding across tokens?", options: ["Convolutional Neural Networks (CNNs)", "Self-Attention Mechanism", "Recurrent Neural Networks (RNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "The self-attention mechanism enables each token to attend to every other token in the sequence, capturing long-range dependencies efficiently. CNNs have limited receptive fields, RNNs struggle with long sequences due to vanishing gradients, and feedforward networks process each position independently.", source: "ncp-genl-exam-2", sourceIndex: 4 },
  { id: 2075, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following mechanisms are fundamental components of transformer-based Large Language Models (LLMs) that enable effective contextual understanding and generation?", options: ["Self-attention mechanism", "Convolutional neural networks (CNNs)", "Positional encoding", "Recurrent neural networks (RNNs)", "Feed-forward neural networks", "Pooling layers"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformers rely on self-attention (token relationships), positional encoding (sequence order), and feed-forward networks (per-position transformations). CNNs, RNNs, and pooling layers are not fundamental Transformer components.", source: "ncp-genl-exam-2", sourceIndex: 5 },
  { id: 2076, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following statements accurately describes the role of positional encoding in transformer-based Large Language Models (LLMs)?", options: ["It assigns learnable embeddings that capture semantic meaning of each token", "It provides information about the position of tokens in the sequence, since the self-attention mechanism itself is permutation-invariant", "It normalizes token representations to stabilize training", "It enables the model to process sequences of variable length by padding tokens to a fixed size"], correct: 1, explanation: "Since self-attention treats tokens as an unordered set (permutation-invariant), positional encoding is essential to inject sequence order information. It doesn't capture semantics (that's the token embedding), doesn't normalize representations (that's layer norm), and doesn't handle variable-length padding.", source: "ncp-genl-exam-2", sourceIndex: 6 },
  { id: 2077, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of large language model (LLM) training, which of the following best describes the primary purpose of the pretraining phase using a self-supervised learning objective such as next-token prediction?", options: ["To fine-tune the model on labeled task-specific datasets for downstream applications", "To enable the model to learn general language representations and world knowledge from large unlabeled text corpora", "To align the model's outputs with human preferences through reinforcement learning from human feedback", "To compress the model's parameters for efficient deployment on resource-constrained devices"], correct: 1, explanation: "Pretraining uses self-supervised objectives (like next-token prediction) on massive unlabeled corpora to learn general language patterns, world knowledge, and reasoning capabilities. Fine-tuning is a separate stage, RLHF handles alignment, and compression is a deployment optimization.", source: "ncp-genl-exam-2", sourceIndex: 7 },
