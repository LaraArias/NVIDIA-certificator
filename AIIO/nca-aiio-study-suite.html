  { id: 2078, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of large language model (LLM) training, which of the following best describes the key distinction between pretraining and instruction fine-tuning?", options: ["Pretraining uses labeled task-specific data while instruction fine-tuning relies entirely on unlabeled web-scale corpora", "Pretraining learns general language representations from unlabeled data using self-supervised objectives, whereas instruction fine-tuning adapts the model to follow explicit task instructions using curated examples", "Pretraining requires reinforcement learning from human feedback (RLHF), while instruction fine-tuning uses unsupervised objectives", "Pretraining and instruction fine-tuning are identical processes that differ only in the scale of the training data used"], correct: 1, explanation: "Pretraining uses self-supervised learning on unlabeled data to learn language fundamentals, while instruction fine-tuning uses curated instruction-response pairs to teach the model to follow instructions. The processes use different data types, objectives, and scales.", source: "ncp-genl-exam-2", sourceIndex: 8 },
  { id: 2129, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of tokenization for large language models (LLMs), which tokenization algorithm most effectively balances subword granularity, vocabulary efficiency, and robust handling of out-of-vocabulary (OOV) words?", options: ["Byte-Pair Encoding (BPE)", "Word-level tokenization", "Character-level tokenization", "Whitespace tokenization"], correct: 0, explanation: "BPE iteratively merges frequent character pairs to create a subword vocabulary that handles rare/OOV words by decomposing them into known subword units. Word-level creates OOV issues, character-level is too granular and increases sequence length, and whitespace tokenization fails for non-space-delimited languages.", source: "ncp-genl-exam-2", sourceIndex: 59 },
  // ── Prompt Engineering & RAG ──
  { id: 2080, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following practices are effective when designing chain-of-thought (CoT) prompts to improve reasoning capabilities in large language models?", options: ["Explicitly instructing the model to break down the problem into intermediate reasoning steps", "Providing a few examples that demonstrate step-by-step reasoning within the prompt", "Using overly concise prompts to minimize token usage and speed up inference", "Asking the model to generate multiple possible answers without explanation", "Encouraging the model to self-verify or reflect on its reasoning steps within the prompt", "Relying solely on the model's default behavior without explicit reasoning instructions"], correct: [0, 1, 4], multiSelect: true, explanation: "Effective CoT practices include explicit step-by-step instructions, few-shot demonstrations of reasoning, and self-verification prompts. Overly concise prompts lose reasoning structure, multiple answers without explanation don't improve reasoning, and default behavior without guidance doesn't leverage CoT benefits.", source: "ncp-genl-exam-2", sourceIndex: 10 },
  { id: 2081, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of domain adaptation via prompting for large language models (LLMs), which strategy most effectively improves model performance on a target domain with limited labeled data?", options: ["Using zero-shot prompting with generic instructions without any domain-specific context", "Employing few-shot prompting with carefully selected domain-relevant examples embedded in the prompt", "Increasing the model's temperature to encourage more diverse and creative responses in the target domain", "Applying retrieval-augmented generation without domain-specific document indexing"], correct: 1, explanation: "Few-shot prompting with domain-relevant examples provides the model with task-specific patterns and vocabulary, enabling effective domain adaptation without training. Generic zero-shot lacks domain context, high temperature increases randomness, and RAG without domain documents doesn't add domain knowledge.", source: "ncp-genl-exam-2", sourceIndex: 11 },
  { id: 2082, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of advanced prompt engineering for large language models (LLMs), which technique most effectively enables complex multi-step reasoning by guiding the model to explicitly generate intermediate reasoning steps?", options: ["Chain-of-Thought (CoT) Prompting", "Zero-Shot Prompting", "Template-Based Prompting", "Retrieval-Augmented Generation (RAG)"], correct: 0, explanation: "Chain-of-Thought prompting guides models through intermediate reasoning steps, significantly improving multi-step problem solving. Zero-shot lacks step-by-step guidance, template-based prompting structures input/output format but doesn't promote reasoning, and RAG retrieves information but doesn't inherently structure reasoning.", source: "ncp-genl-exam-2", sourceIndex: 12 },
  { id: 2086, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG) systems, which component is responsible for retrieving the most semantically relevant documents from the knowledge base given a user query?", options: ["The language model generator that produces the final response", "The dense retriever that embeds queries and documents into a shared vector space and retrieves top-k similar documents", "The tokenizer that preprocesses the user query for input to the language model", "The reranker that orders retrieved documents based on cross-attention scores"], correct: 1, explanation: "The dense retriever encodes queries and documents into the same embedding space and uses similarity search to find the top-k most relevant documents. The generator produces responses from retrieved context, the tokenizer preprocesses text, and the reranker refines ordering after initial retrieval.", source: "ncp-genl-exam-2", sourceIndex: 16 },
  { id: 2087, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG), which of the following architectural components most significantly affects the quality and relevance of retrieved context when handling complex multi-hop queries?", options: ["The choice of large language model (LLM) architecture used for answer generation", "The retrieval strategy, including the use of dense passage retrieval (DPR) combined with a reranking model to select the most relevant passages", "The tokenization method applied to preprocess input queries before retrieval", "The generation decoding strategy (e.g., beam search vs. nucleus sampling) used by the LLM"], correct: 1, explanation: "For multi-hop queries, the retrieval strategy is critical—dense passage retrieval finds initial candidates and reranking improves precision by cross-attending to query-passage pairs. The LLM architecture affects generation, tokenization is preprocessing, and decoding strategy affects output diversity, not retrieval quality.", source: "ncp-genl-exam-2", sourceIndex: 17 },
  { id: 2093, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "Which of the following mitigation strategies most effectively addresses hallucination in large language models (LLMs) deployed in production systems?", options: ["Increasing the model's temperature parameter to generate more diverse outputs", "Implementing Retrieval-Augmented Generation (RAG) to ground model responses in verified external knowledge bases", "Reducing the context window size to prevent the model from processing conflicting information", "Fine-tuning the model exclusively on synthetic data to reduce exposure to noisy training samples"], correct: 1, explanation: "RAG grounds model responses in verified external knowledge, significantly reducing hallucination. Higher temperature increases randomness and hallucination risk, smaller context windows lose useful information, and synthetic-only training can amplify model biases.", source: "ncp-genl-exam-2", sourceIndex: 23 },
  { id: 2133, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of building enterprise-grade RAG (Retrieval-Augmented Generation) systems, which of the following design considerations most critically impacts the system's ability to handle complex, multi-hop reasoning queries?", options: ["The size of the language model used for answer generation", "The retrieval strategy, including iterative retrieval and re-ranking mechanisms that enable the system to gather evidence across multiple documents", "The tokenization method used to preprocess user queries before retrieval", "The generation decoding strategy (e.g., greedy vs. beam search) used by the language model"], correct: 1, explanation: "Multi-hop queries require iterative retrieval (gathering evidence across multiple documents) and re-ranking (selecting the most relevant passages across iterations). Model size affects generation, tokenization is preprocessing, and decoding strategy affects output quality but not retrieval capability.", source: "ncp-genl-exam-2", sourceIndex: 63 },
  { id: 2134, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of optimizing RAG (Retrieval-Augmented Generation) pipelines for enterprise knowledge management, which combination of techniques most effectively improves retrieval precision and reduces hallucination in generated responses?", options: ["Using keyword-based sparse retrieval without any reranking or context compression", "Combining dense vector retrieval with cross-encoder reranking, retrieved context compression, and source attribution in the generated output", "Increasing the language model's context window to include all retrieved documents without filtering", "Relying solely on the language model's parametric knowledge without external retrieval"], correct: 1, explanation: "Dense retrieval + cross-encoder reranking maximizes retrieval precision, context compression manages token limits, and source attribution enables verification—together minimizing hallucination. Sparse retrieval misses semantic matches, including everything wastes context, and parametric-only knowledge hallucinates more.", source: "ncp-genl-exam-2", sourceIndex: 64 },
  { id: 2135, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of building LLM-powered conversational agents for enterprise customer support, which architecture most effectively balances response accuracy, factual grounding, and scalability?", options: ["A single fine-tuned LLM with all domain knowledge embedded in its parameters, deployed without any retrieval mechanism", "A RAG-based architecture combining a fine-tuned LLM with a continuously updated vector database and a reranking layer for precision retrieval", "A rule-based chatbot augmented with a generative LLM for fallback responses", "A multi-LLM ensemble without retrieval, where multiple models vote on the best response"], correct: 1, explanation: "RAG with fine-tuned LLM, updated vector database, and reranking provides accuracy (fine-tuning), factual grounding (retrieval), and scalability (vector database). Parametric-only knowledge becomes stale, rule-based systems lack flexibility, and multi-LLM ensembles without retrieval can't ground facts.", source: "ncp-genl-exam-2", sourceIndex: 65 },
  // ── Training & Fine-Tuning ──
  { id: 2079, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which technique minimizes computational cost by introducing trainable rank-decomposition matrices into transformer layers while keeping the original model weights frozen?", options: ["Full fine-tuning", "Prefix tuning", "Low-Rank Adaptation (LoRA)", "Reinforcement Learning from Human Feedback (RLHF)"], correct: 2, explanation: "LoRA introduces small trainable low-rank matrices alongside frozen original weights, dramatically reducing computational cost. Full fine-tuning updates all parameters, prefix tuning adds trainable prefix tokens, and RLHF is an alignment technique using reward models.", source: "ncp-genl-exam-2", sourceIndex: 9 },
  { id: 2083, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of large language model (LLM) fine-tuning, which parameter-efficient technique introduces small trainable modules between existing transformer layers without modifying the original pre-trained weights?", options: ["Low-Rank Adaptation (LoRA)", "Adapter layers", "Full fine-tuning", "Prefix tuning"], correct: 1, explanation: "Adapter layers insert small trainable modules between existing transformer layers while keeping original weights frozen. LoRA adds low-rank matrices to existing weight matrices, full fine-tuning updates all parameters, and prefix tuning adds trainable prefix tokens to the input.", source: "ncp-genl-exam-2", sourceIndex: 13 },
  { id: 2084, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of Reinforcement Learning from Human Feedback (RLHF) for aligning large language models (LLMs), which component is directly responsible for providing the training signal that guides the policy model toward generating preferred outputs?", options: ["The supervised fine-tuning (SFT) model used as the baseline policy", "The reward model trained on human preference data to score model outputs", "The Kullback-Leibler (KL) divergence penalty applied to prevent the policy from deviating too far from the SFT baseline", "The value function estimating the expected cumulative reward for each state-action pair"], correct: 1, explanation: "The reward model, trained on human preference comparisons, scores model outputs and provides the training signal that guides the policy toward preferred responses. SFT provides the baseline, KL penalty constrains deviation, and the value function estimates future rewards.", source: "ncp-genl-exam-2", sourceIndex: 14 },
  { id: 2085, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs) for domain-specific applications, which of the following techniques most effectively reduces computational cost while maintaining model performance by only updating a small number of additional parameters?", options: ["Full fine-tuning of all model parameters on domain-specific data", "Parameter-Efficient Fine-Tuning (PEFT) using methods such as LoRA or adapter layers", "Training a new model from scratch on domain-specific data", "Using data augmentation techniques to expand the domain-specific dataset"], correct: 1, explanation: "PEFT methods (LoRA, adapters) update only a small number of additional parameters while keeping the base model frozen, dramatically reducing computational cost. Full fine-tuning is expensive, training from scratch wastes pretrained knowledge, and data augmentation doesn't reduce training cost.", source: "ncp-genl-exam-2", sourceIndex: 15 },
  { id: 2088, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of tokenization for large language models (LLMs), which tokenization strategies most effectively balance vocabulary size, handling of rare words, and computational efficiency?", options: ["Byte-Pair Encoding (BPE)", "Word-Level Tokenization", "Character-Level Tokenization", "Sentence Tokenization", "Unigram Language Model Tokenization", "N/A"], correct: [0, 4], multiSelect: true, explanation: "BPE and Unigram Language Model Tokenization both achieve effective subword segmentation. BPE merges frequent pairs iteratively, while Unigram starts with a large vocabulary and prunes based on likelihood. Word-level creates OOV issues, character-level is too granular, and sentence tokenization is too coarse for LLM inputs.", source: "ncp-genl-exam-2", sourceIndex: 18 },
  { id: 2089, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of dataset cleaning and curation for training large language models (LLMs), which of the following practices are essential to ensure high-quality, unbiased, and relevant training data?", options: ["Removing duplicate entries to prevent overfitting and data leakage", "Normalizing text by converting all characters to lowercase without considering language-specific nuances", "Filtering out toxic or biased content to reduce harmful model outputs", "Augmenting the dataset by injecting synthetic noise to simulate real-world data variability", "Ensuring metadata consistency and correct labeling for supervised fine-tuning tasks", "Ignoring rare or outlier data points as they do not significantly affect model performance"], correct: [0, 2, 4], multiSelect: true, explanation: "Essential practices include deduplication (preventing overfitting), toxic content filtering (reducing harmful outputs), and metadata/label consistency (ensuring quality supervision). Blind lowercasing loses information, synthetic noise degrades quality, and ignoring outliers misses important patterns.", source: "ncp-genl-exam-2", sourceIndex: 19 },
  { id: 2090, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of data preparation for training generative AI large language models (LLMs), which of the following preprocessing steps most critically affects the quality and diversity of the training corpus?", options: ["Applying aggressive data augmentation techniques such as random token deletion and substitution", "Deduplication of training data to remove near-duplicate documents that could cause the model to overfit to repetitive patterns", "Converting all text to a single language to reduce vocabulary complexity", "Removing all punctuation and special characters to standardize the input format"], correct: 1, explanation: "Deduplication is the most critical step as duplicates cause overfitting and waste training compute on repetitive content, reducing corpus diversity. Aggressive augmentation introduces noise, single-language conversion loses multilingual capability, and removing punctuation loses important syntactic information.", source: "ncp-genl-exam-2", sourceIndex: 20 },
  { id: 2091, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of training data preparation for large language models (LLMs), which of the following practices most effectively reduces the risk of training data contamination that could inflate benchmark evaluation scores?", options: ["Implementing rigorous deduplication and removal of benchmark test sets from training corpora before model training", "Using synthetic data generation to replace real-world data and avoid benchmark overlap", "Applying aggressive data augmentation techniques to reduce the likelihood of memorization", "Filtering training data based solely on perplexity scores from a reference language model"], correct: 0, explanation: "Rigorous deduplication and benchmark test set removal prevents the model from memorizing evaluation data, ensuring fair benchmark scores. Synthetic data doesn't guarantee no overlap, augmentation doesn't prevent memorization of benchmark content, and perplexity filtering doesn't detect benchmark contamination.", source: "ncp-genl-exam-2", sourceIndex: 21 },
  { id: 2092, domain: "training", domainLabel: "Training & Fine-Tuning", question: "Which of the following strategies most effectively mitigates catastrophic forgetting in large language models (LLMs) when continually fine-tuning on new domain-specific datasets?", options: ["Retraining the model from scratch on a combined dataset of old and new domain data", "Applying elastic weight consolidation (EWC) combined with experience replay of representative samples from previous tasks", "Increasing the learning rate to accelerate adaptation to the new domain data", "Freezing all model layers except the final output layer during fine-tuning on new domains"], correct: 1, explanation: "EWC protects important weights while experience replay maintains performance on previous tasks, together preventing catastrophic forgetting. Retraining from scratch is expensive, high learning rates accelerate forgetting, and freezing all but the output layer limits adaptation capability.", source: "ncp-genl-exam-2", sourceIndex: 22 },
  { id: 2104, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which of the following statements accurately describe the purpose and characteristics of conceptual data mapping documents?", options: ["They define the relationships between raw training data attributes and the model's expected input features to ensure consistent data preprocessing.", "They serve as detailed logs of model training hyperparameters and architecture configurations used during fine-tuning.", "They help identify semantic equivalences and discrepancies between different data sources to harmonize training datasets.", "They primarily focus on documenting the model evaluation metrics and benchmark results after fine-tuning.", "They facilitate the alignment of domain-specific terminology in training data with the model's tokenization and embedding representations.", "They are exclusively used for post-training analysis of model outputs and are not relevant during the data preparation phase."], correct: [0, 2, 4], multiSelect: true, explanation: "Conceptual data mapping documents define data-to-feature relationships (preprocessing consistency), identify semantic equivalences across sources (dataset harmonization), and align domain terminology with model representations (tokenization alignment). They are not hyperparameter logs, evaluation documentation, or post-training-only tools.", source: "ncp-genl-exam-2", sourceIndex: 34 },
  // ── Deployment & Optimization ──
  { id: 2096, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following practices are essential for implementing effective real-time monitoring in generative AI large language models (LLMs) to optimize model performance and reliability?", options: ["Tracking model latency and throughput metrics continuously during inference", "Implementing drift detection on input data distributions to identify shifts affecting model accuracy", "Logging all generated outputs without filtering for anomalies or quality issues", "Using real-time alerts triggered by degradation in key performance indicators (KPIs) such as perplexity or generation quality", "Scheduling weekly batch evaluations of the model on static test datasets only", "Monitoring system resource utilization (CPU, GPU, memory) during model inference"], correct: [0, 1, 3, 5], multiSelect: true, explanation: "Essential real-time monitoring includes latency/throughput tracking, input drift detection, KPI-based alerting, and resource utilization monitoring. Unfiltered output logging without anomaly detection is noise, and weekly batch-only evaluation misses real-time issues.", source: "ncp-genl-exam-2", sourceIndex: 26 },
  { id: 2097, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of model update management for large language models (LLMs), which strategy best balances minimizing downtime while ensuring model performance and safety during deployment?", options: ["Replacing the old model version directly in production with no traffic management", "Implementing a blue-green deployment strategy with automated rollback triggered by performance degradation thresholds", "Deploying model updates exclusively during off-peak hours without performance validation", "Using a single model version in production and updating it manually when issues are identified"], correct: 1, explanation: "Blue-green deployment runs two identical environments, enabling instant traffic switching to the new version with automated rollback if performance degrades. Direct replacement risks downtime, off-peak-only deployment delays updates, and manual updates are slow and error-prone.", source: "ncp-genl-exam-2", sourceIndex: 27 },
  { id: 2098, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying generative AI large language models (LLMs) in production, which of the following strategies most effectively ensures high availability and fault tolerance while managing cost?", options: ["Deploying a single high-capacity server with no redundancy to minimize infrastructure costs", "Implementing a distributed deployment with load balancing, auto-scaling, and active-passive failover mechanisms", "Using only on-premises infrastructure to avoid cloud provider dependencies", "Relying on a single cloud region deployment with manual failover procedures"], correct: 1, explanation: "Distributed deployment with load balancing, auto-scaling, and failover provides high availability, fault tolerance, and cost efficiency through dynamic resource allocation. Single servers lack redundancy, on-premises-only limits flexibility, and single-region with manual failover creates availability risks.", source: "ncp-genl-exam-2", sourceIndex: 28 },
  { id: 2099, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) in production, which of the following optimization techniques most effectively reduces inference latency while maintaining model accuracy?", options: ["Increasing the number of transformer layers in the model to improve output quality", "Applying dynamic quantization to reduce model precision from FP32 to INT8 without significant accuracy degradation", "Disabling the KV-cache to reduce memory consumption during autoregressive decoding", "Using a larger batch size exclusively for all inference requests regardless of latency requirements"], correct: 1, explanation: "Dynamic quantization reduces precision (FP32→INT8) with minimal accuracy loss, significantly reducing computation and memory bandwidth. More layers increase latency, disabling KV-cache forces redundant computation, and fixed large batches increase latency for individual requests.", source: "ncp-genl-exam-2", sourceIndex: 29 },
  { id: 2103, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating generative AI large language models (LLMs), which quantitative metric most effectively measures the model's ability to generate contextually relevant and coherent text over multiple turns in a conversation?", options: ["Perplexity", "BLEU Score", "Dialog Coherence Score", "ROUGE Score"], correct: 2, explanation: "Dialog Coherence Score specifically measures multi-turn conversational coherence and contextual relevance. Perplexity measures prediction confidence, BLEU measures n-gram precision against references, and ROUGE measures recall of reference content—none are specifically designed for multi-turn dialog evaluation.", source: "ncp-genl-exam-2", sourceIndex: 33 },
  { id: 2105, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production deployment of large language models (LLMs), which combination of evaluation methods most effectively ensures ongoing model quality and reliability after initial deployment?", options: ["Continuous A/B testing combined with automated regression testing and human evaluation of sampled outputs", "One-time evaluation on a held-out test set before deployment with no subsequent monitoring", "Relying exclusively on user feedback forms to identify model quality issues post-deployment", "Periodic full model retraining triggered solely by user complaint thresholds"], correct: 0, explanation: "Continuous A/B testing, automated regression testing, and human evaluation together provide comprehensive ongoing quality assurance. One-time evaluation misses drift, user feedback alone is incomplete and slow, and complaint-triggered retraining is reactive rather than proactive.", source: "ncp-genl-exam-2", sourceIndex: 35 },
  { id: 2106, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating large language models (LLMs) for domain-specific question answering tasks, which of the following evaluation frameworks most comprehensively assesses both factual accuracy and response relevance while accounting for open-ended outputs?", options: ["Automated BLEU score evaluation against a fixed set of reference answers", "A hybrid evaluation framework combining automated metrics (e.g., BERTScore, ROUGE-L) with human evaluation for factual correctness, completeness, and relevance", "Perplexity measurement on domain-specific validation datasets", "Exact match accuracy on closed-domain multiple-choice benchmarks"], correct: 1, explanation: "A hybrid framework combining automated metrics (for scalable quantitative assessment) with human evaluation (for factual correctness and relevance of open-ended outputs) provides the most comprehensive assessment. BLEU alone misses semantics, perplexity doesn't measure accuracy, and exact match doesn't handle open-ended responses.", source: "ncp-genl-exam-2", sourceIndex: 36 },
  { id: 2107, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for real-time applications, which of the following deployment strategies most effectively balances inference throughput and response latency while maintaining cost efficiency?", options: ["Deploying a single large monolithic model on dedicated high-memory GPUs for all request types", "Implementing a tiered deployment with a smaller, quantized model for low-complexity requests and routing complex queries to a larger model", "Using CPU-based inference for all requests to reduce infrastructure costs", "Deploying multiple identical model replicas without any request routing or load balancing"], correct: 1, explanation: "Tiered deployment with intelligent routing optimizes cost (smaller models for simple queries), latency (fast models for easy requests), and throughput (larger models reserved for complex queries). Monolithic deployment wastes resources, CPU inference is too slow, and identical replicas without routing don't optimize by complexity.", source: "ncp-genl-exam-2", sourceIndex: 37 },
  { id: 2108, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When deploying large language models (LLMs) in production environments with strict latency requirements, which of the following infrastructure optimization strategies most effectively reduces inference time without significant model accuracy degradation?", options: ["Increasing the number of model layers to enhance output quality at the cost of latency", "Applying model quantization to INT8 precision combined with KV-cache optimization and continuous batching", "Disabling GPU acceleration and running inference on CPU to reduce hardware costs", "Increasing the context window size to reduce the number of inference calls per session"], correct: 1, explanation: "INT8 quantization reduces computation, KV-cache avoids redundant attention computation, and continuous batching maximizes GPU utilization—together providing optimal latency reduction. More layers increase latency, CPU inference is much slower, and larger context windows increase per-call latency.", source: "ncp-genl-exam-2", sourceIndex: 38 },
  { id: 2109, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM inference optimization, which technique most effectively reduces the computational overhead of autoregressive decoding by avoiding redundant computation of previously processed token representations?", options: ["Gradient checkpointing", "Mixed precision training", "Key-Value (KV) caching", "Speculative decoding"], correct: 2, explanation: "KV caching stores previously computed key-value pairs so they're reused at each decoding step rather than recomputed. Gradient checkpointing is a training memory optimization, mixed precision is for training efficiency, and speculative decoding accelerates generation through parallel draft-and-verify.", source: "ncp-genl-exam-2", sourceIndex: 39 },
  { id: 2110, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following model compression techniques most effectively reduces the memory footprint and inference latency of a large language model for deployment on edge devices, while preserving acceptable task performance?", options: ["Increasing the model's context window to reduce the number of inference passes required", "Applying structured pruning combined with post-training quantization to INT4/INT8 precision", "Fine-tuning the model on a larger dataset to improve generalization before compression", "Using a higher-rank LoRA adaptation to preserve more model capacity during compression"], correct: 1, explanation: "Structured pruning removes entire neurons/heads (reducing architecture size) and post-training quantization reduces precision—together dramatically reducing memory and latency for edge deployment. Larger context windows increase memory, fine-tuning doesn't compress, and LoRA is for adaptation not compression.", source: "ncp-genl-exam-2", sourceIndex: 40 },
  { id: 2111, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scaling generative AI large language models (LLMs), which of the following distributed training strategies most effectively reduces communication overhead while maintaining training throughput across a large cluster of GPUs?", options: ["Data parallelism with synchronous all-reduce gradient aggregation across all GPUs", "Pipeline parallelism combined with tensor parallelism and gradient accumulation to overlap computation and communication", "Fully synchronous model parallelism with blocking communication at each layer boundary", "Using a single large GPU node to avoid inter-node communication overhead entirely"], correct: 1, explanation: "Pipeline + tensor parallelism with gradient accumulation overlaps computation and communication, reducing idle time. Pure data parallelism has high communication overhead at scale, fully synchronous model parallelism blocks on communication, and single-node training doesn't scale to large models.", source: "ncp-genl-exam-2", sourceIndex: 41 },
  { id: 2112, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of distributed training for large language models (LLMs), which combination of parallelism strategies most effectively addresses both memory constraints and communication overhead when scaling to thousands of GPUs?", options: ["Data parallelism alone with synchronous gradient updates across all nodes", "3D parallelism combining data parallelism, tensor parallelism, and pipeline parallelism to distribute model weights, activations, and batches across GPU clusters", "Model parallelism alone by splitting all transformer layers sequentially across GPUs", "Gradient accumulation without any form of model or data parallelism"], correct: 1, explanation: "3D parallelism distributes the workload across three dimensions: data (batch splitting), tensor (layer splitting within nodes), and pipeline (sequential layer distribution across nodes), optimally addressing both memory and communication constraints at scale.", source: "ncp-genl-exam-2", sourceIndex: 42 },
  { id: 2113, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of large language model (LLM) training infrastructure, which combination of techniques most effectively addresses GPU memory constraints when training models with billions of parameters?", options: ["Increasing batch size and using full FP32 precision to maximize numerical stability", "Applying gradient checkpointing, mixed precision training (FP16/BF16), and ZeRO optimization to reduce memory footprint across distributed nodes", "Using data parallelism exclusively without any memory optimization techniques", "Reducing the number of transformer layers to fit the model within available GPU memory"], correct: 1, explanation: "Gradient checkpointing trades compute for memory, mixed precision halves memory for activations/weights, and ZeRO partitions optimizer states across nodes—together enabling training of models that exceed single-GPU memory. Larger batch sizes and FP32 increase memory, data parallelism alone doesn't reduce per-GPU memory, and fewer layers changes the model.", source: "ncp-genl-exam-2", sourceIndex: 43 },
  { id: 2114, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building scalable generative AI pipelines for large language models (LLMs), which architectural pattern most effectively decouples data ingestion, preprocessing, and inference stages to maximize throughput and fault tolerance?", options: ["A monolithic architecture where all pipeline stages run sequentially on a single compute node", "An event-driven microservices architecture with message queues (e.g., Kafka) orchestrating asynchronous data flow between decoupled stages", "A batch processing pipeline that processes all data at fixed intervals without real-time capabilities", "A tightly coupled architecture where preprocessing and inference are colocated to minimize network latency"], correct: 1, explanation: "Event-driven microservices with message queues enable asynchronous, decoupled processing where each stage scales independently and failures don't cascade. Monolithic architectures can't scale independently, batch processing lacks real-time capability, and tightly coupled systems propagate failures.", source: "ncp-genl-exam-2", sourceIndex: 44 },
  { id: 2115, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scalable deployment for generative AI large language models (LLMs), which combination of infrastructure patterns most effectively manages traffic variability and ensures low-latency inference?", options: ["Using a single large monolithic server with fixed resources and no auto-scaling", "Implementing horizontal auto-scaling with load balancing, request queuing, and model caching to handle variable workloads efficiently", "Deploying multiple isolated model instances without centralized traffic management", "Pre-allocating maximum expected capacity at all times to guarantee headroom without auto-scaling"], correct: 1, explanation: "Horizontal auto-scaling dynamically adjusts capacity, load balancing distributes requests, queuing handles bursts, and caching reduces redundant computation—together managing traffic variability efficiently. Fixed resources waste during low traffic, isolated instances lack coordination, and pre-allocated maximum capacity is cost-prohibitive.", source: "ncp-genl-exam-2", sourceIndex: 45 },
  { id: 2116, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing multi-modal large language model (LLM) systems that process both text and images, which architectural component is primarily responsible for aligning visual representations with the language model's embedding space?", options: ["The tokenizer that segments image pixels into discrete tokens for language model input", "A cross-modal projection layer (e.g., linear projection or cross-attention mechanism) that maps visual encoder outputs into the language model's token embedding space", "The positional encoding module that assigns spatial positions to image patches", "The feed-forward network within each transformer block that processes aligned token representations"], correct: 1, explanation: "The cross-modal projection layer bridges the gap between visual encoder outputs and the language model's embedding space, enabling the model to process both modalities jointly. Tokenizers segment text, positional encoding provides position info, and feed-forward networks transform representations within the transformer.", source: "ncp-genl-exam-2", sourceIndex: 46 },
  { id: 2117, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building LLM-powered autonomous agents, which architectural component most critically enables the agent to dynamically select and invoke external tools based on task requirements?", options: ["The language model's fine-tuned weights trained exclusively on tool documentation", "A tool-use module that interprets the LLM's structured output to dispatch API calls and return results back to the model's context", "A static rule-based decision tree that maps predefined intents to tool invocations", "An external knowledge base that the agent queries for tool selection without LLM involvement"], correct: 1, explanation: "The tool-use module interprets the LLM's structured outputs (function calls, API requests), dispatches them to appropriate tools, and feeds results back into context—enabling dynamic, context-aware tool selection. Fine-tuned weights alone can't execute tools, rule-based trees lack flexibility, and external KBs without LLM integration can't reason about tool selection.", source: "ncp-genl-exam-2", sourceIndex: 47 },
  { id: 2118, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building production-grade LLM-powered applications, which of the following system design patterns most effectively ensures reliable, auditable, and maintainable AI workflows at scale?", options: ["Embedding all business logic directly within the LLM prompt without external orchestration", "Implementing a modular architecture with clear separation between the LLM inference layer, orchestration logic, data retrieval, and evaluation components", "Using a single monolithic service that combines all LLM-related functions for simplicity", "Relying exclusively on the LLM to handle error recovery, data validation, and logging internally"], correct: 1, explanation: "Modular architecture with separated concerns enables independent scaling, testing, and maintenance of each component while maintaining auditability. Prompt-embedded logic is fragile, monolithic services are hard to maintain, and LLM-handled error recovery is unreliable.", source: "ncp-genl-exam-2", sourceIndex: 48 },
  { id: 2119, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM-powered applications requiring persistent user context across sessions, which architectural pattern most effectively balances context relevance, memory efficiency, and retrieval accuracy?", options: ["Storing the full conversation history as a flat text file and prepending it entirely to each new prompt", "Implementing a hierarchical memory system combining short-term in-context storage, mid-term summarization, and long-term vector store retrieval with relevance-based context selection", "Resetting the context window at the start of each session to prevent context overflow", "Fine-tuning the LLM on each user's historical interactions to encode personal context into model weights"], correct: 1, explanation: "Hierarchical memory with short-term (recent turns), mid-term (summarized), and long-term (vector store) tiers optimally balances context quality, memory efficiency, and retrieval accuracy. Full history prepending exceeds token limits, resetting loses context, and per-user fine-tuning is impractical.", source: "ncp-genl-exam-2", sourceIndex: 49 },
  { id: 2120, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of performance profiling of Generative AI LLM workloads on GPUs, which of the following metrics and techniques are most critical to identify bottlenecks and optimize throughput?", options: ["GPU kernel execution time", "Memory bandwidth utilization", "CPU utilization percentage", "Warp occupancy and divergence", "Disk I/O throughput", "Power consumption of the GPU"], correct: [0, 1, 3], multiSelect: true, explanation: "GPU kernel execution time identifies slow kernels, memory bandwidth utilization reveals data movement bottlenecks, and warp occupancy/divergence shows GPU underutilization. CPU utilization is secondary for GPU workloads, disk I/O is rarely the bottleneck for inference, and power consumption is an efficiency metric not a performance bottleneck indicator.", source: "ncp-genl-exam-2", sourceIndex: 50 },
  { id: 2121, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production deployment pipelines for generative AI large language models (LLMs), which practice is most critical to ensure seamless model updates with minimal service disruption?", options: ["Deploying new model versions directly to the production environment without traffic splitting", "Implementing canary deployments with gradual traffic shifting to the new model version", "Using batch inference jobs to update the model predictions in production", "Relying solely on manual rollback procedures in case of deployment failures"], correct: 1, explanation: "Canary deployments gradually shift traffic to the new version while monitoring for issues, enabling quick rollback if problems arise. Direct deployment risks widespread failures, batch jobs don't handle real-time serving, and manual rollback is slow and error-prone.", source: "ncp-genl-exam-2", sourceIndex: 51 },
  { id: 2122, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of efficient batch serving for large language models (LLMs) in production, which strategy most effectively reduces latency and maximizes throughput while maintaining model accuracy?", options: ["Processing each request individually to avoid overhead from batching", "Grouping multiple inference requests into batches to exploit parallel computation on GPUs", "Using a smaller model variant for batch serving to reduce per-request cost", "Applying synchronous request processing with fixed batch sizes to simplify scheduling"], correct: 1, explanation: "Batching groups multiple requests for parallel GPU processing, amortizing overhead and maximizing throughput. Individual processing wastes GPU capacity, smaller models sacrifice quality, and fixed batch sizes don't adapt to variable traffic patterns.", source: "ncp-genl-exam-2", sourceIndex: 52 },
  { id: 2130, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for real-time applications with strict latency constraints, which of the following optimization strategies most effectively reduces inference time while maintaining output quality?", options: ["Increasing the number of attention heads to improve contextual understanding at inference time", "Applying speculative decoding combined with KV-cache reuse to accelerate autoregressive token generation", "Using full-precision (FP32) inference to avoid accuracy degradation from quantization", "Expanding the model's context window to reduce the number of inference steps required"], correct: 1, explanation: "Speculative decoding uses a smaller draft model to generate candidate tokens verified by the larger model, and KV-cache reuse avoids redundant computation—together significantly reducing latency. More attention heads increase computation, FP32 is slower than quantized, and larger context windows increase per-step computation.", source: "ncp-genl-exam-2", sourceIndex: 60 },
  { id: 2136, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing multi-agent LLM systems for complex problem-solving, which orchestration pattern most effectively ensures reliable task decomposition, parallel execution, and result synthesis?", options: ["A hierarchical orchestrator-agent pattern where a central orchestrator decomposes tasks into subtasks, delegates them to specialized agents, and aggregates results with validation checkpoints", "A peer-to-peer agent network where all agents communicate directly without central coordination", "A sequential pipeline where each agent processes the full task and passes its output to the next agent", "A single monolithic agent with access to all tools and knowledge bases to handle all tasks independently"], correct: 0, explanation: "The hierarchical orchestrator pattern provides centralized task decomposition, delegation to specialized agents, parallel execution capability, and result aggregation with validation—ensuring reliability. Peer-to-peer lacks coordination guarantees, sequential pipelines can't parallelize, and monolithic agents don't leverage specialization.", source: "ncp-genl-exam-2", sourceIndex: 66 },
  { id: 2137, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of tool-augmented LLM agents, which design pattern most effectively prevents cascading failures when one tool invocation returns an unexpected result or error during a multi-step agentic workflow?", options: ["Allowing the agent to proceed without handling errors to maximize task completion speed", "Implementing structured error handling with retry logic, fallback strategies, and explicit state checkpointing to recover gracefully from tool failures", "Replacing all external tool calls with LLM-generated synthetic responses to avoid dependency on external systems", "Terminating the entire workflow immediately upon encountering any tool error without attempting recovery"], correct: 1, explanation: "Structured error handling with retries, fallbacks, and checkpointing enables graceful recovery from individual tool failures without cascading. Ignoring errors causes cascading failures, synthetic replacements lose factual grounding, and immediate termination wastes completed work.", source: "ncp-genl-exam-2", sourceIndex: 67 },
  { id: 2138, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of prompt management for large-scale LLM deployments, which approach most effectively ensures prompt consistency, version control, and auditability across multiple teams and environments?", options: ["Storing prompts as hardcoded strings within application code to ensure they are always co-located with the model inference logic", "Implementing a centralized prompt registry with version control, metadata tagging, access controls, and a testing pipeline for prompt validation before deployment", "Allowing individual teams to manage their own prompt libraries without any cross-team standardization", "Embedding prompts directly into model weights through fine-tuning to eliminate runtime prompt management complexity"], correct: 1, explanation: "A centralized prompt registry with version control, access controls, and testing ensures consistency, auditability, and safe iteration across teams. Hardcoded prompts are inflexible, decentralized management causes inconsistency, and weight-embedded prompts can't be updated without retraining.", source: "ncp-genl-exam-2", sourceIndex: 68 },
  { id: 2139, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of testing and validating LLM-powered applications before production deployment, which testing strategy most comprehensively evaluates both functional correctness and safety of model outputs?", options: ["Unit testing individual prompt templates against a fixed set of expected outputs", "Combining automated regression testing, adversarial red-teaming, human evaluation of sampled outputs, and behavioral testing across diverse input distributions", "Relying solely on user acceptance testing (UAT) with internal stakeholders before launch", "Evaluating the model exclusively on academic benchmarks without application-specific testing"], correct: 1, explanation: "Comprehensive testing combines automated regression (consistency), adversarial red-teaming (safety), human evaluation (quality), and behavioral testing (robustness)—covering both functional correctness and safety. Unit testing is too narrow, UAT alone is insufficient, and benchmarks don't test application-specific behavior.", source: "ncp-genl-exam-2", sourceIndex: 69 },
  { id: 2140, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM application observability, which combination of monitoring strategies most effectively enables proactive detection of performance degradation and unexpected model behavior in production?", options: ["Collecting only system-level infrastructure metrics (CPU, memory, network) without model-specific signals", "Implementing end-to-end distributed tracing combined with real-time statistical monitoring of output distributions, input drift detection, and automated alerting on anomalous generation patterns", "Performing weekly batch analysis of logged conversations without real-time monitoring", "Relying on manual review of randomly sampled outputs by the engineering team"], correct: 1, explanation: "End-to-end tracing with real-time output monitoring, drift detection, and automated alerting provides comprehensive proactive observability. System-only metrics miss model behavior, weekly batch analysis is too slow, and manual review doesn't scale for production traffic.", source: "ncp-genl-exam-2", sourceIndex: 70 },
  // ── Safety & Governance ──
  { id: 2094, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of bias detection and mitigation in large language models (LLMs), which evaluation methodology most comprehensively assesses and reduces implicit biases present in generated text?", options: ["Evaluating model performance exclusively on benchmark datasets such as GLUE and SuperGLUE", "Combining counterfactual data augmentation with adversarial probing and human audits to systematically identify and mitigate biases", "Fine-tuning the model on a curated balanced dataset without any additional evaluation steps", "Applying rule-based post-processing filters to remove explicitly biased terms from generated outputs"], correct: 1, explanation: "Combining counterfactual augmentation (revealing bias through modified inputs), adversarial probing (discovering hidden biases), and human audits (catching subtle issues) provides comprehensive bias assessment. Benchmarks don't measure bias, balanced fine-tuning alone doesn't guarantee debiasing, and post-processing filters are superficial.", source: "ncp-genl-exam-2", sourceIndex: 24 },
  { id: 2095, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI, which of the following best describes the role of model transparency in large language model (LLM) deployments?", options: ["Ensuring that the model's source code is fully open-sourced for public inspection", "Providing comprehensive documentation of model architecture, training data, limitations, and known failure modes to stakeholders", "Granting unrestricted access to model weights for independent researchers", "Disclosing all proprietary training data to regulatory bodies upon request"], correct: 1, explanation: "Model transparency means providing stakeholders with comprehensive documentation about the model's architecture, training data, capabilities, limitations, and known failure modes. It doesn't require open-sourcing code, unrestricted weight access, or full training data disclosure.", source: "ncp-genl-exam-2", sourceIndex: 25 },
  { id: 2100, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which combination of techniques most comprehensively ensures alignment with human values while minimizing harmful outputs?", options: ["Applying rule-based output filters exclusively to block predefined harmful content categories", "Combining RLHF with Constitutional AI principles, adversarial red-teaming, and continuous safety monitoring", "Relying solely on supervised fine-tuning on curated safe datasets without any feedback mechanisms", "Using model distillation to create smaller, safer models without additional alignment techniques"], correct: 1, explanation: "RLHF (preference alignment), Constitutional AI (principled self-critique), red-teaming (vulnerability discovery), and continuous monitoring (production oversight) together provide comprehensive alignment. Rule-based filters are easily bypassed, SFT alone lacks preference optimization, and distillation doesn't add safety properties.", source: "ncp-genl-exam-2", sourceIndex: 30 },
  { id: 2101, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety and alignment, which technique most effectively uses human preference data to fine-tune language models to produce outputs that are helpful, harmless, and honest?", options: ["Supervised Fine-Tuning (SFT) using labeled instruction-following datasets", "Self-supervised pretraining on large unlabeled corpora", "Reinforcement Learning from Human Feedback (RLHF)", "Knowledge distillation from a larger aligned teacher model"], correct: 2, explanation: "RLHF trains a reward model from human preference comparisons and uses reinforcement learning to optimize the LLM toward preferred responses. SFT teaches format but not preferences, pretraining is general-purpose, and distillation transfers capabilities without adding alignment.", source: "ncp-genl-exam-2", sourceIndex: 31 },
  { id: 2102, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which framework most comprehensively ensures accountability, transparency, and auditability of model decisions in high-stakes applications?", options: ["Relying solely on internal model developers to self-report potential risks and limitations", "Implementing model cards with detailed documentation, independent third-party audits, and continuous post-deployment monitoring with incident reporting protocols", "Applying strict output filtering mechanisms to block all outputs above a predefined risk threshold", "Restricting model access to vetted users through API key management and rate limiting"], correct: 1, explanation: "Model cards (transparency), third-party audits (independence), continuous monitoring (ongoing oversight), and incident protocols (accountability) together provide comprehensive governance. Self-reporting lacks verification, output filtering is one narrow control, and access management doesn't ensure responsible use.", source: "ncp-genl-exam-2", sourceIndex: 32 },
  { id: 2123, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of deploying large language models (LLMs) in regulated industries (e.g., healthcare, finance), which of the following data governance practices most effectively ensures compliance with privacy regulations such as GDPR and HIPAA?", options: ["Storing all user interaction logs in plaintext for auditability without any access restrictions", "Implementing end-to-end encryption, data minimization, role-based access controls, and audit trails for all data processed by the LLM", "Relying on the cloud provider's default security settings without additional application-level controls", "Anonymizing only the output data generated by the LLM while retaining raw input data without protection"], correct: 1, explanation: "End-to-end encryption, data minimization, RBAC, and audit trails together satisfy GDPR/HIPAA requirements for data protection, access control, and accountability. Plaintext storage violates regulations, default cloud settings are insufficient, and output-only anonymization leaves input data exposed.", source: "ncp-genl-exam-2", sourceIndex: 53 },
  { id: 2124, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI practices for large language models (LLMs), which of the following governance measures most comprehensively ensures accountability and minimizes the risk of harmful model behavior in production?", options: ["Deploying models without documentation to protect proprietary information and reduce regulatory exposure", "Establishing model cards, incident response protocols, continuous monitoring dashboards, and regular third-party audits to maintain transparency and accountability", "Relying solely on end-user feedback to identify and remediate harmful outputs after deployment", "Restricting model outputs to predefined templates to eliminate the possibility of harmful generation"], correct: 1, explanation: "Model cards (documentation), incident response (handling issues), monitoring dashboards (visibility), and third-party audits (independent verification) provide comprehensive governance. No documentation prevents oversight, user feedback alone is reactive, and template restrictions destroy model utility.", source: "ncp-genl-exam-2", sourceIndex: 54 },
  { id: 2125, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety evaluation, which methodology most rigorously identifies failure modes and unsafe behaviors in a large language model before production deployment?", options: ["Automated benchmarking on standard academic datasets such as GLUE and SuperGLUE", "Structured adversarial red-teaming with diverse human evaluators probing for harmful, deceptive, or unsafe outputs across multiple risk categories", "Statistical analysis of training data distributions to predict potential unsafe outputs", "Unit testing of individual model components in isolation without end-to-end evaluation"], correct: 1, explanation: "Structured red-teaming with diverse evaluators systematically probes for safety vulnerabilities across risk categories that standard testing misses. Academic benchmarks don't test safety, training data analysis can't predict all unsafe outputs, and component testing misses emergent end-to-end behaviors.", source: "ncp-genl-exam-2", sourceIndex: 55 },
  { id: 2126, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment, which of the following approaches most effectively operationalizes the principle of 'human-in-the-loop' for high-stakes LLM applications?", options: ["Automating all LLM decisions without human review to maximize throughput and reduce latency", "Designing workflows where LLM outputs in high-risk scenarios are reviewed and approved by qualified human reviewers before being acted upon", "Relying on the LLM's confidence scores to automatically determine when human review is necessary", "Replacing human oversight entirely with a secondary LLM to validate outputs for scalability"], correct: 1, explanation: "Human-in-the-loop requires qualified human review of high-risk LLM outputs before action, ensuring accountability and catching errors. Full automation removes oversight, confidence-based routing is unreliable, and LLM-based validation doesn't provide genuine human judgment.", source: "ncp-genl-exam-2", sourceIndex: 56 },
  { id: 2127, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of privacy-preserving techniques for large language models (LLMs), which approach most effectively prevents the model from memorizing and reproducing sensitive personal information present in the training data?", options: ["Applying post-hoc output filtering to remove personally identifiable information (PII) from generated text", "Incorporating differential privacy mechanisms during model training to limit the influence of individual data points on model parameters", "Encrypting training data at rest without modifying the training procedure", "Reducing model size to decrease the capacity for memorization of specific training examples"], correct: 1, explanation: "Differential privacy adds mathematically calibrated noise during training, providing formal guarantees that individual data points can't be extracted. Post-hoc filtering is incomplete, encryption at rest doesn't affect the trained model, and smaller models can still memorize sensitive data.", source: "ncp-genl-exam-2", sourceIndex: 57 },
  { id: 2128, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM deployment for enterprise applications, which of the following strategies most effectively ensures data privacy when processing sensitive user queries?", options: ["Logging all user queries in plaintext to enable full audit trails without any access controls", "Implementing query anonymization, differential privacy techniques, and strict data retention policies to minimize exposure of sensitive information", "Allowing unrestricted access to query logs for all internal teams to support rapid debugging", "Relying solely on network-level encryption without application-layer privacy controls"], correct: 1, explanation: "Query anonymization, differential privacy, and strict retention policies provide layered privacy protection for sensitive queries. Plaintext logging exposes data, unrestricted access violates least-privilege principles, and network-only encryption doesn't protect data at the application layer.", source: "ncp-genl-exam-2", sourceIndex: 58 },
  { id: 2131, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which combination of technical and governance strategies most comprehensively mitigates the risk of model-generated misinformation at scale?", options: ["Deploying content filters based solely on keyword blocklists to prevent harmful outputs", "Combining factual grounding via RAG with output confidence calibration, human-in-the-loop review for high-stakes outputs, and continuous model monitoring for drift", "Relying on user reporting mechanisms as the primary safeguard against misinformation", "Restricting LLM outputs to pre-approved templates to eliminate generation variability"], correct: 1, explanation: "RAG (factual grounding), confidence calibration (uncertainty awareness), human review (high-stakes oversight), and drift monitoring (ongoing vigilance) together comprehensively mitigate misinformation. Keyword filters are easily bypassed, user reporting is reactive, and templates destroy model utility.", source: "ncp-genl-exam-2", sourceIndex: 61 },
  { id: 2132, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of aligning large language models (LLMs) with safety and helpfulness requirements, which combination of techniques most effectively reduces the risk of reward hacking during RLHF training?", options: ["Using a single reward model trained on a small set of human preferences without any regularization", "Employing ensemble reward models, KL-divergence penalties to constrain policy deviation, and iterative red-teaming to identify and correct reward hacking behaviors", "Increasing the number of RLHF training iterations without modifying the reward model architecture", "Replacing human annotators with automated scoring models to scale preference data collection"], correct: 1, explanation: "Ensemble reward models reduce single-model exploitability, KL penalties prevent excessive policy deviation, and iterative red-teaming discovers reward hacking behaviors. Single reward models are easily gamed, more iterations without changes amplify hacking, and automated scoring may encode biases.", source: "ncp-genl-exam-2", sourceIndex: 62 },
  // ── Exam 3 (Q1-Q70) ──
  // ── Architecture & Foundations ──
  { id: 2141, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component primarily enables the model to capture long-range dependencies within input sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Layers", "Embedding Layers"], correct: 1, explanation: "The self-attention mechanism computes relationships between all token pairs simultaneously, enabling distance-independent capture of long-range dependencies. RNNs struggle with long-range dependencies, convolutional layers have limited receptive fields, and embedding layers map tokens to vectors without modeling dependencies.", source: "ncp-genl-exam-3", sourceIndex: 1 },
  { id: 2142, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of foundational Large Language Models (LLMs), which component primarily enables the model to capture contextual relationships across tokens in a sequence?", options: ["Convolutional Neural Networks (CNNs)", "Self-Attention Mechanism", "Recurrent Neural Networks (RNNs)", "Feed-Forward Neural Networks"], correct: 1, explanation: "Self-attention enables each token to attend to all other tokens simultaneously, capturing contextual relationships regardless of position. CNNs capture local patterns, RNNs process sequentially with vanishing gradient issues, and feed-forward networks operate on individual positions.", source: "ncp-genl-exam-3", sourceIndex: 2 },
  { id: 2143, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In transformer-based Large Language Models (LLMs), which architectural component primarily enables the model to capture long-range dependencies in input sequences effectively?", options: ["Feed-forward neural network layers", "Self-attention mechanism", "Positional encoding", "Layer normalization"], correct: 1, explanation: "Self-attention captures long-range dependencies by computing attention scores between all token pairs. Feed-forward layers transform per-position representations, positional encoding provides order information, and layer normalization stabilizes training—none directly capture inter-token dependencies.", source: "ncp-genl-exam-3", sourceIndex: 3 },
  { id: 2144, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of foundational Large Language Models (LLMs), which component primarily enables the model to capture contextual relationships between tokens across long sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Layers", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention computes pairwise relationships between all tokens regardless of distance, enabling long-range contextual understanding. RNNs have vanishing gradient issues for long sequences, convolutional layers have limited receptive fields, and feedforward networks operate per-position.", source: "ncp-genl-exam-3", sourceIndex: 4 },
  { id: 2145, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following mechanisms are fundamental components of the Transformer architecture used in Large Language Models (LLMs) to effectively capture contextual dependencies?", options: ["Self-attention mechanism", "Convolutional layers", "Positional encoding", "Recurrent neural networks (RNNs)", "Layer normalization", "Max pooling"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformers rely on self-attention (token relationships), positional encoding (sequence order), and layer normalization (training stability). Convolutional layers, RNNs, and max pooling are not fundamental Transformer components.", source: "ncp-genl-exam-3", sourceIndex: 5 },
  { id: 2146, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component primarily enables the model to capture long-range dependencies in input sequences, and why?", options: ["Recurrent Neural Networks (RNNs)", "Self-attention mechanism", "Convolutional layers", "Feedforward neural networks"], correct: 1, explanation: "Self-attention computes attention scores between every pair of tokens simultaneously, enabling efficient capture of dependencies regardless of distance. RNNs process sequentially causing vanishing gradients, convolutions have limited receptive fields, and feedforward networks process positions independently.", source: "ncp-genl-exam-3", sourceIndex: 6 },
  { id: 2147, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of foundational Large Language Models (LLMs), which component primarily enables the model to capture long-range dependencies in input sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Feedforward Neural Networks without Attention"], correct: 1, explanation: "Self-attention enables parallel computation of relationships between all tokens, efficiently capturing long-range dependencies. RNNs suffer from vanishing gradients over long sequences, CNNs have limited receptive fields, and feedforward networks without attention can't model inter-token dependencies.", source: "ncp-genl-exam-3", sourceIndex: 7 },
  { id: 2203, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of tokenization for large language models (LLMs), which tokenization algorithm most effectively balances vocabulary coverage, handling of rare and unknown words, and computational efficiency across multilingual corpora?", options: ["Byte-Pair Encoding (BPE)", "Word-level tokenization", "Character-level tokenization", "Whitespace tokenization"], correct: 0, explanation: "BPE creates a subword vocabulary by iteratively merging frequent character pairs, effectively handling rare words, maintaining manageable vocabulary size, and working across languages. Word-level has OOV issues, character-level is too granular, and whitespace fails for non-space-delimited languages.", source: "ncp-genl-exam-3", sourceIndex: 43 },
  { id: 2204, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of LLM inference, which of the following tokenization strategies most effectively reduces out-of-vocabulary (OOV) issues while maintaining a manageable vocabulary size for multilingual inputs?", options: ["Word-level tokenization with a large fixed vocabulary", "Byte-Pair Encoding (BPE) or SentencePiece tokenization that learns subword units from training data", "Character-level tokenization without any subword merging", "Whitespace tokenization with language-specific preprocessing"], correct: 1, explanation: "BPE and SentencePiece learn subword units that decompose rare words into known sub-units, handling OOV effectively with manageable vocabulary. Word-level creates large vocabularies with OOV gaps, character-level is too granular, and whitespace fails for many languages.", source: "ncp-genl-exam-3", sourceIndex: 44 },
  // ── Prompt Engineering & RAG ──
  { id: 2148, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of chain-of-thought prompting for large language models, which of the following best describes the primary advantage of using this technique during inference?", options: ["It forces the model to generate shorter, more concise answers by limiting token output.", "It enables the model to break down complex problems into intermediate reasoning steps, improving accuracy on multi-step reasoning tasks.", "It reduces the computational cost of inference by guiding the model toward faster token prediction.", "It eliminates the need for few-shot examples by relying entirely on zero-shot capabilities."], correct: 1, explanation: "Chain-of-thought prompting guides models to produce intermediate reasoning steps, improving accuracy on complex multi-step tasks. It actually increases output length (not reduces it), doesn't reduce computational cost, and can be combined with both zero-shot and few-shot approaches.", source: "ncp-genl-exam-3", sourceIndex: 8 },
  { id: 2149, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models (LLMs), which strategy most effectively enables the model to generalize to new tasks by leveraging a small number of task demonstrations provided in the input context?", options: ["Zero-shot prompting", "Few-shot prompting", "Instruction tuning", "Retrieval-Augmented Generation (RAG)"], correct: 1, explanation: "Few-shot prompting provides task demonstrations in the context that help the model infer the expected pattern and generalize to new inputs. Zero-shot uses no examples, instruction tuning modifies weights, and RAG retrieves documents but isn't a prompting strategy for task demonstrations.", source: "ncp-genl-exam-3", sourceIndex: 9 },
  { id: 2150, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt injection attacks on large language model (LLM) systems, which defense strategy most effectively mitigates the risk of adversarial inputs overriding the system prompt instructions?", options: ["Increasing the length of the system prompt to reduce the proportion of attacker-controlled tokens", "Implementing input sanitization and instruction hierarchy enforcement that strictly separates trusted system instructions from untrusted user inputs", "Disabling the system prompt entirely to prevent attackers from exploiting prompt structure", "Using a higher temperature during inference to randomize outputs and reduce deterministic exploitation"], correct: 1, explanation: "Strict separation of trusted system instructions from untrusted user inputs with sanitization prevents adversarial inputs from overriding system behavior. Longer prompts don't prevent injection, disabling system prompts removes control, and higher temperature doesn't prevent exploitation.", source: "ncp-genl-exam-3", sourceIndex: 10 },
  { id: 2151, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of few-shot learning for large language models (LLMs), which of the following best describes why carefully selected in-context examples significantly improve model performance on downstream tasks?", options: ["They cause the model to update its internal weights to better reflect the target task distribution.", "They provide the model with task-specific patterns and output formats that help it infer the correct behavior without parameter updates.", "They increase the model's context window, allowing it to process larger inputs more effectively.", "They reduce the perplexity of the model on the target task by adding domain-specific vocabulary to the prompt."], correct: 1, explanation: "In-context examples demonstrate task patterns and expected output formats, enabling the model to infer correct behavior through in-context learning without any weight updates. Examples don't change weights, don't increase context window, and don't directly reduce perplexity.", source: "ncp-genl-exam-3", sourceIndex: 11 },
