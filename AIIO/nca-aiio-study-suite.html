  { id: 2152, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of retrieval-augmented generation (RAG) systems, which of the following best describes the primary benefit of integrating a retrieval component with a large language model?", options: ["It allows the model to generate text faster by pre-fetching likely next tokens from an external database.", "It enables the model to produce more accurate and up-to-date responses by grounding generation in relevant documents retrieved from an external knowledge base.", "It replaces the need for the model to have any pretrained knowledge by fully relying on retrieved documents.", "It reduces the size of the language model required by offloading all factual knowledge to the retrieval system."], correct: 1, explanation: "RAG grounds generation in retrieved documents, improving accuracy and enabling up-to-date responses. It doesn't pre-fetch tokens, doesn't replace pretrained knowledge (the LLM still reasons), and doesn't reduce model size requirements.", source: "ncp-genl-exam-3", sourceIndex: 12 },
  { id: 2153, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG) for large language models, which of the following architectural components is most critical for ensuring that retrieved context is semantically relevant to the input query?", options: ["The language model decoder that generates the final response", "The dense retriever, such as a bi-encoder, that encodes both query and documents into a shared vector space for similarity search", "The tokenizer that preprocesses input text before it is passed to the retrieval system", "The reranker module that performs cross-attention between the query and all documents in the corpus"], correct: 1, explanation: "The dense retriever (bi-encoder) maps queries and documents into the same embedding space, enabling semantic similarity search for relevant context. The decoder generates responses, the tokenizer preprocesses text, and the reranker refines ordering after initial retrieval.", source: "ncp-genl-exam-3", sourceIndex: 13 },
  { id: 2160, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of mitigating hallucination in large language models (LLMs), which technique most effectively reduces the generation of factually incorrect or unsupported claims?", options: ["Increasing the model's temperature during inference to encourage more diverse outputs", "Implementing Retrieval-Augmented Generation (RAG) to ground model outputs in verified external knowledge sources", "Applying aggressive prompt truncation to reduce the model's context window", "Fine-tuning the model exclusively on synthetic data generated by the model itself"], correct: 1, explanation: "RAG grounds model outputs in verified external knowledge, significantly reducing hallucination. Higher temperature increases randomness and hallucination, prompt truncation loses context, and self-generated synthetic data can amplify existing errors.", source: "ncp-genl-exam-3", sourceIndex: 20 },
  { id: 2205, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of optimizing retrieval-augmented generation (RAG) systems for enterprise knowledge bases, which combination of techniques most effectively improves both retrieval precision and generation quality?", options: ["Using only sparse keyword retrieval (BM25) without any semantic search capabilities", "Combining dense vector retrieval with cross-encoder reranking, context compression, and source-grounded generation with citation support", "Increasing the language model's context window to include all documents in the knowledge base without any retrieval", "Relying solely on the language model's parametric knowledge without any external retrieval"], correct: 1, explanation: "Dense retrieval + reranking maximizes precision, context compression manages token limits, and source-grounded generation with citations ensures factual accuracy and verifiability. Sparse retrieval misses semantics, including everything wastes context, and parametric-only knowledge hallucinates more.", source: "ncp-genl-exam-3", sourceIndex: 65 },
  { id: 2206, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of building enterprise RAG (Retrieval-Augmented Generation) systems, which architectural design decision most critically impacts the system's ability to handle complex, multi-hop reasoning queries?", options: ["The choice of language model architecture used for final answer generation", "The retrieval strategy, including whether iterative or multi-hop retrieval is used to gather evidence from multiple documents before generation", "The tokenization method applied to preprocess user queries and retrieved documents", "The generation decoding strategy (e.g., greedy vs. beam search) used by the language model"], correct: 1, explanation: "Multi-hop queries require iterative retrieval that gathers evidence across multiple documents before generation. Model architecture affects generation, tokenization is preprocessing, and decoding strategy affects output diversity—none address the multi-hop retrieval challenge.", source: "ncp-genl-exam-3", sourceIndex: 66 },
  // ── Training & Fine-Tuning ──
  { id: 2154, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of preparing datasets for training large language models (LLMs), which of the following practices is most effective for ensuring high-quality, unbiased input data during dataset cleaning and curation?", options: ["Removing all duplicate entries regardless of their source or context", "Implementing domain-specific filtering rules combined with manual review to identify and remove noisy, irrelevant, or biased data", "Applying generic text normalization techniques such as lowercasing and punctuation removal as the sole cleaning step", "Excluding any data that contains rare or domain-specific terminology to avoid overfitting"], correct: 1, explanation: "Domain-specific filtering with manual review ensures targeted removal of noise, irrelevant content, and bias while preserving valuable data. Blind deduplication may remove valid variants, generic normalization is insufficient, and excluding domain terms loses important information.", source: "ncp-genl-exam-3", sourceIndex: 14 },
  { id: 2155, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of preparing datasets for training generative AI large language models (LLMs), which data preprocessing step is most critical to ensure high-quality tokenization and model performance?", options: ["Removing stop words to reduce dataset size and improve model focus", "Normalizing text by handling encoding issues, deduplicating content, and standardizing formatting to ensure clean, consistent input sequences", "Converting all text to uppercase to minimize tokenization variability", "Truncating all documents to a fixed length to maintain uniform input sizes during training"], correct: 1, explanation: "Text normalization, encoding fixes, deduplication, and formatting standardization ensure clean, consistent inputs for optimal tokenization. Removing stop words loses information, uppercasing changes semantics, and fixed-length truncation loses content from longer documents.", source: "ncp-genl-exam-3", sourceIndex: 15 },
  { id: 2156, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which technique most effectively reduces catastrophic forgetting when adapting a pretrained model to a new domain-specific task?", options: ["Retraining the model from scratch on the combined old and new task datasets", "Using elastic weight consolidation (EWC) or replay-based methods that preserve knowledge from the original pretraining distribution", "Fine-tuning only the final output layer while keeping all other parameters frozen", "Increasing the learning rate to accelerate adaptation to the new task"], correct: 1, explanation: "EWC and replay-based methods preserve critical weights and previous task knowledge during fine-tuning. Retraining from scratch is expensive, freezing all but the output layer limits adaptation, and high learning rates accelerate forgetting of pretrained knowledge.", source: "ncp-genl-exam-3", sourceIndex: 16 },
  { id: 2157, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which parameter-efficient fine-tuning (PEFT) technique most effectively reduces computational cost and memory usage while maintaining competitive downstream task performance?", options: ["Full fine-tuning of all model parameters on domain-specific data", "Low-Rank Adaptation (LoRA), which introduces trainable low-rank matrices into transformer layers while keeping the original weights frozen", "Adapter modules inserted between every transformer block, which require full backpropagation through the entire model", "Prefix tuning applied only to the input embeddings without modifying transformer layers"], correct: 1, explanation: "LoRA introduces small trainable low-rank matrices while freezing original weights, providing the best balance of efficiency and performance. Full fine-tuning is expensive, adapters require full backpropagation, and input-only prefix tuning has limited expressiveness.", source: "ncp-genl-exam-3", sourceIndex: 17 },
  { id: 2158, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs) for specific downstream tasks, which training approach most effectively balances computational efficiency with model performance by only updating a small set of task-specific parameters?", options: ["Full fine-tuning of all model parameters on the target task dataset", "Parameter-efficient fine-tuning (PEFT) methods such as LoRA or adapter-based tuning that add and train only a small number of additional parameters", "Continued pretraining on the target task dataset using the original self-supervised objective", "Knowledge distillation from a larger fine-tuned teacher model to a smaller student model"], correct: 1, explanation: "PEFT methods update only small additional parameters while keeping the base model frozen, providing optimal efficiency-performance balance. Full fine-tuning is computationally expensive, continued pretraining doesn't target specific tasks, and distillation requires a pre-fine-tuned teacher.", source: "ncp-genl-exam-3", sourceIndex: 18 },
  { id: 2159, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of Reinforcement Learning from Human Feedback (RLHF) for aligning large language models (LLMs), which stage most directly shapes the model's output distribution to align with human preferences?", options: ["Supervised fine-tuning (SFT) on instruction-following demonstrations", "Reward model training on human preference comparisons", "Proximal Policy Optimization (PPO) applied to the language model using reward signals from the trained reward model", "Pretraining on large-scale unlabeled text corpora"], correct: 2, explanation: "PPO directly optimizes the language model's output distribution using reward signals, actively shaping it to align with human preferences. SFT provides the baseline, reward model training creates the scoring function, and pretraining learns general language—none directly optimize for preferences.", source: "ncp-genl-exam-3", sourceIndex: 19 },
  { id: 2205, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of deploying large language models (LLMs) for specialized enterprise applications, which approach most effectively adapts the model to domain-specific language and tasks while minimizing computational overhead?", options: ["Retraining the model from scratch on domain-specific data to ensure full adaptation", "Increasing the model's context window to accommodate longer domain-specific documents", "Applying parameter-efficient fine-tuning (PEFT) methods such as LoRA on curated domain-specific datasets while keeping the base model weights frozen", "Extending the tokenizer's vocabulary with domain-specific tokens and retraining only the embedding layer"], correct: 2, explanation: "PEFT/LoRA enables rapid domain adaptation with minimal compute by training only small additional parameters on domain data. Retraining from scratch is expensive, larger context windows don't add domain knowledge, and vocabulary extension alone doesn't adapt model behavior.", source: "ncp-genl-exam-3", sourceIndex: 45 },
  // ── Deployment & Optimization ──
  { id: 2166, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When configuring model serving for large language models in a production environment, which of the following practices help optimize inference latency and resource utilization?", options: ["Implementing model quantization to reduce model size and accelerate inference", "Using dynamic batching to aggregate multiple inference requests into a single batch", "Disabling model parallelism to simplify deployment and reduce overhead", "Setting a fixed maximum sequence length regardless of input to standardize resource allocation", "Preloading the entire model into GPU memory before serving to avoid runtime loading delays", "Using synchronous inference calls exclusively to ensure consistent response times"], correct: [0, 1, 4], multiSelect: true, explanation: "Quantization reduces computation, dynamic batching maximizes GPU utilization, and preloading avoids cold start delays. Disabling parallelism limits scaling, fixed sequence length wastes resources, and synchronous-only calls limit throughput.", source: "ncp-genl-exam-3", sourceIndex: 26 },
  { id: 2167, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following practices are essential for implementing effective real-time monitoring in the optimization of large language models (LLMs) during deployment?", options: ["Tracking model latency and throughput metrics continuously", "Regularly retraining the model with new data without monitoring performance", "Implementing anomaly detection on output distributions and confidence scores", "Using static batch evaluation metrics only during initial deployment", "Monitoring resource utilization such as GPU memory and CPU usage in real-time", "Ignoring user feedback and focusing solely on automated metrics"], correct: [0, 2, 4], multiSelect: true, explanation: "Essential monitoring includes continuous latency/throughput tracking, anomaly detection on outputs, and real-time resource utilization monitoring. Retraining without monitoring is blind, static-only evaluation misses drift, and ignoring user feedback loses valuable signals.", source: "ncp-genl-exam-3", sourceIndex: 27 },
  { id: 2168, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When implementing custom data importers and exporters for fine-tuning large language models, which of the following best practices ensures data integrity and compatibility throughout the fine-tuning pipeline?", options: ["Using a proprietary binary format to optimize storage and speed without schema validation", "Defining and enforcing a strict data schema with versioning, validation checks, and error handling to ensure consistency across import and export operations", "Avoiding schema enforcement to allow flexible data formats that can accommodate diverse datasets", "Relying solely on manual inspection of data samples to verify integrity without automated validation"], correct: 1, explanation: "Strict schema with versioning, validation, and error handling ensures data integrity and compatibility throughout the pipeline. Proprietary formats lack interoperability, no schema causes inconsistency, and manual inspection doesn't scale.", source: "ncp-genl-exam-3", sourceIndex: 28 },
  { id: 2169, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of large language model (LLM) evaluation, which of the following metrics most effectively captures both the fluency and factual accuracy of model-generated responses in open-domain question answering?", options: ["Perplexity on a held-out test set", "BLEU score comparing model outputs to reference answers", "A combination of BERTScore for semantic similarity and human evaluation for factual correctness", "ROUGE-L recall score on reference answers"], correct: 2, explanation: "BERTScore captures semantic quality while human evaluation assesses factual accuracy—together providing comprehensive evaluation. Perplexity measures prediction confidence, BLEU measures n-gram overlap, and ROUGE-L measures recall—none individually capture both fluency and factual accuracy.", source: "ncp-genl-exam-3", sourceIndex: 29 },
  { id: 2170, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating large language models (LLMs) for generative tasks, which of the following evaluation methodologies most comprehensively assesses the model's output quality by accounting for both semantic similarity and factual accuracy?", options: ["BLEU score evaluation comparing token n-gram overlaps against reference outputs", "A hybrid evaluation combining automated metrics such as BERTScore and ROUGE with human evaluation for coherence, factual correctness, and task-specific relevance", "Perplexity measurement on held-out validation datasets to assess language modeling quality", "Exact match accuracy on closed-ended benchmark datasets without generative output evaluation"], correct: 1, explanation: "Hybrid evaluation combining automated metrics (semantic quality) with human evaluation (factual accuracy, coherence) provides the most comprehensive assessment. BLEU alone misses semantics, perplexity doesn't measure factual accuracy, and exact match doesn't handle generative outputs.", source: "ncp-genl-exam-3", sourceIndex: 30 },
  { id: 2171, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for production applications, which of the following deployment strategies most effectively balances inference latency, cost, and model performance?", options: ["Deploying a single full-precision model on a dedicated GPU cluster with no optimization", "Using a combination of model quantization, caching frequently accessed outputs, and horizontal scaling with load balancing to optimize cost and latency", "Deploying all model variants simultaneously to allow dynamic switching based on request type", "Relying solely on CPU-based inference to reduce GPU costs without additional optimizations"], correct: 1, explanation: "Quantization reduces compute cost, caching eliminates redundant inference, and horizontal scaling with load balancing handles traffic—together optimizing latency, cost, and performance. Single unoptimized model is expensive, all-variants wastes resources, and CPU-only is too slow.", source: "ncp-genl-exam-3", sourceIndex: 31 },
  { id: 2172, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of optimizing large language models (LLMs) for deployment, which technique most effectively reduces memory usage and inference latency without significant degradation in model accuracy?", options: ["Increasing the number of transformer layers to improve output quality at the cost of speed", "Applying post-training quantization to reduce weight precision from FP32 to INT8 or INT4", "Removing positional encoding from the model to reduce parameter count", "Training the model with a larger batch size to improve generalization before deployment"], correct: 1, explanation: "Post-training quantization reduces memory and computation with minimal accuracy loss. More layers increase latency, removing positional encoding breaks the model, and batch size doesn't affect inference optimization.", source: "ncp-genl-exam-3", sourceIndex: 32 },
  { id: 2173, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of optimizing large language models (LLMs) for production inference, which technique most effectively reduces the time-to-first-token (TTFT) latency for autoregressive generation under high load?", options: ["Increasing the number of attention heads in the model to improve contextual understanding", "Implementing speculative decoding with a smaller draft model to speculatively generate tokens that are verified by the larger model", "Using full-precision FP32 inference to maximize numerical stability at inference time", "Disabling the KV-cache to reduce memory overhead during multi-turn generation"], correct: 1, explanation: "Speculative decoding uses a smaller model to draft multiple tokens that the larger model verifies in parallel, reducing time-to-first-token. More attention heads increase computation, FP32 is slower, and disabling KV-cache increases latency dramatically.", source: "ncp-genl-exam-3", sourceIndex: 33 },
  { id: 2174, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following techniques most effectively reduces the memory footprint of large language models (LLMs) during inference while maintaining acceptable output quality?", options: ["Post-training quantization (PTQ) to INT8 or INT4 precision", "Increasing the number of attention heads to distribute computation", "Expanding the model's embedding dimensions to improve representation quality", "Fine-tuning the model on domain-specific data to specialize its outputs"], correct: 0, explanation: "PTQ reduces precision with minimal quality loss, dramatically reducing memory. More attention heads and larger embeddings increase memory, and fine-tuning doesn't reduce memory footprint.", source: "ncp-genl-exam-3", sourceIndex: 34 },
  { id: 2175, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of distributed training for large language models (LLMs), which combination of parallelism strategies most effectively addresses both memory constraints and communication overhead when scaling to hundreds of GPUs?", options: ["Data parallelism alone with synchronous gradient updates across all nodes", "3D parallelism combining pipeline parallelism, tensor parallelism, and data parallelism to distribute the model and data across GPU clusters", "Model parallelism alone by partitioning all transformer layers sequentially across GPUs", "Gradient accumulation without any form of parallelism to simplify the training setup"], correct: 1, explanation: "3D parallelism optimally distributes workload: pipeline parallelism splits layers across nodes, tensor parallelism splits within layers, and data parallelism splits batches. Pure data parallelism has communication overhead, model parallelism alone creates pipeline bubbles, and no parallelism doesn't scale.", source: "ncp-genl-exam-3", sourceIndex: 35 },
  { id: 2176, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of distributed training for large language models (LLMs), which technique most effectively reduces GPU memory usage during backpropagation without significantly increasing training time?", options: ["Increasing the batch size to amortize memory overhead across more samples", "Applying gradient checkpointing to recompute activations during the backward pass instead of storing them", "Reducing model depth by removing transformer layers to lower activation memory requirements", "Using full-precision (FP32) training to maximize numerical stability at the cost of memory"], correct: 1, explanation: "Gradient checkpointing trades modest extra computation for significant memory savings by recomputing activations during backward pass. Larger batches increase memory, removing layers changes the model, and FP32 uses more memory than mixed precision.", source: "ncp-genl-exam-3", sourceIndex: 36 },
  { id: 2177, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of training infrastructure for large language models (LLMs), which combination of hardware and software techniques most effectively maximizes GPU utilization and reduces idle time during distributed training?", options: ["Using data parallelism only with synchronous gradient updates across all GPUs", "Implementing pipeline parallelism with microbatching combined with mixed precision training (BF16/FP16) and NCCL-based gradient communication", "Disabling checkpointing and gradient accumulation to reduce I/O overhead", "Running training exclusively on CPU nodes to avoid GPU memory limitations"], correct: 1, explanation: "Pipeline parallelism with microbatching reduces idle time, mixed precision improves throughput, and NCCL optimizes GPU communication. Pure data parallelism has synchronization overhead, disabling checkpointing wastes memory, and CPU-only training is orders of magnitude slower.", source: "ncp-genl-exam-3", sourceIndex: 37 },
  { id: 2178, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scaling generative AI LLM workloads for high-throughput serving, which combination of infrastructure strategies most effectively maximizes requests per second (RPS) while minimizing GPU cost per request?", options: ["Deploying large full-precision models on dedicated GPU nodes without any batching or quantization", "Combining dynamic batching, model quantization (INT8/FP16), and model sharding across multiple GPU nodes to maximize throughput while reducing per-request compute cost", "Using CPU-based inference with aggressive caching to eliminate GPU costs entirely", "Deploying a separate full model replica for each user to guarantee isolation and consistent latency"], correct: 1, explanation: "Dynamic batching maximizes GPU utilization, quantization reduces per-token compute, and sharding distributes the model—together maximizing RPS while minimizing cost. Full precision wastes resources, CPU inference is too slow, and per-user replicas are prohibitively expensive.", source: "ncp-genl-exam-3", sourceIndex: 38 },
  { id: 2179, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) at scale, which observability strategy most effectively detects silent degradation in model output quality before it significantly impacts end users?", options: ["Relying exclusively on infrastructure metrics such as CPU and memory utilization to infer model health", "Implementing continuous automated evaluation of sampled model outputs using reference-free quality metrics combined with statistical drift detection on output distributions", "Performing manual weekly reviews of randomly sampled model outputs by the operations team", "Monitoring only latency and error rates as proxy signals for model quality degradation"], correct: 1, explanation: "Continuous automated evaluation with reference-free metrics and drift detection proactively catches quality degradation. Infrastructure metrics don't measure output quality, weekly reviews are too slow, and latency/error rates don't capture subtle quality changes.", source: "ncp-genl-exam-3", sourceIndex: 39 },
  { id: 2192, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following strategies are effective for optimizing efficient batch serving of large language models in production environments?", options: ["Dynamic batching to combine multiple inference requests into a single batch at runtime", "Using fixed-size batches only, regardless of request volume, to maintain consistent latency", "Implementing asynchronous request queues to decouple request arrival from model inference execution", "Reducing model precision (e.g., FP32 to FP16) to decrease memory and computation requirements during batch serving", "Disabling caching mechanisms to ensure every request is processed freshly for maximum accuracy", "Prioritizing single-request low latency over throughput by avoiding batch processing"], correct: [0, 2, 3], multiSelect: true, explanation: "Dynamic batching maximizes GPU utilization, async queues handle variable traffic, and reduced precision saves memory/compute. Fixed batches waste resources, disabling caching loses optimization opportunities, and avoiding batching wastes GPU parallelism.", source: "ncp-genl-exam-3", sourceIndex: 52 },
  { id: 2193, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following is considered the best practice when serving large generative AI language models in production environments to ensure low latency and high availability?", options: ["Deploy the model on a single high-performance server to minimize network latency between components", "Use a combination of model quantization, horizontal scaling with load balancing, and KV-cache optimization to reduce latency while maintaining availability", "Serve the model using full-precision (FP32) weights to avoid quality degradation from quantization", "Use synchronous, single-request inference to simplify the serving pipeline and avoid batching complexity"], correct: 1, explanation: "Quantization + horizontal scaling + KV-cache optimization provides optimal latency and availability. Single servers lack redundancy, FP32 is slower, and single-request inference wastes GPU capacity.", source: "ncp-genl-exam-3", sourceIndex: 53 },
  { id: 2200, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying conversational AI systems using large language models (LLMs), which architectural pattern most effectively manages long multi-turn dialogue history while respecting the model's context window limitations?", options: ["Storing the complete conversation history as a static string and prepending it to each new prompt regardless of length", "Implementing a sliding window with dynamic summarization to compress older dialogue turns while retaining recent context and key information", "Resetting the conversation context at the start of every user session to prevent context overflow", "Fine-tuning the model on user-specific conversation history to encode long-term preferences into model parameters"], correct: 1, explanation: "Sliding window with summarization maintains recent context in detail while compressing older turns, optimally managing context window limits. Full history exceeds limits, resetting loses context, and per-user fine-tuning is impractical.", source: "ncp-genl-exam-3", sourceIndex: 60 },
  { id: 2201, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing LLM-powered multi-agent systems for enterprise automation, which orchestration pattern most effectively balances parallelism, reliability, and result consistency across specialized agents?", options: ["A hierarchical orchestrator-agent pattern with a central planner that decomposes tasks, routes them to specialized agents in parallel, validates results, and aggregates outputs", "A peer-to-peer agent topology where each agent independently decides its next action without central coordination", "A sequential pipeline where agents execute tasks one at a time in a fixed order", "A single generalist agent that handles all subtasks using extended chain-of-thought prompting"], correct: 0, explanation: "Hierarchical orchestration enables parallel execution, centralized validation, and reliable result aggregation. Peer-to-peer lacks coordination guarantees, sequential pipelines can't parallelize, and single agents don't leverage specialization.", source: "ncp-genl-exam-3", sourceIndex: 61 },
  { id: 2202, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of tool-augmented LLM agents, which design approach most effectively prevents cascading failures during multi-step task execution when a tool call returns an unexpected error?", options: ["Ignoring tool errors and instructing the agent to proceed with the task using its parametric knowledge alone", "Implementing structured error handling with explicit retry logic, fallback strategies, and human-in-the-loop escalation for unrecoverable errors", "Terminating the entire workflow immediately upon any tool error without attempting recovery", "Replacing external tool calls with LLM-generated synthetic responses to eliminate dependency on external systems"], correct: 1, explanation: "Structured error handling with retries, fallbacks, and human escalation provides resilient multi-step execution. Ignoring errors cascades failures, immediate termination wastes work, and synthetic replacements lose factual grounding.", source: "ncp-genl-exam-3", sourceIndex: 62 },
  { id: 2207, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM observability, which combination of monitoring strategies most effectively enables proactive detection of model performance degradation and unexpected behavior?", options: ["Monitoring only infrastructure metrics such as CPU and GPU utilization without model-specific signals", "Implementing distributed tracing combined with real-time statistical monitoring of output distributions, input drift detection, latency tracking, and automated alerting on anomalous generation patterns", "Performing weekly batch analysis of logged conversations without any real-time monitoring", "Relying on manual review of randomly sampled outputs by the engineering team"], correct: 1, explanation: "Distributed tracing + real-time output monitoring + drift detection + automated alerting provides comprehensive proactive observability. Infrastructure-only metrics miss model behavior, weekly analysis is too slow, and manual review doesn't scale.", source: "ncp-genl-exam-3", sourceIndex: 67 },
  { id: 2208, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM application reliability engineering, which combination of practices most effectively ensures high availability and graceful degradation under unexpected load spikes or model failures?", options: ["Deploying a single large model instance with manual failover procedures", "Implementing circuit breakers, fallback responses, load balancing across model replicas, and autoscaling policies to handle failures and traffic spikes gracefully", "Relying solely on cloud provider SLAs to guarantee availability without application-level resilience patterns", "Pre-allocating maximum expected capacity at all times to guarantee headroom without dynamic scaling"], correct: 1, explanation: "Circuit breakers prevent cascade failures, fallbacks maintain service, load balancing distributes traffic, and autoscaling handles spikes—together providing comprehensive resilience. Single instances lack redundancy, SLAs alone don't ensure app-level resilience, and pre-allocated maximum capacity is cost-prohibitive.", source: "ncp-genl-exam-3", sourceIndex: 68 },
  { id: 2209, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of integrating large language models (LLMs) into enterprise workflows, which design pattern most effectively ensures that the LLM's outputs are used to assist human decision-making rather than replace it in high-stakes scenarios?", options: ["Fully automating all decision workflows using LLM outputs without human review", "Implementing a human-in-the-loop architecture where LLM outputs are surfaced as recommendations with confidence indicators, and high-risk decisions require human approval before execution", "Using the LLM exclusively for low-stakes tasks and replacing it with deterministic rule-based systems for all critical decisions", "Relying on the LLM's uncertainty estimates alone to determine when human review is required"], correct: 1, explanation: "Human-in-the-loop with recommendations, confidence indicators, and required human approval for high-risk decisions ensures LLMs assist rather than replace human judgment. Full automation removes oversight, LLM-only for low-stakes underutilizes capability, and uncertainty estimates alone are unreliable.", source: "ncp-genl-exam-3", sourceIndex: 69 },
  { id: 2210, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of continuous improvement of production LLM systems, which feedback loop architecture most effectively captures real-world performance signals and translates them into model and system improvements?", options: ["Collecting user feedback only through explicit star ratings and using them to retrain the model monthly", "Implementing a closed-loop system that continuously collects implicit and explicit user signals, performs automated quality scoring, routes failures to human reviewers, and feeds curated data back into fine-tuning and prompt optimization pipelines", "Relying solely on automated evaluation metrics computed on held-out test sets without incorporating live production signals", "Retraining the model from scratch on new data at fixed quarterly intervals without any real-time signal integration"], correct: 1, explanation: "Closed-loop continuous improvement captures all signals (implicit + explicit), automates quality scoring, involves human review for failures, and feeds back into training/prompts. Star-only ratings are incomplete, held-out-only evaluation misses production issues, and quarterly retraining is too slow.", source: "ncp-genl-exam-3", sourceIndex: 70 },
  { id: 2186, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building agentic LLM systems, which of the following design patterns most effectively enables a language model to autonomously plan and execute multi-step tasks by interleaving reasoning and action?", options: ["Retrieval-Augmented Generation (RAG) with a fixed retrieval pipeline", "Chain-of-thought prompting without any external tool access", "ReAct (Reasoning + Acting) framework that combines chain-of-thought reasoning with tool-use actions and observation feedback loops", "Standard instruction-following with a single system prompt and no iterative feedback"], correct: 2, explanation: "ReAct interleaves reasoning traces with tool actions and observations, enabling dynamic planning and execution. RAG without replanning can't adapt, CoT without tools can't act, and standard instruction-following lacks iterative capability.", source: "ncp-genl-exam-3", sourceIndex: 46 },
  { id: 2187, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of multi-agent LLM architectures for complex task automation, which design pattern most effectively ensures reliable coordination, fault tolerance, and result aggregation across specialized agents?", options: ["A hierarchical orchestrator-subagent pattern where a central planner decomposes tasks, assigns them to specialized agents, validates intermediate results, and synthesizes the final output", "A fully decentralized peer-to-peer agent network without any central coordination or result validation", "A sequential pipeline where each agent processes the entire task and passes output to the next agent", "A single monolithic agent with access to all tools and no task decomposition"], correct: 0, explanation: "Hierarchical orchestration provides centralized task management, parallel delegation, validation checkpoints, and reliable result synthesis. Peer-to-peer lacks guarantees, sequential pipelines can't parallelize, and monolithic agents don't leverage specialization.", source: "ncp-genl-exam-3", sourceIndex: 47 },
  { id: 2188, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building LLM-based applications that require structured outputs (e.g., JSON or XML), which combination of techniques most reliably ensures format compliance and reduces parsing failures in production?", options: ["Relying solely on prompt instructions to specify the desired output format without any programmatic validation", "Combining constrained decoding or grammar-based generation with output schema validation and retry logic for malformed responses", "Using high-temperature sampling to increase output diversity and manually filtering for valid structured outputs", "Post-processing all model outputs with a rule-based parser that coerces any text into the target format"], correct: 1, explanation: "Constrained decoding enforces structure at generation time, schema validation catches remaining issues, and retry logic handles edge cases. Prompt-only instructions don't guarantee format, high-temperature increases malformation, and coercion produces invalid data.", source: "ncp-genl-exam-3", sourceIndex: 48 },
  { id: 2189, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM systems, which prompt management strategy most effectively ensures consistency, versioning, and controlled rollout of prompt changes across large-scale deployments?", options: ["Hardcoding prompts directly in application code to ensure they are always co-located with inference logic", "Maintaining a centralized prompt registry with version control, access controls, automated testing pipelines, and staged rollout capabilities for prompt changes", "Allowing individual development teams to independently manage their own prompt libraries without cross-team standardization", "Embedding all instructions into fine-tuned model weights to eliminate the need for runtime prompt management"], correct: 1, explanation: "Centralized registry with version control, testing, and staged rollout ensures consistency and safe iteration. Hardcoded prompts are inflexible, decentralized management causes drift, and weight-embedded instructions can't be updated without retraining.", source: "ncp-genl-exam-3", sourceIndex: 49 },
  { id: 2190, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building production-grade LLM applications, which testing strategy most comprehensively validates both functional correctness and safety of model outputs before deployment?", options: ["Unit testing individual prompt templates against a fixed set of expected outputs in isolation", "Combining automated regression testing, adversarial red-teaming, human evaluation of diverse sampled outputs, and integration testing across the full application pipeline", "Relying solely on user acceptance testing (UAT) with a small group of internal stakeholders", "Evaluating the model exclusively on standard academic benchmarks without application-specific test cases"], correct: 1, explanation: "Comprehensive testing combines regression (consistency), red-teaming (safety), human evaluation (quality), and integration testing (end-to-end correctness). Unit testing is narrow, UAT alone is insufficient, and benchmarks don't test application-specific behavior.", source: "ncp-genl-exam-3", sourceIndex: 50 },
  { id: 2191, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scalable orchestration for deploying large language models (LLMs) in production, which approach most effectively ensures efficient resource utilization and low-latency inference under variable workloads?", options: ["Using a static cluster of dedicated GPUs with fixed resource allocation for all inference requests", "Implementing autoscaling with container orchestration platforms like Kubernetes combined with model sharding and batch inference", "Deploying the entire model on a single high-memory CPU instance to avoid network overhead", "Using serverless functions to deploy the full LLM for each inference request independently"], correct: 1, explanation: "Kubernetes autoscaling + model sharding + batch inference provides dynamic, efficient resource utilization under variable loads. Static allocation wastes resources, CPU-only is too slow, and serverless per-request LLM deployment has high cold-start latency.", source: "ncp-genl-exam-3", sourceIndex: 51 },
  // ── Safety & Governance ──
  { id: 2161, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of bias detection and mitigation in large language models (LLMs), which of the following approaches most comprehensively reduces demographic and social biases in model outputs while preserving task performance?", options: ["Applying post-hoc output filtering to remove tokens associated with demographic groups", "Training the model exclusively on synthetic data to avoid real-world biases", "Combining diverse and balanced training data curation with adversarial debiasing techniques and targeted fine-tuning on fairness-aware datasets", "Increasing model size to allow the model to learn more nuanced representations that naturally reduce bias"], correct: 2, explanation: "Combining diverse data curation, adversarial debiasing, and fairness-aware fine-tuning addresses bias at multiple lifecycle stages. Post-hoc filtering is superficial, synthetic data introduces different biases, and larger models don't naturally reduce bias.", source: "ncp-genl-exam-3", sourceIndex: 21 },
  { id: 2162, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM alignment and safety, which of the following best describes the role of Constitutional AI (CAI) in improving model behavior?", options: ["It trains the model exclusively on human preference data collected through pairwise comparisons", "It applies reinforcement learning without any explicit rules or constraints", "It uses a set of predefined principles to guide the model in self-critiquing and revising its outputs, reducing reliance on human labeling for safety training", "It replaces RLHF by fine-tuning the model on filtered internet data without any alignment-specific training"], correct: 2, explanation: "CAI uses predefined principles (a 'constitution') for self-critique and revision, reducing reliance on human labelers while maintaining alignment. It's not purely preference-based, uses explicit principles (not rule-free RL), and complements rather than replaces RLHF.", source: "ncp-genl-exam-3", sourceIndex: 22 },
  { id: 2163, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which of the following governance frameworks most effectively ensures transparency, accountability, and auditability of model decisions?", options: ["Deploying models without documentation to protect proprietary information", "Restricting access to the model's outputs exclusively to internal teams", "Implementing model cards and datasheets, continuous monitoring pipelines, and independent auditing processes to ensure ongoing compliance and stakeholder accountability", "Relying solely on automated content filters to manage model behavior"], correct: 2, explanation: "Model cards/datasheets (transparency), continuous monitoring (ongoing oversight), and independent auditing (accountability) provide comprehensive governance. No documentation prevents oversight, restricting access doesn't ensure responsible use, and content filters alone are insufficient.", source: "ncp-genl-exam-3", sourceIndex: 23 },
  { id: 2164, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which approach most effectively ensures that model outputs are auditable, interpretable, and aligned with organizational risk policies?", options: ["Deploying the model without logging to protect user privacy", "Using only black-box evaluation metrics to assess model performance", "Implementing structured logging of inputs, outputs, and model decisions combined with interpretability tools and human review processes for high-risk outputs", "Restricting access to the model's internal representations to prevent reverse engineering"], correct: 2, explanation: "Structured logging, interpretability tools, and human review together provide auditability, interpretability, and policy alignment. No logging prevents auditing, black-box metrics lack interpretability, and restricting access doesn't ensure responsible outputs.", source: "ncp-genl-exam-3", sourceIndex: 24 },
  { id: 2165, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI, which technique most effectively reduces the risk of large language models (LLMs) generating harmful or biased outputs at scale?", options: ["Deploying models without any output filtering to maximize response diversity", "Combining Reinforcement Learning from Human Feedback (RLHF) with red-teaming exercises and continuous post-deployment monitoring to iteratively align model behavior", "Relying solely on pretraining data curation to ensure safe outputs without additional alignment steps", "Using deterministic decoding strategies to eliminate variability in model outputs"], correct: 1, explanation: "RLHF (alignment), red-teaming (vulnerability discovery), and continuous monitoring (production oversight) together iteratively reduce harmful outputs. No filtering is irresponsible, data curation alone is insufficient, and deterministic decoding doesn't address content safety.", source: "ncp-genl-exam-3", sourceIndex: 25 },
  { id: 2180, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of production LLM deployment, which combination of safety and governance mechanisms most effectively ensures compliance with organizational risk policies while maintaining model utility?", options: ["Deploying the model without any output filtering to maximize response diversity and avoid false positives", "Implementing layered guardrails including input validation, output filtering, human-in-the-loop review for high-risk queries, and continuous monitoring dashboards aligned with policy thresholds", "Relying solely on fine-tuning the model on policy-compliant data to ensure safe outputs without runtime controls", "Using rule-based keyword blocklists as the sole mechanism for compliance enforcement"], correct: 1, explanation: "Layered guardrails with input validation, output filtering, human review, and monitoring provide comprehensive compliance while maintaining utility. No filtering is irresponsible, fine-tuning alone lacks runtime controls, and keyword blocklists are easily bypassed.", source: "ncp-genl-exam-3", sourceIndex: 40 },
  { id: 2181, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of data privacy for large language models (LLMs), which of the following techniques most effectively prevents the model from memorizing and reproducing sensitive personal information present in the training data?", options: ["Applying post-hoc output filtering to remove personally identifiable information (PII) from generated text", "Incorporating differential privacy mechanisms during training to add calibrated noise that limits the influence of individual training examples on model parameters", "Encrypting training data before ingestion without modifying the training procedure", "Reducing model size to decrease the model's capacity for memorization"], correct: 1, explanation: "Differential privacy provides mathematically guaranteed protection against memorization by adding calibrated noise during training. Post-hoc filtering is incomplete, encryption doesn't affect trained weights, and smaller models can still memorize sensitive data.", source: "ncp-genl-exam-3", sourceIndex: 41 },
  { id: 2182, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which of the following practices most comprehensively ensures accountability, transparency, and auditability across the model lifecycle?", options: ["Deploying models without documentation to protect proprietary information and reduce regulatory exposure", "Maintaining detailed model cards, implementing audit logs of model decisions and data usage, and establishing clear escalation and incident response protocols for model failures", "Relying solely on end-user feedback to identify and remediate harmful outputs after deployment", "Restricting model outputs to predefined templates to eliminate the possibility of harmful generation"], correct: 1, explanation: "Model cards (documentation), audit logs (traceability), and escalation/incident protocols (accountability) provide comprehensive lifecycle governance. No documentation prevents oversight, user feedback alone is reactive, and templates destroy utility.", source: "ncp-genl-exam-3", sourceIndex: 42 },
  { id: 2194, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of deploying large language models (LLMs) in regulated industries such as healthcare or finance, which of the following compliance and privacy strategies most effectively addresses both regulatory requirements and model governance?", options: ["Storing all user prompts and model outputs indefinitely in plaintext for auditability purposes", "Implementing end-to-end encryption, strict data retention and deletion policies, role-based access controls, and audit trails that align with regulatory frameworks such as HIPAA and GDPR", "Relying solely on the cloud provider's default compliance certifications without any application-level controls", "Anonymizing only model outputs while retaining raw user inputs without protection"], correct: 1, explanation: "End-to-end encryption, retention policies, RBAC, and regulation-aligned audit trails comprehensively address compliance. Plaintext storage violates regulations, default cloud settings are insufficient, and output-only anonymization leaves inputs exposed.", source: "ncp-genl-exam-3", sourceIndex: 54 },
  { id: 2195, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI practices for large language models (LLMs), which combination of techniques most comprehensively mitigates the generation of harmful content while maintaining model utility for legitimate use cases?", options: ["Implementing a strict keyword-based output filter that blocks any response containing predefined sensitive terms", "Combining RLHF-based alignment with Constitutional AI principles, adversarial red-teaming, and context-aware content moderation to create layered safety guardrails", "Restricting the model to respond only to queries that exactly match pre-approved templates", "Deploying the model without safety measures to maximize response diversity and minimize false positives"], correct: 1, explanation: "Layered guardrails combining RLHF, Constitutional AI, red-teaming, and context-aware moderation provide comprehensive safety while preserving utility. Keyword filters are too blunt, templates destroy utility, and no safety measures are irresponsible.", source: "ncp-genl-exam-3", sourceIndex: 55 },
  { id: 2196, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of safety evaluation for large language models (LLMs), which methodology most rigorously identifies potential failure modes and harmful behaviors before production deployment?", options: ["Standard benchmarking on academic datasets such as GLUE and SuperGLUE for performance assessment", "Structured red-teaming with diverse adversarial prompts designed to probe safety boundaries, elicit harmful outputs, and test edge cases across multiple risk categories", "User acceptance testing with a small group of internal stakeholders to validate usability", "Automated regression testing against predefined input-output pairs to verify functional correctness"], correct: 1, explanation: "Structured red-teaming systematically probes safety boundaries with diverse adversarial prompts across risk categories. Academic benchmarks don't test safety, UAT is too narrow, and regression testing only covers known scenarios.", source: "ncp-genl-exam-3", sourceIndex: 56 },
  { id: 2197, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which evaluation methodology most rigorously identifies potential safety vulnerabilities and failure modes before production deployment?", options: ["Standard benchmarking on held-out test sets using accuracy and perplexity metrics", "Structured red-teaming with diverse adversarial prompts designed to probe safety boundaries and trigger harmful outputs", "User acceptance testing with a small group of internal stakeholders", "Automated regression testing against predefined input-output pairs"], correct: 1, explanation: "Structured red-teaming with diverse adversarial prompts discovers safety vulnerabilities that standard testing misses. Benchmarks measure general performance, UAT is too narrow, and regression testing only covers known scenarios.", source: "ncp-genl-exam-3", sourceIndex: 57 },
  { id: 2198, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety and alignment, which approach most effectively ensures that a large language model consistently refuses to generate harmful content across a wide range of adversarial inputs?", options: ["Applying rule-based output filtering based on a static list of prohibited keywords", "Combining RLHF with adversarial training on diverse harmful input distributions and iterative red-teaming to build robust refusal behaviors", "Restricting the model to a closed set of pre-approved response templates", "Reducing the model's context window to limit the amount of adversarial content that can influence outputs"], correct: 1, explanation: "RLHF alignment + adversarial training + iterative red-teaming builds robust, generalized refusal behaviors. Keyword filtering is easily bypassed, templates destroy utility, and smaller context windows don't prevent harmful generation.", source: "ncp-genl-exam-3", sourceIndex: 58 },
  { id: 2199, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of privacy-preserving machine learning for large language models (LLMs), which technique most effectively prevents the extraction of training data from the model through membership inference or data extraction attacks?", options: ["Post-hoc removal of sensitive data from model weights after training", "Applying differential privacy during training with calibrated noise injection to limit the influence of individual training examples on model parameters", "Encrypting training data at rest and in transit without modifying the training procedure", "Reducing model capacity to limit memorization capacity without any formal privacy guarantees"], correct: 1, explanation: "Differential privacy provides formal mathematical guarantees against data extraction by limiting each example's influence on model parameters. Post-hoc removal is impractical, encryption doesn't affect trained weights, and reducing capacity doesn't provide formal guarantees.", source: "ncp-genl-exam-3", sourceIndex: 59 },
  { id: 2183, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of evaluating LLM-powered applications, which testing methodology most comprehensively validates both the functional correctness and safety of model behavior across diverse and adversarial inputs?", options: ["Unit testing individual components of the application pipeline with predefined input-output pairs", "Combining automated regression testing with adversarial red-teaming, human evaluation of diverse sampled outputs, and integration testing across the full application stack", "Relying solely on end-user feedback collected after production deployment", "Evaluating the model exclusively on academic benchmarks without application-specific test scenarios"], correct: 1, explanation: "Comprehensive validation combines regression testing (consistency), red-teaming (safety), human evaluation (quality), and integration testing (end-to-end correctness). Component testing is narrow, user feedback is reactive, and benchmarks don't test application-specific behavior.", source: "ncp-genl-exam-3", sourceIndex: 64 },
  // ── Exam 4 (Q1-Q70) ──
  // ── Architecture & Foundations ──
  { id: 2211, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component is primarily responsible for capturing long-range dependencies in input sequences, enabling the model to understand context over extended text?", options: ["Feed-forward neural networks", "Self-attention mechanism", "Convolutional layers", "Recurrent neural networks (RNNs)"], correct: 1, explanation: "The self-attention mechanism computes relationships between all token pairs simultaneously, enabling context understanding over extended text regardless of distance. Feed-forward networks transform per-position, convolutions have limited receptive fields, and RNNs suffer from vanishing gradients.", source: "ncp-genl-exam-4", sourceIndex: 1 },
  { id: 2212, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component primarily enables the model to capture long-range dependencies in input sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention enables parallel computation of relationships between all tokens, efficiently capturing long-range dependencies. RNNs process sequentially with vanishing gradients, CNNs have limited receptive fields, and feedforward networks process each position independently.", source: "ncp-genl-exam-4", sourceIndex: 2 },
  { id: 2213, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following architectural components or mechanisms are fundamental to the structure of foundational Large Language Models (LLMs) used in generative AI?", options: ["Self-attention mechanism", "Convolutional layers", "Positional encoding", "Recurrent neural networks (RNNs)", "Feed-forward neural networks within transformer blocks", "Batch normalization layers"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformers use self-attention (token relationships), positional encoding (sequence order), and feed-forward networks (per-position transformations). Convolutional layers, RNNs, and batch normalization are not fundamental Transformer components.", source: "ncp-genl-exam-4", sourceIndex: 3 },
  { id: 2214, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following components are fundamental to the architecture of transformer-based Large Language Models (LLMs)?", options: ["Self-attention mechanism", "Convolutional layers", "Positional encoding", "Recurrent neural networks (RNNs)", "Feed-forward neural network layers", "Batch normalization"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformer LLMs are built on self-attention, positional encoding, and feed-forward layers. Convolutional layers, RNNs, and batch normalization are not core Transformer architectural components.", source: "ncp-genl-exam-4", sourceIndex: 4 },
  { id: 2249, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of tokenization for large language models (LLMs), which tokenization algorithm most effectively balances vocabulary coverage, subword granularity, and robustness to out-of-vocabulary (OOV) words across multilingual corpora?", options: ["Byte-Pair Encoding (BPE)", "Word-level tokenization", "Character-level tokenization", "Whitespace tokenization"], correct: 0, explanation: "BPE creates subword units by iteratively merging frequent character pairs, handling rare/OOV words effectively while maintaining manageable vocabulary size across languages. Word-level has OOV issues, character-level is too granular, and whitespace fails for many languages.", source: "ncp-genl-exam-4", sourceIndex: 39 },
  // ── Prompt Engineering & RAG ──
  { id: 2215, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of chain-of-thought prompting for large language models, which of the following best describes its primary advantage in improving model performance on complex reasoning tasks?", options: ["It reduces the model's output length by summarizing intermediate steps into a single concise answer.", "It encourages the model to generate intermediate reasoning steps explicitly, improving performance on tasks requiring multi-step logical deduction.", "It increases the diversity of model outputs by introducing stochastic reasoning paths.", "It eliminates the need for few-shot examples by relying solely on the model's zero-shot capabilities."], correct: 1, explanation: "Chain-of-thought prompting guides the model to produce explicit intermediate reasoning steps, significantly improving multi-step logical deduction. It increases rather than reduces output length, doesn't introduce stochastic paths, and can be combined with few-shot approaches.", source: "ncp-genl-exam-4", sourceIndex: 5 },
  { id: 2216, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models (LLMs), which technique most effectively improves the model's performance on complex multi-step reasoning tasks by guiding it to articulate intermediate steps?", options: ["Zero-shot prompting", "Chain-of-thought prompting", "Template-based prompting", "Few-shot prompting with single-step examples"], correct: 1, explanation: "Chain-of-thought prompting guides models through intermediate reasoning steps, demonstrating the step-by-step process. Zero-shot lacks demonstrations, template-based doesn't promote reasoning, and single-step few-shot examples don't show multi-step reasoning chains.", source: "ncp-genl-exam-4", sourceIndex: 6 },
  { id: 2217, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models, which technique most effectively improves task performance when only a few labeled examples are available by including them directly in the input context?", options: ["Zero-shot prompting", "Few-shot prompting", "Instruction fine-tuning", "Retrieval-Augmented Generation (RAG)"], correct: 1, explanation: "Few-shot prompting includes labeled examples directly in the prompt context, enabling the model to infer task patterns without weight updates. Zero-shot uses no examples, instruction fine-tuning modifies weights, and RAG retrieves documents rather than task demonstrations.", source: "ncp-genl-exam-4", sourceIndex: 7 },
  { id: 2218, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt injection attacks on large language model (LLM) systems, which of the following defense strategies is most effective at preventing malicious user inputs from overriding system-level instructions?", options: ["Increasing the verbosity of system prompts to reduce the proportion of attacker-controlled tokens", "Implementing strict input validation, sanitization pipelines, and architectural separation between trusted system instructions and untrusted user inputs", "Disabling system prompts entirely to prevent attackers from exploiting prompt structure vulnerabilities", "Increasing the model's context window to dilute the impact of injected malicious instructions"], correct: 1, explanation: "Strict input validation, sanitization, and architectural separation between system and user inputs prevents adversarial overrides. Longer prompts don't prevent injection, disabling system prompts removes control, and larger context windows don't dilute attack effectiveness.", source: "ncp-genl-exam-4", sourceIndex: 8 },
  { id: 2219, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of retrieval-augmented generation (RAG), which component is most critical for ensuring that retrieved documents are semantically relevant to the input query?", options: ["The language model decoder responsible for generating the final response", "The dense retriever that encodes queries and documents into a shared vector space and retrieves the top-k most similar documents", "The tokenizer that preprocesses the input query before retrieval", "The reranker that orders retrieved documents using cross-attention scores"], correct: 1, explanation: "The dense retriever maps queries and documents into the same embedding space for semantic similarity search. The decoder generates responses, the tokenizer preprocesses text, and the reranker refines ordering after initial retrieval—but the retriever determines initial relevance.", source: "ncp-genl-exam-4", sourceIndex: 9 },
  { id: 2220, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG) for large language models, which architectural component most significantly determines the relevance and quality of retrieved context for complex multi-hop queries?", options: ["The generation model's decoding strategy (e.g., beam search vs. sampling)", "The retrieval strategy, combining dense passage retrieval with a reranker that scores passages based on relevance to the query", "The tokenization method used to preprocess the query and documents", "The size of the language model used for final answer generation"], correct: 1, explanation: "Dense passage retrieval + reranking is most critical for multi-hop queries, finding and prioritizing relevant passages across documents. Decoding affects generation, tokenization is preprocessing, and model size affects generation quality but not retrieval relevance.", source: "ncp-genl-exam-4", sourceIndex: 10 },
  { id: 2221, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "When designing prompts for large language models (LLMs) to minimize hallucination in enterprise knowledge retrieval systems, which strategy is most effective?", options: ["Using high-temperature sampling to generate diverse responses that cover more potential facts", "Including explicit instructions to acknowledge uncertainty, cite retrieved sources, and avoid generating information not present in the provided context", "Relying on zero-shot prompts without any contextual grounding to leverage the model's parametric knowledge", "Increasing prompt length with detailed background information to improve factual recall"], correct: 1, explanation: "Explicit instructions to acknowledge uncertainty and cite sources grounds responses in verifiable information and reduces hallucination. High temperature increases randomness, zero-shot without context relies on parametric knowledge, and longer prompts don't prevent fabrication.", source: "ncp-genl-exam-4", sourceIndex: 11 },
  { id: 2228, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of hallucination mitigation in large language models (LLMs), which of the following strategies most directly reduces the generation of factually incorrect or unsupported claims in production systems?", options: ["Increasing the model's temperature parameter to encourage more diverse and exploratory outputs", "Implementing Retrieval-Augmented Generation (RAG) to ground model responses in verified, up-to-date external knowledge sources", "Applying aggressive prompt truncation to reduce the information available in the model's context", "Fine-tuning the model on synthetic data generated by the same model to reinforce consistent outputs"], correct: 1, explanation: "RAG grounds responses in verified external knowledge, directly reducing factually incorrect claims. Higher temperature increases randomness, prompt truncation loses context, and self-generated synthetic data can amplify existing errors.", source: "ncp-genl-exam-4", sourceIndex: 18 },
  { id: 2257, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of LLM-powered conversational AI for enterprise applications, which architecture most effectively balances factual accuracy, knowledge freshness, and scalability?", options: ["A standalone fine-tuned LLM with domain knowledge embedded in its parameters and no retrieval mechanism", "A RAG-based architecture combining a fine-tuned LLM with a continuously updated vector database and a reranking layer for precision retrieval", "A rule-based chatbot augmented with a generative LLM used only for fallback responses", "A multi-LLM ensemble without retrieval where multiple models vote on the best response"], correct: 1, explanation: "RAG with fine-tuned LLM, updated vector database, and reranking provides accuracy (fine-tuning), freshness (updated retrieval), and scalability (vector database). Parametric-only knowledge becomes stale, rule-based lacks flexibility, and ensembles without retrieval can't ground facts.", source: "ncp-genl-exam-4", sourceIndex: 47 },
  { id: 2269, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of building enterprise RAG systems, which architectural design decision most critically impacts the system's ability to handle complex multi-hop reasoning queries?", options: ["The language model architecture used for final answer generation", "The retrieval strategy, including whether iterative or multi-hop retrieval is employed to gather evidence across multiple documents before generation", "The tokenization method applied to preprocess queries and retrieved documents", "The decoding strategy (e.g., greedy vs. beam search) used during generation"], correct: 1, explanation: "Multi-hop reasoning requires iterative retrieval gathering evidence across multiple documents before generation. Model architecture, tokenization, and decoding strategy affect other aspects but don't address the multi-hop retrieval challenge.", source: "ncp-genl-exam-4", sourceIndex: 59 },
  { id: 2270, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of optimizing RAG pipelines for enterprise knowledge management, which combination of techniques most effectively improves retrieval precision and reduces hallucination in generated responses?", options: ["Using sparse keyword retrieval (BM25) without reranking or context compression", "Combining dense vector retrieval with cross-encoder reranking, context compression to reduce irrelevant retrieved content, and source attribution in generated outputs", "Increasing the language model's context window to include all retrieved documents without filtering", "Relying solely on the LLM's parametric knowledge without any external retrieval"], correct: 1, explanation: "Dense retrieval + reranking maximizes precision, context compression removes noise, and source attribution ensures verifiability. Sparse retrieval misses semantics, including everything wastes context, and parametric-only knowledge hallucinates more.", source: "ncp-genl-exam-4", sourceIndex: 60 },
  // ── Training & Fine-Tuning ──
  { id: 2222, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which parameter-efficient technique most effectively reduces computational cost while maintaining competitive downstream task performance by injecting trainable low-rank matrices into transformer layers?", options: ["Full fine-tuning of all model parameters", "Adapter layer insertion between transformer blocks", "Low-Rank Adaptation (LoRA)", "Prefix tuning applied to input embeddings"], correct: 2, explanation: "LoRA injects small trainable low-rank matrices into existing weight matrices while freezing original parameters, providing optimal efficiency-performance balance. Full fine-tuning is expensive, adapters add entire new modules, and prefix tuning has limited expressiveness.", source: "ncp-genl-exam-4", sourceIndex: 12 },
  { id: 2223, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which technique most efficiently adapts a pretrained model to a specific task by updating only a small set of newly introduced parameters while keeping original weights frozen?", options: ["Full fine-tuning", "Continued pretraining on task-specific data", "Parameter-Efficient Fine-Tuning (PEFT) methods such as LoRA or adapter tuning", "Knowledge distillation into a smaller student model"], correct: 2, explanation: "PEFT methods update only small additional parameters while keeping the base model frozen, minimizing compute while preserving pretrained knowledge. Full fine-tuning is expensive, continued pretraining doesn't target tasks, and distillation requires a teacher model.", source: "ncp-genl-exam-4", sourceIndex: 13 },
  { id: 2224, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of Reinforcement Learning from Human Feedback (RLHF), which component directly provides the training signal used to update the language model's policy toward generating more preferred outputs?", options: ["The supervised fine-tuning (SFT) model serving as the reference policy", "The reward model trained on human preference comparisons that assigns scalar scores to model outputs", "The KL-divergence penalty that constrains the policy from deviating excessively from the SFT baseline", "The value function estimating cumulative expected reward for each generated token"], correct: 1, explanation: "The reward model scores model outputs based on learned human preferences, directly providing the training signal for policy optimization. SFT is the baseline, KL penalty constrains deviation, and the value function estimates future rewards.", source: "ncp-genl-exam-4", sourceIndex: 14 },
  { id: 2225, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of preparing datasets for fine-tuning large language models (LLMs), which data preprocessing practice is most critical for ensuring consistent model performance and preventing training instability?", options: ["Removing all punctuation and special characters to standardize text format", "Deduplicating training examples, handling encoding inconsistencies, and normalizing input formatting to ensure clean and consistent training data", "Converting all text to lowercase to reduce vocabulary size and improve tokenization efficiency", "Truncating all documents to a fixed maximum length regardless of content"], correct: 1, explanation: "Deduplication, encoding fixes, and format normalization ensure clean, consistent training data that prevents instability. Removing punctuation loses information, lowercasing changes semantics, and fixed truncation loses content from longer documents.", source: "ncp-genl-exam-4", sourceIndex: 15 },
