  { id: 2403, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) using cloud-native architectures, which combination most effectively balances inference cost and latency while ensuring high availability?", options: ["Fixed full-precision replicas on dedicated on-demand GPU instances without auto-scaling", "Auto-scaling GPU clusters with model quantization, request batching, and spot/preemptible instances to minimize cost while maintaining availability", "CPU-only inference to eliminate GPU costs, accepting higher latency", "Pre-loading all model variants into a single high-memory instance"], correct: 1, explanation: "Auto-scaling + quantization + batching + spot instances provide optimal cost-latency balance with availability. Fixed replicas waste resources, CPU is too slow, and pre-loading everything wastes memory.", source: "ncp-genl-exam-6", sourceIndex: 53 },
  { id: 2405, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing tool-augmented LLM agents, which approach most effectively prevents cascading failures when a tool call returns an unexpected error?", options: ["Proceeding with parametric knowledge when tool calls fail", "Structured error handling with retry logic, fallback strategies, state checkpointing, and human-in-the-loop escalation for unrecoverable errors", "Terminating the entire workflow immediately upon any tool error", "Replacing all external tool calls with LLM-synthesized responses"], correct: 1, explanation: "Structured error handling with retries, fallbacks, checkpointing, and human escalation ensures resilient execution. Ignoring errors cascades, termination wastes work, and synthetic replacements lose grounding.", source: "ncp-genl-exam-6", sourceIndex: 55 },
  { id: 2406, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM observability, which monitoring combination most effectively enables early detection of model performance degradation?", options: ["Infrastructure metrics (CPU, GPU) only as proxy signals", "Distributed tracing with end-to-end logging, real-time statistical monitoring of output distributions, input drift detection, and automated alerting", "Weekly batch analysis of sampled outputs without real-time monitoring", "Manual review of randomly sampled outputs as the primary mechanism"], correct: 1, explanation: "Comprehensive observability requires distributed tracing, real-time monitoring, drift detection, and automated alerting. Infrastructure-only misses model behavior, weekly analysis is too slow, and manual review doesn't scale.", source: "ncp-genl-exam-6", sourceIndex: 56 },
  { id: 2407, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of continuous improvement of production LLM systems, which feedback loop architecture most effectively translates real-world signals into model improvements?", options: ["Explicit star ratings collected from users with monthly model retraining", "Closed-loop system continuously capturing implicit and explicit user signals, automated quality scoring, routing failures to human reviewers, and feeding curated data back into fine-tuning and prompt optimization", "Automated evaluation on held-out test sets without live production signals", "Full model retraining from scratch at fixed quarterly intervals"], correct: 1, explanation: "Closed-loop continuous improvement captures all signals, automates scoring, involves human review, and feeds back into training/prompts. Star-only is incomplete, held-out metrics miss production issues, and quarterly retraining is too slow.", source: "ncp-genl-exam-6", sourceIndex: 57 },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];

function isCorrectAnswer(q, answer) {
  if (answer === 'skip' || answer === undefined || answer === null) return false;
  if (q.multiSelect) {
    if (!(answer instanceof Set)) return false;
    const correctSet = new Set(q.correct);
    if (answer.size !== correctSet.size) return false;
    for (const a of answer) { if (!correctSet.has(a)) return false; }
    return true;
  }
  return answer === q.correct;
}

function isOptionCorrect(q, idx) {
  if (q.multiSelect) return q.correct.includes(idx);
  return idx === q.correct;
}

function deriveKeyConcept(q) {
  const exp = q.explanation;
  const sentences = exp.split(/\.\s+/).filter(s => s.trim().length > 10);
  return sentences.slice(0, 2).join('. ').trim() + (sentences.length > 0 ? '.' : '');
}

function deriveNvidiaProduct(q) {
  const products = ['TensorRT', 'Triton', 'NeMo', 'DCGM', 'DGX', 'NIM', 'NGC', 'RAPIDS', 'cuDNN', 'NCCL', 'NVLink', 'NVSwitch', 'InfiniBand', 'BlueField', 'ConnectX', 'Spectrum-X', 'Grace Hopper', 'Grace', 'HGX', 'MIG', 'vGPU', 'DRIVE', 'Base Command', 'GPU Operator', 'DCGM-Exporter', 'nvidia-smi', 'GPUDirect Storage', 'GPUDirect', 'RoCE', 'Slurm', 'CUDA', 'AI Enterprise', 'SuperPOD', 'Merlin', 'OpenSM', 'Kubernetes', 'Omniverse', 'Clara', 'Jetson', 'BMC', 'NVMe', 'Container Toolkit', 'H200', 'H100', 'Blackwell', 'B100', 'B200', 'Run:ai', 'Dynamo'];
  const text = q.question + ' ' + q.explanation;
  const found = products.filter(p => text.includes(p));
  if (found.length === 0) return null;
  const primary = found[0];
  const expSentences = q.explanation.split(/\.\s+/);
  const relevant = expSentences.filter(s => s.includes(primary)).slice(0, 2).join('. ').trim();
  return { name: primary, description: relevant ? relevant + '.' : 'Referenced in the question.' };
}

function deriveWhyNot(q) {
  const results = [];
  const exp = q.explanation.toLowerCase();
  for (let i = 0; i < q.options.length; i++) {
    if (isOptionCorrect(q, i)) continue;
    const optLower = q.options[i].toLowerCase();
    const optWords = optLower.split(/\s+/).filter(w => w.length > 3);
    const relevantSentences = q.explanation.split(/\.\s+/).filter(s => {
      const sl = s.toLowerCase();
      return optWords.some(w => sl.includes(w));
    });
    if (relevantSentences.length > 0) {
      results.push({ index: i, reason: relevantSentences[0].trim().replace(/\.$/, '') + '.' });
    } else {
      results.push({ index: i, reason: "Not addressed in source material." });
    }
  }
  return results;
}

// ─── PROGRESS TRACKER (localStorage) ───
function getStorageKey(certId) { return certId + '-progress'; }

function loadProgress(certId) {
  try {
    const raw = localStorage.getItem(getStorageKey(certId));
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Restore Sets
    if (data.flaggedIds) data.flaggedIds = new Set(data.flaggedIds);
    if (data.incorrectIds) data.incorrectIds = new Set(data.incorrectIds);
    return data;
  } catch { return null; }
}

function saveProgress(certId, data) {
  try {
    const serializable = {
      ...data,
      flaggedIds: data.flaggedIds instanceof Set ? [...data.flaggedIds] : (data.flaggedIds || []),
      incorrectIds: data.incorrectIds instanceof Set ? [...data.incorrectIds] : (data.incorrectIds || []),
    };
    localStorage.setItem(getStorageKey(certId), JSON.stringify(serializable));
  } catch (e) { console.warn('Failed to save progress:', e); }
}

function getDefaultProgress() {
  return {
    questionStats: {},    // { [questionId]: { attempts, correct, lastSeen, streak, history: [{date, correct}] } }
    sessions: [],         // { date, mode, score, total, pct, domainBreakdown, elapsed }
    flaggedIds: new Set(),
    incorrectIds: new Set(),
    firstSessionDate: null
  };
}

function recordAnswer(progress, questionId, wasCorrect) {
  const stats = progress.questionStats[questionId] || { attempts: 0, correct: 0, lastSeen: null, streak: 0, history: [] };
  stats.attempts++;
  if (wasCorrect) { stats.correct++; stats.streak++; }
  else { stats.streak = 0; }
  stats.lastSeen = new Date().toISOString();
  stats.history.push({ date: stats.lastSeen, correct: wasCorrect });
  // Keep only last 20 entries per question
  if (stats.history.length > 20) stats.history = stats.history.slice(-20);
  progress.questionStats[questionId] = stats;
  return progress;
}

function getAccuracyRate(stats) {
  if (!stats || stats.attempts === 0) return null;
  return Math.round((stats.correct / stats.attempts) * 100);
}

function getMasteryLevel(stats) {
  if (!stats || stats.attempts === 0) return 'unseen';
  const rate = stats.correct / stats.attempts;
  if (stats.streak >= 3 && rate >= 0.8) return 'mastered';
  if (rate >= 0.6) return 'learning';
  return 'weak';
}

  const makeDomainBools = (domains, value = true) => Object.fromEntries(domains.map(d => [d, value]));

  const [progress, setProgress] = useState(() => {
    const saved = loadProgress('nca-aiio');
    return saved || getDefaultProgress();
  });

  // Derived from progress for backward compat
  const testHistory = progress.sessions;
  const incorrectIds = progress.incorrectIds instanceof Set ? progress.incorrectIds : new Set(progress.incorrectIds || []);
  const flaggedIds = progress.flaggedIds instanceof Set ? progress.flaggedIds : new Set(progress.flaggedIds || []);

  // Save to localStorage whenever progress changes
  useEffect(() => { saveProgress(certId, progress); }, [progress, certId]);

  // Helper to update progress immutably
  function updateProgress(fn) {
    setProgress(prev => {
      const next = { ...prev };
      fn(next);
      return next;
    });
  }

  function setIncorrectIds(updater) {
    updateProgress(p => {
      p.incorrectIds = typeof updater === 'function' ? updater(p.incorrectIds instanceof Set ? p.incorrectIds : new Set(p.incorrectIds || [])) : updater;
    });
  }

  function setFlaggedIds(updater) {
    updateProgress(p => {
      p.flaggedIds = typeof updater === 'function' ? updater(p.flaggedIds instanceof Set ? p.flaggedIds : new Set(p.flaggedIds || [])) : updater;
    });
  }

  function setTestHistory(updater) {
    updateProgress(p => {
      p.sessions = typeof updater === 'function' ? updater(p.sessions) : updater;
    });
  }

  // Record a study answer
  function recordStudyAnswer(questionId, wasCorrect) {
    updateProgress(p => { recordAnswer(p, questionId, wasCorrect); });
  }

  // Record all test answers at once
  function recordTestAnswers(questions, answers) {
    updateProgress(p => {
      questions.forEach((q, i) => {
        const wasCorrect = isCorrectAnswer(q, answers[i]);
        recordAnswer(p, q.id, wasCorrect);
      });
    });
  }

  function resetProgress() {
    if (!window.confirm('This will erase ALL your saved progress, session history, flags, and question stats. Are you sure?')) return;
    const fresh = getDefaultProgress();
    setProgress(fresh);
    addToast('Progress reset', 'warning');
  }

  function exportProgress() {
    const allData = {};
    Object.keys(CERTIFICATIONS).forEach(cId => {
      const raw = localStorage.getItem(cId + '-progress');
      if (raw) allData[cId] = JSON.parse(raw);
    });
    const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nvidia-study-progress-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    addToast('Progress exported', 'success');
  }

  function importProgress() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!window.confirm('This will replace your current progress with the imported data. Continue?')) return;
          Object.entries(data).forEach(([cId, val]) => {
            localStorage.setItem(cId + '-progress', JSON.stringify(val));
          });
          const saved = loadProgress(certId);
          setProgress(saved || getDefaultProgress());
          addToast('Progress imported successfully', 'success');
        } catch { addToast('Invalid file format', 'warning'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // Study state
  const [studyQuestions, setStudyQuestions] = useState(ACTIVE_QUESTIONS);
  const [studyIndex, setStudyIndex] = useState(0);
  const [studyFilters, setStudyFilters] = useState({
    domains: makeDomainBools(CERTIFICATIONS['nca-aiio'].domains),
    filter: 'all',
    search: '',
    sort: 'default'
  });
  const [selfQuiz, setSelfQuiz] = useState(false);
  const [studyAnswer, setStudyAnswer] = useState(null);
  const [studyRevealed, setStudyRevealed] = useState(false);

  // Test state
  const [testConfig, setTestConfig] = useState({
    count: 50, domains: makeDomainBools(CERTIFICATIONS['nca-aiio'].domains),
    randomize: true, timed: true, minutes: 60
  });

  // Switch certification
  function switchCert(newCertId) {
    if (newCertId === certId) return;
    saveProgress(certId, progress);
    setCertId(newCertId);
    const newCert = CERTIFICATIONS[newCertId];
    const saved = loadProgress(newCertId);
    setProgress(saved || getDefaultProgress());
    setScreen('home');
    setStudyIndex(0);
    setStudyAnswer(null);
    setStudyRevealed(false);
    setStudyFilters({ domains: makeDomainBools(newCert.domains), filter: 'all', search: '', sort: 'default' });
    setTestConfig({ count: 50, domains: makeDomainBools(newCert.domains), randomize: true, timed: true, minutes: newCert.timeLimit });
    setTestQuestions([]);
    setTestResults(null);
  }
  const [testQuestions, setTestQuestions] = useState([]);
  const [testIndex, setTestIndex] = useState(0);
  const [testAnswers, setTestAnswers] = useState({});
  const [testFlagged, setTestFlagged] = useState(new Set());
  const [testStartTime, setTestStartTime] = useState(null);
  const [testElapsed, setTestElapsed] = useState(0);
  const [testResults, setTestResults] = useState(null);
  const [testReviewFilter, setTestReviewFilter] = useState('all');
  const [showGrid, setShowGrid] = useState(false);

  const addToast = useCallback((message, type = 'info') => {
    const id = ++toastId;
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2500);
  }, []);

  // Timer
  useEffect(() => {
    if (screen !== 'test-active' || !testConfig.timed) return;
    const interval = setInterval(() => {
      setTestElapsed(Math.floor((Date.now() - testStartTime) / 1000));
    }, 1000);
    return () => clearInterval(interval);
  }, [screen, testConfig.timed, testStartTime]);

  // Auto-submit on time expiry
  useEffect(() => {
    if (screen === 'test-active' && testConfig.timed && testElapsed >= testConfig.minutes * 60) {
      submitTest();
    }
  }, [testElapsed]);

  // Keyboard shortcuts
  useEffect(() => {
    function handleKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (screen === 'study') {
        if (e.key === 'ArrowRight') { e.preventDefault(); navigateStudy(1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); navigateStudy(-1); }
        if (['1','2','3','4','5','6'].includes(e.key)) {
          e.preventDefault();
          handleStudySelect(parseInt(e.key) - 1);
        }
        if (e.key === 'f' || e.key === 'F') {
          e.preventDefault();
          toggleStudyFlag();
        }
      }

      if (screen === 'test-active') {
        if (e.key === 'ArrowRight') { e.preventDefault(); navigateTest(1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); navigateTest(-1); }
        if (['1','2','3','4','5','6'].includes(e.key)) {
          e.preventDefault();
          handleTestSelect(parseInt(e.key) - 1);
        }
        if (e.key === 'f' || e.key === 'F') {
          e.preventDefault();
          toggleTestFlag();
        }
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [screen, studyIndex, studyQuestions, testIndex, testQuestions, studyAnswer, studyRevealed, selfQuiz]);

  // ─── STUDY MODE LOGIC ───
  // Ref to track if filters actually changed (vs just flag/incorrect state)
  const prevFiltersRef = useRef(studyFilters);

  const filteredStudyQuestions = useMemo(() => {
    const qStats = progress.questionStats;
    let qs = ACTIVE_QUESTIONS.filter(q => studyFilters.domains[q.domainLabel]);
    if (studyFilters.filter === 'flagged') qs = qs.filter(q => flaggedIds.has(q.id));
    if (studyFilters.filter === 'incorrect') qs = qs.filter(q => incorrectIds.has(q.id));
    if (studyFilters.filter === 'unseen') qs = qs.filter(q => !qStats[q.id] || qStats[q.id].attempts === 0);
    if (studyFilters.filter === 'weak') qs = qs.filter(q => getMasteryLevel(qStats[q.id]) === 'weak');
    if (studyFilters.filter === 'learning') qs = qs.filter(q => getMasteryLevel(qStats[q.id]) === 'learning');
    if (studyFilters.filter === 'mastered') qs = qs.filter(q => getMasteryLevel(qStats[q.id]) === 'mastered');
    if (studyFilters.search.trim()) {
      const s = studyFilters.search.toLowerCase();
      qs = qs.filter(q => q.question.toLowerCase().includes(s) || q.explanation.toLowerCase().includes(s));
    }
    if (studyFilters.sort === 'random') qs = shuffle(qs);
    if (studyFilters.sort === 'domain') qs = [...qs].sort((a, b) => a.domainLabel.localeCompare(b.domainLabel));
    if (studyFilters.sort === 'weakest') qs = [...qs].sort((a, b) => {
      const rateA = getAccuracyRate(qStats[a.id]) ?? 101;
      const rateB = getAccuracyRate(qStats[b.id]) ?? 101;
      return rateA - rateB;
    });
    return qs;
  }, [studyFilters, flaggedIds, incorrectIds, progress.questionStats, ACTIVE_QUESTIONS]);

  useEffect(() => {
    const filtersChanged = prevFiltersRef.current !== studyFilters;
    prevFiltersRef.current = studyFilters;
    setStudyQuestions(filteredStudyQuestions);
    if (filtersChanged) {
      setStudyIndex(0);
      setStudyAnswer(null);
      setStudyRevealed(false);
    }
  }, [filteredStudyQuestions]);

  function handleStudySelect(idx) {
    if (studyRevealed) return;
    const q = studyQuestions[studyIndex];
    if (!q) return;
    // "Don't know"
    if (idx === 'skip') {
      setStudyAnswer('skip');
      setStudyRevealed(true);
      recordStudyAnswer(q.id, false);
      setIncorrectIds(prev => new Set(prev).add(q.id));
      return;
    }
    if (idx < 0 || idx >= q.options.length) return;
    if (q.multiSelect) {
      setStudyAnswer(prev => {
        const s = new Set(prev instanceof Set ? prev : []);
        if (s.has(idx)) s.delete(idx); else s.add(idx);
        return new Set(s);
      });
      if (!selfQuiz) return; // multi-select always needs explicit check
    } else {
      setStudyAnswer(idx);
      if (!selfQuiz) {
        setStudyRevealed(true);
        const wasCorrect = idx === q.correct;
        recordStudyAnswer(q.id, wasCorrect);
        if (!wasCorrect) setIncorrectIds(prev => new Set(prev).add(q.id));
      }
    }
  }

  function revealStudyAnswer() {
    setStudyRevealed(true);
    const q = studyQuestions[studyIndex];
    if (!q) return;
    const wasCorrect = isCorrectAnswer(q, studyAnswer);
    recordStudyAnswer(q.id, wasCorrect);
    if (!wasCorrect) setIncorrectIds(prev => new Set(prev).add(q.id));
    addToast('Answer revealed', 'info');
  }

  function navigateStudy(dir) {
    const next = studyIndex + dir;
    if (next >= 0 && next < studyQuestions.length) {
      setStudyIndex(next);
      setStudyAnswer(null);
      setStudyRevealed(false);
    }
  }

  function jumpStudy(idx) {
    setStudyIndex(idx);
    setStudyAnswer(null);
    setStudyRevealed(false);
  }

  function toggleStudyFlag() {
    const q = studyQuestions[studyIndex];
    if (!q) return;
    setFlaggedIds(prev => {
      const next = new Set(prev);
      if (next.has(q.id)) next.delete(q.id); else next.add(q.id);
      return next;
    });
    addToast(flaggedIds.has(q.id) ? 'Flag removed' : 'Question flagged', 'warning');
  }

  // ─── TEST MODE LOGIC ───
  function startTest() {
    const pool = ACTIVE_QUESTIONS.filter(q => testConfig.domains[q.domainLabel]);
    if (pool.length === 0) { addToast('Select at least one domain', 'warning'); return; }
    const ordered = testConfig.randomize ? shuffle(pool) : [...pool];
    const selected = ordered.slice(0, Math.min(testConfig.count, ordered.length));
    setTestQuestions(selected);
    setTestIndex(0);
    setTestAnswers({});
    setTestFlagged(new Set());
    setTestStartTime(Date.now());
    setTestElapsed(0);
    setTestResults(null);
    setTestReviewFilter('all');
    setShowGrid(false);
    setScreen('test-active');
  }

  function handleTestSelect(idx) {
    const q = testQuestions[testIndex];
    if (!q || idx < 0 || idx >= q.options.length) return;
    // If currently 'skip', clear it first
    if (q.multiSelect) {
      setTestAnswers(prev => {
        const existing = prev[testIndex] instanceof Set ? new Set(prev[testIndex]) : new Set();
        if (existing.has(idx)) existing.delete(idx); else existing.add(idx);
        return { ...prev, [testIndex]: new Set(existing) };
      });
    } else {
      setTestAnswers(prev => ({ ...prev, [testIndex]: idx }));
    }
  }

  function handleTestSkip() {
    setTestAnswers(prev => ({ ...prev, [testIndex]: 'skip' }));
  }

  function navigateTest(dir) {
    const next = testIndex + dir;
    if (next >= 0 && next < testQuestions.length) setTestIndex(next);
  }

  function toggleTestFlag() {
    setTestFlagged(prev => {
      const next = new Set(prev);
      if (next.has(testIndex)) next.delete(testIndex); else next.add(testIndex);
      return next;
    });
    addToast(testFlagged.has(testIndex) ? 'Flag removed' : 'Question flagged', 'warning');
  }

  function submitTest() {
    const answered = Object.entries(testAnswers).filter(([_, v]) => v !== undefined && !(v instanceof Set && v.size === 0)).length;
    const unanswered = testQuestions.length - answered;
    if (unanswered > 0 && !window.confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;

    let correct = 0;
    const domainStats = {};
    const wrongIds = [];

    testQuestions.forEach((q, i) => {
      if (!domainStats[q.domainLabel]) domainStats[q.domainLabel] = { correct: 0, total: 0, wrongIndices: [] };
      domainStats[q.domainLabel].total++;
      if (isCorrectAnswer(q, testAnswers[i])) {
        correct++;
        domainStats[q.domainLabel].correct++;
      } else {
        domainStats[q.domainLabel].wrongIndices.push(i);
        wrongIds.push(q.id);
      }
    });

    const pct = Math.round((correct / testQuestions.length) * 100);
    const elapsed = Math.floor((Date.now() - testStartTime) / 1000);

    const result = { correct, total: testQuestions.length, pct, passed: pct >= 70, elapsed, domainStats, wrongIds };
    setTestResults(result);

    // Record all answers to progress tracker
    recordTestAnswers(testQuestions, testAnswers);

    // Save session
    const domainBreakdown = {};
    Object.entries(domainStats).forEach(([label, s]) => {
      domainBreakdown[label] = { correct: s.correct, total: s.total, pct: s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0 };
    });
    // Build per-question review data for persistent storage
    const questionReview = testQuestions.map((q, i) => {
      const ua = testAnswers[i];
      const wasCorrect = isCorrectAnswer(q, ua);
      const skipped = ua === 'skip';
      return {
        id: q.id,
        questionText: q.question,
        domainLabel: q.domainLabel,
        userAnswer: ua instanceof Set ? [...ua] : ua,
        correctAnswer: q.correct,
        options: q.options,
        multiSelect: q.multiSelect || false,
        wasCorrect,
        skipped,
        flagged: testFlagged.has(i),
        explanation: q.explanation
      };
    });

    setTestHistory(prev => [...prev, {
      pct, date: new Date().toISOString(),
      score: correct, total: testQuestions.length,
      mode: 'test', elapsed, domainBreakdown,
      questionReview
    }]);

    // Update first session date
    updateProgress(p => { if (!p.firstSessionDate) p.firstSessionDate = new Date().toISOString(); });

    setIncorrectIds(prev => {
      const next = new Set(prev);
      wrongIds.forEach(id => next.add(id));
      return next;
    });
    setScreen('test-results');
    addToast('Test submitted', 'success');
  }

  function studyWeakDomain(domainLabel) {
    const wrongIndices = testResults.domainStats[domainLabel]?.wrongIndices || [];
    const wrongQIds = new Set(wrongIndices.map(i => testQuestions[i].id));

    setStudyFilters({
      domains: { ...makeDomainBools(ACTIVE_DOMAINS, false), [domainLabel]: true },
      filter: 'incorrect',
      search: '',
      sort: 'default'
    });
    setScreen('study');
  }

  function reviewTestQuestion(idx) {
    const q = testQuestions[idx];
    const globalIdx = ACTIVE_QUESTIONS.findIndex(aq => aq.id === q.id);
    setStudyFilters({
      domains: makeDomainBools(ACTIVE_DOMAINS),
      filter: 'all', search: '', sort: 'default'
    });
    setScreen('study');
    setTimeout(() => {
      setStudyIndex(globalIdx >= 0 ? globalIdx : 0);
      setStudyAnswer(null);
      setStudyRevealed(false);
    }, 50);
  }

  // ─── RENDER ───
  return (
    <div>
      <ToastContainer toasts={toasts} />

      {/* Certification tabs */}
      <div style={{ display: 'flex', borderBottom: '2px solid var(--border)', background: 'var(--surface)' }}>
        {Object.values(CERTIFICATIONS).map(c => (
          <button key={c.id} onClick={() => switchCert(c.id)}
            style={{
              padding: '12px 24px', fontSize: 14, fontWeight: 600, cursor: 'pointer',
              background: 'transparent', border: 'none', borderBottom: certId === c.id ? '2px solid var(--accent)' : '2px solid transparent',
              color: certId === c.id ? 'var(--accent)' : 'var(--text-sec)',
              marginBottom: -2
            }}>
            {c.name}
          </button>
        ))}
      </div>

      {screen === 'home' && (
        <HomeScreen
          cert={cert}
          activeQuestions={ACTIVE_QUESTIONS}
          onStartStudy={() => {
            setStudyFilters({ domains: makeDomainBools(ACTIVE_DOMAINS), filter: 'all', search: '', sort: 'default' });
            setScreen('study');
          }}
          onStartTest={() => setScreen('test-config')}
          onReviewPastTests={() => setScreen('past-test-review')}
          onGlossary={() => setScreen('glossary')}
          testHistory={testHistory}
          progress={progress}
          onResetProgress={resetProgress}
          onExportProgress={exportProgress}
          onImportProgress={importProgress}
        />
      )}

      {screen === 'study' && (
        <StudyMode
          questions={studyQuestions}
          index={studyIndex}
          answer={studyAnswer}
          revealed={studyRevealed}
          selfQuiz={selfQuiz}
          filters={studyFilters}
          flaggedIds={flaggedIds}
          allQuestions={ACTIVE_QUESTIONS}
          activeDomains={ACTIVE_DOMAINS}
          questionStats={progress.questionStats}
          onSelect={handleStudySelect}
          onReveal={revealStudyAnswer}
          onNavigate={navigateStudy}
          onJump={jumpStudy}
          onToggleFlag={toggleStudyFlag}
          onSetSelfQuiz={setSelfQuiz}
          onSetFilters={setStudyFilters}
          onHome={() => setScreen('home')}
        />
      )}

      {screen === 'test-config' && (
        <TestConfig
          config={testConfig}
          onSetConfig={setTestConfig}
          onStart={startTest}
          onHome={() => setScreen('home')}
          activeQuestions={ACTIVE_QUESTIONS}
          activeDomains={ACTIVE_DOMAINS}
        />
      )}

      {screen === 'test-active' && (
        <TestActive
          questions={testQuestions}
          index={testIndex}
          answers={testAnswers}
          flagged={testFlagged}
          elapsed={testElapsed}
          config={testConfig}
          showGrid={showGrid}
          onSelect={handleTestSelect}
          onSkip={handleTestSkip}
          onNavigate={navigateTest}
          onJump={setTestIndex}
          onToggleFlag={toggleTestFlag}
          onToggleGrid={() => setShowGrid(!showGrid)}
          onSubmit={submitTest}
        />
      )}

      {screen === 'test-results' && testResults && (
        <TestResults
          results={testResults}
          questions={testQuestions}
          answers={testAnswers}
          flagged={testFlagged}
          history={testHistory}
          reviewFilter={testReviewFilter}
          onSetReviewFilter={setTestReviewFilter}
          onStudyWeak={studyWeakDomain}
          onReviewQuestion={reviewTestQuestion}
          onRetry={() => setScreen('test-config')}
          onHome={() => setScreen('home')}
        />
      )}

      {screen === 'past-test-review' && (
        <PastTestReview
          sessions={progress.sessions}
          onHome={() => setScreen('home')}
          onStudyQuestion={(qId) => {
            const globalIdx = ACTIVE_QUESTIONS.findIndex(q => q.id === qId);
            setStudyFilters({ domains: makeDomainBools(ACTIVE_DOMAINS), filter: 'all', search: '', sort: 'default' });
            setScreen('study');
            setTimeout(() => { setStudyIndex(globalIdx >= 0 ? globalIdx : 0); setStudyAnswer(null); setStudyRevealed(false); }, 50);
          }}
        />
      )}

      {screen === 'glossary' && (
        <GlossaryScreen onHome={() => setScreen('home')} />
      )}
    </div>
  );
}

// ─── PAST TEST REVIEW ───
function PastTestReview({ sessions, onHome, onStudyQuestion }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [filter, setFilter] = useState('all');
  const testsWithReview = sessions.filter(s => s.questionReview);

  if (testsWithReview.length === 0) {
    return (
      <div style={{ maxWidth: 600, margin: '0 auto', padding: '60px 20px', textAlign: 'center' }}>
        <h2 style={{ marginBottom: 12 }}>No saved test results</h2>
        <p style={{ color: 'var(--text-sec)', marginBottom: 24 }}>Complete a test to see your results here.</p>
        <button onClick={onHome} style={btnStyle('var(--surface-el)', 'var(--text)', 44, 15, '1px solid var(--border)')}>Back to Home</button>
      </div>
    );
  }

  const selected = selectedIdx !== null ? testsWithReview[selectedIdx] : null;
  const review = selected?.questionReview || [];
  const filtered = filter === 'all' ? review
    : filter === 'wrong' ? review.filter(r => !r.wasCorrect)
    : filter === 'skipped' ? review.filter(r => r.skipped)
    : filter === 'correct' ? review.filter(r => r.wasCorrect)
    : review;

  return (
    <div style={{ maxWidth: 760, margin: '0 auto', padding: '32px 20px' }}>
      <button onClick={onHome} style={{ background: 'none', border: 'none', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 14, marginBottom: 20 }}>← Home</button>
      <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 20 }}>Past Test Results</h2>

      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 24 }}>
        {testsWithReview.map((s, i) => (
          <button key={i} onClick={() => { setSelectedIdx(i); setFilter('all'); }} style={{
            padding: '10px 16px', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer',
            background: selectedIdx === i ? (s.pct >= 70 ? 'rgba(0,229,176,0.15)' : 'rgba(255,77,106,0.15)') : 'var(--surface)',
            border: `1px solid ${selectedIdx === i ? (s.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)') : 'var(--border)'}`,
            color: selectedIdx === i ? (s.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)') : 'var(--text-sec)'
          }}>
            <div>Test #{i + 1}: {s.pct}%</div>
            <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.7 }}>{new Date(s.date).toLocaleDateString()}</div>
          </button>
        ))}
      </div>

      {selected && (
        <>
          <div style={{ display: 'flex', gap: 14, marginBottom: 20 }}>
            <div style={{ padding: '12px 20px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, textAlign: 'center', flex: 1 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: selected.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)' }}>{selected.pct}%</div>
              <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>{selected.score}/{selected.total}</div>
            </div>
            <div style={{ padding: '12px 20px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, textAlign: 'center', flex: 1 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--incorrect)' }}>{review.filter(r => !r.wasCorrect).length}</div>
              <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Wrong</div>
            </div>
            <div style={{ padding: '12px 20px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, textAlign: 'center', flex: 1 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--text-sec)' }}>{review.filter(r => r.skipped).length}</div>
              <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Didn't know</div>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
            {[['all', 'All'], ['wrong', 'Wrong'], ['skipped', "Didn't know"], ['correct', 'Correct']].map(([k, label]) => (
              <button key={k} onClick={() => setFilter(k)} style={chipStyle(filter === k)}>{label} ({
                k === 'all' ? review.length : k === 'wrong' ? review.filter(r => !r.wasCorrect).length : k === 'skipped' ? review.filter(r => r.skipped).length : review.filter(r => r.wasCorrect).length
              })</button>
            ))}
          </div>

          {filtered.map((r, idx) => (
            <div key={idx} style={{
              marginBottom: 10, padding: '12px 16px', background: 'var(--surface)', borderRadius: 8,
              borderLeft: `3px solid ${r.wasCorrect ? 'var(--correct)' : 'var(--incorrect)'}`, cursor: 'pointer'
            }} onClick={() => onStudyQuestion(r.id)}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <DomainBadge label={r.domainLabel} />
                  {r.skipped && <span style={{ fontSize: 10, color: 'var(--incorrect)', fontWeight: 600, fontStyle: 'italic' }}>DIDN'T KNOW</span>}
                  {r.flagged && <span style={{ fontSize: 12, color: 'var(--warning)' }}>⚑</span>}
                </div>
                <span style={{ fontSize: 12, fontWeight: 600, color: r.wasCorrect ? 'var(--correct)' : 'var(--incorrect)' }}>
                  {r.wasCorrect ? '✓' : '✗'}
                </span>
              </div>
              <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4, lineHeight: 1.4 }}>{r.questionText}</div>
              <div style={{ fontSize: 12, color: 'var(--text-sec)' }}>
                {r.skipped ? (
                  <span style={{ color: 'var(--incorrect)', fontStyle: 'italic' }}>Didn't know</span>
                ) : (
                  <>You: <span style={{ color: r.wasCorrect ? 'var(--correct)' : 'var(--incorrect)', fontWeight: 600 }}>
                    {r.multiSelect && Array.isArray(r.userAnswer) ? r.userAnswer.map(a => LETTERS[a]).join(', ') : typeof r.userAnswer === 'number' ? LETTERS[r.userAnswer] : '—'}
                  </span></>
                )}
                {!r.wasCorrect && <>{' → '}Correct: <span style={{ color: 'var(--correct)', fontWeight: 600 }}>
                  {r.multiSelect ? r.correctAnswer.map(c => LETTERS[c]).join(', ') : LETTERS[r.correctAnswer]}
                </span></>}
              </div>
            </div>
          ))}

          {filtered.length === 0 && <p style={{ textAlign: 'center', padding: 24, color: 'var(--text-sec)' }}>No questions match this filter.</p>}
        </>
      )}

      {!selected && <p style={{ textAlign: 'center', padding: 40, color: 'var(--text-sec)' }}>Select a test above to review your answers.</p>}
    </div>
  );
}

// ─── HOME SCREEN ───
function HomeScreen({ cert, activeQuestions, onStartStudy, onStartTest, onReviewPastTests, onGlossary, testHistory, progress, onResetProgress, onExportProgress, onImportProgress }) {
  const domainCounts = {};
  activeQuestions.forEach(q => { domainCounts[q.domainLabel] = (domainCounts[q.domainLabel] || 0) + 1; });

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '40px 20px', textAlign: 'center' }}>
      <div style={{ marginBottom: 12 }}>
        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1.5, color: 'var(--accent)', textTransform: 'uppercase' }}>Study Suite</span>
      </div>
      <h1 style={{ fontSize: 32, fontWeight: 700, marginBottom: 8 }}>{cert.name}</h1>
      <p style={{ color: 'var(--text-sec)', fontSize: 15, marginBottom: 36 }}>
        {cert.fullName}
      </p>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 32 }}>
        <InfoCard label="Questions" value={String(activeQuestions.length)} />
        <InfoCard label="Time Limit" value={`${cert.timeLimit} min`} />
        <InfoCard label="Passing" value={`${cert.passingScore}%`} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `repeat(auto-fill, minmax(140px, 1fr))`, gap: 14, marginBottom: 36 }}>
        {Object.entries(domainCounts).map(([label, count]) => (
          <div key={label} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 12px', textAlign: 'left' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: getDomainColor(label) }} />
              <span style={{ fontSize: 12, color: 'var(--text-sec)' }}>{label}</span>
            </div>
            <span style={{ fontSize: 20, fontWeight: 600, color: getDomainColor(label) }}>{count}</span>
            <span style={{ fontSize: 13, color: 'var(--text-sec)', marginLeft: 4 }}>questions</span>
          </div>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 14, justifyContent: 'center', marginBottom: 24 }}>
        <button onClick={onStartStudy} style={btnStyle('var(--accent)', 'var(--bg)', 56, 18)}>
          Study Mode
        </button>
        <button onClick={onStartTest} style={btnStyle('var(--surface-el)', 'var(--text)', 56, 18, '1px solid var(--border)')}>
          Test Mode
        </button>
        {testHistory.length > 0 && (
          <button onClick={onReviewPastTests} style={btnStyle('var(--surface-el)', 'var(--text-sec)', 56, 14, '1px solid var(--border)')}>
            Review Past Tests
          </button>
        )}
        <button onClick={onGlossary} style={btnStyle('var(--surface-el)', 'var(--text)', 56, 16, '1px solid var(--border)')}>
          Glossary
        </button>
      </div>

      {/* ─── PROGRESS DASHBOARD ─── */}
      {(() => {
        const qs = progress.questionStats;
        const totalQ = activeQuestions.length;
        const seen = activeQuestions.filter(q => qs[q.id] && qs[q.id].attempts > 0).length;
        const masteredCount = activeQuestions.filter(q => getMasteryLevel(qs[q.id]) === 'mastered').length;
        const weakCount = activeQuestions.filter(q => getMasteryLevel(qs[q.id]) === 'weak').length;
        const learningCount = activeQuestions.filter(q => getMasteryLevel(qs[q.id]) === 'learning').length;
        const unseenCount = totalQ - seen;
        const totalAttempts = activeQuestions.reduce((sum, q) => sum + (qs[q.id]?.attempts || 0), 0);
        const totalCorrect = activeQuestions.reduce((sum, q) => sum + (qs[q.id]?.correct || 0), 0);
        const overallRate = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;

        // Per-domain accuracy
        const domainAcc = {};
        cert.domains.forEach(d => {
          const domQs = activeQuestions.filter(q => q.domainLabel === d);
          const dAttempts = domQs.reduce((s, q) => s + (qs[q.id]?.attempts || 0), 0);
          const dCorrect = domQs.reduce((s, q) => s + (qs[q.id]?.correct || 0), 0);
          domainAcc[d] = { attempts: dAttempts, correct: dCorrect, pct: dAttempts > 0 ? Math.round((dCorrect / dAttempts) * 100) : null };
        });

        if (seen === 0 && testHistory.length === 0) return null;

        return (
          <div style={{ marginTop: 24 }}>
            {/* Mastery overview */}
            <div style={{ padding: 18, background: 'var(--surface)', borderRadius: 8, border: '1px solid var(--border)', marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: 'var(--text-sec)', marginBottom: 14, textTransform: 'uppercase', letterSpacing: 0.5 }}>Your Progress</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 16 }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: 'var(--accent)' }}>{overallRate}%</div>
                  <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Overall accuracy</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: 'var(--correct)' }}>{masteredCount}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Mastered</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: 'var(--warning)' }}>{learningCount}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Learning</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: unseenCount > 0 ? 'var(--text-sec)' : 'var(--correct)' }}>{unseenCount}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-sec)' }}>Unseen</div>
                </div>
              </div>
              {/* Progress bar */}
              <div style={{ display: 'flex', height: 8, borderRadius: 4, overflow: 'hidden', background: 'var(--surface-el)', marginBottom: 8 }}>
                <div style={{ width: `${(masteredCount / totalQ) * 100}%`, background: 'var(--correct)', transition: 'width 0.5s' }} />
                <div style={{ width: `${(learningCount / totalQ) * 100}%`, background: 'var(--warning)', transition: 'width 0.5s' }} />
                <div style={{ width: `${(weakCount / totalQ) * 100}%`, background: 'var(--incorrect)', transition: 'width 0.5s' }} />
              </div>
              <div style={{ display: 'flex', gap: 14, justifyContent: 'center', fontSize: 11, color: 'var(--text-sec)' }}>
                <span><span style={{ color: 'var(--correct)' }}>■</span> Mastered</span>
                <span><span style={{ color: 'var(--warning)' }}>■</span> Learning</span>
                <span><span style={{ color: 'var(--incorrect)' }}>■</span> Weak ({weakCount})</span>
                <span>□ Unseen</span>
              </div>
            </div>

            {/* Domain accuracy */}
            <div style={{ padding: 18, background: 'var(--surface)', borderRadius: 8, border: '1px solid var(--border)', marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: 'var(--text-sec)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5 }}>Accuracy by Domain</div>
              {Object.entries(domainAcc).map(([label, d]) => (
                <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: getDomainColor(label), flexShrink: 0 }} />
                  <div style={{ flex: 1, fontSize: 13 }}>{label}</div>
                  <div style={{ width: 100, height: 5, background: 'var(--surface-el)', borderRadius: 3, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${d.pct || 0}%`, background: (d.pct || 0) >= 70 ? 'var(--correct)' : (d.pct || 0) >= 50 ? 'var(--warning)' : 'var(--incorrect)', borderRadius: 3 }} />
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 600, fontFamily: "'SF Mono', monospace", color: d.pct === null ? 'var(--text-sec)' : d.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)', minWidth: 40, textAlign: 'right' }}>
                    {d.pct !== null ? `${d.pct}%` : '—'}
                  </span>
                </div>
              ))}
            </div>

            {/* Test session history */}
            {testHistory.length > 0 && (
              <div style={{ padding: 18, background: 'var(--surface)', borderRadius: 8, border: '1px solid var(--border)', marginBottom: 14 }}>
                <div style={{ fontSize: 12, color: 'var(--text-sec)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5 }}>Test History</div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 }}>
                  {testHistory.map((h, i) => (
                    <div key={i} style={{ padding: '6px 12px', borderRadius: 6, background: h.pct >= 70 ? 'rgba(0,229,176,0.12)' : 'rgba(255,77,106,0.12)', border: `1px solid ${h.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)'}`, fontSize: 12, fontWeight: 600, color: h.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)' }}>
                      #{i + 1}: {h.pct}% <span style={{ fontWeight: 400, opacity: 0.7 }}>{h.date ? new Date(h.date).toLocaleDateString() : ''}</span>
                    </div>
                  ))}
                </div>
                {testHistory.length >= 2 && (() => {
                  const first = testHistory[0].pct;
                  const last = testHistory[testHistory.length - 1].pct;
                  const diff = last - first;
                  return (
                    <div style={{ fontSize: 13, color: diff > 0 ? 'var(--correct)' : diff < 0 ? 'var(--incorrect)' : 'var(--text-sec)' }}>
                      {diff > 0 ? `↑ +${diff}%` : diff < 0 ? `↓ ${diff}%` : '→ No change'} from baseline ({first}% → {last}%)
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Readiness estimator */}
            {seen > 0 && (() => {
              const coveragePct = Math.round((seen / totalQ) * 100);
              const masteryPct = Math.round((masteredCount / totalQ) * 100);
              const domainReady = Object.values(domainAcc).filter(d => d.pct !== null && d.pct >= 70).length;
              const totalDomains = cert.domains.length;
              const lastTests = testHistory.slice(-3);
              const avgTestScore = lastTests.length > 0 ? Math.round(lastTests.reduce((s, t) => s + t.pct, 0) / lastTests.length) : 0;
              const readiness = Math.round(
                (coveragePct * 0.15) + (overallRate * 0.25) + (masteryPct * 0.2) +
                ((domainReady / totalDomains) * 100 * 0.15) + (avgTestScore * 0.25)
              );
              const readinessColor = readiness >= 80 ? 'var(--correct)' : readiness >= 60 ? 'var(--warning)' : 'var(--incorrect)';
              const readinessLabel = readiness >= 80 ? 'Ready' : readiness >= 60 ? 'Almost there' : 'Keep studying';
              return (
                <div style={{ padding: 18, background: 'var(--surface)', borderRadius: 8, border: `1px solid ${readinessColor}`, marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: 'var(--text-sec)', marginBottom: 10, textTransform: 'uppercase', letterSpacing: 0.5 }}>Exam Readiness</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                    <div style={{ fontSize: 36, fontWeight: 700, color: readinessColor }}>{readiness}%</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: readinessColor, marginBottom: 4 }}>{readinessLabel}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-sec)', lineHeight: 1.5 }}>
                        {coveragePct}% covered · {masteryPct}% mastered · {domainReady}/{totalDomains} domains above 70%
                        {lastTests.length > 0 && ` · Last ${lastTests.length} test avg: ${avgTestScore}%`}
                      </div>
                    </div>
                  </div>
                  <div style={{ marginTop: 10, height: 6, borderRadius: 3, overflow: 'hidden', background: 'var(--surface-el)' }}>
                    <div style={{ height: '100%', width: `${readiness}%`, background: readinessColor, borderRadius: 3, transition: 'width 0.5s' }} />
                  </div>
                </div>
              );
            })()}

            {/* Stats footer + reset */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: 'var(--text-sec)' }}>
              <span>{seen}/{totalQ} seen · {totalAttempts} total attempts</span>
              <div style={{ display: 'flex', gap: 12 }}>
                <button onClick={onExportProgress} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, opacity: 0.7 }}>Export progress</button>
                <button onClick={onImportProgress} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, opacity: 0.7 }}>Import progress</button>
                <button onClick={onResetProgress} style={{ background: 'none', border: 'none', color: 'var(--incorrect)', cursor: 'pointer', fontSize: 11, opacity: 0.6 }}>Reset all progress</button>
              </div>
            </div>
          </div>
        );
      })()}

      <p style={{ marginTop: 24, fontSize: 12, color: 'var(--text-sec)' }}>
        Keyboard: Arrow keys navigate, 1-6 select options, F to flag · Progress saves to localStorage
      </p>
    </div>
  );
}

function InfoCard({ label, value }) {
  return (
    <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 16 }}>
      <div style={{ fontSize: 12, color: 'var(--text-sec)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 600, color: 'var(--accent)' }}>{value}</div>
    </div>
  );
}

// ─── STUDY MODE ───
function StudyMode({ questions, index, answer, revealed, selfQuiz, filters, flaggedIds, allQuestions, activeDomains, questionStats, onSelect, onReveal, onNavigate, onJump, onToggleFlag, onSetSelfQuiz, onSetFilters, onHome }) {
  const q = questions[index];

  if (!q) {
    return (
      <div style={{ maxWidth: 600, margin: '0 auto', padding: '60px 20px', textAlign: 'center' }}>
        <h2 style={{ marginBottom: 12 }}>No questions match your filters</h2>
        <p style={{ color: 'var(--text-sec)', marginBottom: 24 }}>Try adjusting domain or filter settings.</p>
        <button onClick={onHome} style={btnStyle('var(--surface-el)', 'var(--text)', 44, 15, '1px solid var(--border)')}>Back to Home</button>
      </div>
    );
  }

  const product = deriveNvidiaProduct(q);
  const whyNot = deriveWhyNot(q);
  const relatedQuestions = allQuestions.filter(rq => rq.domainLabel === q.domainLabel && rq.id !== q.id);

  return (
    <div>
      {/* Top bar */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 20px', borderBottom: '1px solid var(--border)', background: 'var(--surface)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <button onClick={onHome} style={{ background: 'none', border: 'none', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 14 }}>← Home</button>
          <span style={{ fontSize: 15, fontWeight: 600, color: 'var(--accent)' }}>Study Mode</span>
          <span style={{ fontSize: 13, color: 'var(--text-sec)' }}>Question {index + 1} of {questions.length}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--text-sec)', cursor: 'pointer' }}>
            <input type="checkbox" checked={selfQuiz} onChange={e => onSetSelfQuiz(e.target.checked)} style={{ accentColor: 'var(--accent)' }} />
            Self-quiz
          </label>
        </div>
      </div>

      {/* Filters bar */}
      <div style={{ padding: '10px 20px', borderBottom: '1px solid var(--border)', background: 'var(--bg)', display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
        {activeDomains.map(d => (
          <label key={d} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: filters.domains[d] ? getDomainColor(d) : 'var(--text-sec)', cursor: 'pointer' }}>
            <input type="checkbox" checked={!!filters.domains[d]} onChange={e => onSetFilters({ ...filters, domains: { ...filters.domains, [d]: e.target.checked } })} style={{ accentColor: getDomainColor(d) }} />
            {d}
          </label>
        ))}
        <span style={{ width: 1, height: 18, background: 'var(--border)' }} />
        <select value={filters.filter} onChange={e => onSetFilters({ ...filters, filter: e.target.value })} style={selectStyle}>
          <option value="all">All</option>
          <option value="flagged">Flagged</option>
          <option value="incorrect">Incorrect</option>
          <option value="unseen">Never seen</option>
          <option value="weak">Weak (&lt;60%)</option>
          <option value="learning">Learning (60-79%)</option>
          <option value="mastered">Mastered (80%+)</option>
        </select>
        <select value={filters.sort} onChange={e => onSetFilters({ ...filters, sort: e.target.value })} style={selectStyle}>
          <option value="default">Default order</option>
          <option value="random">Random</option>
          <option value="domain">By domain</option>
          <option value="weakest">Weakest first</option>
        </select>
        <input
          type="text"
          placeholder="Search..."
          value={filters.search}
          onChange={e => onSetFilters({ ...filters, search: e.target.value })}
          style={{ ...selectStyle, width: 160 }}
        />
      </div>

      {/* Main content */}
      <div className="study-layout" style={{ display: 'flex', minHeight: 'calc(100vh - 100px)' }}>
        {/* Left panel */}
        <div className="study-left" style={{ width: '62%', padding: '24px 28px', paddingRight: 28 }}>
          {/* Progress bar */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ height: 3, background: 'var(--surface-el)', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${((index + 1) / questions.length) * 100}%`, background: 'var(--accent)', borderRadius: 2, transition: 'width 0.3s ease' }} />
            </div>
          </div>

          {/* Domain + flag */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <DomainBadge label={q.domainLabel} />
            <button onClick={onToggleFlag} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, color: flaggedIds.has(q.id) ? 'var(--warning)' : 'var(--text-sec)' }}>
              {flaggedIds.has(q.id) ? '⚑ Flagged' : '⚐ Flag'}
            </button>
          </div>

          {/* Question */}
          <div style={{ fontSize: 17, fontWeight: 500, lineHeight: 1.55, marginBottom: 6 }}>
            {q.question}
          </div>
          {q.multiSelect && <div style={{ fontSize: 12, color: 'var(--warning)', marginBottom: 16, fontWeight: 600 }}>Select all that apply</div>}
          {!q.multiSelect && <div style={{ height: 16 }} />}

          {/* Options */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {q.options.map((opt, i) => {
              let bg = 'var(--surface)';
              let border = 'var(--border)';
              let letterBg = 'var(--surface-el)';
              let letterColor = 'var(--text)';
              let letterBorder = 'var(--border)';
              let icon = null;
              const isSelected = q.multiSelect ? (answer instanceof Set && answer.has(i)) : answer === i;
              const isCorr = isOptionCorrect(q, i);

              if (revealed) {
                if (isCorr) {
                  bg = 'rgba(0, 229, 176, 0.08)';
                  border = 'var(--correct)';
                  letterBg = 'var(--correct)';
                  letterColor = 'var(--bg)';
                  letterBorder = 'var(--correct)';
                  icon = '✓';
                } else if (isSelected) {
                  bg = 'rgba(255, 77, 106, 0.08)';
                  border = 'var(--incorrect)';
                  letterBg = 'var(--incorrect)';
                  letterColor = '#fff';
                  letterBorder = 'var(--incorrect)';
                  icon = '✗';
                }
              } else if (isSelected) {
                bg = 'rgba(118, 185, 0, 0.1)';
                border = 'var(--accent)';
                letterBg = 'var(--accent)';
                letterColor = 'var(--bg)';
                letterBorder = 'var(--accent)';
              }

              return (
                <div
                  key={i}
                  onClick={() => onSelect(i)}
                  style={{
                    display: 'flex', alignItems: 'flex-start', gap: 12, padding: '13px 16px',
                    background: bg, border: `1px solid ${border}`, borderRadius: 8,
                    cursor: revealed ? 'default' : 'pointer',
                    transition: 'all 0.15s ease'
                  }}
                >
                  <div style={{ flexShrink: 0, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 6, fontSize: 13, fontWeight: 600, background: letterBg, color: letterColor, border: `1px solid ${letterBorder}` }}>
                    {icon || LETTERS[i]}
                  </div>
                  <div style={{ fontSize: 15, paddingTop: 3 }}>{opt}</div>
                </div>
              );
            })}
            {/* Don't know option */}
            {!revealed && (
              <div onClick={() => { onSelect('skip'); }} style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '11px 16px',
                background: answer === 'skip' ? 'rgba(255,77,106,0.08)' : 'var(--surface)',
                border: `1px dashed ${answer === 'skip' ? 'var(--incorrect)' : 'var(--border)'}`,
                borderRadius: 8, cursor: 'pointer', transition: 'all 0.15s ease'
              }}>
                <div style={{
                  flexShrink: 0, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  borderRadius: 6, fontSize: 13, fontWeight: 600,
                  background: answer === 'skip' ? 'var(--incorrect)' : 'var(--surface-el)',
                  color: answer === 'skip' ? '#fff' : 'var(--text-sec)',
                  border: `1px solid ${answer === 'skip' ? 'var(--incorrect)' : 'var(--border)'}`
                }}>?</div>
                <div style={{ fontSize: 14, color: answer === 'skip' ? 'var(--incorrect)' : 'var(--text-sec)', fontStyle: 'italic' }}>I don't know</div>
              </div>
            )}
            {revealed && answer === 'skip' && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '11px 16px',
                background: 'rgba(255,77,106,0.08)', border: '1px dashed var(--incorrect)',
                borderRadius: 8, opacity: 0.6
              }}>
                <div style={{ flexShrink: 0, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 6, fontSize: 13, fontWeight: 600, background: 'var(--incorrect)', color: '#fff', border: '1px solid var(--incorrect)' }}>?</div>
                <div style={{ fontSize: 14, color: 'var(--incorrect)', fontStyle: 'italic' }}>I don't know — marked as incorrect</div>
              </div>
            )}
          </div>

          {/* Explanation area */}
          {revealed && (
            <div style={{ marginTop: 18, animation: 'toastIn 0.25s ease' }}>
              {/* Main explanation */}
              <div style={{ padding: '14px 16px', background: 'var(--surface)', borderLeft: `3px solid ${isCorrectAnswer(q, answer) ? 'var(--correct)' : 'var(--incorrect)'}`, borderRadius: '0 8px 8px 0', marginBottom: 14 }}>
                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 8, color: isCorrectAnswer(q, answer) ? 'var(--correct)' : 'var(--incorrect)' }}>
                  {isCorrectAnswer(q, answer) ? '✓ Correct!' : q.multiSelect ? `✗ Incorrect — Correct answers: ${q.correct.map(c => LETTERS[c]).join(', ')}` : `✗ Incorrect — Answer: ${LETTERS[q.correct]}`}
                </div>
                <div style={{ fontSize: 14, color: 'var(--text-sec)', lineHeight: 1.6 }}>
                  {q.multiSelect ? (
                    <><strong style={{ color: 'var(--text)' }}>Correct: {q.correct.map(c => `${LETTERS[c]}. ${q.options[c]}`).join(' + ')}</strong> — {q.explanation}</>
                  ) : (
                    <><strong style={{ color: 'var(--text)' }}>Correct: {LETTERS[q.correct]}. {q.options[q.correct]}</strong> — {q.explanation}</>
                  )}
                </div>
              </div>

              {/* Why not each wrong option */}
              <div style={{ padding: '14px 16px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)', marginBottom: 10 }}>Why not the other options?</div>
                {whyNot.map(w => (
                  <div key={w.index} style={{ fontSize: 13, color: 'var(--text-sec)', marginBottom: 6, lineHeight: 1.5 }}>
                    <strong style={{ color: 'var(--text)' }}>Why not {LETTERS[w.index]}:</strong> {w.reason}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Self-quiz check button */}
          {((selfQuiz && answer !== null) || (q.multiSelect && answer instanceof Set && answer.size > 0)) && !revealed && (
            <div style={{ marginTop: 16 }}>
              <button onClick={onReveal} style={btnStyle('var(--accent)', 'var(--bg)', 44, 15)}>
                Check Answer
              </button>
            </div>
          )}

          {/* Navigation */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 24 }}>
            <button onClick={() => onNavigate(-1)} disabled={index === 0} style={navBtnStyle(index === 0)}>
              ← Previous
            </button>
            {/* Question selector */}
            <select value={index} onChange={e => onJump(parseInt(e.target.value))} style={{ ...selectStyle, width: 'auto' }}>
              {questions.map((_, i) => <option key={i} value={i}>Q{i + 1}</option>)}
            </select>
            <button onClick={() => onNavigate(1)} disabled={index === questions.length - 1} style={navBtnStyle(index === questions.length - 1)}>
              Next →
            </button>
          </div>
        </div>

        {/* Right panel - Concept Sidebar */}
        <div className="study-right" style={{ width: '38%', borderLeft: '1px solid var(--border)', padding: '24px 20px', position: 'sticky', top: 0, maxHeight: '100vh', overflowY: 'auto', background: 'var(--bg)' }}>
          {/* Domain badge */}
          <DomainBadge label={q.domainLabel} large />

          {/* Key concept */}
          <SidebarCard title="Concept (derived from exam materials)">
            <p style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--text-sec)' }}>
              {deriveKeyConcept(q)}
            </p>
          </SidebarCard>

          {/* NVIDIA product */}
          {product && (
            <SidebarCard title={`NVIDIA ${product.name}`} accent={getDomainColor(q.domainLabel)}>
              <p style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--text-sec)' }}>
                {product.description}
              </p>
            </SidebarCard>
          )}

          {/* Related questions */}
          <SidebarCard title={`Related Questions (${q.domainLabel})`}>
            <div style={{ maxHeight: 200, overflowY: 'auto' }}>
              {relatedQuestions.slice(0, 8).map(rq => {
                const globalIdx = questions.findIndex(sq => sq.id === rq.id);
                return (
                  <div
                    key={rq.id}
                    onClick={() => globalIdx >= 0 ? onJump(globalIdx) : null}
                    style={{
                      fontSize: 13, color: globalIdx >= 0 ? 'var(--text)' : 'var(--text-sec)',
                      padding: '6px 0', borderBottom: '1px solid var(--border)',
                      cursor: globalIdx >= 0 ? 'pointer' : 'default',
                      lineHeight: 1.4
                    }}
                  >
                    <span style={{ color: getDomainColor(q.domainLabel), fontWeight: 600, marginRight: 6 }}>Q{rq.sourceIndex + 1}</span>
                    {rq.question.slice(0, 60)}...
                  </div>
                );
              })}
            </div>
          </SidebarCard>

          {/* Your stats for this question */}
          {(() => {
            const st = questionStats[q.id];
            if (!st || st.attempts === 0) return (
              <SidebarCard title="Your Stats">
                <p style={{ fontSize: 13, color: 'var(--text-sec)' }}>Not attempted yet</p>
              </SidebarCard>
            );
            const rate = getAccuracyRate(st);
            const mastery = getMasteryLevel(st);
            const mColor = mastery === 'mastered' ? 'var(--correct)' : mastery === 'learning' ? 'var(--warning)' : 'var(--incorrect)';
            const mLabel = mastery === 'mastered' ? 'Mastered' : mastery === 'learning' ? 'Learning' : 'Weak';
            return (
              <SidebarCard title="Your Stats" accent={mColor}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, fontSize: 13 }}>
                  <div><span style={{ color: 'var(--text-sec)' }}>Attempts:</span> {st.attempts}</div>
                  <div><span style={{ color: 'var(--text-sec)' }}>Correct:</span> {st.correct}</div>
                  <div><span style={{ color: 'var(--text-sec)' }}>Accuracy:</span> <span style={{ color: rate >= 70 ? 'var(--correct)' : 'var(--incorrect)', fontWeight: 600 }}>{rate}%</span></div>
                  <div><span style={{ color: 'var(--text-sec)' }}>Streak:</span> {st.streak}</div>
                </div>
                <div style={{ marginTop: 8, padding: '4px 10px', borderRadius: 4, background: mColor + '18', color: mColor, fontSize: 12, fontWeight: 600, display: 'inline-block' }}>{mLabel}</div>
              </SidebarCard>
            );
          })()}

          {/* Source */}
          <SidebarCard title="Source">
            <p style={{ fontSize: 13, color: 'var(--text-sec)' }}>
              File: {q.source}<br />
              Original index: {q.sourceIndex}
            </p>
          </SidebarCard>
        </div>
      </div>
    </div>
  );
}

function SidebarCard({ title, accent, children }) {
  return (
    <div style={{ marginBottom: 16, padding: '14px 16px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, borderTop: accent ? `2px solid ${accent}` : undefined }}>
      <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: accent || 'var(--text-sec)', marginBottom: 8 }}>{title}</div>
      {children}
    </div>
  );
}

function DomainBadge({ label, large }) {
  return (
    <span style={{
      display: 'inline-block', fontSize: large ? 12 : 11, fontWeight: 600,
      textTransform: 'uppercase', letterSpacing: 0.5,
      padding: large ? '5px 12px' : '3px 8px', borderRadius: 4,
      background: getDomainBg(label), color: getDomainColor(label),
      marginBottom: large ? 16 : 0
    }}>
      {label}
    </span>
  );
}

// ─── TEST CONFIG ───
function TestConfig({ config, onSetConfig, onStart, onHome, activeQuestions, activeDomains }) {
  const totalPool = activeQuestions.filter(q => config.domains[q.domainLabel]).length;

  return (
    <div style={{ maxWidth: 560, margin: '0 auto', padding: '40px 20px' }}>
      <button onClick={onHome} style={{ background: 'none', border: 'none', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 14, marginBottom: 20 }}>← Back to Home</button>
      <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Test Configuration</h2>
      <p style={{ color: 'var(--text-sec)', fontSize: 14, marginBottom: 28 }}>Set up your practice exam</p>

      {/* Question count */}
      <ConfigSection title="Question Count">
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {[10, 25, 50, activeQuestions.length].map(n => (
            <button key={n} onClick={() => onSetConfig({ ...config, count: n })}
              style={chipStyle(config.count === n)}>{n}</button>
          ))}
          <input
            type="number" min="1" max={totalPool} value={config.count}
            onChange={e => onSetConfig({ ...config, count: Math.max(1, parseInt(e.target.value) || 1) })}
            style={{ ...selectStyle, width: 80, textAlign: 'center' }}
          />
        </div>
        <p style={{ fontSize: 12, color: 'var(--text-sec)', marginTop: 6 }}>{totalPool} questions available</p>
      </ConfigSection>

      {/* Domains */}
      <ConfigSection title="Domains">
        {activeDomains.map(d => {
          const count = activeQuestions.filter(q => q.domainLabel === d).length;
          return (
            <label key={d} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', cursor: 'pointer' }}>
              <input type="checkbox" checked={!!config.domains[d]}
                onChange={e => onSetConfig({ ...config, domains: { ...config.domains, [d]: e.target.checked } })}
                style={{ accentColor: getDomainColor(d) }} />
              <span style={{ fontSize: 14, color: config.domains[d] ? getDomainColor(d) : 'var(--text-sec)' }}>{d}</span>
              <span style={{ fontSize: 12, color: 'var(--text-sec)', marginLeft: 'auto' }}>{count}q</span>
            </label>
          );
        })}
      </ConfigSection>

      {/* Options */}
      <ConfigSection title="Options">
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', cursor: 'pointer' }}>
          <input type="checkbox" checked={config.randomize} onChange={e => onSetConfig({ ...config, randomize: e.target.checked })} style={{ accentColor: 'var(--accent)' }} />
          <span style={{ fontSize: 14 }}>Randomize order</span>
        </label>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0' }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
            <input type="checkbox" checked={config.timed} onChange={e => onSetConfig({ ...config, timed: e.target.checked })} style={{ accentColor: 'var(--accent)' }} />
            <span style={{ fontSize: 14 }}>Time limit</span>
          </label>
          {config.timed && (
            <input type="number" min="1" max="180" value={config.minutes}
              onChange={e => onSetConfig({ ...config, minutes: Math.max(1, parseInt(e.target.value) || 1) })}
              style={{ ...selectStyle, width: 64, textAlign: 'center' }} />
          )}
          {config.timed && <span style={{ fontSize: 13, color: 'var(--text-sec)' }}>minutes</span>}
        </div>
      </ConfigSection>

      <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
        <button onClick={() => {
          const allDomains = {};
          activeDomains.forEach(d => allDomains[d] = true);
          onSetConfig({ count: 50, domains: allDomains, randomize: true, timed: true, minutes: 60 });
        }} style={{ ...btnStyle('var(--surface-el)', 'var(--warning)', 52, 13, '1px solid var(--warning)'), flex: 1 }}>
          Simulate Real Exam
        </button>
        <button onClick={onStart} style={{ ...btnStyle('var(--accent)', 'var(--bg)', 52, 16), flex: 2 }}>
          Start Test
        </button>
      </div>
    </div>
  );
}

function ConfigSection({ title, children }) {
  return (
    <div style={{ marginBottom: 24, padding: '16px 18px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
      <div style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)', marginBottom: 12 }}>{title}</div>
      {children}
    </div>
  );
}

// ─── TEST ACTIVE ───
function TestActive({ questions, index, answers, flagged, elapsed, config, showGrid, onSelect, onSkip, onNavigate, onJump, onToggleFlag, onToggleGrid, onSubmit }) {
  const q = questions[index];
  if (!q) return null;

  const remaining = config.timed ? Math.max(0, config.minutes * 60 - elapsed) : null;
  const timerColor = remaining !== null ? (remaining < 300 ? 'var(--incorrect)' : remaining < 600 ? 'var(--warning)' : 'var(--text-sec)') : 'var(--text-sec)';

  return (
    <div style={{ maxWidth: 760, margin: '0 auto', padding: '0 20px' }}>
      {/* Top bar */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: '1px solid var(--border)', marginBottom: 20 }}>
        <span style={{ fontSize: 15, fontWeight: 600, color: 'var(--accent)' }}>Test Mode</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          {remaining !== null && (
            <span style={{ fontFamily: "'SF Mono', 'Fira Code', monospace", fontSize: 15, fontWeight: 600, color: timerColor }}>
              {formatTime(remaining)}
            </span>
          )}
          <span style={{ fontSize: 13, color: 'var(--text-sec)' }}>{Object.keys(answers).length}/{questions.length} answered</span>
        </div>
      </div>

      {/* Progress */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-sec)', marginBottom: 6 }}>
          <span>Question {index + 1} of {questions.length}</span>
        </div>
        <div style={{ height: 3, background: 'var(--surface-el)', borderRadius: 2, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${((index + 1) / questions.length) * 100}%`, background: 'var(--accent)', borderRadius: 2, transition: 'width 0.3s ease' }} />
        </div>
      </div>

      {/* Domain + flag */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <DomainBadge label={q.domainLabel} />
        <button onClick={onToggleFlag} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, color: flagged.has(index) ? 'var(--warning)' : 'var(--text-sec)' }}>
          {flagged.has(index) ? '⚑ Flagged' : '⚐ Flag'}
        </button>
      </div>

      {/* Question */}
      <div style={{ fontSize: 17, fontWeight: 500, lineHeight: 1.55, marginBottom: 6 }}>{q.question}</div>
      {q.multiSelect && <div style={{ fontSize: 12, color: 'var(--warning)', marginBottom: 16, fontWeight: 600 }}>Select all that apply</div>}
      {!q.multiSelect && <div style={{ height: 16 }} />}

      {/* Options */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {q.options.map((opt, i) => {
          const selected = q.multiSelect ? (answers[index] instanceof Set && answers[index].has(i)) : answers[index] === i;
          return (
            <div key={i} onClick={() => onSelect(i)} style={{
              display: 'flex', alignItems: 'flex-start', gap: 12, padding: '13px 16px',
              background: selected ? 'rgba(118,185,0,0.1)' : 'var(--surface)',
              border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`,
              borderRadius: 8, cursor: 'pointer', transition: 'all 0.15s ease'
            }}>
              <div style={{
                flexShrink: 0, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
                borderRadius: 6, fontSize: 13, fontWeight: 600,
                background: selected ? 'var(--accent)' : 'var(--surface-el)',
                color: selected ? 'var(--bg)' : 'var(--text)',
                border: `1px solid ${selected ? 'var(--accent)' : 'var(--border)'}`
              }}>
                {LETTERS[i]}
              </div>
              <div style={{ fontSize: 15, paddingTop: 3 }}>{opt}</div>
            </div>
          );
        })}
        {/* Don't know option */}
        <div onClick={() => onSkip()} style={{
          display: 'flex', alignItems: 'center', gap: 12, padding: '11px 16px',
          background: answers[index] === 'skip' ? 'rgba(255,77,106,0.08)' : 'var(--surface)',
          border: `1px dashed ${answers[index] === 'skip' ? 'var(--incorrect)' : 'var(--border)'}`,
          borderRadius: 8, cursor: 'pointer', transition: 'all 0.15s ease'
        }}>
          <div style={{
            flexShrink: 0, width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
            borderRadius: 6, fontSize: 13, fontWeight: 600,
            background: answers[index] === 'skip' ? 'var(--incorrect)' : 'var(--surface-el)',
            color: answers[index] === 'skip' ? '#fff' : 'var(--text-sec)',
            border: `1px solid ${answers[index] === 'skip' ? 'var(--incorrect)' : 'var(--border)'}`
          }}>?</div>
          <div style={{ fontSize: 14, color: answers[index] === 'skip' ? 'var(--incorrect)' : 'var(--text-sec)', fontStyle: 'italic' }}>I don't know</div>
        </div>
      </div>

      {/* Navigation */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 24 }}>
        <button onClick={() => onNavigate(-1)} disabled={index === 0} style={navBtnStyle(index === 0)}>
          ← Previous
        </button>
        <button onClick={onToggleGrid} style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '8px 14px', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 13 }}>
          {showGrid ? 'Hide Grid' : 'Show Grid'}
        </button>
        {index < questions.length - 1 ? (
          <button onClick={() => onNavigate(1)} style={navBtnStyle(false)}>Next →</button>
        ) : (
          <button onClick={onSubmit} style={btnStyle('var(--accent)', 'var(--bg)', 44, 15)}>Submit Test</button>
        )}
      </div>

      {/* Question grid */}
