:root {

  --incorrect: #FF4D6A;
  --warning: #FFB84D;
  --text: #E8ECF1;
  --text-sec: #8899AA;
  --border: #2A3A52;
  --domain-essential: #5BA8FF;
  --domain-infra: #00E5B0;
  --domain-ops: #FFB84D;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-sec); }

#root { min-height: 100vh; }

.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface-el);
  border: 1px solid var(--border);
  color: var(--text);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.toast.success { border-color: var(--correct); color: var(--correct); }
.toast.warning { border-color: var(--warning); color: var(--warning); }
.toast.info { border-color: var(--accent); color: var(--accent); }

@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

@media (max-width: 1024px) {
  .study-layout { flex-direction: column !important; }
  .study-left { width: 100% !important; padding-right: 0 !important; }
  .study-right { width: 100% !important; position: static !important; max-height: none !important; border-left: none !important; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }
}

  { id: 1001, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "In the Exploratory Data Analysis (EDA) stage, analysts frequently calculate numerical summaries to gain a clearer view of the data's distribution and variability. Which EDA method specifically involves computing measures like mean, median, mode, variance, standard deviation, min, max, and percentiles?", options: ["Data Visualization", "Feature Engineering", "Descriptive Statistics", "Inferential Statistics"], correct: 2, explanation: "Descriptive statistics involves computing summary measures like mean, median, mode, variance, standard deviation, min, max, and percentiles to understand data distribution and variability. Data Visualization uses graphs, Feature Engineering creates new variables, and Inferential Statistics draws conclusions about populations from samples.", source: "nca-genl-exam-1", sourceIndex: 1 },
  { id: 1002, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "During data analysis, graphical displays are commonly employed to quickly uncover insights about data patterns and structure. What is the main goal of data visualization in this scenario?", options: ["Training predictive models", "Cleaning and preprocessing raw data", "Converting categorical variables to numerical format", "Revealing patterns, trends, and outliers through graphs"], correct: 3, explanation: "Data visualization uses graphical representations like histograms, scatter plots, and box plots to quickly reveal patterns, trends, correlations, and outliers in data. It is part of EDA and not directly involved in model training, data cleaning, or variable encoding.", source: "nca-genl-exam-1", sourceIndex: 2 },
  { id: 1003, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "During the training of machine learning or deep learning models, the full dataset is typically fed through the model several times to enhance learning. What exactly does an 'epoch' mean in this process?", options: ["A single batch of training examples", "One full pass over the entire training dataset", "A step applied solely in model evaluation", "A direct measure of model accuracy"], correct: 1, explanation: "An epoch represents one complete pass through the entire training dataset during model training. Multiple epochs allow the model to learn patterns more thoroughly. A batch is a subset of data processed at once, and epochs are a training concept not directly tied to evaluation or accuracy measurement.", source: "nca-genl-exam-1", sourceIndex: 3 },
  { id: 1004, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Once a machine learning model is trained, evaluating its effectiveness on unfamiliar data is essential. What does 'model evaluation' refer to here?", options: ["Gathering and labeling data for training", "Tuning hyperparameters", "Evaluating the trained model's performance on new unseen data", "Deploying the model in production"], correct: 2, explanation: "Model evaluation assesses how well a trained model performs on new, unseen data using metrics like accuracy, precision, recall, and F1-score. It is distinct from data collection, hyperparameter tuning, and deployment, though it informs decisions in those stages.", source: "nca-genl-exam-1", sourceIndex: 4 },
  { id: 1005, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Beyond quantitative metrics, some models—particularly generative ones—are assessed through subjective assessment. Which option represents a qualitative evaluation approach?", options: ["Calculating accuracy", "Analyzing a confusion matrix", "Human evaluation of generated content", "Optimizing loss functions"], correct: 2, explanation: "Human evaluation is a qualitative approach where human judges assess generated content for qualities like fluency, coherence, relevance, and factual accuracy. Accuracy calculation, confusion matrices, and loss function optimization are all quantitative methods.", source: "nca-genl-exam-1", sourceIndex: 5 },
  { id: 1006, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Transfer learning allows models to reuse knowledge from prior tasks or larger pre-trained models. Which method below is a form of transfer learning?", options: ["Feature scaling", "Data augmentation", "Knowledge distillation", "Dimensionality reduction"], correct: 2, explanation: "Knowledge distillation is a transfer learning technique where a smaller 'student' model learns to mimic a larger 'teacher' model's behavior, transferring knowledge from the pre-trained model. Feature scaling, data augmentation, and dimensionality reduction are preprocessing or regularization techniques, not transfer learning methods.", source: "nca-genl-exam-1", sourceIndex: 6 },
  { id: 1007, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "In machine learning, input variables are key for pattern detection. What term describes a 'feature'?", options: ["The entire training dataset", "An individual observable attribute or property of the data", "An output prediction from the model", "A particular learning algorithm"], correct: 1, explanation: "A feature is an individual measurable property or attribute of the data used as input to a machine learning model. Features represent the dimensions along which the model learns patterns. The dataset is the collection of all samples, predictions are outputs, and algorithms are the learning methods.", source: "nca-genl-exam-1", sourceIndex: 7 },
  { id: 1008, domain: "llm", domainLabel: "LLMs & Generative AI", question: "For NLP tasks like translation, summarization, or paraphrasing, models need to transform input sequences into output sequences. Which architecture is best suited for these sequence-to-sequence problems?", options: ["Convolutional Neural Networks", "Attention-only mechanisms", "Encoder-Decoder architecture", "Clustering algorithms"], correct: 2, explanation: "The Encoder-Decoder architecture is specifically designed for sequence-to-sequence tasks. The encoder processes the input sequence into a context representation, and the decoder generates the output sequence from that representation. CNNs are primarily for spatial data, attention-only mechanisms are a component (not full architecture), and clustering is unsupervised.", source: "nca-genl-exam-1", sourceIndex: 8 },
  { id: 1009, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "When handling large datasets with demanding ML algorithms, GPU acceleration boosts speed significantly. Which library provides GPU-accelerated alternatives to standard ML routines?", options: ["NumPy", "Pandas", "cuML", "Scikit-learn"], correct: 2, explanation: "cuML is part of NVIDIA's RAPIDS suite and provides GPU-accelerated machine learning algorithms that mirror Scikit-learn's API. NumPy and Pandas are CPU-based data manipulation libraries, and Scikit-learn runs on CPU. cuML can deliver significant speedups for algorithms like linear regression, random forests, and clustering.", source: "nca-genl-exam-1", sourceIndex: 9 },
  { id: 1010, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "TensorRT employs various optimizations to prepare models for efficient deployment. Which technique does TensorRT use to build faster inference engines?", options: ["Dropout regularization", "Data augmentation", "Layer fusion", "Gradient clipping"], correct: 2, explanation: "Layer fusion is a key TensorRT optimization that combines multiple sequential operations into a single kernel, reducing memory transfers and computation overhead. Dropout regularization and gradient clipping are training techniques, and data augmentation is a data preprocessing technique—none are inference optimizations.", source: "nca-genl-exam-1", sourceIndex: 10 },
  { id: 1011, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Which statement most accurately defines Word2vec?", options: ["A programming language for AI development", "A statistical method for word frequency analysis", "A deep learning method that produces word embeddings from text", "A database system for word storage and queries"], correct: 2, explanation: "Word2vec is a neural network-based technique that learns dense vector representations (embeddings) of words from large text corpora. It captures semantic relationships so that similar words have similar vectors. It is not a programming language, frequency analysis method, or database system.", source: "nca-genl-exam-1", sourceIndex: 11 },
  { id: 1012, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In large language models, what role does the attention mechanism play?", options: ["Assessing importance of words in the generated output", "Determining generation order of words", "Capturing word order in the input", "Assigning relevance weights to input tokens"], correct: 3, explanation: "The attention mechanism assigns relevance weights to input tokens, allowing the model to focus on the most relevant parts of the input when processing each position. It does not determine generation order (that's the autoregressive nature) or capture word order (that's positional encoding).", source: "nca-genl-exam-1", sourceIndex: 12 },
  { id: 1013, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What function does positional encoding serve in the Transformer architecture?", options: ["Eliminating redundant input information", "Encoding semantic meaning of tokens", "Injecting positional order information for tokens", "Encoding token importance"], correct: 2, explanation: "Positional encoding injects information about each token's position in the sequence into the Transformer model. Since Transformers process all tokens in parallel (unlike RNNs), they need positional encoding to understand token order. It doesn't encode semantics, importance, or remove redundancy.", source: "nca-genl-exam-1", sourceIndex: 13 },
  { id: 1014, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What is typically meant by 'generative AI'?", options: ["AI that creates models capable of producing new data instances", "AI that automatically builds classification models", "AI that enhances efficiency of existing models", "AI that analyzes and interprets data"], correct: 0, explanation: "Generative AI refers to artificial intelligence systems that can create new content—text, images, audio, code, etc.—that resembles their training data. Unlike discriminative models that classify or analyze, generative models learn data distributions and produce novel outputs.", source: "nca-genl-exam-1", sourceIndex: 14 },
  { id: 1015, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "As a data scientist deploying deep learning models, your team discusses TensorRT and ONNX for optimization and deployment. Select the two accurate descriptions of their roles.", options: ["TensorRT acts as hardware accelerator while ONNX is a language for ML development", "TensorRT optimizes and deploys models on NVIDIA GPUs; ONNX enables framework interoperability", "TensorRT builds and trains models; ONNX optimizes for specific hardware", "TensorRT accelerates inference via optimization; ONNX provides interoperable model format", "TensorRT creates models from scratch; ONNX handles deployment"], correct: [1, 3], multiSelect: true, explanation: "TensorRT is NVIDIA's inference optimizer that applies optimizations like layer fusion, precision calibration, and kernel auto-tuning for fast GPU inference. ONNX (Open Neural Network Exchange) is an open format enabling models to be shared across different frameworks (PyTorch, TensorFlow, etc.). Together they form a powerful optimization and interoperability pipeline.", source: "nca-genl-exam-1", sourceIndex: 15 },
  { id: 1016, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "You've trained a new deep learning model and plan A/B testing for performance comparison. Which method is proper?", options: ["Run new model for a while and compare to old model's past metrics", "Run new model then revert to old for comparison", "Run new model and use user feedback only", "Randomly split users: half use new model, half use old then compare metrics"], correct: 3, explanation: "Proper A/B testing randomly splits users into two groups simultaneously—one using the new model and one using the old—then compares metrics under identical conditions. This controls for temporal and environmental variables, unlike sequential testing or feedback-only approaches.", source: "nca-genl-exam-1", sourceIndex: 16 },
  { id: 1017, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What role does a tokenizer play in Large Language Models?", options: ["Removing stop words and punctuation", "Predicting the next token in text", "Dividing text into smaller units (tokens) for processing", "Converting text directly to numerical tokens"], correct: 2, explanation: "A tokenizer splits input text into smaller units called tokens (words, subwords, or characters) that the model can process. While tokenizers do map tokens to numerical IDs, their primary role is the segmentation step. They don't remove stop words (that's preprocessing) or predict tokens (that's the model).", source: "nca-genl-exam-1", sourceIndex: 17 },
  { id: 1018, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Why is positional encoding required in Transformer models?", options: ["To indicate the sequence order of tokens", "To avoid model overfitting", "To lower input dimensionality", "To boost processing speed"], correct: 0, explanation: "Positional encoding is required because Transformers process all tokens in parallel and have no inherent notion of sequence order. Without positional encoding, the model would treat 'the cat sat' identically to 'sat the cat'. It doesn't affect overfitting, dimensionality, or speed.", source: "nca-genl-exam-1", sourceIndex: 18 },
  { id: 1019, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In preprocessing text for Large Language Models, what is tokenization?", options: ["Breaking text into smaller units such as words or subwords", "Turning text into numerical vectors", "Eliminating stop words", "Using augmentation to create more data"], correct: 0, explanation: "Tokenization is the process of breaking text into smaller units (tokens) such as words, subwords, or characters. This is a fundamental preprocessing step for LLMs. Converting to vectors is embedding, removing stop words is a separate preprocessing step, and data augmentation generates new samples.", source: "nca-genl-exam-1", sourceIndex: 19 },
  { id: 1020, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What best captures the role of attention mechanisms in Transformers?", options: ["Concentrating on relevant input portions for the task", "Compressing input for quicker computation", "Adding noise for robustness", "Transforming text to numbers"], correct: 0, explanation: "Attention mechanisms allow Transformers to dynamically focus on the most relevant parts of the input sequence when processing each token. This selective focus enables the model to capture long-range dependencies effectively. Attention doesn't compress input, add noise, or convert text to numbers.", source: "nca-genl-exam-1", sourceIndex: 20 },
  { id: 1021, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In the realm of Large Language Models, what defines a foundation model?", options: ["A model achieving top GLUE benchmark scores", "A large-scale model trained on massive data to adapt to various downstream tasks", "A model certified by AI safety institutes for Transformer apps", "A model from the 'Attention is All You Need' paper using RNNs/convolutions"], correct: 1, explanation: "A foundation model is a large-scale model pre-trained on broad, diverse data that can be adapted (fine-tuned) for many downstream tasks. Examples include GPT, BERT, and LLaMA. It's defined by its scale and adaptability, not benchmark scores, certifications, or specific architectures.", source: "nca-genl-exam-1", sourceIndex: 21 },
  { id: 1022, domain: "llm", domainLabel: "LLMs & Generative AI", question: "The prompt 'Translate to French: cheese =>' exemplifies which technique?", options: ["Few-shot learning", "Fine-tuning the model", "One-shot learning", "Zero-shot learning"], correct: 3, explanation: "This is zero-shot learning because the prompt gives only a task instruction with no examples. The model must rely entirely on its pre-trained knowledge to translate. Few-shot would include example translations, one-shot would include exactly one example, and fine-tuning involves retraining model weights.", source: "nca-genl-exam-1", sourceIndex: 22 },
  { id: 1023, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "For complex reasoning tasks like multi-step math problems in LLMs, which prompt technique best ensures consistent strong results?", options: ["Zero-shot with basic instructions", "Few-shot with random examples", "Chain-of-thought with step-by-step reasoning demonstrations", "Retrieval-augmented generation with math databases"], correct: 2, explanation: "Chain-of-thought (CoT) prompting guides the model to break down complex problems into intermediate reasoning steps, significantly improving performance on math, logic, and multi-step reasoning tasks. Zero-shot and random few-shot lack the structured reasoning guidance that CoT provides.", source: "nca-genl-exam-1", sourceIndex: 23 },
  { id: 1024, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which prompt engineering method helps LLMs produce more precise and suitable responses?", options: ["Adding more training data", "Using the system message", "Increasing parameter size", "Switching model architecture"], correct: 1, explanation: "The system message sets the overall behavior, role, and constraints for the LLM, guiding it to produce more focused and appropriate responses. Adding training data and increasing parameters require retraining, and switching architecture is a model design change—none are prompt engineering techniques.", source: "nca-genl-exam-1", sourceIndex: 24 },
  { id: 1025, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What is the goal of few-shot learning in prompt engineering?", options: ["Providing the model with example demonstrations", "Training a model from the ground up", "Optimizing hyperparameters", "Fine-tuning on huge datasets"], correct: 0, explanation: "Few-shot learning in prompt engineering provides the model with a small number of input-output examples within the prompt to demonstrate the expected task format and behavior. It requires no weight updates, unlike training from scratch or fine-tuning, and is not related to hyperparameter optimization.", source: "nca-genl-exam-1", sourceIndex: 25 },
  // ── Exam 2 (Q26-Q50) ──
  { id: 1026, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which prompt engineering approach proves most successful in enhancing an LLM's ability to handle complex, multi-step reasoning problems?", options: ["Retrieval-augmented generation without any additional context", "Few-shot prompting using unrelated examples", "Zero-shot prompting with in-depth task instructions", "Chain-of-thought prompting that includes clear intermediate reasoning steps"], correct: 3, explanation: "Chain-of-thought prompting explicitly demonstrates intermediate reasoning steps, teaching the model to break down complex problems systematically. Unrelated few-shot examples don't help reasoning, zero-shot lacks demonstrations, and RAG without context doesn't address the reasoning process itself.", source: "nca-genl-exam-2", sourceIndex: 26 },
  { id: 1027, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What exactly does Retrieval-Augmented Generation (RAG) refer to in the context of large language models?", options: ["A method that optimizes LLM outputs by retraining on domain-specific datasets", "A technique combining information retrieval with a generative component", "A process for creating and manipulating text using Transformer-based models", "A fine-tuning approach to boost pre-trained LLM performance"], correct: 1, explanation: "RAG combines a retrieval component (that fetches relevant documents from an external knowledge base) with a generative LLM that uses the retrieved information to produce grounded, accurate responses. It doesn't involve retraining, and is distinct from general text generation or fine-tuning.", source: "nca-genl-exam-2", sourceIndex: 27 },
  { id: 1028, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "In the Retrieval-Augmented Generation (RAG) process, what role does 'chunking' play?", options: ["Rewriting text blocks to fit within the model's context window", "A technique for producing random text in RAG", "A training-related concept for large language models", "A method to divide text into smaller coherent segments"], correct: 3, explanation: "Chunking divides large documents into smaller, coherent segments that can be individually embedded and retrieved. This enables precise retrieval of relevant passages rather than entire documents. It is not about rewriting text, generating random text, or a training concept.", source: "nca-genl-exam-2", sourceIndex: 28 },
  { id: 1029, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What is the essential component needed for effective Retrieval-Augmented Generation (RAG) implementation in enterprise environments?", options: ["Prompt engineering techniques", "Model fine-tuning", "Zero-shot capabilities", "A robust data retrieval system"], correct: 3, explanation: "A robust data retrieval system—including document processing, embedding generation, vector storage, and efficient similarity search—is the essential foundation for RAG. While prompt engineering, fine-tuning, and zero-shot capabilities can enhance RAG, the retrieval infrastructure is the core differentiating component.", source: "nca-genl-exam-2", sourceIndex: 29 },
  { id: 1030, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which two metrics are most appropriate for assessing how accurately a RAG system responds to user queries?", options: ["Generator latency", "Retriever latency", "Tokens generated per second", "Response relevancy", "Context precision"], correct: [3, 4], multiSelect: true, explanation: "Response relevancy measures how well the generated answer addresses the user's question, while context precision measures the proportion of retrieved context that is actually relevant. Latency and throughput metrics measure speed, not accuracy of responses.", source: "nca-genl-exam-2", sourceIndex: 30 },
  { id: 1031, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "In what way does Retrieval-Augmented Generation (RAG) contribute to creating more reliable AI applications?", options: ["Improving energy efficiency and reducing cooling needs", "Providing responses with citations from external sources for transparency", "Enhancing security through encryption and confidential computing", "Aligning multiple models for cross-verification"], correct: 1, explanation: "RAG enhances reliability by grounding LLM responses in retrieved external sources, enabling citation and verification of claims. This transparency helps users assess response accuracy. RAG doesn't directly address energy efficiency, encryption, or multi-model alignment.", source: "nca-genl-exam-2", sourceIndex: 31 },
  { id: 1032, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "If you want to customize a large language model using prompt engineering, prompt learning, or efficient fine-tuning methods, which NVIDIA framework supports all these approaches?", options: ["NVIDIA TensorRT", "NVIDIA DALI", "NVIDIA Triton", "NVIDIA NeMo"], correct: 3, explanation: "NVIDIA NeMo is the comprehensive framework for building, customizing, and deploying LLMs, supporting prompt engineering, p-tuning (prompt learning), and parameter-efficient fine-tuning (LoRA, etc.). TensorRT is for inference optimization, DALI for data loading, and Triton for model serving.", source: "nca-genl-exam-2", sourceIndex: 32 },
  { id: 1033, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What is a main use case for both XGBoost and the cuML library?", options: ["Cleaning, inspecting and transforming datasets", "Running GPU-accelerated machine learning algorithms", "Training convolutional neural networks", "Creating visualizations and exploratory analysis"], correct: 1, explanation: "Both XGBoost (with GPU support) and cuML provide GPU-accelerated implementations of machine learning algorithms like gradient boosting, random forests, linear models, and clustering. They focus on ML algorithms, not data cleaning (cuDF), CNN training (deep learning frameworks), or visualization.", source: "nca-genl-exam-2", sourceIndex: 33 },
  { id: 1034, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which RAPIDS library is primarily designed to speed up data preparation tasks on GPUs?", options: ["cuML", "XGBoost", "cuDF", "cuGraph"], correct: 2, explanation: "cuDF is the RAPIDS library that provides a GPU-accelerated DataFrame API similar to Pandas for fast data manipulation, filtering, aggregation, and preprocessing. cuML handles ML algorithms, XGBoost is for gradient boosting, and cuGraph is for graph analytics.", source: "nca-genl-exam-2", sourceIndex: 34 },
  { id: 1035, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What is the main goal of the NVIDIA NeMo framework?", options: ["Studying word formation and language structure", "Trading model size for minimal performance loss", "Building models for speech recognition and language understanding", "Developing convolution-based computer vision models"], correct: 2, explanation: "NVIDIA NeMo is designed for building, training, and fine-tuning models for conversational AI, including speech recognition (ASR), natural language processing/understanding (NLP/NLU), and text-to-speech (TTS). It is not focused on linguistics, model compression, or computer vision.", source: "nca-genl-exam-2", sourceIndex: 35 },
  { id: 1036, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "How does the RAPIDS suite primarily speed up data science workflows when used with Python?", options: ["Boosting PCIe bus speed through special techniques", "Compressing data transfers between CPU and GPU", "Using CPU parallelism for full pipeline acceleration", "Performing expensive computations on GPU while reducing data transfers"], correct: 3, explanation: "RAPIDS accelerates data science by executing computationally expensive operations on the GPU, keeping data in GPU memory to minimize CPU-GPU data transfers. It doesn't modify PCIe speed, compress transfers, or use CPU parallelism—its core advantage is GPU computation with minimized data movement.", source: "nca-genl-exam-2", sourceIndex: 36 },
  { id: 1037, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "In a pipeline for fine-tuning LLMs with RAPIDS, what key capability of cuDF provides faster data handling than standard Pandas?", options: ["Parallelizing Python across multiple CPU cores", "GPU-based columnar processing with minimal memory copying", "Connecting to distributed cloud storage", "Turning DataFrames into SQL for queries"], correct: 1, explanation: "cuDF processes data in a columnar format on the GPU, enabling massive parallelism with minimal memory copying. This is fundamentally different from Pandas which runs on CPU. cuDF doesn't parallelize CPU cores, connect to cloud storage, or convert to SQL.", source: "nca-genl-exam-2", sourceIndex: 37 },
  { id: 1038, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which description best captures the purpose of NVIDIA's NeMo Guardrails?", options: ["Optimizing scalability and speed in model training/inference", "Creating multimodal data integration models", "Enforcing ethical guidelines and rules for AI outputs", "Constructing data pipelines for generative AI"], correct: 2, explanation: "NeMo Guardrails is a toolkit for adding programmable safety, security, and conversational guardrails to LLM-powered applications. It enforces ethical guidelines, topic boundaries, and output rules. It doesn't optimize training/inference, create multimodal models, or build data pipelines.", source: "nca-genl-exam-2", sourceIndex: 38 },
  { id: 1039, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What is one standout capability of NVIDIA's Triton Inference Server?", options: ["Gradient clipping", "Model pruning", "Model quantization", "Dynamic batching"], correct: 3, explanation: "Dynamic batching is a key Triton Inference Server feature that automatically combines multiple inference requests into optimized batches, maximizing GPU utilization and throughput. Gradient clipping is a training technique, and model pruning/quantization are optimization techniques not specific to Triton.", source: "nca-genl-exam-2", sourceIndex: 39 },
  { id: 1040, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What role does the NVIDIA NGC catalog serve for developers?", options: ["A testing and debugging environment", "A collaboration space for sharing projects", "A collection of GPU-optimized AI and data science tools", "A marketplace for purchasing development resources"], correct: 2, explanation: "NGC (NVIDIA GPU Cloud) is a catalog/registry providing GPU-optimized containers, pre-trained models, SDKs, and Helm charts for AI and data science. It is not a testing environment, collaboration platform, or commercial marketplace.", source: "nca-genl-exam-2", sourceIndex: 40 },
  { id: 1041, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "How do NGC containers from NVIDIA improve consistency in LLM training and deployment processes?", options: ["Providing direct GPU access without drivers", "Auto-tuning model hyperparameters", "Compressing neural networks for less memory", "Packaging dependencies for identical runs across environments"], correct: 3, explanation: "NGC containers package all software dependencies (frameworks, libraries, drivers) into reproducible environments that run identically across different systems. This eliminates 'works on my machine' issues. They don't bypass drivers, auto-tune hyperparameters, or compress networks.", source: "nca-genl-exam-2", sourceIndex: 41 },
  { id: 1042, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which tool is best suited for putting a large language model into production use?", options: ["Git", "Pandas", "Falcon", "Triton"], correct: 3, explanation: "NVIDIA Triton Inference Server is purpose-built for deploying models in production, providing features like dynamic batching, model versioning, multi-framework support, and health monitoring. Git is for version control, Pandas for data manipulation, and Falcon is a web framework.", source: "nca-genl-exam-2", sourceIndex: 42 },
  { id: 1043, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Select the two factors that most contribute to RAPIDS' faster data processing performance.", options: ["Maximizing CPU clock speeds", "Approximating results via data subsampling", "Leveraging GPUs for parallel data operations", "Scaling processing across multiple GPUs", "Providing additional memory capacity"], correct: [2, 3], multiSelect: true, explanation: "RAPIDS achieves faster processing by leveraging GPU parallel computing for data operations and scaling across multiple GPUs for even larger workloads. It doesn't rely on CPU clock speeds, data subsampling (which would sacrifice accuracy), or simply adding memory.", source: "nca-genl-exam-2", sourceIndex: 43 },
  { id: 1044, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "For deploying an NLP application requiring high-performance inference in production, which framework is most appropriate?", options: ["NVIDIA DeepStream", "HuggingFace", "NeMo", "NVIDIA Triton"], correct: 3, explanation: "NVIDIA Triton Inference Server is designed for high-performance production inference, supporting multiple frameworks and models simultaneously with optimized serving. DeepStream is for video analytics, HuggingFace is primarily for model development, and NeMo is for training and fine-tuning.", source: "nca-genl-exam-2", sourceIndex: 44 },
  { id: 1045, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "When using Triton Inference Server to deploy an LLM for a live chatbot, what technique lowers latency while preserving throughput?", options: ["Expanding the model with more parameters", "Grouping multiple requests into batches dynamically", "Shortening input sequences", "Moving to CPU inference for scalability"], correct: 1, explanation: "Dynamic batching groups incoming requests together and processes them as a batch, amortizing the per-request overhead and maximizing GPU utilization. Adding parameters increases latency, truncating inputs loses information, and CPU inference is slower than GPU for LLMs.", source: "nca-genl-exam-2", sourceIndex: 45 },
  { id: 1046, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What does confidential computing primarily involve?", options: ["Protecting hardware and software from security risks", "Creating explainable and fair AI systems", "Aligning AI outputs with human values", "Combining different data types in models"], correct: 0, explanation: "Confidential computing protects data and computations through hardware-based security mechanisms like trusted execution environments (TEEs), ensuring data remains encrypted even during processing. It is not about AI explainability, alignment, or multimodal data processing.", source: "nca-genl-exam-2", sourceIndex: 46 },
  { id: 1047, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which two approaches help mitigate bottlenecks in data transfer between CPU and GPU?", options: ["Raising CPU clock frequency", "Employing memory pooling methods", "Upgrading to a more powerful GPU", "Adding more CPU cores"], correct: [1, 2], multiSelect: true, explanation: "Memory pooling reduces allocation overhead and enables reuse of GPU memory buffers, while upgrading to a more powerful GPU provides higher bandwidth and faster memory. CPU clock speed and core count don't directly address the CPU-GPU data transfer bottleneck.", source: "nca-genl-exam-2", sourceIndex: 47 },
  { id: 1048, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which suite enables complete GPU-accelerated pipelines for data science from start to finish?", options: ["Scikit-learn", "PyTorch", "TensorFlow", "NVIDIA RAPIDS"], correct: 3, explanation: "NVIDIA RAPIDS provides end-to-end GPU-accelerated data science pipelines covering data loading (cuDF), machine learning (cuML), graph analytics (cuGraph), and more. Scikit-learn is CPU-only, and PyTorch/TensorFlow are primarily deep learning frameworks, not full data science pipeline suites.", source: "nca-genl-exam-2", sourceIndex: 48 },
  { id: 1049, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What makes the HuggingFace Transformers library especially effective for fine-tuning LLMs on NVIDIA hardware?", options: ["Support for CPU-focused preprocessing", "Integration with PyTorch and TensorRT for GPU speed", "Auto-conversion to ONNX for other platforms", "Easy API for traditional ML methods"], correct: 1, explanation: "HuggingFace Transformers integrates seamlessly with PyTorch for GPU training and can export models for TensorRT optimization, making it highly effective on NVIDIA hardware. Its strength is not CPU preprocessing, automatic ONNX conversion, or traditional ML algorithms.", source: "nca-genl-exam-2", sourceIndex: 49 },
  { id: 1050, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which Python package is tailored specifically for handling large language models?", options: ["Scikit-learn", "HuggingFace Transformers", "NumPy", "Pandas"], correct: 1, explanation: "HuggingFace Transformers is the leading Python library for working with LLMs, providing pre-trained model access, tokenizers, training utilities, and inference pipelines. Scikit-learn is for traditional ML, NumPy for numerical computing, and Pandas for data manipulation.", source: "nca-genl-exam-2", sourceIndex: 50 },
  // ── Exam 3 (Q51-Q75) ──
  { id: 1051, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "For building trustworthy AI, what is the main goal of conducting red-teaming during the alignment phase of large language models?", options: ["Optimizing inference speed for deployment", "Detecting and addressing biases, risks and harmful responses", "Expanding the model's parameters for improved results", "Automating data gathering for model fine-tuning"], correct: 1, explanation: "Red-teaming involves systematically probing an LLM to discover biases, safety vulnerabilities, and harmful response patterns. This adversarial testing helps identify and mitigate risks before deployment. It is not about optimization, scaling, or data collection.", source: "nca-genl-exam-3", sourceIndex: 51 },
  { id: 1052, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which Trustworthy AI principle focuses on the ethical effects of AI on society, including risks of misuse and unexpected outcomes?", options: ["Certification", "Data Privacy", "Accountability", "Legal Responsibility"], correct: 2, explanation: "Accountability in Trustworthy AI encompasses responsibility for the ethical impact of AI systems on society, including addressing risks of misuse, unintended consequences, and ensuring proper oversight. Certification, data privacy, and legal responsibility are related but narrower concepts.", source: "nca-genl-exam-3", sourceIndex: 52 },
  { id: 1053, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which element in ethical AI development helps ensure systems conform to societal standards and values?", options: ["Achieving maximum predictive accuracy", "Using advanced algorithms for better problem-solving", "Creating AI independent of human oversight", "Providing explainable decision processes"], correct: 3, explanation: "Explainability allows stakeholders to understand how AI systems make decisions, enabling verification that those decisions align with societal standards and values. Maximum accuracy, advanced algorithms, and autonomy from human oversight do not inherently ensure ethical alignment.", source: "nca-genl-exam-3", sourceIndex: 53 },
  { id: 1054, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Select two commonly accepted principles for developing trustworthy AI systems.", options: ["Conversational", "Low latency", "Privacy", "Scalability", "Non-discrimination"], correct: [2, 4], multiSelect: true, explanation: "Privacy (protecting personal data) and non-discrimination (ensuring fair treatment regardless of protected characteristics) are widely recognized principles for trustworthy AI. Conversational ability, low latency, and scalability are technical features, not ethical principles.", source: "nca-genl-exam-3", sourceIndex: 54 },
  { id: 1055, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What does the term 'hallucinations' refer to in the outputs of large language models?", options: ["Generating images from text prompts", "Outputs that mimic input data closely", "Responses with grammatical errors", "Plausible-sounding but factually wrong results"], correct: 3, explanation: "LLM hallucinations are outputs that sound convincing and fluent but contain factually incorrect or fabricated information. The model generates plausible text based on learned patterns without verifying factual accuracy. This is distinct from image generation, data mimicry, or grammar errors.", source: "nca-genl-exam-3", sourceIndex: 55 },
  { id: 1056, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which method helps verify the authenticity of content produced by AI models?", options: ["Model interpretability", "Data lineage tracking", "Data augmentation techniques", "Adversarial training"], correct: 1, explanation: "Data lineage tracking traces the origin, transformations, and provenance of data and content, helping verify that AI-generated content is authentic and traceable. Model interpretability explains decisions, data augmentation creates training data, and adversarial training improves robustness.", source: "nca-genl-exam-3", sourceIndex: 56 },
  { id: 1057, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "How does Docker support the deployment of machine learning models effectively?", options: ["Generating new features automatically", "Ensuring uniform environments for training and inference", "Lowering resource demands for model training", "Boosting model accuracy directly"], correct: 1, explanation: "Docker containers package applications with all dependencies into portable, reproducible environments that run consistently across development, testing, and production. This eliminates environment-related deployment issues. Docker doesn't generate features, reduce compute needs, or improve accuracy.", source: "nca-genl-exam-3", sourceIndex: 57 },
  { id: 1058, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Which description accurately captures diffusion models in the field of generative AI?", options: ["Probabilistic models that add noise gradually and learn to reverse it for generation", "Discriminative models optimizing gradients for classification", "Unsupervised models clustering similar points", "Generative models using transformers to model distributions"], correct: 0, explanation: "Diffusion models work by gradually adding Gaussian noise to data (forward process) and then learning to reverse this noising process (reverse process) to generate new samples. This denoising approach has proven highly effective for image, audio, and video generation.", source: "nca-genl-exam-3", sourceIndex: 58 },
  { id: 1059, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "What method trains deep learning models by updating weights according to prediction errors?", options: ["Gradient Boosting", "Principal Component Analysis", "K-means Clustering", "Back Propagation"], correct: 3, explanation: "Backpropagation computes gradients of the loss function with respect to each weight by propagating errors backward through the network, then uses these gradients to update weights. Gradient Boosting is an ensemble method, PCA reduces dimensions, and K-means is clustering—none train neural networks.", source: "nca-genl-exam-3", sourceIndex: 59 },
  { id: 1060, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "What is the standard sequence of phases in a machine learning project?", options: ["Model evaluation, Data preprocessing, Model training, Data collection", "Model evaluation, Data collection, Data preprocessing, Model training", "Data preprocessing, Data collection, Model training, Model evaluation", "Data collection, Data preprocessing, Model training, Model evaluation"], correct: 3, explanation: "The standard ML pipeline follows: Data Collection (gather raw data), Data Preprocessing (clean, transform, split), Model Training (fit model to training data), Model Evaluation (assess performance on test data). This logical sequence ensures each step builds on the previous one.", source: "nca-genl-exam-3", sourceIndex: 60 },
  { id: 1061, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Which option represents an activation function commonly applied in neural networks?", options: ["Sigmoid function", "K-means clustering function", "Mean Squared Error function", "Diffusion function"], correct: 0, explanation: "The Sigmoid function is a classic activation function that maps inputs to values between 0 and 1, commonly used in binary classification output layers. K-means is a clustering algorithm, MSE is a loss function, and diffusion refers to generative model processes—none are activation functions.", source: "nca-genl-exam-3", sourceIndex: 61 },
  { id: 1062, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "For assessing a fine-tuned LLM on text classification with unbalanced data, which validation method provides reliable performance metrics?", options: ["Simple hold-out with a static test set", "Stratified k-fold cross-validation", "Bootstrapping via random samples", "Grid search for parameter optimization"], correct: 1, explanation: "Stratified k-fold cross-validation maintains the same class distribution in each fold as the original dataset, providing reliable performance estimates even with imbalanced data. Simple hold-out may produce skewed splits, bootstrapping doesn't guarantee class balance, and grid search is for hyperparameter tuning.", source: "nca-genl-exam-3", sourceIndex: 62 },
  { id: 1063, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Select two benefits of utilizing ONNX in machine learning workflows.", options: ["Reducing model training duration", "Lowering inference latency", "Compressing model size", "Enabling model sharing across frameworks"], correct: [1, 3], multiSelect: true, explanation: "ONNX enables model interoperability across different frameworks (PyTorch to TensorFlow, etc.) and can lower inference latency through its optimized runtime (ONNX Runtime). It doesn't inherently reduce training duration or compress model size.", source: "nca-genl-exam-3", sourceIndex: 63 },
  { id: 1064, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Choose two key advantages provided by A/B testing in AI development.", options: ["Determining the top-performing model", "Identifying optimal hyperparameters", "Finding best data preprocessing methods", "Selecting ideal hardware setups"], correct: [0, 1], multiSelect: true, explanation: "A/B testing enables controlled comparison to determine which model performs better in production and can help identify which hyperparameter settings lead to better real-world outcomes. Data preprocessing and hardware selection are typically determined through other methods.", source: "nca-genl-exam-3", sourceIndex: 64 },
  { id: 1065, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "What is the main function of ONNX in deep learning ecosystems?", options: ["Standardizing models for cross-framework compatibility", "Shortening model training periods", "Shrinking model sizes", "Distributing research papers"], correct: 0, explanation: "ONNX (Open Neural Network Exchange) standardizes the representation of ML models, enabling seamless transfer between frameworks like PyTorch, TensorFlow, and others. It doesn't reduce training time, compress models, or distribute papers.", source: "nca-genl-exam-3", sourceIndex: 65 },
  { id: 1066, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "Which evaluation measure is typically applied to machine translation systems?", options: ["F1 Score", "BLEU score", "ROUGE score", "Perplexity"], correct: 1, explanation: "BLEU (Bilingual Evaluation Understudy) measures translation quality by comparing n-gram precision between machine output and reference translations. F1 is for classification, ROUGE is for summarization, and perplexity measures language model quality—BLEU is the standard for machine translation.", source: "nca-genl-exam-3", sourceIndex: 66 },
  { id: 1067, domain: "llm", domainLabel: "LLMs & Generative AI", question: "For EDA in Natural Language Understanding, which technique is key for examining word relationships in text?", options: ["Counting individual word occurrences", "Conducting sentiment analysis", "Producing word clouds for visualization", "Building n-gram models for sequence patterns"], correct: 3, explanation: "N-gram models capture sequential word relationships by analyzing co-occurrence patterns of consecutive word groups (bigrams, trigrams, etc.). This reveals phrase structures and word associations. Word counts, sentiment analysis, and word clouds provide simpler, less relational insights.", source: "nca-genl-exam-3", sourceIndex: 67 },
  { id: 1068, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "How is the performance of a Transformer model typically measured in translation applications?", options: ["Examining lexical variety in translations vs. sources", "Matching model outputs against human translations on benchmarks", "Checking consistency of style across text types", "Assessing syntactic depth vs. professional corpora"], correct: 1, explanation: "Translation performance is measured by comparing model outputs against human reference translations using metrics like BLEU on benchmark datasets (WMT, etc.). Lexical variety, style consistency, and syntactic depth are not standard primary evaluation approaches.", source: "nca-genl-exam-3", sourceIndex: 68 },
  { id: 1069, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What does an autoregressive language model forecast in sequence generation?", options: ["Next token's probability based on prior tokens", "Next token via sampling from historical ones", "Next token with recurrent or LSTM units only", "Next token considering both past and future"], correct: 0, explanation: "Autoregressive models predict the probability distribution of the next token conditioned on all previously generated tokens, generating sequences one token at a time from left to right. They don't require RNN/LSTM units (Transformers are autoregressive too) and only use past context, not future.", source: "nca-genl-exam-3", sourceIndex: 69 },
  { id: 1070, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "In what scenarios are clustering and visualization methods like t-SNE or UMAP most useful?", options: ["Dealing with and filling in missing data values", "Conducting regression for numerical predictions", "Lowering data dimensions and plotting clusters visually", "Extracting and prioritizing key features"], correct: 2, explanation: "t-SNE and UMAP are dimensionality reduction techniques that project high-dimensional data into 2D or 3D spaces for visualization, revealing cluster structures and data relationships. They don't handle missing data, perform regression, or do feature extraction/selection.", source: "nca-genl-exam-3", sourceIndex: 70 },
  { id: 1071, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Why is performing EDA on the dataset crucial when adapting an LLM to a particular task?", options: ["To identify data patterns and irregularities", "To choose the right learning rate", "To estimate fine-tuning compute needs", "To set the ideal layer count"], correct: 0, explanation: "EDA reveals data patterns, distributions, imbalances, outliers, and quality issues that directly affect model performance. Understanding your data before fine-tuning helps ensure appropriate preprocessing and realistic expectations. Learning rate, compute estimation, and layer count are determined through other means.", source: "nca-genl-exam-3", sourceIndex: 71 },
  { id: 1072, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Which statement correctly characterizes TensorRT and ONNX?", options: ["TensorRT for deployment, ONNX for model exchange", "TensorRT for deployment, ONNX for creation", "TensorRT for creation, ONNX for exchange", "TensorRT for creation, ONNX for deployment"], correct: 0, explanation: "TensorRT is NVIDIA's inference optimizer and runtime for deploying optimized models on GPUs. ONNX is an open interchange format enabling models to be exchanged between different frameworks. Together, models can be exported to ONNX then optimized with TensorRT for deployment.", source: "nca-genl-exam-3", sourceIndex: 72 },
  { id: 1073, domain: "tools", domainLabel: "NVIDIA Frameworks & Tools", question: "Select two optimization features offered by NVIDIA's TensorRT.", options: ["Data augmentation", "Variable learning rate", "Multi-Stream Execution", "Layer Fusion", "Residual connections"], correct: [2, 3], multiSelect: true, explanation: "Multi-Stream Execution allows TensorRT to run multiple inference streams in parallel for higher throughput, and Layer Fusion combines compatible layers into single kernels for faster execution. Data augmentation, variable learning rate, and residual connections are training concepts, not TensorRT optimizations.", source: "nca-genl-exam-3", sourceIndex: 73 },
  { id: 1074, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Why is subword tokenization (like BPE) preferred over word-based methods when preparing text for LLM fine-tuning, especially for uncommon words?", options: ["Eliminating punctuation to streamline inputs", "Splitting words into sub-units for better generalization", "Fixing vocabulary size to avoid overflow", "Simplifying computation by removing embeddings"], correct: 1, explanation: "Subword tokenization (BPE, WordPiece, SentencePiece) splits rare or unknown words into known subword units, enabling the model to handle unseen words by composing them from familiar parts. This provides better generalization than word-level tokenization which treats unknown words as out-of-vocabulary.", source: "nca-genl-exam-3", sourceIndex: 74 },
  { id: 1075, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What makes layer normalization vital in Transformer-based architectures?", options: ["Improving generalization to unseen data", "Reducing model size for storage", "Stabilizing training by normalizing feature inputs", "Adding sequence position details"], correct: 2, explanation: "Layer normalization stabilizes training by normalizing the inputs to each layer, reducing internal covariate shift and enabling more consistent gradient flow in deep networks. It doesn't reduce model size, add positional information, or directly improve generalization to unseen data.", source: "nca-genl-exam-3", sourceIndex: 75 },
  // ── Exam 4 (Q76-Q100) ──
  { id: 1076, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "You've created a deep learning model for recommendations and want to assess its performance with A/B testing. What's the rationale for this approach?", options: ["A/B testing allows for a controlled comparison between two versions of the model, helping to identify the version that performs better.", "A/B testing methodologies integrate rationale and technical commentary from the designers of the deep learning model.", "A/B testing ensures that the deep learning model is robust and can handle different variations of input data.", "A/B testing helps in collecting comparative latency data to evaluate the performance of the deep learning model."], correct: 0, explanation: "A/B testing provides a controlled experimental framework where two model versions are compared simultaneously under identical conditions with randomly assigned users. This isolates the effect of model changes on key metrics, enabling data-driven decisions about which version performs better.", source: "nca-genl-exam-4", sourceIndex: 76 },
  { id: 1077, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What are the primary benefits of instructed large language models compared to traditional small language models (under 300M parameters)?", options: ["Trained without the need for labeled data.", "Smaller latency, higher throughput.", "It is easier to explain the predictions.", "Cheaper computational costs during inference.", "Single generic model can do more than one task."], correct: [3, 4], multiSelect: true, explanation: "Instructed LLMs offer cheaper inference than deploying multiple specialized small models and can handle diverse tasks with a single model through instruction-following. Small models may have lower individual latency but require separate models per task, making the overall system more expensive and complex.", source: "nca-genl-exam-4", sourceIndex: 77 },
  { id: 1078, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Which option represents a core feature of Rapid Application Development (RAD)?", options: ["Minimal user feedback during the development process.", "Linear progression through predefined project phases.", "Extensive upfront planning before any development.", "Iterative prototyping with active user involvement."], correct: 3, explanation: "RAD emphasizes iterative prototyping with continuous user feedback, allowing rapid cycles of building, testing, and refining. This contrasts with waterfall approaches that use linear phases and extensive upfront planning. Active user involvement ensures the product meets actual needs.", source: "nca-genl-exam-4", sourceIndex: 78 },
  { id: 1079, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What is the key distinction between forward diffusion and reverse diffusion in diffusion models for Generative AI?", options: ["Forward diffusion focuses on generating a sample from a given noise vector, while reverse diffusion reverses the process by estimating the latent space representation.", "Forward diffusion uses feed-forward networks, while reverse diffusion uses recurrent networks.", "Forward diffusion uses bottom-up processing, while reverse diffusion uses top-down processing.", "Forward diffusion focuses on progressively injecting noise into data, while reverse diffusion focuses on generating new samples from the given noise vectors."], correct: 3, explanation: "In diffusion models, forward diffusion progressively adds Gaussian noise to real data until it becomes pure noise. Reverse diffusion learns to denoise step by step, transforming random noise back into coherent data samples. This reverse process is what enables generation of new content.", source: "nca-genl-exam-4", sourceIndex: 79 },
  { id: 1080, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In transformer-based LLMs, how does multi-head attention enhance model performance over single-head attention, especially for intricate NLP tasks?", options: ["Multi-head attention reduces the model's memory footprint by sharing weights across heads.", "Multi-head attention allows the model to focus on multiple aspects of the input sequence simultaneously.", "Multi-head attention eliminates the need for positional encodings in the input sequence.", "Multi-head attention simplifies the training process by reducing the number of parameters."], correct: 1, explanation: "Multi-head attention runs multiple attention operations in parallel, each learning to focus on different aspects (syntactic, semantic, positional relationships) of the input. This provides richer representations than a single attention head. It doesn't reduce memory, eliminate positional encodings, or simplify training.", source: "nca-genl-exam-4", sourceIndex: 80 },
  { id: 1081, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Which metric is typically employed to gauge the semantic similarity between two text segments?", options: ["Hamming distance", "Cosine similarity", "Jaccard similarity", "Euclidean distance"], correct: 1, explanation: "Cosine similarity measures the angle between two embedding vectors, capturing semantic similarity regardless of magnitude. It is the standard metric for comparing text embeddings. Hamming distance measures bit differences, Jaccard measures set overlap, and Euclidean measures absolute distance—less suitable for high-dimensional semantic spaces.", source: "nca-genl-exam-4", sourceIndex: 81 },
  { id: 1082, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "For assessing a fine-tuned LLM on a text classification task, which experimental method provides reliable performance estimates with imbalanced datasets?", options: ["Single hold-out validation with a fixed test set.", "Stratified k-fold cross-validation.", "Bootstrapping with random sampling.", "Grid search for hyperparameter tuning."], correct: 1, explanation: "Stratified k-fold cross-validation preserves the class distribution in each fold, ensuring reliable evaluation even with imbalanced datasets. Single hold-out may produce unrepresentative splits, bootstrapping doesn't guarantee class proportions, and grid search optimizes hyperparameters rather than evaluating model performance.", source: "nca-genl-exam-4", sourceIndex: 82 },
  { id: 1083, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "You're developing an app to classify animal images and need to train a neural model but labeled data is scarce. Which method can leverage pre-trained model knowledge to boost your new model's performance?", options: ["Dropout", "Random initialization", "Transfer learning", "Early stopping"], correct: 2, explanation: "Transfer learning uses a model pre-trained on a large dataset (like ImageNet) and adapts it to your specific task, requiring far less labeled data. Dropout and early stopping are regularization techniques, and random initialization doesn't leverage any prior knowledge.", source: "nca-genl-exam-4", sourceIndex: 83 },
  { id: 1084, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What sets BLEU scores apart from ROUGE scores in assessing natural language processing models?", options: ["BLEU scores determine the fluency of text generation, while ROUGE scores rate the uniqueness of generated text.", "BLEU scores analyze syntactic structures, while ROUGE scores evaluate semantic accuracy.", "BLEU scores evaluate the 'precision' of translations, while ROUGE scores focus on the 'recall' of summarized text.", "BLEU scores measure model efficiency, whereas ROUGE scores assess computational complexity."], correct: 2, explanation: "BLEU emphasizes precision—how much of the generated output matches the reference. ROUGE emphasizes recall—how much of the reference content is captured in the generated output. BLEU is standard for translation, ROUGE for summarization, reflecting their respective priorities.", source: "nca-genl-exam-4", sourceIndex: 84 },
  { id: 1085, domain: "llm", domainLabel: "LLMs & Generative AI", question: "For an NLP application, which strategy is best for enabling zero-shot learning to categorize text into unseen classes during training?", options: ["Use a pre-trained language model with semantic embeddings.", "Use rule-based systems to manually define the characteristics of each category.", "Train the new model from scratch for each new category encountered.", "Use a large labeled dataset for each possible category."], correct: 0, explanation: "Pre-trained language models with semantic embeddings can generalize to unseen categories by comparing text embeddings to category label embeddings in the same semantic space. Rule-based systems lack generalization, training from scratch requires data, and labeled datasets for every category contradicts zero-shot learning.", source: "nca-genl-exam-4", sourceIndex: 85 },
  { id: 1086, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "You can access training data but not test data. Which assessment technique can evaluate your AI model's performance?", options: ["Cross-validation", "Randomized controlled trial", "Average entropy approximation", "Greedy decoding"], correct: 0, explanation: "Cross-validation splits the training data into multiple folds, using each fold alternately as a validation set while training on the remaining folds. This provides performance estimates without needing separate test data. RCTs are experimental designs, entropy approximation isn't an evaluation method, and greedy decoding is a generation strategy.", source: "nca-genl-exam-4", sourceIndex: 86 },
  { id: 1087, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "What is the core function of LangChain within an LLM workflow?", options: ["To act as a replacement for traditional programming languages.", "To reduce the size of AI foundation models.", "To orchestrate LLM components into complex workflows.", "To directly manage the hardware resources used by LLMs."], correct: 2, explanation: "LangChain is a framework for orchestrating LLM-powered applications by chaining together components like prompts, models, memory, retrieval, and tools into complex workflows. It doesn't replace programming languages, compress models, or manage hardware.", source: "nca-genl-exam-4", sourceIndex: 87 },
  { id: 1088, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Transformers excel in language modeling due to their architecture being well-suited for managing which aspect?", options: ["Translations", "Long sequences", "Class tokens", "Embeddings"], correct: 1, explanation: "Transformers excel at handling long sequences through their self-attention mechanism, which can relate any two positions regardless of distance. This overcomes the long-range dependency limitations of RNNs and LSTMs. While Transformers handle translations, class tokens, and embeddings, their architectural advantage is in sequence length management.", source: "nca-genl-exam-4", sourceIndex: 88 },
  { id: 1089, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "For fine-tuning LLMs, which metric is usually applied to evaluate the fine-tuned model's effectiveness?", options: ["Accuracy on a validation set", "Model size", "Number of layers", "Training duration"], correct: 0, explanation: "Accuracy (or task-specific metrics like F1, BLEU, etc.) on a held-out validation set measures how well the fine-tuned model performs on the target task. Model size, layer count, and training duration describe model characteristics, not performance quality.", source: "nca-genl-exam-4", sourceIndex: 89 },
  { id: 1090, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "What is the main goal of using different image transformation methods (like flipping, rotation, zooming) on a dataset?", options: ["To artificially expand the dataset's size and improve the model's ability to generalize.", "To reduce the computational resources required for training deep learning models.", "To simplify the model's architecture, making it easier to interpret the results.", "To ensure perfect alignment and uniformity across all images in the dataset."], correct: 0, explanation: "Data augmentation applies transformations to create varied versions of training images, effectively increasing dataset size and diversity. This helps the model learn invariant features and generalize better to unseen data. It doesn't reduce compute, simplify architecture, or enforce image uniformity.", source: "nca-genl-exam-4", sourceIndex: 90 },
  { id: 1091, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In transformer-based large language models, how does layer normalization address issues in training deep neural networks?", options: ["It reduces the computational complexity by normalizing the input embeddings.", "It stabilizes training by normalizing the inputs to each layer reducing internal covariate shift.", "It increases the model's capacity by adding additional parameters to each layer.", "It replaces the attention mechanism to improve sequence processing efficiency."], correct: 1, explanation: "Layer normalization stabilizes deep network training by normalizing activations within each layer, reducing the internal covariate shift that causes unstable gradients. This enables more consistent learning across layers. It doesn't reduce complexity, add capacity, or replace attention.", source: "nca-genl-exam-4", sourceIndex: 91 },
  { id: 1092, domain: "llm", domainLabel: "LLMs & Generative AI", question: "Which kind of model is suitable for tasks involving emotion classification?", options: ["Auto-encoder model", "Siamese model", "Encoder model", "SVM model"], correct: 2, explanation: "Encoder models (like BERT) are well-suited for classification tasks including emotion detection because they generate rich bidirectional contextual representations of input text. Auto-encoders are for reconstruction, Siamese models for similarity, and SVMs lack the deep contextual understanding needed for nuanced emotion classification.", source: "nca-genl-exam-4", sourceIndex: 92 },
  { id: 1093, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "In neural networks, what does the vanishing gradient problem describe?", options: ["The problem of overfitting in neural networks.", "The issue of gradients becoming too large during backpropagation, leading to unstable training.", "The problem of underfitting in neural networks.", "The issue of gradients becoming too small during backpropagation"], correct: 3, explanation: "The vanishing gradient problem occurs when gradients become extremely small as they are propagated backward through many layers, causing earlier layers to learn very slowly or not at all. This is distinct from overfitting/underfitting and from the exploding gradient problem (gradients becoming too large).", source: "nca-genl-exam-4", sourceIndex: 93 },
  { id: 1094, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "Which tool is appropriate for choosing training data based on certain keywords?", options: ["ActionScript", "Tableau dashboard", "JSON parser", "Regular expression filter"], correct: 3, explanation: "Regular expressions provide powerful pattern matching for filtering and selecting text data based on keyword patterns, making them ideal for curating training datasets. ActionScript is a programming language, Tableau is for visualization, and JSON parsers handle data format conversion.", source: "nca-genl-exam-4", sourceIndex: 94 },
  { id: 1095, domain: "llm", domainLabel: "LLMs & Generative AI", question: "In the Transformer architecture, which statement accurately describes the Q (query), K (key), and V (value) matrices?", options: ["Q, K and V are randomly initialized weight matrices used for positional encoding.", "K is responsible for computing the attention scores between the query and key vectors.", "Q represents the query vector used to retrieve relevant information from the input sequence.", "V is used to calculate the positional embeddings for each token in the input sequence."], correct: 2, explanation: "In the attention mechanism, Q (query) represents what information a token is looking for, K (key) represents what information each token offers, and V (value) holds the actual content. Attention scores are computed by matching Q against K, then used to weight V. Q/K/V are not for positional encoding.", source: "nca-genl-exam-4", sourceIndex: 95 },
  { id: 1096, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "What is the goal of hyperparameter tuning?", options: ["To achieve the fastest training time possible.", "To find the most performant model settings for a task.", "To generate more features.", "To implement dropout."], correct: 1, explanation: "Hyperparameter tuning systematically searches for the optimal configuration (learning rate, batch size, regularization strength, etc.) that maximizes model performance on the target task. It's not about training speed, feature generation, or implementing specific techniques like dropout.", source: "nca-genl-exam-4", sourceIndex: 96 },
  { id: 1097, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "When evaluating ReLU versus sigmoid activation functions, which assertion holds true?", options: ["ReLU is a linear function while sigmoid is non-linear.", "ReLU is more computationally efficient but sigmoid is better for predicting probabilities.", "ReLU is less computationally efficient than sigmoid, but it is more accurate than sigmoid.", "ReLU and sigmoid both have a range of 0 to 1."], correct: 1, explanation: "ReLU (max(0,x)) is computationally efficient with a simple threshold operation and helps avoid vanishing gradients, but outputs unbounded values. Sigmoid maps to (0,1), making it natural for probability outputs but is more expensive to compute and prone to vanishing gradients. Both are non-linear.", source: "nca-genl-exam-4", sourceIndex: 97 },
  { id: 1098, domain: "deployment", domainLabel: "Deployment, RAG & Ethics", question: "When building an LLM orchestration for chat functions, how can you reduce time and compute for protecting against unsuitable inputs?", options: ["Using an embedding classifier", "Using structured output to call tools", "Using a well-refined text generation prompt", "Using chain-of-thought reasoning"], correct: 0, explanation: "An embedding classifier can quickly categorize inputs as suitable or unsuitable by comparing their embedding vectors against known categories, requiring far less compute than running full LLM inference for content moderation. Structured output, text generation prompts, and chain-of-thought all require full LLM processing.", source: "nca-genl-exam-4", sourceIndex: 98 },
  { id: 1099, domain: "fundamentals", domainLabel: "AI Fundamentals", question: "You're handling a project that requires analyzing and displaying a vast dataset. Which method can reduce its dimensionality and show it in a reduced space?", options: ["Support Vector Machines (SVM)", "T-distributed Stochastic Neighbor Embedding (t-SNE)", "K-means clustering", "Random Forests"], correct: 1, explanation: "t-SNE is a dimensionality reduction technique that maps high-dimensional data to 2D or 3D for visualization while preserving local structure and cluster relationships. SVMs are classifiers, K-means clusters data without reducing dimensions, and Random Forests are ensemble classifiers.", source: "nca-genl-exam-4", sourceIndex: 99 },
  { id: 1100, domain: "llm", domainLabel: "LLMs & Generative AI", question: "What is the main objective of the NLP method known as Named Entity Recognition (NER)?", options: ["To generate natural language responses.", "To identify and classify words or phrases in text.", "To analyze sentiment and emotions in text.", "To perform language translation."], correct: 1, explanation: "NER identifies and categorizes named entities in text into predefined classes such as person names, organizations, locations, dates, and quantities. It is a fundamental NLP task for information extraction, distinct from generation, sentiment analysis, or translation.", source: "nca-genl-exam-4", sourceIndex: 100 }
];

const NCP_GENL_QUESTIONS = [
  // ── Exam 1 (Q1-Q70) ──
  // ── Architecture & Foundations ──
  { id: 2001, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following components are fundamental structural elements of transformer-based Large Language Models (LLMs) that enable effective sequence modeling and contextual understanding?", options: ["Self-attention mechanism", "Convolutional layers", "Positional encoding", "Recurrent connections", "Feed-forward neural networks (FFNN)", "Batch normalization layers"], correct: [0, 2, 4], multiSelect: true, explanation: "Transformers rely on three fundamental components: self-attention mechanisms (to weigh relationships between all tokens), positional encoding (to inject sequence order information), and feed-forward neural networks (to transform representations at each position). Convolutional layers, recurrent connections, and batch normalization are not core Transformer components.", source: "ncp-genl-exam-1", sourceIndex: 1 },
  { id: 2002, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following components are fundamental to the architecture of transformer-based Large Language Models (LLMs)?", options: ["Multi-head self-attention mechanism", "Convolutional neural networks (CNNs)", "Positional encoding", "Recurrent neural networks (RNNs)", "Feed-forward neural network layers", "Dropout layers"], correct: [0, 2, 4], multiSelect: true, explanation: "The core Transformer architecture consists of multi-head self-attention (enabling parallel attention across different representation subspaces), positional encoding (providing sequence order), and feed-forward layers (applying non-linear transformations). CNNs, RNNs, and dropout are not fundamental architectural components of Transformers.", source: "ncp-genl-exam-1", sourceIndex: 2 },
  { id: 2003, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following architectural components or design choices are essential for enabling efficient long-context handling in large language models (LLMs)?", options: ["Utilization of sparse attention mechanisms", "Incorporation of rotary position embeddings (RoPE)", "Replacement of self-attention with convolutional layers", "Use of sliding window attention to limit per-token attention scope", "Increasing embedding dimensionality without changing attention span", "Application of standard fixed positional encoding"], correct: [0, 1, 3], multiSelect: true, explanation: "Efficient long-context handling requires sparse attention (reducing quadratic complexity), rotary position embeddings/RoPE (enabling relative position awareness that generalizes to longer sequences), and sliding window attention (limiting each token's attention scope for efficiency). Replacing attention with convolutions loses global context, increasing embedding size doesn't help attention span, and fixed positional encoding doesn't generalize well to longer sequences.", source: "ncp-genl-exam-1", sourceIndex: 3 },
