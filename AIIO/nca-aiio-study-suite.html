      {showGrid && (
        <div style={{ marginTop: 20, padding: 16, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)', marginBottom: 10 }}>Question Grid</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {questions.map((_, i) => {
              const isSkipped = answers[i] === 'skip';
              const isAnswered = !isSkipped && answers[i] !== undefined && !(answers[i] instanceof Set && answers[i].size === 0);
              const isFlagged = flagged.has(i);
              const isCurrent = i === index;
              let bg = 'var(--surface-el)';
              let border = 'var(--border)';
              let color = 'var(--text-sec)';

              if (isAnswered) { bg = 'rgba(118,185,0,0.15)'; border = 'var(--accent)'; color = 'var(--accent)'; }
              if (isSkipped) { bg = 'rgba(255,77,106,0.1)'; border = 'var(--incorrect)'; color = 'var(--incorrect)'; }
              if (isFlagged) { bg = 'rgba(255,184,77,0.12)'; border = 'var(--warning)'; color = 'var(--warning)'; }
              if (isCurrent) { border = 'var(--text)'; }

              return (
                <button key={i} onClick={() => onJump(i)} style={{
                  width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  background: bg, border: `2px solid ${border}`, color,
                  boxShadow: isCurrent ? '0 0 0 2px var(--text)' : 'none'
                }}>
                  {i + 1}
                </button>
              );
            })}
          </div>
          <div style={{ display: 'flex', gap: 16, marginTop: 12, fontSize: 11, color: 'var(--text-sec)' }}>
            <span>■ Gray: not visited</span>
            <span style={{ color: 'var(--accent)' }}>■ Green: answered</span>
            <span style={{ color: 'var(--warning)' }}>■ Orange: flagged</span>
            <span>□ White border: current</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TEST RESULTS ───
function TestResults({ results, questions, answers, flagged, history, reviewFilter, onSetReviewFilter, onStudyWeak, onReviewQuestion, onRetry, onHome }) {
  const { correct, total, pct, passed, elapsed, domainStats } = results;

  const sortedDomains = Object.entries(domainStats).sort((a, b) => {
    const pA = a[1].total > 0 ? a[1].correct / a[1].total : 0;
    const pB = b[1].total > 0 ? b[1].correct / b[1].total : 0;
    return pA - pB;
  });

  const filteredReview = questions.map((q, i) => ({ q, i })).filter(({ q, i }) => {
    if (reviewFilter === 'incorrect') return answers[i] !== q.correct;
    if (reviewFilter === 'flagged') return flagged.has(i);
    return true;
  });

  return (
    <div style={{ maxWidth: 760, margin: '0 auto', padding: '32px 20px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28 }}>
        <button onClick={onHome} style={{ background: 'none', border: 'none', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 14 }}>← Home</button>
        <span style={{ fontSize: 13, color: 'var(--text-sec)' }}>Test Complete</span>
      </div>

      {/* Score display */}
      <div style={{ textAlign: 'center', marginBottom: 32 }}>
        <h2 style={{ fontSize: 22, marginBottom: 6 }}>{passed ? 'Practice Passed' : 'Needs More Study'}</h2>
        <p style={{ fontSize: 13, color: 'var(--text-sec)', marginBottom: 20 }}>
          {passed ? 'You reached the passing threshold. Keep studying weak areas.' : 'Focus on domains where you scored under 70%.'}
        </p>
        <div style={{
          width: 150, height: 150, borderRadius: '50%',
          border: `4px solid ${passed ? 'var(--correct)' : 'var(--incorrect)'}`,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          margin: '0 auto 16px'
        }}>
          <div style={{ fontSize: 40, fontWeight: 700, color: passed ? 'var(--correct)' : 'var(--incorrect)', lineHeight: 1 }}>{pct}%</div>
          <div style={{ fontSize: 13, color: 'var(--text-sec)' }}>{correct}/{total}</div>
        </div>
        <div style={{
          display: 'inline-block', padding: '4px 16px', borderRadius: 20, fontSize: 13, fontWeight: 600,
          background: passed ? 'rgba(0,229,176,0.12)' : 'rgba(255,77,106,0.12)',
          color: passed ? 'var(--correct)' : 'var(--incorrect)',
          border: `1px solid ${passed ? 'var(--correct)' : 'var(--incorrect)'}`
        }}>
          {passed ? 'PASS' : 'FAIL'} — 70% required
        </div>
        <p style={{ fontSize: 13, color: 'var(--text-sec)', marginTop: 10 }}>
          Time: {formatTime(elapsed)}
        </p>
      </div>

      {/* Domain breakdown */}
      <div style={{ marginBottom: 28 }}>
        <h3 style={{ fontSize: 14, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)', marginBottom: 12 }}>Domain Breakdown (weakest first)</h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {sortedDomains.map(([label, stats]) => {
            const dpct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
            const barColor = dpct >= 80 ? 'var(--correct)' : dpct >= 60 ? 'var(--warning)' : 'var(--incorrect)';
            return (
              <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'var(--surface)', borderRadius: 8, border: '1px solid var(--border)' }}>
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: getDomainColor(label), flexShrink: 0 }} />
                <div style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{label}</div>
                <div style={{ width: 120, height: 6, background: 'var(--surface-el)', borderRadius: 3, overflow: 'hidden', flexShrink: 0 }}>
                  <div style={{ height: '100%', width: `${dpct}%`, background: barColor, borderRadius: 3, transition: 'width 0.5s ease' }} />
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'SF Mono', monospace", color: barColor, minWidth: 80, textAlign: 'right' }}>
                  {stats.correct}/{stats.total} ({dpct}%)
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Focus areas */}
      {sortedDomains.filter(([_, s]) => s.total > 0 && (s.correct / s.total) < 0.7).length > 0 && (
        <div style={{ marginBottom: 28, padding: 18, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--incorrect)', marginBottom: 12 }}>Focus Areas</h3>
          {sortedDomains.filter(([_, s]) => s.total > 0 && (s.correct / s.total) < 0.7).map(([label, stats]) => (
            <div key={label} style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 14, fontWeight: 500, color: getDomainColor(label) }}>{label}</span>
                <button onClick={() => onStudyWeak(label)} style={btnStyle('rgba(118,185,0,0.15)', 'var(--accent)', 32, 12, '1px solid var(--accent)')}>
                  Study These
                </button>
              </div>
              <div style={{ fontSize: 12, color: 'var(--text-sec)' }}>
                Wrong: {stats.wrongIndices.map(i => `Q${i + 1}`).join(', ')}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Session history */}
      {history.length > 1 && (
        <div style={{ marginBottom: 28, padding: 16, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)', marginBottom: 10 }}>Progress Tracker</div>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {history.map((h, i) => (
              <span key={i} style={{ padding: '4px 12px', borderRadius: 6, fontSize: 13, fontWeight: 600, background: h.pct >= 70 ? 'rgba(0,229,176,0.12)' : 'rgba(255,77,106,0.12)', color: h.pct >= 70 ? 'var(--correct)' : 'var(--incorrect)' }}>
                Attempt {i + 1}: {h.pct}%
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Actions */}
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 32 }}>
        <button onClick={onRetry} style={btnStyle('var(--accent)', 'var(--bg)', 44, 15)}>Try Again</button>
        <button onClick={onHome} style={btnStyle('var(--surface-el)', 'var(--text)', 44, 15, '1px solid var(--border)')}>Home</button>
      </div>

      {/* Full question review */}
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, color: 'var(--text-sec)' }}>Question Review</h3>
          <div style={{ display: 'flex', gap: 6 }}>
            {['all', 'incorrect', 'flagged'].map(f => (
              <button key={f} onClick={() => onSetReviewFilter(f)} style={chipStyle(reviewFilter === f)}>
                {f === 'all' ? 'All' : f === 'incorrect' ? 'Incorrect' : 'Flagged'}
              </button>
            ))}
          </div>
        </div>

        {filteredReview.map(({ q, i }) => {
          const userAnswer = answers[i];
          const isSkipped = userAnswer === 'skip';
          const isCorrect = isCorrectAnswer(q, userAnswer);
          const isFlagged = flagged.has(i);
          const hasAnswer = !isSkipped && userAnswer !== undefined && userAnswer !== null && !(userAnswer instanceof Set && userAnswer.size === 0);

          const userAnswerText = isSkipped ? null
            : q.multiSelect && userAnswer instanceof Set
            ? [...userAnswer].map(a => `${LETTERS[a]}`).join(', ')
            : (hasAnswer && typeof userAnswer === 'number' ? `${LETTERS[userAnswer]}. ${q.options[userAnswer]}` : null);

          const correctText = q.multiSelect
            ? q.correct.map(c => `${LETTERS[c]}`).join(', ')
            : `${LETTERS[q.correct]}. ${q.options[q.correct]}`;

          return (
            <div key={i} onClick={() => onReviewQuestion(i)} style={{
              marginBottom: 12, padding: '14px 16px', background: 'var(--surface)', borderRadius: 8, cursor: 'pointer',
              borderLeft: `3px solid ${isCorrect ? 'var(--correct)' : 'var(--incorrect)'}`,
              transition: 'background 0.15s ease'
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-sec)' }}>Q{i + 1}</span>
                  <DomainBadge label={q.domainLabel} />
                  {q.multiSelect && <span style={{ fontSize: 10, color: 'var(--warning)', fontWeight: 600 }}>MULTI</span>}
                  {isFlagged && <span style={{ fontSize: 12, color: 'var(--warning)' }}>⚑</span>}
                </div>
                <span style={{ fontSize: 12, fontWeight: 600, color: isCorrect ? 'var(--correct)' : 'var(--incorrect)' }}>
                  {isCorrect ? '✓ Correct' : '✗ Wrong'}
                </span>
              </div>
              <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 6, lineHeight: 1.4 }}>{q.question}</div>
              <div style={{ fontSize: 13, color: 'var(--text-sec)' }}>
                {isSkipped ? (
                  <span style={{ color: 'var(--incorrect)', fontStyle: 'italic' }}>Didn't know</span>
                ) : hasAnswer && userAnswerText ? (
                  <>Your answer: <span style={{ color: isCorrect ? 'var(--correct)' : 'var(--incorrect)', fontWeight: 600 }}>{userAnswerText}</span></>
                ) : (
                  <span style={{ color: 'var(--incorrect)' }}>Not answered</span>
                )}
                {!isCorrect && <><br/>Correct: <span style={{ color: 'var(--correct)', fontWeight: 600 }}>{correctText}</span></>}
              </div>
            </div>
          );
        })}

        {filteredReview.length === 0 && (
          <p style={{ textAlign: 'center', padding: 24, color: 'var(--text-sec)', fontSize: 14 }}>
            No questions match this filter.
          </p>
        )}
      </div>
    </div>
  );
}

// ─── STYLE HELPERS ───
function btnStyle(bg, color, height = 44, fontSize = 14, border = 'none') {
  return {
    padding: `0 24px`, height, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    borderRadius: 8, fontSize, fontWeight: 600, cursor: 'pointer',
    background: bg, color, border, transition: 'all 0.15s ease'
  };
}

function navBtnStyle(disabled) {
  return {
    padding: '10px 20px', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
    background: 'var(--surface-el)', color: disabled ? 'var(--text-sec)' : 'var(--text)',
    border: '1px solid var(--border)', opacity: disabled ? 0.5 : 1, transition: 'all 0.15s ease'
  };
}

function chipStyle(active) {
  return {
    padding: '6px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
    background: active ? 'rgba(118,185,0,0.15)' : 'var(--surface-el)',
    color: active ? 'var(--accent)' : 'var(--text-sec)',
    border: `1px solid ${active ? 'var(--accent)' : 'var(--border)'}`,
    transition: 'all 0.15s ease'
  };
}

const selectStyle = {
  padding: '6px 10px', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer',
  background: 'var(--surface-el)', color: 'var(--text)', border: '1px solid var(--border)', outline: 'none'
};

  { term: "KV Cache", fullName: "Key-Value Cache", category: "Prompt Engineering", certs: ["GENLP"], definition: "An optimization for autoregressive generation that caches previously computed key and value tensors in attention layers, avoiding redundant computation. Critical for fast inference in long-context LLM applications.", lifecycle: "optimization" },
  // ── Data & Preprocessing ──
  { term: "Data Augmentation", category: "Data & Preprocessing", certs: ["AIIO", "GENL"], definition: "Techniques to artificially increase the diversity and size of training data by applying transformations (rotation, flipping, cropping, noise injection, etc.). NCA-GENL covers enhancing datasets through augmentation to improve model accuracy.", lifecycle: "data preparation" },
  { term: "Feature Engineering", category: "Data & Preprocessing", certs: ["AIIO", "GENL"], definition: "The process of selecting, transforming, and creating input variables (features) from raw data that best represent the underlying problem to the model. Critical for model performance, especially in traditional ML.", lifecycle: "data preparation" },
  { term: "Tokenization", category: "Data & Preprocessing", certs: ["GENLP"], definition: "The process of splitting text into tokens (sub-words, words, or characters) for model input. NCP-GENL covers selecting and training tokenizers, optimizing vocabulary size with BPE and WordPiece strategies to fit tasks and resources.", lifecycle: "data preparation" },
  { term: "BPE", fullName: "Byte Pair Encoding", category: "Data & Preprocessing", certs: ["GENLP"], definition: "A subword tokenization algorithm that iteratively merges the most frequent pairs of characters/tokens. Balances vocabulary size with the ability to handle rare words. Used by GPT models.", lifecycle: "data preparation" },
  { term: "WordPiece", category: "Data & Preprocessing", certs: ["GENLP"], definition: "A subword tokenization algorithm similar to BPE but uses a likelihood-based merge criterion. Used by BERT. Helps handle out-of-vocabulary words while keeping vocabulary size manageable.", lifecycle: "data preparation" },
  { term: "RAG", fullName: "Retrieval-Augmented Generation", category: "Data & Preprocessing", certs: ["GENL", "GENLP"], definition: "An architecture that combines LLM generation with external knowledge retrieval. The model retrieves relevant documents from a knowledge base before generating an answer, reducing hallucinations and keeping responses grounded. NCA-GENL covers building RAG apps; NCP-GENL covers deploying RAG pipelines at scale.", lifecycle: "deployment" },
  { term: "Vector Database", category: "Data & Preprocessing", certs: ["GENL"], definition: "A specialized database optimized for storing and querying high-dimensional vector embeddings. Used in RAG systems and semantic search. Examples include FAISS, Pinecone, Milvus, and Weaviate.", lifecycle: "deployment" },
  { term: "NER", fullName: "Named Entity Recognition", category: "Data & Preprocessing", certs: ["GENL", "GENLP"], definition: "An NLP task that identifies and classifies named entities (persons, organizations, locations, etc.) in text. NCA-GENL covers applying LLMs for NER; NCP-GENL covers developing NER solutions using transformer models.", lifecycle: "model development" },
  // ── Training & Fine-Tuning ──
  { term: "Transfer Learning", category: "Training & Fine-Tuning", certs: ["AIIO", "GENL"], definition: "A technique where a model pre-trained on a large dataset is fine-tuned on a smaller, task-specific dataset. Significantly reduces training time and data requirements. Foundation models like GPT are commonly used as starting points.", lifecycle: "model development" },
  { term: "Mixed Precision Training", category: "Training & Fine-Tuning", certs: ["AIIO", "GENLP"], definition: "Uses lower precision (FP16 or BF16) for most operations while keeping critical operations in FP32. Nearly doubles throughput, reduces memory consumption, while maintaining accuracy through loss scaling.", lifecycle: "training" },
  { term: "Data Parallelism", category: "Training & Fine-Tuning", certs: ["AIIO", "GENLP"], definition: "A distributed training strategy where the model is replicated across multiple GPUs, each processing a different mini-batch of data. Gradients are synchronized (AllReduce) across GPUs after each step.", lifecycle: "training" },
  { term: "Model Parallelism", category: "Training & Fine-Tuning", certs: ["AIIO", "GENLP"], definition: "A distributed training strategy where different parts of the model are placed on different GPUs. Used when a model is too large to fit in a single GPU's memory. Includes tensor parallelism and pipeline parallelism.", lifecycle: "training" },
  { term: "Pipeline Parallelism", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A form of model parallelism that splits the model into sequential stages across GPUs, with micro-batches flowing through the pipeline. Reduces idle time through interleaved scheduling.", lifecycle: "training" },
  { term: "Tensor Parallelism", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A form of model parallelism that splits individual layers (e.g., large matrix multiplications) across multiple GPUs. Each GPU computes a portion of the layer and results are combined. Requires high-bandwidth interconnects like NVLink.", lifecycle: "training" },
  { term: "Expert Parallelism", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A parallelism strategy used in Mixture-of-Experts (MoE) models where different expert sub-networks are placed on different GPUs. Only a subset of experts is activated per token, enabling efficient scaling.", lifecycle: "training" },
  { term: "DDP", fullName: "Distributed Data Parallel", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A PyTorch module for distributed data parallelism that replicates the model on each GPU and synchronizes gradients during backpropagation. Each process handles a portion of the data.", lifecycle: "training" },
  { term: "FSDP", fullName: "Fully Sharded Data Parallel", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "An advanced distributed training strategy that shards model parameters, gradients, and optimizer states across GPUs. Reduces per-GPU memory usage compared to standard DDP, enabling training of larger models.", lifecycle: "training" },
  { term: "Gradient Accumulation", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A technique that accumulates gradients over multiple mini-batches before performing a weight update. Enables effectively larger batch sizes when GPU memory is limited.", lifecycle: "training" },
  { term: "GEMM", fullName: "General Matrix Multiplication", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "The core mathematical operation in neural networks. NCP-GENL covers distributing and optimizing self-attention head GEMM operations across GPUs for large models with limited GPU memory.", lifecycle: "training" },
  { term: "LoRA", fullName: "Low-Rank Adaptation", category: "Training & Fine-Tuning", certs: ["GENL", "GENLP"], definition: "A parameter-efficient fine-tuning technique that freezes the pre-trained model and adds small trainable low-rank matrices to each layer. Dramatically reduces the number of trainable parameters while maintaining model quality.", lifecycle: "training" },
  { term: "P-Tuning", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A parameter-efficient fine-tuning method that prepends trainable continuous prompt embeddings to the input. Only the prompt parameters are trained while the model remains frozen.", lifecycle: "training" },
  { term: "Adapters", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "Small trainable modules inserted between frozen pre-trained layers. A parameter-efficient fine-tuning approach that adds minimal parameters while allowing task-specific adaptation without modifying the base model.", lifecycle: "training" },
  { term: "RLHF", fullName: "Reinforcement Learning from Human Feedback", category: "Training & Fine-Tuning", certs: ["GENL", "GENLP"], definition: "A technique to align LLM outputs with human preferences. A reward model is trained on human-ranked outputs, then used to fine-tune the LLM via reinforcement learning (PPO).", lifecycle: "training" },
  { term: "DPO", fullName: "Direct Preference Optimization", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "An alternative to RLHF that directly optimizes the policy model using preference data, without needing a separate reward model. Simpler and more stable than PPO-based RLHF.", lifecycle: "training" },
  { term: "GRPO", fullName: "Group Relative Policy Optimization", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A reinforcement learning alignment method that evaluates model responses relative to a group of sampled outputs rather than requiring a trained reward model. Used as an alternative to PPO and DPO.", lifecycle: "training" },
  { term: "Contrastive Loss", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A loss function that trains embeddings by pulling similar pairs closer and pushing dissimilar pairs apart in the embedding space.", lifecycle: "training" },
  { term: "Early Stopping", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A regularization technique that monitors validation metrics during training and stops when performance begins to degrade, preventing overfitting.", lifecycle: "training" },
  { term: "Causal Language Modeling", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A training objective where the model predicts the next token given all previous tokens (left-to-right). Used by GPT-style decoder models. Contrasts with masked language modeling used by BERT.", lifecycle: "training" },
  { term: "Masked Language Modeling", fullName: "MLM", category: "Training & Fine-Tuning", certs: ["GENLP"], definition: "A training objective where random tokens are masked and the model predicts them using bidirectional context. Used by BERT-style encoder models.", lifecycle: "training" },
  // ── Optimization & Compression ──
  { term: "Quantization", category: "Optimization", certs: ["AIIO", "GENL", "GENLP"], definition: "The process of reducing model precision (e.g., FP32 \u2192 INT8 or INT4) to decrease model size and increase inference speed with minimal accuracy loss. NCP-GENL distinguishes between post-training quantization (PTQ) and quantization-aware training (QAT).", lifecycle: "optimization" },
  { term: "QAT", fullName: "Quantization-Aware Training", category: "Optimization", certs: ["GENLP"], definition: "A quantization method where the model is trained with simulated low-precision operations, allowing it to learn to compensate for quantization errors. Produces higher accuracy than post-training quantization but requires retraining.", lifecycle: "optimization" },
  { term: "PTQ", fullName: "Post-Training Quantization", category: "Optimization", certs: ["GENLP"], definition: "Quantization applied after training without retraining the model. Faster and simpler than QAT but may incur more accuracy loss. Includes techniques like GPTQ for transformer models.", lifecycle: "optimization" },
  { term: "Knowledge Distillation", category: "Optimization", certs: ["GENLP"], definition: "A compression technique where a smaller 'student' model is trained to replicate the behavior of a larger 'teacher' model. The student learns from the teacher's soft probability outputs, capturing more knowledge than training on hard labels alone.", lifecycle: "optimization" },
  { term: "Pruning", category: "Optimization", certs: ["GENLP"], definition: "Removing redundant or less important weights/neurons from a neural network to reduce model size and computation. Can be unstructured (individual weights) or structured (entire channels/heads).", lifecycle: "optimization" },
  { term: "Layer Fusion", category: "Optimization", certs: ["AIIO", "GENL"], definition: "An optimization technique (used by TensorRT) that combines multiple neural network layers into a single kernel operation, reducing memory bandwidth requirements and kernel launch overhead.", lifecycle: "optimization" },
  { term: "Dynamic Batching", category: "Optimization", certs: ["AIIO", "GENLP"], definition: "A serving optimization (used by Triton/Dynamo-Triton) that groups incoming inference requests into batches on the fly to maximize GPU utilization and throughput, without requiring clients to batch requests themselves.", lifecycle: "deployment" },
  { term: "Sliding Window Attention", category: "Optimization", certs: ["GENLP"], definition: "An attention variant that limits each token's attention to a fixed-size local window rather than the full sequence. Reduces computation from O(n\u00B2) to O(n\u00B7w). Used for handling long sequences efficiently.", lifecycle: "optimization" },
  { term: "Ablation Study", category: "Optimization", certs: ["GENLP"], definition: "A systematic experiment that removes or modifies individual components to measure their contribution to model performance. NCP-GENL covers using beam search, temperature scaling, and systematic ablation studies.", lifecycle: "validation/testing" },
  // ── Evaluation & Metrics ──
  { term: "BLEU", fullName: "Bilingual Evaluation Understudy", category: "Evaluation & Metrics", certs: ["GENLP"], definition: "A metric for evaluating machine-generated text by measuring n-gram precision against reference texts. Commonly used for machine translation and text generation quality assessment. Ranges from 0 to 1 (higher is better).", lifecycle: "validation/testing" },
  { term: "ROUGE", fullName: "Recall-Oriented Understudy for Gisting Evaluation", category: "Evaluation & Metrics", certs: ["GENLP"], definition: "A set of metrics for evaluating text summarization by measuring n-gram recall against reference summaries. ROUGE-1 (unigrams), ROUGE-2 (bigrams), and ROUGE-L (longest common subsequence) are most common.", lifecycle: "validation/testing" },
  { term: "Perplexity", category: "Evaluation & Metrics", certs: ["GENLP"], definition: "A metric measuring how well a language model predicts a text sample. Lower perplexity means the model is more confident and accurate. Calculated as the exponential of the average cross-entropy loss.", lifecycle: "validation/testing" },
  { term: "LLM-as-a-Judge", category: "Evaluation & Metrics", certs: ["GENLP"], definition: "Using a powerful LLM to evaluate the outputs of another LLM, combining quantitative scoring with qualitative assessment. NCP-GENL covers combining metrics (BLEU, ROUGE, perplexity) with LLM-as-a-judge and human-in-the-loop reviews.", lifecycle: "validation/testing" },
  { term: "Cross-Validation", category: "Evaluation & Metrics", certs: ["GENL"], definition: "A technique for evaluating model performance by splitting data into multiple folds, training on some and testing on others. Provides a more reliable estimate of generalization performance than a single train/test split.", lifecycle: "validation/testing" },
  { term: "Loss Function", category: "Evaluation & Metrics", certs: ["GENL"], definition: "A mathematical function that measures the difference between predicted and actual outputs. Common examples: cross-entropy (classification), MSE (regression), contrastive loss (embeddings). Guides model training by providing the signal for gradient descent.", lifecycle: "training" },
  { term: "A/B Testing (Model)", category: "Evaluation & Metrics", certs: ["AIIO", "GENL", "GENLP"], definition: "Deploying multiple model versions simultaneously and routing traffic to each to compare performance metrics in production.", lifecycle: "deployment" },
  { term: "NeMo Evaluator", category: "Evaluation & Metrics", certs: ["GENLP"], definition: "A tool in the NeMo ecosystem for standardized evaluation of LLM performance across benchmarks. Supports automated evaluation workflows for comparing model versions.", lifecycle: "validation/testing" },
  // ── Deployment & Monitoring ──
  { term: "Model Drift", category: "Deployment & Monitoring", certs: ["AIIO", "GENLP"], definition: "The degradation of model performance over time as the statistical properties of real-world data change compared to the training data. Requires continuous monitoring and periodic retraining.", lifecycle: "monitoring" },
  { term: "Hallucination", category: "Deployment & Monitoring", certs: ["GENL", "GENLP"], definition: "When an LLM generates plausible-sounding but factually incorrect or fabricated information. Mitigated through fine-tuning, constrained decoding, RAG, and NeMo Guardrails.", lifecycle: "monitoring" },
  { term: "Model Versioning", category: "Deployment & Monitoring", certs: ["GENLP"], definition: "Managing multiple versions of deployed models for rollback, comparison, and gradual rollout. Triton/Dynamo-Triton supports model versioning natively.", lifecycle: "deployment" },
  { term: "Observability", category: "Deployment & Monitoring", certs: ["GENLP"], definition: "The ability to understand the internal state of a production ML system through logs, metrics, traces, and anomaly detection. Covers monitoring dashboards, error tracking, and ensuring continuous uptime.", lifecycle: "monitoring" },
  // ── AI Ethics & Safety ──
  { term: "Trustworthy AI", category: "AI Ethics & Safety", certs: ["GENL", "GENLP"], definition: "The practice of creating AI systems that are ethical, energy-conscious, transparent, fair, and verifiable. NCA-GENL covers ethical principles and data privacy; NCP-GENL covers auditing for bias, implementing guardrails, and monitoring for compliance.", lifecycle: "deployment" },
  { term: "Bias Detection & Mitigation", category: "AI Ethics & Safety", certs: ["GENL", "GENLP"], definition: "Techniques for identifying and reducing unfair biases in AI models, including dataset auditing, fairness metrics, debiasing algorithms, and adversarial evaluation.", lifecycle: "validation/testing" },
  // ── Core ML Concepts ──
  { term: "Activation Function", category: "Core ML Concepts", certs: ["GENL"], definition: "A mathematical function applied to a neuron's output to introduce non-linearity. Common types: ReLU (most popular for hidden layers), sigmoid, tanh, GELU (used in transformers), and softmax (for output probabilities).", lifecycle: "model development" },
  { term: "Backpropagation", category: "Core ML Concepts", certs: ["GENL"], definition: "The algorithm for computing gradients of the loss function with respect to each weight in the network, working backwards from output to input layers. Combined with gradient descent, it is the primary training algorithm for neural networks.", lifecycle: "training" },
  { term: "XGBoost", category: "Core ML Concepts", certs: ["GENL"], definition: "A popular gradient boosting library for structured/tabular data, known for high performance in competitions and production ML. NCA-GENL covers using XGBoost alongside other ML algorithms for data science problems.", lifecycle: "model development" },
  { term: "Overfitting", category: "Core ML Concepts", certs: ["GENL", "GENLP"], definition: "When a model learns noise and details specific to the training data rather than the underlying patterns, resulting in poor generalization. Addressed through regularization, dropout, early stopping, data augmentation, and cross-validation.", lifecycle: "training" },
  // ── Gap Coverage Terms ──
  { term: "GPUDirect Storage", category: "Networking", certs: ["AIIO"], definition: "Enables a direct data path between storage devices (local NVMe or remote) and GPU memory, bypassing the CPU and system memory. Distinct from GPUDirect RDMA (which is GPU-to-network-adapter). Critical for feeding training data to GPUs at maximum speed.", lifecycle: "training" },
  { term: "NVIDIA Container Toolkit", category: "Infrastructure & Operations", certs: ["AIIO"], definition: "Enables Docker and Kubernetes containers to access and utilize host NVIDIA GPUs. Provides the runtime components needed for GPU-accelerated containers, including the NVIDIA container runtime and device support.", lifecycle: "deployment" },
  { term: "BMC", fullName: "Baseboard Management Controller", category: "Infrastructure & Operations", certs: ["AIIO"], definition: "Provides out-of-band remote hardware management including power cycling, BIOS access, and console access independently of the main operating system. Essential for lights-out management of data center servers.", lifecycle: "monitoring" },
  { term: "Grace Hopper Superchip", category: "Hardware & GPUs", certs: ["AIIO"], definition: "A combined Grace CPU and Hopper GPU in a single module connected via NVLink-C2C (chip-to-chip) with 900 GB/s coherent bandwidth. Designed for workloads requiring tight CPU-GPU coupling, such as large-model training and inference with massive datasets.", lifecycle: "training" },
  { term: "H200", category: "Hardware & GPUs", certs: ["AIIO"], definition: "An enhanced version of the H100 GPU featuring 141GB of HBM3e memory (vs H100's 80GB HBM3), providing significantly more memory capacity and bandwidth. Same Hopper architecture but optimized for memory-intensive LLM inference workloads.", lifecycle: "training" },
  { term: "Blackwell", category: "Hardware & GPUs", certs: ["AIIO"], definition: "NVIDIA's GPU architecture succeeding Hopper. Includes B100 and B200 GPUs with significant improvements in compute performance and energy efficiency. Designed for next-generation AI training and inference workloads.", lifecycle: "training" },
  { term: "Omniverse", category: "Software & Frameworks", certs: ["AIIO"], definition: "NVIDIA's platform for creating and operating digital twins — virtual replicas of physical environments. Used in manufacturing for factory simulation, predictive maintenance, and design collaboration.", lifecycle: "deployment" },
  { term: "Run:ai", category: "Infrastructure & Operations", certs: ["AIIO"], definition: "A GPU orchestration platform (now part of NVIDIA) that provides GPU pooling across clusters, fractional GPU allocation, and intelligent scheduling for AI workloads. Maximizes GPU utilization across teams and projects.", lifecycle: "deployment" },
  { term: "Dynamo", category: "Software & Frameworks", certs: ["AIIO"], definition: "NVIDIA's next-generation inference engine designed for optimized serving of large language models. Provides advanced features for efficient multi-GPU inference deployment.", lifecycle: "deployment" },
  { term: "Supervised Learning", category: "Core ML Concepts", certs: ["AIIO", "GENL"], definition: "A machine learning approach where the model learns from labeled training data, mapping inputs to known outputs. Examples include image classification, spam detection, and regression. Contrasts with unsupervised learning (no labels) and reinforcement learning (reward signals).", lifecycle: "training" },
  { term: "CNN", fullName: "Convolutional Neural Network", category: "Core ML Concepts", certs: ["AIIO", "GENL"], definition: "A neural network architecture specifically designed for processing grid-like data such as images. Uses convolutional filters to automatically detect features like edges, textures, and patterns. Widely used for image classification, object detection, and medical imaging.", lifecycle: "model development" },
  { term: "RNN", fullName: "Recurrent Neural Network", category: "Core ML Concepts", certs: ["AIIO", "GENL"], definition: "A neural network architecture designed for sequential data where the output depends on previous computations. Uses hidden state to maintain memory of past inputs. Largely replaced by Transformers for most NLP tasks but still used in some time-series applications.", lifecycle: "model development" },
];

const GLOSSARY_CATEGORIES = [...new Set(GLOSSARY_TERMS.map(t => t.category))];
const LIFECYCLE_STAGES = ["data preparation", "model development", "training", "validation/testing", "optimization", "deployment", "monitoring"];
const ALL_CERTS = ["AIIO", "GENL", "GENLP"];

// ─── GLOSSARY SCREEN ───
function GlossaryScreen({ onHome }) {
  const [search, setSearch] = useState('');
  const [selectedCategory, setSelectedCategory] = useState('all');
  const [selectedLifecycle, setSelectedLifecycle] = useState('all');
  const [selectedCert, setSelectedCert] = useState('all');
  const [expandedTerms, setExpandedTerms] = useState(new Set());

  const filtered = useMemo(() => {
    let terms = GLOSSARY_TERMS;
    if (selectedCategory !== 'all') terms = terms.filter(t => t.category === selectedCategory);
    if (selectedLifecycle !== 'all') terms = terms.filter(t => t.lifecycle === selectedLifecycle);
    if (selectedCert !== 'all') terms = terms.filter(t => t.certs && t.certs.includes(selectedCert));
    if (search.trim()) {
      const s = search.toLowerCase();
      terms = terms.filter(t => t.term.toLowerCase().includes(s) || (t.fullName && t.fullName.toLowerCase().includes(s)) || t.definition.toLowerCase().includes(s));
    }
    return terms;
  }, [search, selectedCategory, selectedLifecycle, selectedCert]);

  function toggleExpand(term) {
    setExpandedTerms(prev => { const next = new Set(prev); next.has(term) ? next.delete(term) : next.add(term); return next; });
  }
  function expandAll() { setExpandedTerms(new Set(filtered.map(t => t.term))); }
  function collapseAll() { setExpandedTerms(new Set()); }

  const lcColors = { "data preparation": "#5BA8FF", "model development": "#A78BFA", "training": "#FFB84D", "validation/testing": "#F97316", "optimization": "#00E5B0", "deployment": "#76B900", "monitoring": "#FF4D6A" };

  return (
    <div style={{ maxWidth: 840, margin: '0 auto', padding: '24px 20px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24, flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <button onClick={onHome} style={{ background: 'var(--surface-el)', border: '1px solid var(--border)', borderRadius: 8, padding: '8px 16px', color: 'var(--text)', cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>{'\u2190'} Home</button>
          <h1 style={{ fontSize: 22, fontWeight: 700 }}>Glossary</h1>
          <span style={{ fontSize: 12, padding: '4px 10px', borderRadius: 12, background: 'rgba(118,185,0,0.15)', color: 'var(--accent)', fontWeight: 600 }}>{filtered.length} terms</span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={expandAll} style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 12px', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 11 }}>Expand all</button>
          <button onClick={collapseAll} style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 12px', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 11 }}>Collapse all</button>
        </div>
      </div>

      {/* Certification filter */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 20px', marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: 'var(--text-sec)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Filter by Certification</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <button onClick={() => setSelectedCert('all')} style={{
            padding: '7px 16px', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
            background: selectedCert === 'all' ? 'rgba(118,185,0,0.15)' : 'var(--surface-el)',
            color: selectedCert === 'all' ? 'var(--accent)' : 'var(--text-sec)',
            border: `1px solid ${selectedCert === 'all' ? 'var(--accent)' : 'var(--border)'}`,
          }}>All Certs</button>
          {ALL_CERTS.map(c => (
            <button key={c} onClick={() => setSelectedCert(selectedCert === c ? 'all' : c)} style={{
              padding: '7px 16px', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
              background: selectedCert === c ? CERT_COLORS[c] + '22' : 'var(--surface-el)',
              color: selectedCert === c ? CERT_COLORS[c] : 'var(--text-sec)',
              border: `1px solid ${selectedCert === c ? CERT_COLORS[c] : 'var(--border)'}`,
            }}>{CERT_LABELS[c]}</button>
          ))}
        </div>
      </div>

      {/* AI Lifecycle visual */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 20px', marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: 'var(--text-sec)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>AI Development Lifecycle</div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', alignItems: 'center' }}>
          {LIFECYCLE_STAGES.map((stage, i) => (
            <React.Fragment key={stage}>
              <button onClick={() => setSelectedLifecycle(selectedLifecycle === stage ? 'all' : stage)} style={{
                padding: '6px 12px', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer',
                background: selectedLifecycle === stage ? lcColors[stage] + '22' : 'var(--surface-el)',
                color: selectedLifecycle === stage ? lcColors[stage] : 'var(--text-sec)',
                border: `1px solid ${selectedLifecycle === stage ? lcColors[stage] : 'var(--border)'}`,
                transition: 'all 0.15s ease'
              }}>{stage}</button>
              {i < LIFECYCLE_STAGES.length - 1 && <span style={{ color: 'var(--text-sec)', fontSize: 11 }}>{'\u2192'}</span>}
            </React.Fragment>
          ))}
          {selectedLifecycle !== 'all' && (
            <button onClick={() => setSelectedLifecycle('all')} style={{ marginLeft: 8, background: 'none', border: 'none', color: 'var(--text-sec)', cursor: 'pointer', fontSize: 11, textDecoration: 'underline' }}>clear</button>
          )}
        </div>
      </div>

      {/* Search + category filter */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <input type="text" placeholder="Search terms..." value={search} onChange={e => setSearch(e.target.value)} style={{ flex: '1 1 250px', padding: '10px 14px', borderRadius: 8, border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text)', fontSize: 14, outline: 'none' }} />
        <select value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)} style={{ ...selectStyle, padding: '10px 14px', fontSize: 13 }}>
          <option value="all">All Categories</option>
          {GLOSSARY_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {/* Terms list */}
      {filtered.length === 0 ? (
        <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sec)' }}>No terms match your filters.</div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {filtered.map(t => {
            const expanded = expandedTerms.has(t.term);
            return (
              <div key={t.term} onClick={() => toggleExpand(t.term)} style={{ background: 'var(--surface)', border: `1px solid ${expanded ? 'var(--accent)' : 'var(--border)'}`, borderRadius: 10, padding: '14px 18px', cursor: 'pointer', transition: 'all 0.15s ease' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--accent)' }}>{t.term}</span>
                    {t.fullName && <span style={{ fontSize: 13, color: 'var(--text-sec)' }}>({t.fullName})</span>}
                    {t.certs && t.certs.map(c => (
                      <span key={c} style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, fontWeight: 700, background: CERT_COLORS[c] + '22', color: CERT_COLORS[c], letterSpacing: 0.3 }}>{CERT_LABELS[c]}</span>
                    ))}
                    {t.lifecycle && <span style={{ fontSize: 10, padding: '2px 8px', borderRadius: 4, fontWeight: 600, background: (lcColors[t.lifecycle] || '#666') + '22', color: lcColors[t.lifecycle] || '#666' }}>{t.lifecycle}</span>}
                  </div>
                  <span style={{ color: 'var(--text-sec)', fontSize: 14, transition: 'transform 0.2s', transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', flexShrink: 0 }}>{'\u25BC'}</span>
                </div>
                {expanded && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)', fontSize: 14, lineHeight: 1.7, color: 'var(--text)' }}>{t.definition}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <p style={{ marginTop: 24, fontSize: 12, color: 'var(--text-sec)', textAlign: 'center' }}>Click any term to expand {'\u00B7'} Filter by certification, lifecycle stage, or category</p>
    </div>
  );
}

// ─── MOUNT ───
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
