  { id: 2226, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of training data curation for large language models (LLMs), which of the following practices most effectively reduces the risk of the model learning spurious correlations and harmful biases from the training corpus?", options: ["Including only single-source data to ensure consistency in writing style and domain coverage", "Curating a diverse, balanced dataset with rigorous deduplication, toxicity filtering, and domain coverage verification", "Maximizing dataset size by retaining all available data without filtering to preserve rare patterns", "Using synthetic data exclusively to eliminate real-world biases from the training corpus"], correct: 1, explanation: "Diverse, balanced curation with deduplication, toxicity filtering, and domain verification prevents spurious correlations and biases. Single-source data introduces source bias, unfiltered data propagates biases, and synthetic-only data introduces different biases.", source: "ncp-genl-exam-4", sourceIndex: 16 },
  { id: 2227, domain: "training", domainLabel: "Training & Fine-Tuning", question: "Which of the following techniques most effectively mitigates catastrophic forgetting in large language models (LLMs) when continually fine-tuning on new domain-specific datasets while retaining general capabilities?", options: ["Retraining the model from scratch on a combined dataset of old and new domain data", "Applying elastic weight consolidation (EWC) or experience replay with samples from previous training distributions", "Increasing the learning rate to accelerate adaptation to the new domain data", "Freezing all model layers and only training a new output head for the new domain"], correct: 1, explanation: "EWC protects critical weights and experience replay maintains prior task performance, together preventing catastrophic forgetting. Retraining is expensive, high learning rates accelerate forgetting, and freezing everything limits adaptation.", source: "ncp-genl-exam-4", sourceIndex: 17 },
  { id: 2250, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of deploying large language models (LLMs) for specialized enterprise applications, which approach most effectively adapts the model to domain-specific language and tasks while minimizing computational overhead?", options: ["Retraining the model from scratch on domain-specific data for full adaptation", "Applying parameter-efficient fine-tuning (PEFT) methods such as LoRA on curated domain-specific datasets while keeping the base model weights frozen", "Expanding the tokenizer's vocabulary with domain terms and retraining only the embedding layer", "Increasing the model's context window to accommodate longer domain-specific documents"], correct: 1, explanation: "PEFT/LoRA enables rapid domain adaptation with minimal compute by training only small additional parameters. Retraining from scratch is expensive, vocabulary expansion alone doesn't adapt behavior, and larger context doesn't add domain knowledge.", source: "ncp-genl-exam-4", sourceIndex: 40 },
  { id: 2275, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs) for domain adaptation, which combination of techniques most effectively prevents catastrophic forgetting of general capabilities while improving domain-specific performance?", options: ["Full fine-tuning on domain-specific data with a high learning rate to accelerate adaptation", "Using parameter-efficient fine-tuning (e.g., LoRA) combined with a mixed training strategy that includes a proportion of general pretraining data to preserve existing capabilities", "Freezing all model parameters and training only a new classification head for the target domain", "Retraining the full model from scratch on a combined dataset of general and domain-specific data"], correct: 1, explanation: "PEFT preserves general knowledge in frozen weights while mixed training maintains general capabilities. Full fine-tuning risks forgetting, frozen parameters limit adaptation, and retraining from scratch wastes pretrained knowledge and is expensive.", source: "ncp-genl-exam-4", sourceIndex: 65 },
  // ── Deployment & Optimization ──
  { id: 2234, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating large language models (LLMs) for generative tasks, which evaluation framework most comprehensively captures both output quality and safety?", options: ["Automated perplexity and BLEU score evaluation on held-out test sets", "A multi-dimensional evaluation combining automated metrics (BERTScore, ROUGE), human evaluation for coherence and factual accuracy, and red-teaming for safety assessment", "Exact match accuracy on closed-ended benchmark datasets", "Single-metric evaluation using only human preference ratings collected through pairwise comparisons"], correct: 1, explanation: "Multi-dimensional evaluation combining automated metrics, human evaluation, and red-teaming provides comprehensive quality and safety assessment. Single metrics are incomplete, benchmarks don't capture generation quality, and pairwise preferences alone miss safety issues.", source: "ncp-genl-exam-4", sourceIndex: 25 },
  { id: 2235, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In optimizing latency and throughput for large language models (LLMs) in generative AI applications, which technique is most effective for reducing inference time without significantly compromising model accuracy?", options: ["Quantization of model weights to lower precision formats (e.g., INT8)", "Increasing the batch size during inference to maximize GPU utilization", "Applying dropout layers during inference to reduce overfitting", "Using larger model architectures to leverage more parameters for faster computation"], correct: 0, explanation: "Quantization reduces computation and memory bandwidth with minimal accuracy loss. Larger batch sizes increase throughput but not per-request latency, dropout is a training technique, and larger models increase latency.", source: "ncp-genl-exam-4", sourceIndex: 26 },
  { id: 2236, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of managing updates for large language models (LLMs) within a production environment, which strategy best balances model performance improvements and operational stability during incremental model updates?", options: ["Deploy the updated model directly to production without A/B testing to minimize deployment time.", "Use a canary deployment approach to gradually roll out the updated model to a subset of users while monitoring key performance indicators before full deployment.", "Perform a full rollback of the previous model version immediately upon any detected performance degradation.", "Update the model only during scheduled maintenance windows without real-time monitoring."], correct: 1, explanation: "Canary deployment gradually rolls out changes while monitoring KPIs, balancing improvement and stability. Direct deployment risks widespread issues, immediate rollback is reactive, and maintenance-window-only updates delay improvements.", source: "ncp-genl-exam-4", sourceIndex: 27 },
  { id: 2237, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of ensuring high availability and fault tolerance for large language model (LLM) deployments in production, which of the following strategies most effectively minimizes service disruption during infrastructure failures?", options: ["Deploying a single large LLM instance on the most powerful available hardware", "Implementing a multi-region deployment with active-active or active-passive failover, combined with health checks and automated traffic rerouting", "Using a monolithic deployment architecture to reduce operational complexity", "Relying solely on hardware redundancy within a single data center"], correct: 1, explanation: "Multi-region deployment with failover, health checks, and automated rerouting provides maximum availability. Single instances lack redundancy, monolithic architectures can't isolate failures, and single-datacenter redundancy doesn't protect against regional outages.", source: "ncp-genl-exam-4", sourceIndex: 28 },
  { id: 2238, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for production inference, which combination of optimization techniques most effectively reduces latency while maintaining output quality for high-throughput applications?", options: ["Full-precision (FP32) inference with single-request processing and no caching", "INT8 quantization combined with KV-cache optimization and continuous batching", "Model pruning combined with high-rank weight decomposition and beam search decoding", "Increasing context window size while disabling tokenization normalization"], correct: 1, explanation: "INT8 quantization reduces computation, KV-cache eliminates redundant attention computation, and continuous batching maximizes GPU utilization. FP32 without optimization is slow, pruning + high-rank is contradictory, and larger context with disabled normalization doesn't help.", source: "ncp-genl-exam-4", sourceIndex: 29 },
  { id: 2239, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of optimizing large language models (LLMs) for deployment on resource-constrained devices, which combination of model compression techniques most effectively reduces memory footprint and inference latency while maintaining acceptable task performance?", options: ["Increasing the number of attention heads to distribute computation across more parameters", "Applying structured pruning to remove redundant attention heads and neurons, combined with post-training quantization to INT8 or INT4 precision", "Expanding the model's embedding dimensions to improve representational quality at a lower layer count", "Fine-tuning the model on device-specific data to improve efficiency without any architectural changes"], correct: 1, explanation: "Structured pruning removes redundant components and quantization reduces precision—together dramatically reducing memory and latency for constrained devices. More attention heads or larger embeddings increase resources, and fine-tuning alone doesn't reduce model size.", source: "ncp-genl-exam-4", sourceIndex: 30 },
  { id: 2240, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of distributed training for large language models (LLMs), which combination of parallelism strategies most effectively addresses both memory constraints and communication overhead when training models with hundreds of billions of parameters across large GPU clusters?", options: ["Data parallelism alone with synchronous gradient updates using all-reduce operations", "3D parallelism combining tensor parallelism, pipeline parallelism, and data parallelism to distribute model weights, activations, and training batches across GPU clusters", "Model parallelism alone by sequentially partitioning transformer layers across available GPUs", "Gradient accumulation without any form of model or tensor parallelism"], correct: 1, explanation: "3D parallelism optimally distributes across three dimensions for maximum efficiency at scale. Pure data parallelism has high communication overhead, model parallelism alone creates pipeline bubbles, and no parallelism doesn't scale.", source: "ncp-genl-exam-4", sourceIndex: 31 },
  { id: 2241, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of training infrastructure for large language models (LLMs), which combination of techniques most effectively reduces GPU memory consumption during backpropagation without significantly increasing training time?", options: ["Using full-precision (FP32) training and increasing batch size to maximize GPU utilization", "Applying gradient checkpointing combined with mixed precision training (BF16/FP16) and ZeRO optimizer state sharding", "Reducing model depth by removing transformer layers to lower activation memory requirements", "Disabling data parallelism and relying solely on model parallelism to reduce per-GPU memory"], correct: 1, explanation: "Gradient checkpointing saves memory by recomputing activations, mixed precision halves memory for weights/activations, and ZeRO shards optimizer state across nodes. FP32 + larger batches increase memory, removing layers changes the model, and disabling data parallelism doesn't reduce per-GPU memory.", source: "ncp-genl-exam-4", sourceIndex: 32 },
  { id: 2242, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of scalable infrastructure for generative AI large language models (LLMs), which combination of strategies most effectively manages variable inference workloads while minimizing cost and maintaining low latency?", options: ["Pre-allocating maximum expected GPU capacity at all times to guarantee headroom without auto-scaling", "Implementing horizontal auto-scaling with load balancing, request queuing, model quantization, and dynamic batching to handle traffic spikes efficiently", "Deploying a fixed number of full-precision model replicas without any batching or caching optimization", "Using CPU-based inference for all requests to reduce GPU costs, accepting higher latency as a tradeoff"], correct: 1, explanation: "Auto-scaling + load balancing + queuing + quantization + dynamic batching optimally manages variable traffic. Pre-allocated maximum capacity wastes resources, fixed replicas can't adapt, and CPU inference is too slow for LLMs.", source: "ncp-genl-exam-4", sourceIndex: 33 },
  { id: 2243, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building scalable generative AI pipelines, which architectural pattern most effectively ensures fault tolerance, high throughput, and loose coupling between data ingestion, preprocessing, and model inference stages?", options: ["A monolithic architecture where all pipeline stages execute sequentially on a single compute node", "An event-driven microservices architecture using message queues (e.g., Kafka or RabbitMQ) to orchestrate asynchronous, decoupled data flow between pipeline stages", "A tightly coupled architecture where preprocessing and inference are co-located to minimize network latency", "A batch processing pipeline that processes all data at fixed scheduled intervals without real-time capabilities"], correct: 1, explanation: "Event-driven microservices with message queues provide decoupled, fault-tolerant, high-throughput pipelines where stages scale independently. Monolithic can't scale independently, tightly coupled propagates failures, and batch-only processing lacks real-time capability.", source: "ncp-genl-exam-4", sourceIndex: 34 },
  { id: 2244, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM inference optimization for production deployments, which technique most effectively reduces memory bandwidth requirements and computational overhead during the autoregressive decoding phase?", options: ["Gradient checkpointing to recompute activations during each decoding step", "Mixed precision training to reduce weight precision during the forward pass", "Key-Value (KV) caching to store and reuse previously computed key and value tensors across decoding steps", "Speculative decoding with full verification of all draft tokens before acceptance"], correct: 2, explanation: "KV caching stores and reuses previously computed key-value pairs, avoiding redundant computation at each decoding step. Gradient checkpointing is for training, mixed precision is for training efficiency, and speculative decoding is a different optimization strategy.", source: "ncp-genl-exam-4", sourceIndex: 35 },
  { id: 2251, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building LLM-powered autonomous agents, which design pattern most effectively enables reliable multi-step task execution by interleaving reasoning and action with real-world feedback?", options: ["Chain-of-thought prompting without access to external tools", "Retrieval-Augmented Generation (RAG) with a fixed retrieval pipeline", "ReAct (Reasoning + Acting) framework combining interleaved reasoning traces and tool-use actions with iterative observation feedback loops", "Standard instruction-following with a single system prompt and no iterative feedback mechanism"], correct: 2, explanation: "ReAct interleaves reasoning, tool actions, and observation feedback, enabling dynamic plan adjustment based on real results. CoT without tools can't act, RAG without replanning can't adapt, and static prompts lack iterative capability.", source: "ncp-genl-exam-4", sourceIndex: 41 },
  { id: 2252, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of multi-agent LLM systems for complex enterprise task automation, which orchestration pattern most effectively ensures reliable task decomposition, parallel execution, and result synthesis?", options: ["A hierarchical orchestrator-subagent pattern where a central planner decomposes tasks, assigns subtasks to specialized agents, validates intermediate results, and aggregates the final output", "A fully decentralized peer-to-peer agent topology without central coordination or validation", "A sequential pipeline where each agent processes the complete task and passes its output to the next agent", "A single monolithic agent with access to all tools and no decomposition of tasks"], correct: 0, explanation: "Hierarchical orchestration enables decomposition, parallel delegation, validation, and aggregation. Peer-to-peer lacks guarantees, sequential can't parallelize, and monolithic agents don't leverage specialization.", source: "ncp-genl-exam-4", sourceIndex: 42 },
  { id: 2253, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building LLM-based applications requiring structured outputs (e.g., JSON), which combination of techniques most effectively ensures format compliance and minimizes parsing failures in production?", options: ["Relying solely on system prompt instructions to enforce the desired output schema", "Combining grammar-based constrained decoding with output schema validation and retry logic for malformed responses", "Using high-temperature sampling to generate diverse outputs and filtering for schema-compliant ones", "Post-processing all outputs with a rule-based parser that coerces any text into the target format"], correct: 1, explanation: "Constrained decoding enforces structure at generation time, schema validation catches issues, and retry logic handles edge cases. Prompt-only instructions don't guarantee format, high-temperature increases malformation, and coercion produces invalid data.", source: "ncp-genl-exam-4", sourceIndex: 43 },
  { id: 2254, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of managing LLM context across long multi-turn conversations, which architectural pattern most effectively handles context window limitations while maintaining dialogue coherence?", options: ["Resetting the entire conversation context at the start of each session to prevent context overflow", "Implementing a sliding window with dynamic summarization that compresses older dialogue turns while retaining recent context and key information", "Storing the complete raw conversation history and prepending it to each prompt regardless of length", "Fine-tuning the model on user-specific conversation history to encode preferences into model parameters"], correct: 1, explanation: "Sliding window + summarization keeps recent context detailed while compressing older turns, managing limits while maintaining coherence. Resetting loses context, full history exceeds limits, and per-user fine-tuning is impractical.", source: "ncp-genl-exam-4", sourceIndex: 44 },
  { id: 2255, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM systems, which prompt management strategy most effectively ensures consistency, auditability, and controlled rollout of prompt updates across large-scale deployments?", options: ["Embedding all prompts directly into application code to ensure tight coupling with inference logic", "Maintaining a centralized prompt registry with version control, access controls, automated validation pipelines, and staged rollout capabilities", "Allowing individual teams to independently manage their own prompt libraries without centralized standardization", "Fine-tuning prompts into model weights to eliminate runtime prompt management overhead"], correct: 1, explanation: "Centralized registry with version control, access controls, validation, and staged rollout ensures consistency and auditability. Hardcoded prompts are inflexible, decentralized management causes drift, and weight-embedded prompts can't be updated without retraining.", source: "ncp-genl-exam-4", sourceIndex: 45 },
  { id: 2256, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of LLM application reliability engineering, which combination of practices most effectively ensures high availability and graceful degradation during traffic spikes or model failures?", options: ["Deploying a single large model instance with manual failover and no auto-scaling", "Implementing circuit breakers, fallback responses, load balancing across replicas, health checks, and autoscaling policies to handle failures and traffic spikes", "Relying solely on cloud provider SLAs to guarantee availability without application-level resilience", "Pre-allocating maximum capacity at all times to ensure headroom without dynamic scaling"], correct: 1, explanation: "Circuit breakers, fallbacks, load balancing, health checks, and autoscaling provide comprehensive resilience. Single instances lack redundancy, SLAs alone don't ensure app-level resilience, and pre-allocated maximum is cost-prohibitive.", source: "ncp-genl-exam-4", sourceIndex: 46 },
  { id: 2258, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of designing tool-augmented LLM agents for production use, which design approach most effectively prevents cascading failures when a tool invocation returns an unexpected error during multi-step task execution?", options: ["Allowing the agent to proceed with the task using parametric knowledge when tool calls fail", "Implementing structured error handling with retry logic, fallback strategies, state checkpointing, and human-in-the-loop escalation for unrecoverable errors", "Terminating the entire workflow immediately upon any tool error without attempting recovery", "Replacing all external tool calls with LLM-synthesized outputs to eliminate dependency on external systems"], correct: 1, explanation: "Structured error handling with retries, fallbacks, checkpointing, and human escalation ensures resilient multi-step execution. Ignoring errors cascades failures, termination wastes work, and synthetic replacements lose factual grounding.", source: "ncp-genl-exam-4", sourceIndex: 48 },
  { id: 2259, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of production LLM observability, which combination of monitoring strategies most effectively enables early detection of model performance degradation and unexpected behaviors?", options: ["Tracking only infrastructure metrics such as CPU and GPU utilization as proxy signals for model health", "Implementing distributed tracing with end-to-end request logging, real-time statistical monitoring of output distributions, input drift detection, and automated alerting on anomalous generation patterns", "Performing weekly batch analysis of sampled model outputs without real-time monitoring", "Relying on manual review of randomly sampled outputs by the engineering team as the primary monitoring mechanism"], correct: 1, explanation: "Comprehensive observability requires distributed tracing, real-time output monitoring, drift detection, and automated alerting. Infrastructure metrics miss model behavior, weekly analysis is too slow, and manual review doesn't scale.", source: "ncp-genl-exam-4", sourceIndex: 49 },
  { id: 2260, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of continuous improvement of production LLM systems, which feedback loop architecture most effectively translates real-world performance signals into model and system enhancements?", options: ["Collecting user feedback only through explicit star ratings and retraining the model monthly on this signal", "Implementing a closed-loop system that continuously captures implicit and explicit user signals, performs automated quality scoring, routes failures to human reviewers, and feeds curated data back into fine-tuning and prompt optimization pipelines", "Relying solely on automated evaluation metrics on held-out test sets without integrating live production signals", "Retraining the model from scratch at fixed quarterly intervals on new data without real-time signal integration"], correct: 1, explanation: "Closed-loop continuous improvement captures all signals, automates scoring, involves human review, and feeds back into training/prompts. Star-only ratings are incomplete, held-out metrics miss production issues, and quarterly retraining is too slow.", source: "ncp-genl-exam-4", sourceIndex: 50 },
  { id: 2261, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following practices are essential for achieving efficient batch serving of large language models (LLMs) in production environments?", options: ["Implementing dynamic batching to group incoming requests based on model input size and latency constraints", "Using asynchronous request handling to parallelize batch processing and minimize idle GPU time", "Prefetching model weights into CPU memory to reduce GPU memory usage during inference", "Applying model quantization to reduce memory footprint and speed up batch inference", "Disabling caching mechanisms to ensure each batch is processed independently without stale data", "Utilizing hardware accelerators like GPUs or TPUs optimized for parallel batch inference workloads"], correct: [0, 1, 3, 5], multiSelect: true, explanation: "Dynamic batching, async handling, quantization, and hardware accelerators are essential for efficient batch serving. CPU prefetching doesn't help GPU inference, and disabling caching wastes optimization opportunities.", source: "ncp-genl-exam-4", sourceIndex: 51 },
  { id: 2262, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of performance profiling for generative AI large language models (LLMs) accelerated on GPUs, which metric provides the most direct insight into GPU compute utilization bottlenecks during model inference?", options: ["CPU utilization percentage during the inference pipeline", "GPU SM (Streaming Multiprocessor) occupancy and kernel execution time measured via profiling tools such as NVIDIA Nsight or nvprof", "Disk I/O throughput for loading model weights from storage", "Network bandwidth utilization between CPU and GPU during data transfer"], correct: 1, explanation: "GPU SM occupancy and kernel execution time directly reveal compute utilization bottlenecks. CPU utilization is secondary for GPU workloads, disk I/O is rarely the inference bottleneck, and network bandwidth is about data transfer, not compute.", source: "ncp-genl-exam-4", sourceIndex: 52 },
  { id: 2263, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) using cloud-native architectures, which combination of strategies most effectively balances inference cost and latency while ensuring high availability under variable workloads?", options: ["Deploying full-precision model replicas on dedicated on-demand GPU instances without any auto-scaling", "Combining auto-scaling GPU clusters with model quantization, request batching, and spot/preemptible instance usage to minimize cost while maintaining low-latency availability", "Running all inference on CPU-based instances to reduce costs, accepting higher latency", "Pre-loading all model variants into memory simultaneously on a single high-memory instance"], correct: 1, explanation: "Auto-scaling + quantization + batching + spot instances provide optimal cost-latency balance with availability. Dedicated instances waste resources, CPU is too slow, and pre-loading everything wastes memory.", source: "ncp-genl-exam-4", sourceIndex: 53 },
  { id: 2268, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of deploying large language models (LLMs) for real-time applications with strict latency requirements, which optimization strategy most effectively accelerates token generation during autoregressive decoding?", options: ["Increasing the number of transformer layers to improve output quality", "Applying speculative decoding with a smaller draft model to generate candidate tokens that the larger model verifies in parallel", "Using full-precision (FP32) inference to avoid accuracy degradation from quantization", "Disabling the KV-cache to reduce peak memory consumption during long sequences"], correct: 1, explanation: "Speculative decoding uses a small draft model to generate candidates verified by the larger model in parallel, accelerating generation. More layers increase latency, FP32 is slower, and disabling KV-cache dramatically increases latency.", source: "ncp-genl-exam-4", sourceIndex: 68 },
  { id: 2280, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of building scalable and maintainable LLM-powered enterprise applications, which software architecture pattern most effectively supports independent scaling, deployment, and iteration of different application components?", options: ["A monolithic architecture where all LLM-related functions are co-located in a single service", "A microservices architecture with clearly defined boundaries between the LLM inference layer, orchestration logic, retrieval components, and evaluation services, enabling independent scaling and deployment", "A tightly coupled architecture where the LLM, retrieval, and business logic share the same compute environment", "A serverless architecture where the full LLM is instantiated fresh for each individual user request"], correct: 1, explanation: "Microservices with clear boundaries enable independent scaling, deployment, and iteration of each component. Monolithic can't scale independently, tightly coupled shares failure domains, and serverless per-request LLM instantiation has high cold-start latency.", source: "ncp-genl-exam-4", sourceIndex: 70 },
  // ── Safety & Governance ──
  { id: 2229, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of bias detection and mitigation in large language models (LLMs), which approach most comprehensively addresses both data-level and model-level sources of bias while maintaining downstream task performance?", options: ["Applying post-hoc output filtering to remove tokens associated with demographic groups", "Combining diverse and balanced training data curation with adversarial debiasing techniques and fairness-aware fine-tuning on curated datasets", "Training the model exclusively on synthetic data to eliminate real-world biases from the corpus", "Increasing model size to allow the model to learn more nuanced representations that naturally mitigate bias"], correct: 1, explanation: "Combining diverse data curation, adversarial debiasing, and fairness-aware fine-tuning addresses bias at both data and model levels. Post-hoc filtering is superficial, synthetic data introduces different biases, and larger models don't naturally reduce bias.", source: "ncp-genl-exam-4", sourceIndex: 19 },
  { id: 2230, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety and alignment, which technique most effectively uses human preference data to fine-tune a language model to generate outputs that are helpful, harmless, and honest?", options: ["Supervised fine-tuning (SFT) on a curated dataset of labeled instruction-following examples", "Unsupervised pretraining on large-scale diverse web corpora", "Reinforcement Learning from Human Feedback (RLHF)", "Knowledge distillation from a larger aligned teacher model into a smaller student model"], correct: 2, explanation: "RLHF trains a reward model from human preference comparisons and uses RL to optimize the LLM toward preferred responses. SFT teaches format not preferences, pretraining is general-purpose, and distillation transfers capabilities without adding alignment.", source: "ncp-genl-exam-4", sourceIndex: 20 },
  { id: 2231, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which governance framework most effectively ensures comprehensive oversight and accountability across the full model lifecycle?", options: ["Relying solely on post-deployment user feedback to identify and correct harmful model behaviors", "Implementing a lifecycle governance framework that includes pre-deployment red-teaming, model cards, continuous monitoring, incident response protocols, and regular third-party audits", "Applying strict keyword-based output filtering as the primary mechanism for safety enforcement", "Delegating all governance responsibilities to end-user organizations deploying the model via APIs"], correct: 1, explanation: "Lifecycle governance with red-teaming, model cards, monitoring, incident response, and audits provides comprehensive oversight. User feedback alone is reactive, keyword filtering is superficial, and delegating responsibility avoids developer accountability.", source: "ncp-genl-exam-4", sourceIndex: 21 },
  { id: 2232, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI for large language models (LLMs), which of the following evaluation methodologies most rigorously identifies potential safety vulnerabilities and failure modes before production deployment?", options: ["Standard benchmarking on held-out academic datasets using accuracy and perplexity metrics", "Structured red-teaming with diverse adversarial prompts designed to probe safety boundaries, elicit harmful outputs, and surface edge-case failures", "User acceptance testing with a small group of internal stakeholders to validate usability", "Automated regression testing against a fixed set of predefined input-output pairs"], correct: 1, explanation: "Structured red-teaming systematically probes safety boundaries with diverse adversarial prompts. Academic benchmarks don't test safety, UAT is too narrow, and regression testing only covers known scenarios.", source: "ncp-genl-exam-4", sourceIndex: 22 },
  { id: 2233, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI practices for large language models (LLMs), which combination of technical and governance measures most comprehensively ensures alignment with safety, fairness, and transparency requirements?", options: ["Applying rule-based output filters exclusively to block predefined harmful content categories", "Combining RLHF-based alignment, Constitutional AI principles, adversarial red-teaming, model cards, and continuous post-deployment monitoring", "Relying solely on pretraining data curation to ensure safe outputs without any post-training alignment", "Using model distillation to create smaller, inherently safer models without additional alignment techniques"], correct: 1, explanation: "RLHF + Constitutional AI + red-teaming + model cards + monitoring provides comprehensive safety, fairness, and transparency. Filters alone are superficial, data curation alone is insufficient, and distillation doesn't inherently add safety.", source: "ncp-genl-exam-4", sourceIndex: 23 },
  { id: 2245, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of production LLM deployment, which combination of safety and governance mechanisms most effectively ensures compliance with organizational risk policies and regulatory requirements?", options: ["Deploying the model without any output filtering to maximize response diversity and avoid over-censorship", "Implementing layered guardrails with input validation, output filtering, human-in-the-loop review for high-risk outputs, audit logging, and continuous monitoring against policy thresholds", "Relying solely on fine-tuning the model on policy-compliant data to enforce safe behaviors without runtime controls", "Using keyword-based blocklists as the only content moderation mechanism"], correct: 1, explanation: "Layered guardrails with input validation, output filtering, human review, audit logging, and monitoring provide comprehensive compliance. No filtering is irresponsible, fine-tuning alone lacks runtime controls, and blocklists are easily bypassed.", source: "ncp-genl-exam-4", sourceIndex: 36 },
  { id: 2246, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of deploying large language models (LLMs) in regulated industries such as healthcare and finance, which combination of data privacy and compliance strategies most comprehensively addresses regulatory requirements?", options: ["Storing all user interactions in plaintext for easy auditability without any access restrictions", "Implementing end-to-end encryption, data minimization, role-based access controls, differential privacy for sensitive data processing, and audit trails aligned with regulations such as HIPAA and GDPR", "Relying on the cloud provider's default security settings without additional application-level privacy controls", "Anonymizing only model outputs while retaining raw user inputs in plaintext"], correct: 1, explanation: "End-to-end encryption, data minimization, RBAC, differential privacy, and regulation-aligned audit trails comprehensively address compliance. Plaintext storage violates regulations, default settings are insufficient, and output-only anonymization leaves inputs exposed.", source: "ncp-genl-exam-4", sourceIndex: 37 },
  { id: 2247, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI governance for large language models (LLMs), which framework most comprehensively ensures accountability, transparency, and auditability across the model's full lifecycle?", options: ["Deploying models without public documentation to protect proprietary architecture details", "Implementing model cards with detailed documentation, continuous monitoring dashboards, independent third-party audits, and clear incident response protocols", "Restricting model access to internal teams through API key management without any external oversight", "Relying on automated output filtering as the sole mechanism for ensuring model accountability"], correct: 1, explanation: "Model cards, monitoring dashboards, third-party audits, and incident response provide comprehensive lifecycle governance. No documentation prevents oversight, API management alone doesn't ensure responsible use, and filtering alone is insufficient.", source: "ncp-genl-exam-4", sourceIndex: 38 },
  { id: 2264, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of data privacy for large language models (LLMs), which technique most effectively prevents the model from memorizing and reproducing sensitive personal information present in the training data?", options: ["Applying post-hoc output filtering to detect and remove PII from generated text at inference time", "Incorporating differential privacy mechanisms during training to add calibrated noise that limits the influence of individual data points on model parameters", "Encrypting training data at rest without modifying the training procedure or objective", "Reducing model size to lower its overall capacity for memorizing training examples"], correct: 1, explanation: "Differential privacy provides formal mathematical guarantees against memorization through calibrated noise. Post-hoc filtering is incomplete, encryption doesn't affect trained weights, and smaller models can still memorize sensitive data.", source: "ncp-genl-exam-4", sourceIndex: 54 },
  { id: 2265, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM safety evaluation, which methodology most rigorously identifies potential safety vulnerabilities before production deployment?", options: ["Automated benchmarking on standard academic datasets to assess task performance", "Structured adversarial red-teaming with diverse human evaluators probing for harmful, deceptive, or unsafe outputs across multiple risk categories", "Statistical analysis of training data distributions to predict potential unsafe outputs", "Unit testing of individual model components in isolation without end-to-end safety evaluation"], correct: 1, explanation: "Structured red-teaming with diverse evaluators systematically discovers safety vulnerabilities across risk categories. Benchmarks don't test safety, training data analysis can't predict all unsafe outputs, and component testing misses emergent behaviors.", source: "ncp-genl-exam-4", sourceIndex: 55 },
  { id: 2266, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment for large language models (LLMs) in high-stakes applications, which combination of measures most comprehensively ensures safe and accountable model behavior?", options: ["Applying strict keyword-based output filters as the sole safety mechanism", "Combining RLHF-based alignment, adversarial red-teaming, human-in-the-loop review for high-risk outputs, model cards, continuous monitoring, and clear incident response protocols", "Relying solely on pretraining data curation to ensure safety without any post-training alignment", "Using model distillation into smaller models as the primary strategy for improving safety"], correct: 1, explanation: "Comprehensive safety requires RLHF alignment, red-teaming, human review, documentation, monitoring, and incident response. Keyword filters are superficial, data curation alone is insufficient, and distillation doesn't inherently improve safety.", source: "ncp-genl-exam-4", sourceIndex: 56 },
  { id: 2267, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of privacy-preserving machine learning for large language models (LLMs), which technique most effectively prevents training data extraction attacks while maintaining acceptable model utility?", options: ["Post-hoc removal of sensitive data from model weights after training is complete", "Applying differential privacy during training with calibrated noise injection to formally bound the influence of individual training examples", "Encrypting training data in transit and at rest without modifying the training procedure", "Reducing model capacity to limit memorization without providing formal privacy guarantees"], correct: 1, explanation: "Differential privacy provides formal bounds on individual example influence through calibrated noise. Post-hoc removal is impractical, encryption doesn't affect trained weights, and reduced capacity doesn't provide formal guarantees.", source: "ncp-genl-exam-4", sourceIndex: 57 },
  { id: 2271, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of building production LLM-powered applications, which testing strategy most comprehensively validates both the functional correctness and safety of model outputs before deployment?", options: ["Unit testing individual prompt templates in isolation against a fixed set of expected outputs", "Combining automated regression testing, adversarial red-teaming, human evaluation of diverse sampled outputs, and integration testing across the full application pipeline", "Relying solely on user acceptance testing with internal stakeholders before release", "Evaluating the model on standard academic benchmarks without application-specific test coverage"], correct: 1, explanation: "Comprehensive testing combines regression (consistency), red-teaming (safety), human evaluation (quality), and integration testing (end-to-end). Unit testing is narrow, UAT alone is insufficient, and benchmarks don't test application-specific behavior.", source: "ncp-genl-exam-4", sourceIndex: 61 },
  { id: 2273, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of integrating LLMs into high-stakes enterprise workflows, which design pattern most effectively ensures appropriate human oversight while maintaining operational efficiency?", options: ["Fully automating all decisions using LLM outputs without any human review", "Implementing a human-in-the-loop architecture where LLM outputs are surfaced as recommendations with confidence scores, and actions above a defined risk threshold require explicit human approval", "Replacing LLMs with deterministic rule-based systems for all critical decision points", "Relying on the LLM's internal uncertainty estimates as the sole trigger for human review"], correct: 1, explanation: "Human-in-the-loop with recommendations, confidence scores, and risk-threshold-based approval ensures oversight with efficiency. Full automation removes oversight, rule-based systems underutilize LLM capability, and uncertainty estimates alone are unreliable.", source: "ncp-genl-exam-4", sourceIndex: 63 },
  { id: 2276, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of responsible AI deployment of large language models (LLMs), which combination of technical and governance practices most comprehensively ensures ongoing compliance with evolving safety and ethical standards?", options: ["Deploying a fixed set of safety filters at launch and updating them only when violations are reported", "Implementing continuous red-teaming, regular bias and fairness audits, model card updates aligned with evolving standards, real-time monitoring dashboards, and feedback loops that incorporate new safety findings into retraining", "Relying on static pretraining data curation as the primary mechanism for long-term safety compliance", "Delegating safety compliance entirely to the cloud provider's built-in content moderation tools"], correct: 1, explanation: "Continuous red-teaming, regular audits, updated model cards, real-time monitoring, and feedback loops ensure ongoing compliance with evolving standards. Fixed filters become outdated, static curation can't adapt, and delegating to cloud tools avoids responsibility.", source: "ncp-genl-exam-4", sourceIndex: 66 },
  { id: 2277, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of LLM-powered customer support automation, which architectural approach most effectively handles edge cases and out-of-distribution queries while maintaining high customer satisfaction?", options: ["Routing all queries exclusively to the LLM without any fallback or escalation mechanism", "Implementing a tiered routing system that uses the LLM for routine queries, escalates low-confidence or high-risk cases to human agents, and continuously improves via feedback from escalated interactions", "Replacing the LLM entirely with a rule-based decision tree for all customer interactions", "Using the LLM's confidence scores as the sole determinant for human escalation without additional safeguards"], correct: 1, explanation: "Tiered routing with LLM for routine queries, human escalation for edge cases, and continuous improvement from escalation feedback optimally handles distribution shifts. LLM-only misses edge cases, rule-based lacks flexibility, and confidence-only escalation is unreliable.", source: "ncp-genl-exam-4", sourceIndex: 67 },
  { id: 2279, domain: "safety", domainLabel: "Safety & Governance", question: "In the context of training large language models (LLMs) on proprietary enterprise data, which combination of data governance and security practices most effectively protects sensitive information while enabling model development?", options: ["Training on raw sensitive data without any anonymization to preserve data fidelity for optimal model performance", "Applying differential privacy during training, using data anonymization and synthetic data generation for sensitive fields, and implementing strict access controls and audit trails for the training pipeline", "Encrypting training data at rest without modifying the training process or applying any privacy-preserving techniques", "Restricting model training to publicly available data only, excluding all proprietary enterprise data"], correct: 1, explanation: "Differential privacy, anonymization, synthetic data for sensitive fields, access controls, and audit trails together protect sensitive information while enabling model development. Raw data exposure is irresponsible, encryption alone doesn't protect the trained model, and excluding proprietary data defeats the purpose.", source: "ncp-genl-exam-4", sourceIndex: 69 },
  // ── Exam 5 (Q1-Q70) ──
  { id: 2281, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which component primarily enables the model to capture long-range dependencies and contextual relationships within input sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention computes relationships between all token pairs simultaneously, enabling distance-independent capture of long-range dependencies and contextual relationships. RNNs struggle with long-range dependencies, CNNs have limited receptive fields, and feedforward networks process positions independently.", source: "ncp-genl-exam-5", sourceIndex: 1 },
  { id: 2282, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the architecture of large language models (LLMs), which mechanism primarily enables the model to capture contextual relationships between tokens regardless of their distance in the input sequence?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention computes pairwise relationships between all tokens simultaneously, capturing contextual dependencies regardless of position distance. RNNs process sequentially, CNNs capture local patterns, and feedforward networks operate per-position.", source: "ncp-genl-exam-5", sourceIndex: 2 },
  { id: 2283, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following architectural components or design choices are critical for enabling efficient training and inference in large-scale Transformer-based LLMs?", options: ["Use of multi-head self-attention to capture diverse contextual relationships", "Incorporation of recurrent neural network layers to maintain long-term dependencies", "Layer normalization applied before each sub-layer to stabilize training", "Use of fixed positional embeddings to encode token order information", "Implementation of sparse attention mechanisms to reduce computational complexity", "Heavy reliance on convolutional layers to extract local features before attention"], correct: [0, 2, 4], multiSelect: true, explanation: "Multi-head self-attention captures diverse relationships, pre-layer normalization stabilizes training, and sparse attention reduces quadratic complexity. RNN layers are replaced by attention, fixed embeddings limit generalization, and convolutional pre-processing is not standard in modern LLMs.", source: "ncp-genl-exam-5", sourceIndex: 3 },
  { id: 2284, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the foundational architecture of large language models (LLMs), which component primarily enables the model to capture long-range dependencies and contextual relationships within input sequences?", options: ["Recurrent Neural Networks (RNNs)", "Self-Attention Mechanism", "Convolutional Neural Networks (CNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention captures long-range dependencies by computing attention scores between all token pairs simultaneously. RNNs have vanishing gradient issues, CNNs have limited receptive fields, and feedforward networks process positions independently.", source: "ncp-genl-exam-5", sourceIndex: 4 },
  { id: 2285, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of foundational Large Language Model (LLM) architectures, which component primarily enables the model to capture long-range dependencies in input sequences effectively?", options: ["Convolutional Neural Networks (CNNs)", "Self-Attention Mechanism", "Recurrent Neural Networks (RNNs)", "Feedforward Neural Networks"], correct: 1, explanation: "Self-attention enables parallel computation of relationships between all tokens, efficiently capturing long-range dependencies. CNNs have limited receptive fields, RNNs process sequentially with vanishing gradients, and feedforward networks operate per-position.", source: "ncp-genl-exam-5", sourceIndex: 5 },
  { id: 2286, domain: "architecture", domainLabel: "Architecture & Foundations", question: "Which of the following architectural components or design choices are essential for enabling efficient training and inference in large-scale Transformer-based LLMs?", options: ["Layer normalization applied before the self-attention and feed-forward sublayers (Pre-LN)", "Use of recurrent connections to capture long-range dependencies", "Scaled dot-product attention with multi-head attention mechanisms", "Replacing feed-forward networks with convolutional layers for token-wise processing", "Position embeddings to provide tokens with sequential order information", "Using sigmoid activation functions exclusively in feed-forward layers"], correct: [0, 2, 4], multiSelect: true, explanation: "Pre-LN stabilizes deep training, scaled dot-product multi-head attention captures diverse relationships, and position embeddings provide order information. Recurrent connections are replaced by attention, convolutional replacement is not standard, and sigmoid is not the standard activation (ReLU/GELU are preferred).", source: "ncp-genl-exam-5", sourceIndex: 6 },
  { id: 2318, domain: "architecture", domainLabel: "Architecture & Foundations", question: "In the context of tokenization for large language models (LLMs), which algorithm most effectively balances vocabulary coverage, subword granularity, and robustness to out-of-vocabulary words across multilingual corpora?", options: ["Byte-Pair Encoding (BPE)", "Word-level tokenization", "Character-level tokenization", "Whitespace tokenization"], correct: 0, explanation: "BPE iteratively merges frequent character pairs, creating subword units that handle rare/OOV words while maintaining manageable vocabulary across languages. Word-level has OOV issues, character-level is too granular, and whitespace fails for non-space-delimited languages.", source: "ncp-genl-exam-5", sourceIndex: 38 },
  // ── Prompt Engineering & RAG ──
  { id: 2287, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models, which technique most effectively enables the model to perform complex, multi-step reasoning by explicitly guiding it to articulate intermediate steps?", options: ["Zero-Shot Prompting", "Few-Shot Prompting", "Chain-of-Thought Prompting", "Template-Based Prompting"], correct: 2, explanation: "Chain-of-thought prompting guides models through intermediate reasoning steps, significantly improving multi-step logical deduction. Zero-shot lacks demonstrations, few-shot provides examples without reasoning chains, and template-based structures format but not reasoning.", source: "ncp-genl-exam-5", sourceIndex: 7 },
  { id: 2288, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models (LLMs), which technique most effectively improves task performance when labeled examples are scarce by including a small number of task demonstrations directly within the input prompt?", options: ["Zero-shot prompting with detailed task descriptions", "Few-shot prompting with carefully selected in-context examples", "Instruction fine-tuning on a large labeled dataset", "Retrieval-Augmented Generation (RAG) with external knowledge bases"], correct: 1, explanation: "Few-shot prompting includes task demonstrations directly in the prompt, enabling the model to infer patterns without weight updates. Zero-shot uses no examples, instruction fine-tuning modifies weights, and RAG retrieves documents rather than task demonstrations.", source: "ncp-genl-exam-5", sourceIndex: 8 },
  { id: 2289, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of designing prompts for large language models to minimize hallucination in enterprise applications, which strategy is most effective?", options: ["Increasing the temperature parameter to encourage more diverse and exploratory outputs", "Explicitly instructing the model to acknowledge uncertainty, cite retrieved sources, and avoid generating information not present in the provided context", "Using zero-shot prompts without any contextual information to rely solely on the model's parametric knowledge", "Lengthening prompts with detailed background to improve factual recall from the model's internal knowledge"], correct: 1, explanation: "Explicit instructions to acknowledge uncertainty and cite sources grounds responses in verifiable information, reducing hallucination. Higher temperature increases randomness, zero-shot without context relies on parametric knowledge, and longer prompts don't prevent fabrication.", source: "ncp-genl-exam-5", sourceIndex: 9 },
  { id: 2290, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt injection attacks on large language model (LLM) systems, which defense strategy most effectively prevents adversarial inputs from overriding system-level instructions?", options: ["Increasing the verbosity and length of system prompts to dominate the context window", "Implementing strict input validation and sanitization combined with architectural separation between trusted system instructions and untrusted user inputs", "Disabling system prompts entirely to eliminate the attack surface", "Increasing the model's context window so injected content is diluted by surrounding tokens"], correct: 1, explanation: "Strict validation, sanitization, and architectural separation prevent adversarial overrides. Longer prompts don't prevent injection, disabling prompts removes control, and larger context doesn't dilute attack effectiveness.", source: "ncp-genl-exam-5", sourceIndex: 10 },
  { id: 2291, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of prompt engineering for large language models, which of the following strategies effectively leverage one-shot learning to improve model performance on a new task?", options: ["Providing a single, well-crafted example within the prompt to demonstrate the task format", "Including multiple examples in the prompt to cover various task scenarios", "Using explicit instructions combined with a single example to clarify the task requirements", "Fine-tuning the model on a large dataset before inference to adapt it to the new task", "Relying solely on the model's pre-trained knowledge without providing any examples or instructions", "Using chain-of-thought prompting with a single example to guide reasoning steps"], correct: [0, 2, 5], multiSelect: true, explanation: "One-shot learning uses a single example to demonstrate task format, combines instructions with one example for clarity, and can use chain-of-thought with one example for reasoning guidance. Multiple examples is few-shot (not one-shot), fine-tuning changes weights, and no examples is zero-shot.", source: "ncp-genl-exam-5", sourceIndex: 11 },
  { id: 2292, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of domain adaptation via prompting for large language models, which of the following strategies are effective for improving model performance on a target domain with limited labeled data?", options: ["Designing prompts that include domain-specific terminology and context to guide model outputs", "Using zero-shot prompting with generic instructions unrelated to the target domain", "Providing few-shot examples that demonstrate domain-specific tasks and expected outputs", "Combining chain-of-thought prompting with domain-specific examples to elicit structured reasoning", "Relying solely on the model's general pre-trained knowledge without domain-specific prompting", "Using high-temperature sampling to encourage diverse outputs without domain-specific guidance"], correct: [0, 2, 3], multiSelect: true, explanation: "Domain adaptation benefits from domain-specific terminology in prompts, few-shot domain examples, and chain-of-thought with domain context. Generic zero-shot lacks domain knowledge, relying on pretrained knowledge alone is insufficient, and high temperature without guidance increases noise.", source: "ncp-genl-exam-5", sourceIndex: 12 },
  { id: 2296, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of mitigating hallucination in large language models (LLMs) for production systems, which technique most directly grounds model outputs in verified external knowledge?", options: ["Increasing inference temperature to generate more diverse candidate outputs", "Implementing Retrieval-Augmented Generation (RAG) to supply the model with relevant, verified documents at inference time", "Reducing the model's context window to limit exposure to conflicting information", "Fine-tuning exclusively on synthetic self-generated data to reinforce consistent patterns"], correct: 1, explanation: "RAG grounds outputs in verified external documents at inference time. Higher temperature increases randomness, smaller context windows lose information, and self-generated synthetic data can amplify existing errors.", source: "ncp-genl-exam-5", sourceIndex: 16 },
  { id: 2301, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of Retrieval-Augmented Generation (RAG) for large language models, which architectural component most significantly determines the relevance and quality of retrieved context?", options: ["The language model decoder that generates the final answer", "The dense retriever that encodes queries and documents into a shared vector space for similarity-based retrieval", "The tokenizer preprocessing the user query", "The reranker module that applies cross-attention between query and all corpus documents"], correct: 1, explanation: "The dense retriever maps queries and documents into the same embedding space for semantic similarity search, determining retrieval relevance. The decoder generates responses, the tokenizer preprocesses text, and the reranker refines ordering after initial retrieval.", source: "ncp-genl-exam-5", sourceIndex: 21 },
  { id: 2330, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of building enterprise RAG systems, which architectural decision most critically impacts the system's ability to handle complex multi-hop reasoning queries?", options: ["Language model architecture used for answer generation", "Retrieval strategy, including iterative or multi-hop retrieval to gather evidence across multiple documents before generation", "Tokenization method applied to queries and documents", "Decoding strategy (greedy vs. beam search) used by the language model"], correct: 1, explanation: "Multi-hop queries require iterative retrieval gathering evidence across documents before generation. Model architecture, tokenization, and decoding affect other aspects but don't address multi-hop retrieval.", source: "ncp-genl-exam-5", sourceIndex: 50 },
  { id: 2326, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of LLM-powered conversational AI for enterprise applications, which architecture most effectively balances factual accuracy, knowledge freshness, and scalability?", options: ["Standalone fine-tuned LLM with domain knowledge in parameters and no retrieval", "RAG-based architecture combining a fine-tuned LLM with a continuously updated vector database and a reranking layer", "Rule-based chatbot augmented with a generative LLM for fallback responses", "Multi-LLM ensemble without retrieval where models vote on the best response"], correct: 1, explanation: "RAG with fine-tuned LLM, updated vector database, and reranking provides accuracy, freshness, and scalability. Parametric-only knowledge becomes stale, rule-based lacks flexibility, and ensembles without retrieval can't ground facts.", source: "ncp-genl-exam-5", sourceIndex: 46 },
  { id: 2339, domain: "prompt", domainLabel: "Prompt Engineering & RAG", question: "In the context of optimizing RAG pipelines for enterprise knowledge management, which combination most effectively improves retrieval precision and reduces hallucination?", options: ["Sparse keyword retrieval (BM25) without reranking or compression", "Dense vector retrieval combined with cross-encoder reranking, context compression, and source attribution in generated outputs", "Increasing context window to include all retrieved documents without filtering", "Relying solely on LLM parametric knowledge without retrieval"], correct: 1, explanation: "Dense retrieval + reranking + compression + source attribution provides precise, verifiable, hallucination-resistant generation. Sparse retrieval misses semantics, including everything wastes context, and parametric-only knowledge hallucinates more.", source: "ncp-genl-exam-5", sourceIndex: 59 },
  // ── Training & Fine-Tuning ──
  { id: 2293, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs), which parameter-efficient technique most effectively reduces computational cost by introducing trainable low-rank matrices into transformer layers while keeping original weights frozen?", options: ["Full fine-tuning of all model parameters", "Low-Rank Adaptation (LoRA)", "Adapter layer insertion between transformer blocks", "Prefix tuning on input embeddings only"], correct: 1, explanation: "LoRA introduces small trainable low-rank matrices alongside frozen original weights, dramatically reducing computational cost. Full fine-tuning updates all parameters, adapters add entire new modules, and prefix tuning has limited expressiveness.", source: "ncp-genl-exam-5", sourceIndex: 13 },
  { id: 2294, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning large language models (LLMs) for domain-specific applications, which approach most effectively reduces computational overhead while maintaining high task performance?", options: ["Full fine-tuning of all model parameters on domain-specific data", "Parameter-Efficient Fine-Tuning (PEFT) using methods such as LoRA or adapter layers that update only a small subset of parameters", "Retraining the model from scratch on domain-specific data", "Continued pretraining on domain-specific data using the original self-supervised objective"], correct: 1, explanation: "PEFT methods update only small additional parameters while keeping the base model frozen, minimizing compute while preserving pretrained knowledge. Full fine-tuning is expensive, retraining wastes pretrained knowledge, and continued pretraining doesn't target specific tasks.", source: "ncp-genl-exam-5", sourceIndex: 14 },
  { id: 2295, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of Reinforcement Learning from Human Feedback (RLHF) for aligning large language models, which component provides the training signal that directly guides the policy model toward generating outputs preferred by humans?", options: ["The supervised fine-tuning (SFT) baseline policy", "The reward model trained on human preference comparison data", "The KL-divergence penalty constraining policy deviation", "The value function estimating expected cumulative reward"], correct: 1, explanation: "The reward model scores outputs based on learned human preferences, directly providing the training signal. SFT provides the baseline, KL penalty constrains deviation, and the value function estimates future rewards.", source: "ncp-genl-exam-5", sourceIndex: 15 },
  { id: 2302, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of preparing datasets for training large language models (LLMs), which data preprocessing practice most critically impacts training quality and generalization?", options: ["Converting all text to uppercase for tokenization consistency", "Deduplication, quality filtering, and normalization of training corpora to remove low-quality, duplicate, or toxic content", "Truncating all documents to a fixed maximum length", "Removing all punctuation to reduce vocabulary size"], correct: 1, explanation: "Deduplication, quality filtering, and normalization ensure clean, diverse training data that improves generalization. Uppercasing changes semantics, fixed truncation loses content, and removing punctuation loses syntactic information.", source: "ncp-genl-exam-5", sourceIndex: 22 },
  { id: 2319, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of deploying large language models (LLMs) for specialized enterprise applications, which approach most effectively adapts the model to domain-specific tasks while minimizing computational overhead?", options: ["Retraining from scratch on domain-specific data", "Applying PEFT methods such as LoRA on curated domain-specific datasets while keeping base model weights frozen", "Expanding the tokenizer vocabulary and retraining only the embedding layer", "Increasing context window size to accommodate longer domain documents"], correct: 1, explanation: "PEFT/LoRA enables rapid domain adaptation with minimal compute. Retraining from scratch is expensive, vocabulary expansion alone doesn't adapt behavior, and larger context doesn't add domain knowledge.", source: "ncp-genl-exam-5", sourceIndex: 39 },
  { id: 2341, domain: "training", domainLabel: "Training & Fine-Tuning", question: "In the context of fine-tuning LLMs for domain adaptation, which combination most effectively prevents catastrophic forgetting while improving domain-specific performance?", options: ["Full fine-tuning with a high learning rate to accelerate adaptation", "PEFT methods (e.g., LoRA) combined with a mixed training strategy retaining a proportion of general pretraining data", "Freezing all parameters and training only a new classification head", "Retraining from scratch on a combined general and domain-specific dataset"], correct: 1, explanation: "PEFT preserves general knowledge in frozen weights while mixed training maintains general capabilities. Full fine-tuning risks forgetting, frozen parameters limit adaptation, and retraining from scratch wastes pretrained knowledge.", source: "ncp-genl-exam-5", sourceIndex: 61 },
  // ── Deployment & Optimization ──
  { id: 2304, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of evaluating large language models (LLMs) for generative tasks, which evaluation framework most comprehensively assesses output quality across multiple dimensions?", options: ["Automated BLEU and ROUGE scores on held-out reference sets", "A hybrid framework combining automated metrics (BERTScore, ROUGE) with human evaluation for coherence, factual correctness, and task-specific relevance, plus red-teaming for safety", "Perplexity measurement on domain-specific validation datasets", "Exact match accuracy on closed-ended benchmark tasks"], correct: 1, explanation: "Hybrid evaluation combining automated metrics, human evaluation, and red-teaming comprehensively covers quality and safety. Single metrics are incomplete, perplexity doesn't measure factual accuracy, and exact match doesn't handle generative outputs.", source: "ncp-genl-exam-5", sourceIndex: 24 },
  { id: 2305, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following techniques are effective for optimizing both latency and throughput in large language model (LLM) inference workloads?", options: ["Quantization of model weights to lower precision formats", "Increasing the batch size during inference without hardware constraints", "Using model distillation to create a smaller, faster model", "Disabling mixed precision to ensure numerical stability", "Using sequential token generation without parallel decoding", "Applying dynamic padding to input sequences during batch processing"], correct: [0, 1, 2], multiSelect: true, explanation: "Quantization reduces computation, larger batch sizes improve throughput, and distillation creates faster models. Disabling mixed precision wastes resources, sequential generation is the baseline (not an optimization), and dynamic padding is standard practice not a specific optimization.", source: "ncp-genl-exam-5", sourceIndex: 25 },
  { id: 2306, domain: "deployment", domainLabel: "Deployment & Optimization", question: "When optimizing large language models (LLMs) deployed with NVIDIA Triton on Kubernetes, which of the following strategies effectively improve inference performance and resource utilization?", options: ["Leveraging Triton's dynamic batching feature to combine multiple inference requests into a single batch", "Configuring Kubernetes Horizontal Pod Autoscaler (HPA) to scale Triton pods based on GPU utilization metrics", "Using Kubernetes StatefulSets to manage Triton instances for stateless LLM inference workloads", "Enabling Triton's model ensemble feature to chain multiple model executions within a single inference request", "Disabling GPU memory pooling in Triton to prevent memory fragmentation during LLM inference", "Deploying Triton with Kubernetes DaemonSets to ensure one pod per GPU node for optimized resource allocation"], correct: [0, 1, 3], multiSelect: true, explanation: "Triton's dynamic batching maximizes GPU utilization, K8s HPA scales based on demand, and model ensembles enable chained inference. StatefulSets are wrong for stateless workloads, disabling memory pooling hurts performance, and DaemonSets don't match dynamic scaling needs.", source: "ncp-genl-exam-5", sourceIndex: 26 },
  { id: 2307, domain: "deployment", domainLabel: "Deployment & Optimization", question: "Which of the following practices are essential for effective model update management in large language model (LLM) deployments within a production environment?", options: ["Implementing a continuous integration and deployment (CI/CD) pipeline for automated model testing and deployment", "Deploying model updates directly to production without staging or testing to minimize downtime", "Using canary releases or blue-green deployments to minimize risk during model updates", "Performing all model updates during peak traffic periods to ensure maximum testing coverage", "Maintaining version control for model artifacts, configurations, and associated datasets to enable reproducibility and rollback", "Skipping performance benchmarking for incremental model updates to streamline the deployment process"], correct: [0, 2, 4], multiSelect: true, explanation: "CI/CD automation, canary/blue-green deployments, and version control are essential for safe, reproducible model updates. Direct production deployment is risky, peak-traffic updates are dangerous, and skipping benchmarks misses regressions.", source: "ncp-genl-exam-5", sourceIndex: 27 },
  { id: 2308, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of ensuring high availability and fault tolerance for large language model (LLM) deployments in production, which strategy most effectively minimizes service disruption during infrastructure failures?", options: ["Deploying a single LLM instance with maximum available hardware resources", "Implementing a multi-region deployment with active-active or active-passive failover, health checks, and automated traffic rerouting", "Using a monolithic deployment to reduce operational complexity", "Relying solely on hardware redundancy within a single data center"], correct: 1, explanation: "Multi-region deployment with failover, health checks, and automated rerouting maximizes availability. Single instances lack redundancy, monolithic can't isolate failures, and single-datacenter redundancy doesn't protect against regional outages.", source: "ncp-genl-exam-5", sourceIndex: 28 },
  { id: 2309, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of large language model (LLM) inference optimization, which technique most effectively reduces the time-to-first-token (TTFT) and memory bandwidth overhead during autoregressive decoding?", options: ["Gradient checkpointing during inference to reduce memory usage", "Mixed precision training to lower weight precision", "KV-cache optimization to store and reuse previously computed key-value tensors across decoding steps", "Speculative decoding with full verification of all tokens before output"], correct: 2, explanation: "KV-cache stores and reuses previously computed key-value pairs, avoiding redundant computation at each decoding step. Gradient checkpointing is for training, mixed precision is for training efficiency, and speculative decoding is a different acceleration technique.", source: "ncp-genl-exam-5", sourceIndex: 29 },
  { id: 2310, domain: "deployment", domainLabel: "Deployment & Optimization", question: "In the context of optimizing large language models (LLMs) for deployment on resource-constrained environments, which combination of techniques most effectively reduces memory footprint and inference latency while maintaining acceptable output quality?", options: ["Increasing the number of attention heads to distribute computation", "Structured pruning to remove redundant parameters combined with post-training quantization to INT8 or INT4", "Expanding embedding dimensions to improve representational quality", "Fine-tuning the model on device-specific datasets without architectural changes"], correct: 1, explanation: "Structured pruning + quantization dramatically reduces memory and latency while maintaining quality. More attention heads or larger embeddings increase resources, and fine-tuning alone doesn't reduce model size.", source: "ncp-genl-exam-5", sourceIndex: 30 },
